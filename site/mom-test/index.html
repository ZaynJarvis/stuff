的前提下，尽快接近能改变业务的事实。`]},example:{label:`两种都会失败的工具`,summary:`推土机与牙刷`,details:[`“你觉得这是好点子吗？”像推土机，会逼出支持你的答案。`,`只问无关痛痒的人口资料像拿牙刷挖整座城市，不偏，却没有进展。`],analysis:[`好问题不是越柔和越好，而是既可靠又有决策价值。`]},practicePrompt:`把你准备问的三个问题各过一遍：它会诱导吗？答案会改变什么？`,try:[`如果答案相反，我会改变哪一步？`,`这件事上一次真实发生是什么时候？`],avoid:[`先用一长段背景暗示你想听的答案。`],sources:[`Introduction · body1.xhtml`,`Talking to customers is hard · body3.xhtml`],tags:[`核心原则`,`提问`,`数据质量`]},{id:`MT-002`,chapterId:`intro`,title:`假阳性比无知更危险`,englishTitle:`False positive`,subtitle:`坏对话会让你放心地走错路`,minutes:3,thesis:`没有信息时你会谨慎；一把虚假的正反馈，却会让你把更多资源押错。`,keyPoints:[`“聊过客户”不等于学到了东西`,`假阳性会诱发过度投入`,`customer conversation 不是完整的 Customer Development`],body:[`坏对话不只浪费一小时。它会让你觉得方向已经被验证，于是继续招人、写代码、花营销费。无知至少会让人小心；虚假的确定感反而最容易把公司拖进深水。`,`本书处理的是 customer conversation：怎样从谈话里拿到可靠信息。它不替你决定产品，也不是 Customer Development 的完整替代。你仍要把谈话与构建、销售和市场结果连起来。`],evidence:{label:`这本书适合谁｜原书列出的八种情况`,summary:`适读人群与方法边界`,details:[`读过 Customer Development 或 Lean Startup，却不知道第一次客户对话怎样开始。`,`来自传统商业或销售岗位，想在尚未找到商业模式的年轻公司里做得更有效。`,`正在辅导、支持或投资创业公司，想帮助团队进行更有用的客户对话。`,`爱上一个新点子，想在辞职前判断它是否站得住。`,`正在融资，而投资人要求看到团队解决真实问题的证据。`,`觉得整个访谈过程非常尴尬，希望有更轻松的做法。`,`只隐约感觉到一个机会，想把它究竟是什么弄清楚。`,`一直想创办自己的公司，希望今天就开始取得真实进展。`,`作者在 Habit 全职与客户交谈数月，团队投入三年、跨国搬迁且资金将尽后，才意识到方法出了问题。`,`原书明确把小写的 customer conversation 与 Steve Blank 的 Customer Development 区分开。`]},example:{label:`假阳性的资源链`,summary:`赞美怎样变成真实损失`,details:[`几场“大家都喜欢”的会，让团队误以为需求成立。`,`错误信心推动继续开发，直到没有客户的事实很晚才出现。`],analysis:[`对话的价值不在次数，而在它是否降低了某个关键风险。`]},practicePrompt:`复盘最近一次“验证”：它留下的是行为、成本和承诺，还是只有好话？`,try:[`写出这次对话降低了哪个具体风险。`,`把赞美与可观察事实分栏记录。`],avoid:[`用“我们已经访谈了很多人”代替证据。`],sources:[`Is this book for you? · body2.xhtml`,`Talking to customers is hard; Scope & terminology · body3.xhtml`],tags:[`核心原则`,`坏数据`,`假阳性`]},{id:`MT-003`,chapterId:`chapter-1`,title:`别问“这是不是好点子”`,englishTitle:`The Mom Test`,subtitle:`问题坏到一定程度，谁都会对你说谎`,minutes:3,thesis:`不要找更毒舌的人；把问题改到连最想保护你的人也无法误导你。`,englishAnchor:`You shouldn't ask anyone whether your business is a good idea.`,keyPoints:[`意见不能代表市场`,`善意也会制造坏数据`,`真相是提问者的责任`],body:[`“别问妈妈你的点子好不好”只说对了一半。问题不在妈妈太爱你，而在这个问法把 ego、期待和答案方向全摊开了。朋友、同事、陌生人也会出于礼貌或支持而说好话。The Mom Test 不测谁更诚实，它约束的是问题：即使对方想照顾你的感受，也只能谈已经发生的事。市场是否成立，最后仍由行为和购买裁决。`],evidence:{label:`核心论证`,details:[`原书先提出“不要问妈妈”，随即扩大成“不要这样问任何人”。`,`对方说什么，部分由你怎样问决定；因此数据质量属于提问者的责任。`]},example:{label:`一句坏问题暴露了什么`,details:[`“我这个商业想法好吗？”同时要求对方评价未来、顾及你的情绪，并替市场下结论。`],analysis:[`换人不解决结构性偏差，换问题才会。`]},practicePrompt:`删掉你脚本里所有让对方评价点子好坏的句子。`,try:[`你们现在怎样处理这件事？`,`最近一次发生时，你做了什么？`],avoid:[`你觉得我这个想法靠谱吗？`],sources:[`Chapter 1 · The Mom Test · body4.xhtml`],tags:[`核心原则`,`提问`,`意见`]},{id:`MT-004`,chapterId:`chapter-1`,title:`失败访谈是怎样被制造的`,englishTitle:`Failing the Mom Test`,subtitle:`诱导、假设、推销，再把礼貌当验证`,minutes:4,thesis:`当你一路把犹豫逼成赞美，拿到的不是验证，只是自己写好的答案。`,keyPoints:[`诱导问题先污染起点`,`未来购买没有约束`,`功能建议也可能只是礼貌`],body:[`电子菜谱的坏对话从“你很常用 iPad，对吧”开始。接着问会不会买 40 美元的 app；妈妈犹豫，儿子不追问，反而继续讲价格、明星厨师、购物清单，直到她终于说“听起来很棒”。`,`这场会看似信息丰富，其实每一步都由创始人推动。妈妈最后提出加菜品图片，只是在配合谈话。创始人却把赞美和功能建议都记成验证，几次之后便可能辞职、投入积蓄。`],evidence:{label:`错误链条`,summary:`每一步都让下一步更不可靠`,details:[`诱导使用频率 → 假设未来购买 → 忽略犹豫 → 连续 pitch → 收到赞美 → 收下功能请求。`,`原书警告：做错比不做更坏，因为一堆假阳性会让人误以为自己很严谨。`]},example:{label:`电子菜谱对话`,summary:`妈妈为什么最后说好`,details:[`她想保护儿子的感受，也想结束不断加码的介绍。`,`40 美元的“价格合理”并未发生在真实购买选择里。`],analysis:[`赞美、报价和功能建议都没有成本，因此都不能单独证明需求。`]},practicePrompt:`给自己的上一场对话画一条“是谁把话题推到这里”的时间线。`,try:[`对方犹豫时停下来追问。`,`把功能请求旁边补上“为什么”。`],avoid:[`对方一冷淡就再补一个卖点。`],sources:[`Chapter 1 · Failing the mom test · body5.xhtml`],tags:[`坏数据`,`提问`,`推销`]},{id:`MT-005`,chapterId:`chapter-1`,title:`不谈点子，反而更快看清它`,englishTitle:`Passing the Mom Test`,subtitle:`从最近一次真实行为往下追`,minutes:4,thesis:`渠道、客群和购买动机，往往藏在对方刚做过的事里。`,keyPoints:[`从“最近一次”开始`,`追意外答案`,`同时检查多个失败点`],visual:`question-path`,body:[`同样聊电子菜谱，先问妈妈最近用 iPad 做什么。她用 Google 找旅行住宿，也从周日报纸认识 app。`,`再聊书架上的菜谱：通用菜谱多半是礼物，最近主动买的却是纯素主题。`,`这段短聊没提产品，却带出了获客渠道、礼品可能性，以及年轻新手与资深厨师两类客群。现在还不能下结论，但下一步该查什么已经清楚了。`],evidence:{label:`这场好对话得到的事实`,details:[`妈妈不会把 App Store 当搜索引擎，而会等具体推荐。`,`她不需要更多通用菜谱，却仍会为饮食目标买主题菜谱。`,`使用媒介和购买内容是两个不同失败点，不能只验证其一。`]},example:{label:`问题如何自然前进`,details:[`最近一次用 iPad 做什么？`,`当时用 app 了吗？其他 app 从哪里知道？`,`最近一本自己买的菜谱是什么？为什么买？`],analysis:[`每一问都从上一条具体事实出发，没有要求妈妈预测未来。`]},practicePrompt:`为你的主题写一条“最近一次 → 当时怎么做 → 从哪知道 → 为什么选择”的追问链。`,try:[`最近一次是什么时候？`,`你当时为什么选了这个办法？`],avoid:[`如果有一个更好的 app，你会用吗？`],sources:[`Chapter 1 · Passing the mom test · body5.xhtml`],tags:[`核心原则`,`提问`,`过去行为`]},{id:`MT-006`,chapterId:`chapter-1`,title:`让业务画面变得更具体`,englishTitle:`Actionable insight`,subtitle:`有用不等于聊得开心`,minutes:3,thesis:`好对话会把模糊点子改写成具体客群、风险和下一步。`,keyPoints:[`事实必须能改变业务`,`不同客群对应不同风险`,`一场对话只提供方向，不提供最终答案`],body:[`“老年人喜欢 iPad 和菜谱，所以做电子菜谱”太宽，几乎任何版本都能被解释成好点子。对话后，画面变成两条不同路线：资深厨师或许买细分主题，却不主动搜 app；年轻新手容易在 App Store 找到，却未必愿付高价。`,`Actionable insight 指的是能改变产品、渠道或风险排序的具体事实。一句“喜欢”做不到。一次对话也不够证明路线，但足以让下一次学习有方向。`],evidence:{label:`前后信息密度`,details:[`原始假设只有人群与媒介的松散拼接。`,`新画面包含两个客群、两种产品方向、一个渠道风险与一个支付风险。`]},example:{label:`把洞察写成可验证句`,details:[`资深厨师可能为自己尚不会的细分菜系付钱。`,`年轻厨师是否愿为通用菜谱支付 premium，仍需另谈。`],analysis:[`洞察越具体，越容易被后续事实推翻或加强。`]},practicePrompt:`把“大家有这个问题”改写成两条客群不同、风险不同的假设。`,try:[`这条事实会改变产品、渠道还是客群？`,`它让我们下一步先查什么？`],avoid:[`只写“用户反馈很好”。`],sources:[`Chapter 1 · A useful conversation · body5.xhtml`],tags:[`核心原则`,`细分`,`行动洞察`]},{id:`MT-007`,chapterId:`chapter-1`,title:`三条总规则`,englishTitle:`The Mom Test rules`,subtitle:`先背下来，再用到不必背`,minutes:2,thesis:`谈他们的生活；问过去的具体事实；少说，多听。`,englishAnchor:`Talk about their life. Ask about specifics in the past. Talk less and listen more.`,keyPoints:[`他们的生活，不是你的点子`,`具体过去，不是未来意见`,`听得比说得多`],visual:`question-path`,body:[`第一条把焦点从产品拉回对方；第二条把想象拉回已经发生的行为；第三条防止你的解释盖住他的真实世界。三条一起用，善意谎言就很难混进来。它们也没有禁止展示产品。到了能索取 commitment 的阶段，当然要说、要卖。常见错误只是说得太早：事实还没出现，谈话已经被方案染色。`],evidence:{label:`原书三条规则`,details:[`Talk about their life instead of your idea.`,`Ask about specifics in the past instead of generics or opinions about the future.`,`Talk less and listen more.`]},example:{label:`一分钟自检`,details:[`这句话是在谈他的生活，还是邀请他评价我的点子？`,`答案指向一次真实行为，还是一个想象中的未来？`,`我是否抢在他讲完前解释？`],analysis:[`三条规则是质量护栏，不是固定问卷。`]},practicePrompt:`把这三条放进会前笔记顶部，出现偏航时用它们拉回。`,try:[`请从头讲讲上一次是怎么做的。`,`然后呢？`],avoid:[`连续讲几分钟才让对方回应。`],sources:[`Chapter 1 · The Mom Test rules · body5.xhtml`],tags:[`核心原则`,`提问`,`倾听`]},{id:`MT-008`,chapterId:`chapter-1`,title:`意见几乎没有商业价值`,englishTitle:`Opinions are worthless`,subtitle:`市场不会把裁决权外包给受访者`,minutes:3,thesis:`收集现有流程、成本和搜索行为，然后由你判断点子。`,keyPoints:[`“好点子”不是需求`,`专家意见也只是参考`,`创始人负责解读事实`],body:[`问“你觉得这个点子好吗”，等于请一个人替市场投票。除非他做过高度相似的业务，否则正反意见都只是噪音。真正有用的是：现在怎么管供应商、哪里难用、试过什么、是否在找替代、哪里亏钱、预算是否存在。`,`这些事实不替你做决定。你把它们带回团队，完成自己的判断。客户负责描述问题世界，创始人负责选择解法。`],evidence:{label:`书中的修正路径`,details:[`对建筑公司，不问供应商管理工具是不是好点子，而是请他们展示当前流程。`,`继续了解喜欢与讨厌之处、替代工具、搜索状态、损失与预算。`]},example:{label:`示意案例｜意见与证据的差别`,details:[`只留下笼统的正面评价，没有购买成本。`,`示意：若记录的是客户每月投入两个人力，而且已经在评估替代方案，才同时包含行为、成本与搜索动作。`],analysis:[`后一种记录仍不保证成交，但能支持业务判断；它是教学示意，不是书中逐字引语。`]},practicePrompt:`把一个“你觉得……”问题改成观察当前流程的请求。`,try:[`能给我看看你们现在怎么做吗？`,`这个流程哪里最花钱？`],avoid:[`你觉得这种产品有市场吗？`],sources:[`Chapter 1 · Good question / bad question drill · body6.xhtml`,`Do you think it’s a good idea? · body7.xhtml`],tags:[`提问`,`核心原则`,`意见`]},{id:`MT-009`,chapterId:`chapter-1`,title:`未来会撒谎，数字也救不了它`,englishTitle:`Future promises`,subtitle:`“愿付多少”只是更像数据的想象`,minutes:3,thesis:`问已经发生的成本；够成熟时，直接请对方付出。`,keyPoints:[`未来意愿普遍过度乐观`,`假设价格仍是假设`,`真实付款能穿透空话`],body:[`“会不会买？”通常得到一个想让你高兴的“会”。再问“愿付多少”，数字会让答案显得严谨，却没有让它更真实。人们想象中的自己总比真正掏钱时积极。`,`改问问题已经造成多少成本、现在花多少钱和时间解决、预算多少。产品走得够远，就不要继续猜：请对方预购、付订金，或做出另一项有成本的承诺。`],evidence:{label:`原书判断`,details:[`Anything involving the future is an over-optimistic lie.`,`价格数字不会修复一个关于未来、关于你点子的坏问题。`]},example:{label:`示意案例｜三层价格证据`,details:[`口头猜测未来愿付价，证据最弱。`,`当前方案的真实支出可以提供 price anchor。`,`实际支付订金，证据最强。`],analysis:[`可信度随当下付出的成本上升；这是强弱关系示意，不是书中的一组真实报价。`]},practicePrompt:`把所有“会不会、愿不愿”改成现状成本或当下承诺。`,try:[`你们现在为这件事花多少？`,`如果要继续，我们今天能确认哪一步？`],avoid:[`如果只卖 X，你肯定会买吗？`],sources:[`Chapter 1 · Would you buy?; How much would you pay? · body7.xhtml`],tags:[`提问`,`承诺`,`定价`]},{id:`MT-010`,chapterId:`chapter-1`,title:`功能愿望背后是动机`,englishTitle:`Dream product`,subtitle:`客户会描述想要什么，你要查清为什么`,minutes:3,thesis:`功能请求的价值不在字面答案，而在它暴露的目标与约束。`,keyPoints:[`愿望题只能打开话题`,`不要按票数造产品`,`追动机、约束与成功标准`],body:[`“梦想产品会做什么？”不算完全坏，但它只是排球里的托球：能把话题送到空中，真正的价值来自下一拍。直接把回答排进 backlog，会把产品做成委员会妥协。`,`继续问为什么需要、它会让你完成什么、没有它现在怎么做。客户通常清楚自己的问题，却未必知道最佳解法；设计仍是你的责任。`],evidence:{label:`原书边界`,details:[`People know what their problems are, but they don’t know how to solve those problems.`,`书中把 dream product 题评为“勉强可以”，前提是有扎实追问。`]},example:{label:`把请求改写成目标`,details:[`不要只记“需要导出”。`,`改记“每周要把少数关键数字发给自己的客户，现流程耗时”。`],analysis:[`目标允许团队寻找比字面功能更轻的办法。`]},practicePrompt:`给最近三个功能请求各补一句“为了什么”。`,try:[`这个功能会让你做成什么？`,`没有它时，你现在怎么应付？`],avoid:[`听到需求就承诺进开发排期。`],sources:[`Chapter 1 · What would your dream product do? · body7.xhtml`],tags:[`提问`,`产品判断`,`功能请求`]},{id:`MT-011`,chapterId:`chapter-1`,title:`为什么还要做这件事？`,englishTitle:`Why do you bother?`,subtitle:`从表面需求穿到真正目标`,minutes:3,thesis:`没弄清对方想完成什么，你可能会把正确的问题解成错误的产品。`,keyPoints:[`追动作背后的目的`,`目标比功能更稳定`,`解法可能因此完全改变`],body:[`财务人员每天围绕表格发大量邮件，表面需求是更好的消息工具。追问“为什么还要这么麻烦”，答案却是确保所有人拿到最新版本。真正卡住他们的是版本不一致，和消息多少没关系。`,`一旦 goal 清楚，解法就从聊天软件转向类似 Dropbox 的同步。没找到 why 之前，你只是蒙着眼设计。`],evidence:{label:`问题到目标的跃迁`,details:[`可观察动作：每天发很多邮件。`,`口头请求：更好的消息工具。`,`真正目标：确认团队都在使用最新版。`]},example:{label:`书中的财务团队`,details:[`创始人若照单全收，会优化邮件。`,`问 why 后，产品方向变成让版本本身保持一致。`],analysis:[`同一动作可能由完全不同目标驱动，不能从表面直接跳到功能。`]},practicePrompt:`选一个高频 workaround，连续追问两次“为什么要这样做”。`,try:[`你为什么还要做这一步？`,`如果不做，最坏会发生什么？`],avoid:[`默认费时间的那一步就是最终问题。`],sources:[`Chapter 1 · Why do you bother? · body7.xhtml`],tags:[`提问`,`问题重要性`,`目标`]},{id:`MT-012`,chapterId:`chapter-1`,title:`问题存在，不等于值得解决`,englishTitle:`Implications`,subtitle:`用后果区分真痛与小烦`,minutes:3,thesis:`问清损失、拖延和影响，才能知道这是不是愿意付钱解决的问题。`,keyPoints:[`强烈措辞不是价值`,`后果是重要性证据`,`后果也提供定价信号`],body:[`有人可以把流程喊成“灾难”，却在问到后果时承认：多派几个实习生，运作得还不错。情绪值得深挖，但不能单独等于市场。`,`追问这件事造成什么：损失多少钱、拖慢谁、风险落在哪里、现办法成本如何。回答会把“很烦”分成愿意付钱的痛点，和能忍的小麻烦。`],evidence:{label:`后果为什么重要`,details:[`它测试问题是否真正影响业务或生活，而非仅存在。`,`它也为价值定价提供比口头愿付价更可靠的参照。`]},example:{label:`“灾难”但可运作`,details:[`受访者用激烈词语和动作描述工作流。`,`被问后果后，只说用一批实习生处理，目前效果尚可。`],analysis:[`表达强度与购买强度不是同一个变量。`]},practicePrompt:`对每个“痛点”补一栏：如果不解决，具体会怎样？`,try:[`这件事最后造成了什么？`,`现在的代价是多少？`],avoid:[`把“太烦了”直接标成 must-have。`],sources:[`Chapter 1 · What are the implications of that? · body7.xhtml`],tags:[`提问`,`问题重要性`,`定价`]},{id:`MT-013`,chapterId:`chapter-1`,title:`让他带你走一遍上一次`,englishTitle:`Show, don’t tell`,subtitle:`行为比自我描述更接近现实`,minutes:3,thesis:`能看就别只听；不能看，就逐步复盘最近一次真实过程。`,keyPoints:[`最近一次会逼出细节`,`workflow 同时暴露工具与人`,`例外和补丁常比标准流程有价值`],visual:`question-path`,body:[`人讲“通常怎么做”时，会自动清理混乱、跳过临时补丁，也会描述自己想成为的样子。`,`最好现场观察。做不到，就问上一次何时发生，请他从头带你走一遍。`,`一段 workflow walkthrough 会同时暴露一天的安排、所用工具、交接对象、限制，以及产品要接入什么。问题常出现在动作间隙，不在客户给流程起的名字里。`],evidence:{label:`原书的 show, don’t tell`,details:[`汉堡店若想知道顾客买什么，先看订单；若要理解为什么，再去谈。`,`作者强调观察任务会显示问题真正在哪里，而非客户以为在哪里。`]},example:{label:`一条有效的复盘链`,details:[`上次是什么时候？`,`先发生了什么？接着呢？`,`当时用了什么、找了谁、哪里卡住？`],analysis:[`时间顺序会让抽象评价落到可验证的动作。`]},practicePrompt:`下一场会只选一个关键任务，请对方完整复盘一次。`,try:[`请从那天开始带我走一遍。`,`这一步当时你实际点了什么？`],avoid:[`你们通常的标准流程是什么？`],sources:[`Chapter 1 · Last time; Workflow · body7.xhtml`],tags:[`核心原则`,`提问`,`工作流`]},{id:`MT-014`,chapterId:`chapter-1`,title:`主动找过解法吗？`,englishTitle:`What else have you tried?`,subtitle:`最便宜的痛点验真器`,minutes:3,thesis:`连搜索和尝试都没发生，购买你的产品通常也不会凭空发生。`,keyPoints:[`口头痛不等于行动`,`替代方案暴露真实标准`,`切换成本也要问`],body:[`当对方说“这问题老发生，我肯定付钱”，先不要庆祝。问最近一次，再问当时如何修、是否搜索过、试过哪些方案、为什么放弃。`,`如果连 Google 一下都没做，问题大概已被接受。真正介意的人会留下一串行动：搜索、试用、付钱、拼 workaround。那串足迹比情绪更可信。`],evidence:{label:`书中的判断规则`,details:[`If they haven’t looked for ways of solving it already, they’re not going to look for—or buy—yours.`,`作者同时建议了解现方案成本、喜欢与讨厌之处，以及切换有多痛。`,`鞋带例子把这一点说得很直白：诱导别人承认拎着杂货时鞋带松开很讨厌，并不能证明新鞋带有市场；真正介意的人早已在用双结。`]},example:{label:`书中案例｜口头“肯定买”却从未搜索`,details:[`受访者说问题经常发生，愿意付钱。`,`追问后承认从没找过现有解法，只是习惯了。`,`鞋带 / 双结案例同样提醒：先找已经发生的补救行为，再判断购买动力。`],analysis:[`愿付钱是想象；没有搜索是已经发生的行为。`]},practicePrompt:`给每个高优先级痛点补齐“已试过什么”这一列。`,try:[`你上次怎么处理？`,`还试过哪些办法？为什么没继续？`],avoid:[`只问“是不是很讨厌”。`],sources:[`Chapter 1 · What else have you tried? · body7.xhtml`],tags:[`提问`,`问题重要性`,`替代方案`]},{id:`MT-015`,chapterId:`chapter-1`,title:`workaround 是价格锚`,englishTitle:`Price anchor`,subtitle:`客户会用现有支出告诉你问题值多少`,minutes:3,thesis:`别逼客户猜愿付价；先算他今天为了活下去已经花了什么。`,keyPoints:[`现有支出比报价可靠`,`人工、软件和代理都要算`,`替代谁会改变定位`],body:[`“现在怎么处理？”不只得到流程，也得到价值区间。可能是一套每月 100 英镑的软件补丁，也可能是一家每年 12 万英镑的代理商。两者都在解决同一问题，却对应完全不同的产品身份。`,`客户很难准确告诉你会付多少，但会展示现在花了多少时间、人工和钱。你决定替代哪个成本中心，也就决定了定价与市场定位。`],evidence:{label:`两种定位的数量级`,details:[`替代 100 英镑/月的 web app，年价值约 1.2k。`,`替代 120k/年的 agency，谈判锚点可能是前者百倍。`]},example:{label:`别漏算隐形 workaround`,details:[`Excel 和邮件看似免费，却可能占用两名全职员工。`,`手工协调、失败风险和管理时间也属于当前成本。`],analysis:[`价格锚来自完整代价，不只是软件账单。`]},practicePrompt:`画出客户今天为这个问题支付的“钱 + 人 + 时间”账单。`,try:[`谁在维护这个流程？每周多久？`,`今年还为它付过哪些外部费用？`],avoid:[`你觉得我们的价格应该是多少？`],sources:[`Chapter 1 · How are you dealing with it now? · body7.xhtml`,`Chapter 2 · Deflect compliments: two-person workaround · body10.xhtml`],tags:[`提问`,`定价`,`问题重要性`]},{id:`MT-016`,chapterId:`chapter-1`,title:`钱从谁的预算出来？`,englishTitle:`Purchasing process`,subtitle:`B2B 需求背后还有一条决策链`,minutes:3,thesis:`使用者、预算拥有者和能否决的人往往不是同一个。`,keyPoints:[`追预算归属`,`找出隐形否决者`,`把购买过程变成销售路线图`],body:[`B2B 对话不能停在“用户需要”。继续问费用从哪一笔预算出、谁签字、谁能阻止、还要过哪些审查。眼前联系人常常不是 budget owner。`,`这不是过早卖产品，而是在理解真实世界。把角色和顺序摸清，未来 pitch 才不会一次次撞上突然出现的老板、技术团队、采购或律师。`],evidence:{label:`原书为什么称它为 must-ask`,details:[`购买流程中的其他人会决定交易能否继续。`,`这些信息最终会沉淀为可重复的销售 roadmap。`]},example:{label:`同一公司里的不同角色`,details:[`一线使用者感到痛，却没有预算。`,`老板拥有预算，技术或律师又可能拥有否决权。`],analysis:[`只访谈其中一人，会把局部支持误作完整购买能力。`]},practicePrompt:`为一笔目标交易画出使用、预算、批准、否决四个角色。`,try:[`这类费用通常从谁的预算出？`,`还有谁会参与或阻止这个决定？`],avoid:[`把“用户喜欢”当成公司会买。`],sources:[`Chapter 1 · Where does the money come from? · body7.xhtml`],tags:[`提问`,`承诺`,`B2B`]},{id:`MT-017`,chapterId:`chapter-1`,title:`还该找谁？我漏问了什么？`,englishTitle:`Who else? Anything else?`,subtitle:`两个适合放在结尾的问题`,minutes:3,thesis:`一个扩展你的网络，一个让行业内行修正你的盲区。`,keyPoints:[`每次都争取转介绍`,`拒绝介绍也是信号`,`给对方纠正问题路线的机会`],body:[`“还应该和谁聊？”能让最初几场冷对话长成暖介绍。若对方完全不愿介绍，也别纠缠：可能会面太正式、太 pitchy，或他根本不在意这个问题。`,`“还有什么是我本该问却没问的？”则让懂行业的人替你指出整条问题路线的盲点。随着你熟悉行业，它会逐渐变成拐杖；早期却很值钱。`],evidence:{label:`两问的不同功能`,details:[`Who else should I talk to? 扩大可谈对象，并测试对方愿否承担一点信誉。`,`Is there anything else I should have asked? 邀请对方主动补上你不知道的重要主题。`]},example:{label:`不愿介绍时怎么读`,details:[`不要把之前的漂亮话继续当强信号。`,`检查自己是否过于正式、黏人或像销售，也检查问题是否对他重要。`],analysis:[`转介绍既是获客动作，也是轻量 commitment。`]},practicePrompt:`把这两个问题固定放进每场会的最后两分钟。`,try:[`你觉得我还该和谁聊？`,`有没有一个我完全漏掉的问题？`],avoid:[`对方犹豫时逼他交出联系人。`],sources:[`Chapter 1 · Closing questions · body8.xhtml`],tags:[`提问`,`获客`,`承诺`]},{id:`MT-018`,chapterId:`chapter-1`,title:`客户拥有问题，你拥有解法`,englishTitle:`They own the problem; you own the solution`,subtitle:`既不委员会造产品，也不替客户宣布痛点`,minutes:3,thesis:`让客户讲清生活与约束，创始团队负责完成解法的跃迁。`,englishAnchor:`They own the problem, you own the solution.`,keyPoints:[`客户不是产品委员会`,`创始人也不能强塞问题`,`方案用承诺而非意见验证`],body:[`好问题并不问“我该做什么”，而是理解客户的麻烦、目标、约束和现有行为。收齐这些材料后，团队要自己完成 creative leap，而不是按功能票数拼产品。`,`边界也适用于另一边：你不能告诉客户他们应该痛在哪里。方案出现后，再用 commitment 与 advancement 检验它是否真的适合那段生活。`],evidence:{label:`书中对分工的定义`,details:[`客户最接近自己的问题世界，却不必知道最佳产品解法。`,`创始人拥有愿景与设计责任，但不能拿愿景替代客户事实。`]},example:{label:`正确的交接`,details:[`客户描述版本混乱、预算和工作流。`,`团队选择同步方案。`,`客户再以试用、介绍或付款验证方案，而非只说喜欢。`],analysis:[`学习、设计、承诺是三个连续但不同的环节。`]},practicePrompt:`把笔记分成“客户事实”和“我们的解法”，不要混写。`,try:[`先写清目标和约束，再开方案会。`,`用真实承诺验证方案。`],avoid:[`让客户直接决定 roadmap。`],sources:[`Chapter 1 · Using the mom test · body9.xhtml`],tags:[`核心原则`,`产品判断`,`承诺`]},{id:`MT-019`,chapterId:`chapter-2`,title:`三类坏数据`,englishTitle:`Bad data taxonomy`,subtitle:`先认出它，才知道怎样救场`,minutes:3,thesis:`赞美要拨开，空话要钉住，点子要往下挖。`,keyPoints:[`Compliments 不预测行为`,`Fluff 把想象说成现实`,`Ideas 要理解而非服从`],body:[`客户对话最常被三类数据带偏：赞美让你舒服，fluff 用“通常、以后、也许”制造虚假确定感，点子和功能请求则诱惑你立刻扩大产品范围。`,`它们不是世界末日。认出类型后，用三个动作恢复：deflect compliments、anchor fluff、dig beneath ideas。越早纠偏，越少把噪音带回团队。`],evidence:{label:`原书三分法`,details:[`Compliments。`,`Fluff：generics、hypotheticals、future。`,`Ideas。`]},example:{label:`三种偏航与三种修复`,details:[`“太酷了” → 回到当前流程。`,`“我肯定会” → 问上一次。`,`“一定要同步 Excel” → 问为了什么。`],analysis:[`同一句回应需要按类型处理，不能全部记成需求。`]},practicePrompt:`给下一场笔记加三枚标记：赞美、空话、点子。`,try:[`听到信号先分类。`,`用对应动作把谈话拉回事实。`],avoid:[`把三类内容都放进“正面反馈”。`],sources:[`Chapter 2 · Avoiding bad data · body10.xhtml`],tags:[`坏数据`,`提问`,`核心原则`]},{id:`MT-020`,chapterId:`chapter-2`,title:`赞美是愚人金`,englishTitle:`Deflect compliments`,subtitle:`闪亮、分心，却一文不值`,minutes:4,thesis:`不要接住“我喜欢”；把它拨开，回到事实、流程和承诺。`,englishAnchor:`Compliments are the fool’s gold of customer learning.`,keyPoints:[`真心喜欢也不等于会买`,`负面真相也是好结果`,`最好先不提点子`],body:[`对方可能因为支持你、怕伤感情，或只想让 pitch 结束而说好话。即使赞美真心，也不能预测购买。最稳的办法是早期不讲点子；已经出现时，直接问“你们现在怎么处理？”`,`有效的对话不必得到想听的答案。对方承认问题不重要、通常直接忽略，同样是成功学习。你要穿过好听的话，找到行为、成本和后果。`],evidence:{label:`为什么赞美权重接近零`,details:[`赞美不要求对方花钱、花时间或承担声誉。`,`除极少数做过高度相似业务的行业专家外，意见不能替代事实与 commitment。`,`拿到一个有用的负面结果后，若对方仍愿意聊，可以继续请他讲现有 workflow，用来判断这是全行业都不在意的问题，还是只与这个具体 segment 或情境有关。`]},example:{label:`书中案例｜同一句“Love it”的两种结局`,details:[`坏结局：继续 pitch，回公司宣布所有人喜欢，六个月后仍零客户。`,`好结局：道歉停止 pitch，追出现流程由两名全职员工、Excel 与大量邮件维持。`,`若结论是“我们通常直接忽略”，仍可再看一次流程，分清普遍非问题与个别非客户。`],analysis:[`赞美本身没变；价值来自其后追到的真实世界。`]},practicePrompt:`下次被夸时，不说谢谢，立刻问一个现状问题。`,try:[`你们现在具体怎样处理？`,`上一次发生时，谁做了什么？`],avoid:[`太好了，很高兴你喜欢！`],sources:[`Chapter 2 · Deflect compliments · body10.xhtml`],tags:[`坏数据`,`提问`,`赞美`]},{id:`MT-021`,chapterId:`chapter-2`,title:`“聊得很好”是警报`,englishTitle:`Compliment symptoms`,subtitle:`有效的会议要能说出具体发生了什么`,minutes:3,thesis:`如果结论只剩“反馈很正面”，你大概收集的是赞美，不是证据。`,keyPoints:[`会中客套会遮住问题`,`会后模糊表述要具体化`,`每条正面信号都要追行为与价值`],body:[`“谢谢”“很高兴你喜欢”是会中警报；“会议很顺”“所有人都爱这个想法”是会后警报。它们听起来积极，却没有告诉团队为什么、值多少、会怎样使用。`,`一听到这类总结，就追问：具体喜欢什么？能省多少钱？怎样进入一天？此前试过什么？答不上来，就把这条降级为赞美，而不是验证。`],evidence:{label:`书中的症状清单`,details:[`会中：Thanks；I’m glad you like it。`,`会后：That meeting went really well；We’re getting positive feedback；Everybody loves the idea。`]},example:{label:`示意案例｜把“很好”改成可检查的记录`,details:[`模糊记录只说客户很感兴趣。`,`示意：改记为客户正在投入多少人力，以及是否同意让预算负责人参加下一步。`],analysis:[`具体记录可被团队审查，模糊句只会传染兴奋；这里不是书中逐字案例。`]},practicePrompt:`会后禁用“很好、积极、喜欢”，只准用行为名词和数字复盘。`,try:[`他说了哪项具体事实？`,`他为下一步付出了什么？`],avoid:[`把会议氛围当结果。`],sources:[`Chapter 2 · Compliment symptoms · body10.xhtml`],tags:[`坏数据`,`团队流程`,`会议`]},{id:`MT-022`,chapterId:`chapter-2`,title:`把空话钉回事实`,englishTitle:`Anchor fluff`,subtitle:`“总是、以后、也许”只能当入口`,minutes:4,thesis:`价值从“上一次是什么时候”才开始。`,englishAnchor:`When’s the last time that happened?`,keyPoints:[`识别三类 fluff`,`坏问题的回答不必采信`,`用最近一次和完整复盘落地`],visual:`question-path`,body:[`Fluff 有三种：泛称的 usually/always/never，未来的 would/will，假设的 might/could。它们描述理想身份或想象未来，不足以成为证据。最危险的一句是“I would definitely buy that”。`,`你不必把这类问题完全禁掉，只要别相信第一层答案。标准落地梯子是：你会这样做吗？上一次何时？请从头讲讲当时怎么做。当时怎么解决？还试过什么？`],evidence:{label:`书中的 fluff 词表`,details:[`Do you ever；Would you ever；What do you usually。`,`Do you think；Might you；Could you see yourself。`,`作者第一家公司把未来承诺误作 commitment，随后过度投入约一千万美元。`]},example:{label:`示意案例｜从空话到事实的四步`,details:[`先听见泛泛的频率描述。`,`追到最近一次发生的具体时间。`,`请对方按顺序说明当时的动作与参与者。`,`最后追问补救方式和实际代价。`],analysis:[`只有落到某次事件后，频率、流程和代价才可检查；这是提问路径示意。`]},practicePrompt:`听到“通常、一定、可能”时，马上接一个过去时问题。`,try:[`最近一次是什么时候？`,`当时你实际怎么做？`],avoid:[`把“我肯定会买”记成预订单。`],sources:[`Chapter 2 · Anchor fluff · body10.xhtml`],tags:[`坏数据`,`提问`,`过去行为`]},{id:`MT-023`,chapterId:`chapter-2`,title:`边缘案例更接近现实`,englishTitle:`Edge cases`,subtitle:`泛泛描述的是理想中的自己`,minutes:3,thesis:`别只验证常态；问“什么时候崩过”，代价最高的场景常藏在例外里。`,keyPoints:[`身份叙述需要核对`,`此刻状态是一个锚`,`例外会暴露恢复成本`],body:[`“我是 Inbox Zero 信徒”是一种身份叙述。先看此刻有多少未读，再问最近一次彻底失控。受访者提到旅行时网络中断，之后用了十天才恢复。`,`真实画面于是从“我总能管好收件箱”变成“通常能，但某些边缘情况恢复极痛”。产品机会往往不在常态，而在那些打破常态、代价陡增的时刻。`],evidence:{label:`泛称为什么会失真`,details:[`人用 generics 描述想成为的自己，而非每次实际行为。`,`用当前状态和最近一次失败，可找出被身份叙述抹掉的例外。`]},example:{label:`Inbox Zero 复盘`,details:[`先核对收件箱此刻约十封。`,`再问最近崩溃：三周前旅行断网，花十天恢复。`],analysis:[`边缘场景给出比“我很自律”更具体的产品切口。`]},practicePrompt:`对每个“总是没问题”的流程追问最近一次例外。`,try:[`最近一次彻底失控是什么时候？`,`你后来花了多久恢复？`],avoid:[`只记录客户对自己习惯的评价。`],sources:[`Chapter 2 · Inbox Zero example · body10.xhtml`],tags:[`坏数据`,`提问`,`边缘案例`]},{id:`MT-024`,chapterId:`chapter-2`,title:`抱怨者不等于客户`,englishTitle:`Complainer vs customer`,subtitle:`把情绪推到一个当下决定`,minutes:4,thesis:`愿不愿采取一个小行动，能区分真实需求与随口抱怨。`,keyPoints:[`不要一听抱怨就 pitch`,`检查是否试过现有解法`,`非客户也是有用发现`],body:[`排队的人抱怨钱包塞满积分卡。若你立刻介绍 app，只会得到“我肯定用”。改问是否试过现有积分 app，再请他现在下载。回答“下次吧”，说明这件事还不值得眼前几十秒。`,`若他已经试过，却因 app 太多、折扣浅、隐私或操作慢而放弃，才出现可用信号。你可能需要商家临界规模、更深优惠、隐私设计或更简单执行。`],evidence:{label:`小决定的验真作用`,details:[`口头支持没有成本；当下下载需要一点注意力和行动。`,`对方不行动不代表他虚伪，只说明这个问题不够重要。`]},example:{label:`积分 app 的四条真实分支`,details:[`每个连锁店一个 app，手机会被塞满。`,`折扣太浅，不值得交出数据。`,`界面太慢，比买咖啡还费时。`,`根本没试过，也不想现在试。`],analysis:[`相同抱怨背后可能是不同产品条件，也可能根本没有客户。`]},practicePrompt:`为一个强烈抱怨设计一项礼貌、低成本、现在可做的行动测试。`,try:[`你试过哪些现成办法？`,`如果方便，现在愿意一起看一下吗？`],avoid:[`太巧了，我正在做一个完美解决它的 app。`],sources:[`Chapter 2 · Loyalty app example · body10.xhtml`],tags:[`坏数据`,`问题重要性`,`提问`]},{id:`MT-025`,chapterId:`chapter-2`,title:`点子先记下，再往下挖`,englishTitle:`Dig beneath ideas`,subtitle:`功能请求要被理解，不要被服从`,minutes:4,thesis:`同一句功能请求，可能是随口愿望，也可能是购买门槛；差别藏在为什么。`,keyPoints:[`记录但不立刻排期`,`追动机、现状与成本`,`判断它是否影响购买`],body:[`客户开始替你想功能，通常说明他已投入话题，这是好信号。但把“同步 Excel”直接放进 todo list，会走上 feature creep 的快车道。`,`继续问它能让你做什么、没有它怎样应付、竞品为何失败、是否值得推迟上线。答案可能只是想把旧报告放一起，也可能是所有替代品都缺的 must-have，或每月耗费一周的昂贵 workaround。`],evidence:{label:`书中的深挖问题`,details:[`Why do you want that?`,`What would that let you do?`,`How are you coping without it?`,`现在必须有，还是可以以后加？它怎样进入一天？`]},example:{label:`Excel 同步的三种含义`,details:[`只是偶尔翻旧报告，不是购买标准。`,`试过多款工具，全部死在同步，是差异化机会。`,`每月整合报告耗时近一周，是高成本痛点。`],analysis:[`请求字面相同，优先级可能从“忽略”到“决定成交”。`]},practicePrompt:`把最新功能请求改写成“为了完成 X，目前付出 Y”。`,try:[`这个功能会让你做到什么？`,`没有它时，现在怎么处理？`],avoid:[`好，我们把它加进 roadmap。`],sources:[`Chapter 2 · Dig beneath ideas · body10.xhtml`],tags:[`坏数据`,`产品判断`,`功能请求`]},{id:`MT-026`,chapterId:`chapter-2`,title:`MTV 真正要的不是分析`,englishTitle:`Root motivation`,subtitle:`三个月漂亮开发，解错了目标`,minutes:4,thesis:`没问动机，团队会把一个简单的交代，误做成复杂的分析系统。`,keyPoints:[`功能名不等于工作目标`,`实际使用会揭穿错误假设`,`更轻的解法常在根因之后出现`],body:[`MTV 说需要 analytics 和 reports，团队便做了功能丰富的自助仪表盘。客户却继续每周五来要 CSV。`,`团队又加了 CSV 和 PDF 导出，仍没人自己操作。`,`直到追问为什么要品牌化报告，才知道他们的客户几乎不读数据，只期待每周收到一份体面的东西。解法其实很轻：固定几个数字、自动发送；早期甚至可以让实习生手工制作。`],evidence:{label:`错误假设怎样扩大产品范围`,details:[`团队以为客户想探索数据，于是做大量切片、展示和导出。`,`真实工作是维持客户关系，而非深入分析。`,`作者回顾这次经历时说，希望拿回浪费的三个月。`]},example:{label:`行为比 demo 掌声诚实`,details:[`会上客户对仪表盘赞叹。`,`会后每周仍打电话让团队代为导出。`],analysis:[`真正的使用方式持续否定了口头认可，却被团队多周忽略。`]},practicePrompt:`找一项没人使用却不断要求优化的功能，重新问它本来要完成什么。`,try:[`你把这份报告交给谁？他拿到后做什么？`,`如果我们替你自动完成结果，还需要自助界面吗？`],avoid:[`把 demo 上的赞叹当成使用验证。`],sources:[`Chapter 2 · MTV analytics story · body10.xhtml`],tags:[`产品判断`,`坏数据`,`案例`]},{id:`MT-027`,chapterId:`chapter-2`,title:`强情绪就是路标`,englishTitle:`Emotional signals`,subtitle:`这里通常藏着一段值得展开的故事`,minutes:3,thesis:`愤怒、尴尬、兴奋和喜悦不是结论，却值得你立刻停下来追。`,keyPoints:[`情绪标记高信息密度`,`简单邀请就能让故事展开`,`最终仍要回到行为和成本`],body:[`对方说“这是我一天最糟的部分”时，只记一笔便翻到下一题，等于错过全场最强的信号。强情绪可能指向高价值经历，也可能只是表达习惯；答案在后面的故事里。`,`追问不必复杂：多说一点；听起来真烦；为什么一直没修好；这对你很重要？先给对方讲完整的许可，再判断其中有没有行为、成本与约束。`],evidence:{label:`原书建议追的情绪`,details:[`愤怒、尴尬、过度高兴、兴奋都值得写下并继续挖。`,`feature request 与情绪信号的共同点：表面不是答案，下面的动机才是。`]},example:{label:`咖啡店旁桌的漏球`,details:[`受访者说某问题几乎是一天里最糟的部分。`,`创始人只在本子上记下，便问下一题。`],analysis:[`脚本顺序压过了现场信号，访谈因此失去最有价值的分支。`]},practicePrompt:`下一场会允许自己偏离脚本一次：只要出现强情绪，就连续追三问。`,try:[`听起来这里有个故事。`,`为什么这件事会这么糟？`],avoid:[`为了问完清单而跳过情绪峰值。`],sources:[`Chapter 2 · Emotional signals · body10.xhtml`],tags:[`提问`,`坏数据`,`情绪`]},{id:`MT-028`,chapterId:`chapter-2`,title:`别把 ego 放上桌`,englishTitle:`The Pathos Problem`,subtitle:`一旦你显得脆弱，对方就会替你减震`,minutes:3,thesis:`别反复要求对方诚实，把话题移回他的具体过去。`,keyPoints:[`钓赞美会主动造假`,`暴露沉没成本也会造假`,`名人的做法未必可复制`],body:[`“我辞职做了这个绝密项目，请务必诚实。”听起来勇敢，其实等于明说：我的自尊系在你的回答上。即使你邀请批评，对方也知道一记重话可能伤到你，于是自然收手。`,`别再强调“我真的扛得住”。停下谈自己，改问对方已经发生的具体经历。点子与 ego 留到可以索取承诺时再出现。`],evidence:{label:`两类 approval seeking`,details:[`Fishing for compliments：直接问生意会不会成、app 喜不喜欢。`,`Pathos Problem：强调辞职、绝密、投入巨大，再要求对方残酷诚实。`]},example:{label:`为什么别照搬强势名人`,details:[`书中提到 Elon Musk、Reid Hoffman、Gordon Ramsay 能主动索取负评。`,`作者提醒：别人不太担心伤害他们的感受，这种社会情境对普通创始人不可复制。`],analysis:[`方法要适配权力关系，不能只复制话术。`]},practicePrompt:`删掉开场里所有能让人看出你沉没成本和期待的句子。`,try:[`把焦点放在他的生活。`,`只问已经发生的具体例子。`],avoid:[`我能承受，拜托狠狠批评。`],sources:[`Chapter 2 · Stop seeking approval · body10.xhtml`],tags:[`坏数据`,`会议`,`ego`]},{id:`MT-029`,chapterId:`chapter-2`,title:`停下 pitch，接回上一句`,englishTitle:`Cut off pitches`,subtitle:`滑进去也能把对话救回来`,minutes:3,thesis:`发现自己在说服时，停、道歉、复述对方上一句，然后闭嘴。`,englishAnchor:`The more you’re talking, the worse you’re doing.`,keyPoints:[`“你没理解”是 pitch 警报`,`误解本身也是信息`,`产品可留到最后讲`],body:[`创业者容易在“你没理解”“对，但我们还会……”里越讲越多。这样做会把学习会变成人质谈判，对方最后说喜欢，可能只是为了离开。`,`一旦发现，直接承认自己兴奋过头，复述他刚才的内容，请他继续。即使对方误解产品，或提到你早有答案的问题，也先听完；那是他真实 mental model 的窗口。`],evidence:{label:`书中的恢复结构`,details:[`Whoops—I just slipped into pitch mode。`,`简短道歉。`,`You were telling me that… 复述上一句并把话语权交回。`]},example:{label:`为什么不要急着纠正`,details:[`对方说“所以它像……”时，你会想立刻强调不同。`,`对方说安全很重要时，你会想证明早已解决。`],analysis:[`两次打断都会让你失去他如何分类产品、什么先进入购买判断的信息。`]},practicePrompt:`给自己准备一句自然的 pitch 退出语，并在下一场真的用一次。`,try:[`抱歉，我刚才开始推销了。你刚说到……`,`我最后再介绍，先把你的情况听完。`],avoid:[`不不，你还没理解我们的厉害之处。`],sources:[`Chapter 2 · Cut off pitches; Talk less · body10.xhtml`],tags:[`坏数据`,`会议`,`倾听`]},{id:`MT-030`,chapterId:`chapter-3`,title:`每场都问一个害怕的问题`,englishTitle:`Scary question`,subtitle:`答案必须有可能推翻你的业务`,minutes:3,thesis:`问题若不能改变下一步，就不配占用最稀缺的会面时间。`,keyPoints:[`无偏见的琐事仍是琐事`,`用失败与成功做思想实验`,`钱、法律与技术都可以问`],body:[`学会不诱导后，人容易过度补偿，转而问一堆安全问题。`,`判断一问是否重要，可以反过来想：如果答案完全出乎意料，我会改变或放弃什么？若什么也不变，这个问题就不该占用会面。`,`会前再做两个想象。公司已经失败，最可能死在哪里？公司大获成功，哪些条件必须成立？每场带一个让你不舒服、却可能击穿当前设想的问题。`],evidence:{label:`原书的判断标准`,details:[`Every time you talk to someone, ask a question which has the potential to completely destroy your imagined business.`,`作者明确说可以问钱；startup 没必要装作这件事不存在。`]},example:{label:`没问律师的五十万美元`,details:[`作者一家公司存在内容所有权的法律歧义。`,`早期一直和高管、创意与技术团队沟通，却从未要求见律师。`,`这个被回避的问题后来至少造成五十万美元损失。`],analysis:[`最危险的问题往往正是团队最不想让答案出现的问题。`]},practicePrompt:`写下一个“若答案是否定，就必须大改”的问题。`,try:[`如果这家公司失败，最可能为什么？`,`这笔购买最终要过哪位律师或预算方？`],avoid:[`只问不会让气氛变差的问题。`],sources:[`Chapter 3 · Asking important questions · body11.xhtml`],tags:[`提问`,`问题重要性`,`风险`]},{id:`MT-031`,chapterId:`chapter-3`,title:`学会喜欢坏消息`,englishTitle:`Love bad news`,subtitle:`“嗯，还行”往往比“哇”更可靠`,minutes:3,thesis:`早期用小成本证明自己错了，是在买回更多选择。`,englishAnchor:`There’s more reliable information in a ‘meh’ than a ‘Wow!’`,keyPoints:[`坏消息能省下大投入`,`冷淡不能靠 pitch 修好`,`先理解原因，再感谢离开`],body:[`若你只有一次机会，坏消息当然糟。但手上有 50k，用 5k 发现死路，等于保住 45k 去找活路。客户对点子冷淡，也可能替你省下数月开发。`,`“不太确定”“挺有意思”已告诉你他不在意。别加码说服到他终于称赞。可以追问是问题不大、客群不对、实现不合，还是当天状态；之后感谢他提供的清晰信号。`],evidence:{label:`学习阶段与销售阶段不同`,details:[`销售员当场没卖出，确实损失收入。`,`尚在决定是否投入时，可靠的冷淡能阻止更大损失。`,`书中要求寻找 truth，而不是 gold star。`]},example:{label:`50k 的选择权`,details:[`把全部 50k 押在第一个点子，失败就是坏消息。`,`先花 5k 排除死路，剩余资源仍能探索。`],analysis:[`早期学习的价值之一，是便宜地保留未来选项。`]},practicePrompt:`下一次冷淡出现时，不补卖点；只问两句原因便结束。`,try:[`这件事对你是不重要，还是我们的做法不适合？`,`谢谢，这正是我需要知道的。`],avoid:[`再给我两分钟，你就会明白它多棒。`],sources:[`Chapter 3 · Love bad news · body11.xhtml`],tags:[`问题重要性`,`坏数据`,`会议`]},{id:`MT-032`,chapterId:`chapter-3`,title:`别太早放大`,englishTitle:`Premature zoom`,subtitle:`先确认整类问题值得管`,minutes:4,thesis:`在非核心问题上问得越细，越容易得到像验证一样的假数据。`,keyPoints:[`局部第一也可能整体不重要`,`强信号前先从大目标开始`,`已知 must-solve 时才可直接放大`],body:[`一个从不锻炼的人，也能替健身 app 排序便利、成本、个性化与新鲜感。但他根本没打算健身。你验证的只是“若必须选，哪个障碍排第一”，不是这个领域进入了真实优先级。`,`不确定时，先问当前大目标、烦恼、成本和快乐。等对方自己提到相关主题，并显示搜索、投入或后果，再 zoom in。只有已非常确定该类问题是 must-solve，才适合从细节开场。`],evidence:{label:`规则不是教条｜五个提问边界`,details:[`总原则仍是：Start broad and don’t zoom in until you’ve found a strong signal。它既适用于整门业务，也适用于每一场谈话。`,`电子菜谱对话里，“当时用了 app 吗？”略有引导性，但可作为把话题推向目标领域的小幅提示；答案要比纯开放问题更谨慎地解释。`,`年龄、是否去健身房等人口或路由问题，本身通常不是商业洞察，但可帮助判断眼前是哪类人、下一问该走哪条分支。`,`已经准备结束一场明显不匹配的健身对话时，可以直接问健康是否在目标清单里；若意外得到肯定回答，必须再用过去行为重新核实。`,`博客案例里，作者不得不问一个未来时问题——是否会认真重建受众——因为没有干净的替代问法；书中明确要求怀疑这个答案，而不是把它记成承诺。`,`Vision / Framing / Weakness / Pedestal / Ask 主要用于 warm introduction 后的邀约。冷联系是另一种、风险更高的情境，不能假定同一模板会有同样效果。`]},example:{label:`书中案例｜健身访谈的完整分支`,details:[`坏分支：受访者几乎不运动，访谈者却追问“去健身房最大的困难”、让他给四项属性排序，最后给出 beta key；对方礼貌说愿意试，心里却根本不会输入。`,`宽问分支：先问当前大目标，得到工作晋升、新房装修、与伴侣相处等重点；健身没有自然出现。`,`路由问题的作用有限：例如先问多久去一次健身房，可以判断接下来是否值得深挖，却不能单独证明需求。`,`继续核对过去后，受访者说高中时运动，成家后不再重视，并认为追孩子已经够锻炼。`],analysis:[`“最大的健身问题”仍可能是一个完全不重要的问题；礼貌接受 beta key 也不能把非客户变成用户。`]},practicePrompt:`检查你的开场是否已偷偷假定某个问题很重要。`,try:[`你现在最想改善的三件事是什么？`,`这件事最近一次进入优先级是什么时候？`],avoid:[`你在 X 方面最大的痛点是什么？——当 X 尚未被确认重要时。`],sources:[`Passing the mom test · body5.xhtml`,`Chapter 3 · Look before you zoom · body11.xhtml`,`Meeting framing caveat · body21.xhtml`],tags:[`提问`,`问题重要性`,`细分`]},{id:`MT-033`,chapterId:`chapter-3`,title:`止痛药还是维生素？`,englishTitle:`Painkiller vs vitamin`,subtitle:`用行为判断问题是否进入真实优先级`,minutes:4,thesis:`看它是否进前三、是否已有时间金钱投入，而不是听“挺烦的”。`,keyPoints:[`目标与投入揭示认真程度`,`赚钱与花钱都是信号`,`泛问题可作为下一步锚点`],body:[`当 must-solve 与 nice-to-have 分不清，问对方多认真经营这件事：是否靠它挣钱、试过多挣钱吗、每周投入多久、有什么大目标、正在用哪些工具。`,`再问当前最想修的三件事，以及已经采取什么行动。部分回答仍会泛，但可以继续 anchor。核心是看它在真实生活里的位置，不是听情绪多浓。`],evidence:{label:`Does-this-problem-matter 清单`,details:[`认真程度、收入、增收尝试、每周时间、长期目标。`,`所用工具与服务、已在做的改善、当前三项重点。`]},example:{label:`作者的博客只是爱好`,details:[`他抱怨 Google Reader 消失可能让受众减半。`,`却没搜索选项，也不打算认真恢复受众，因为博客不是收入来源。`],analysis:[`口头烦恼成立，商业上的 must-solve 却不成立。`]},practicePrompt:`给每个候选痛点打三项分：优先级、已有投入、主动搜索。`,try:[`这件事在你当前三大重点里吗？`,`你已经为它投入了哪些工具或时间？`],avoid:[`把“我希望更好”当作购买动力。`],sources:[`Chapter 3 · Does-this-problem-matter questions · body11.xhtml`],tags:[`问题重要性`,`提问`,`行为证据`]},{id:`MT-034`,chapterId:`chapter-3`,title:`房间里还有一头象`,englishTitle:`Elephant in the room`,subtitle:`一个强需求不能替所有失败点作证`,minutes:3,thesis:`创业依赖多个条件同时成立；别只研究最有趣、最舒服的那一个。`,keyPoints:[`真实痛点也可能没有预算`,`列出所有必须成立条件`,`客户、伙伴和产品风险都要覆盖`],body:[`贫困学校的教师确实超负荷，工具也确实能省时间。若学校没有预算，团队把教师工作流研究得再透，商业上也可能直接走不通。`,`业务通常有多个独立 failure points。需求、购买能力、关键伙伴、技术和增长，任一不存在都可能要求大改。把这些条件摊开，不能用一个强信号替整条链。`],evidence:{label:`为什么团队会忽略 elephant`,details:[`最有趣的产品问题容易吸走全部注意力。`,`预算、法律或分销等问题不够浪漫，却同样能杀死公司。`]},example:{label:`教师需求与学校预算`,details:[`教师问题真实且紧迫。`,`学校付款能力却可能缺失。`],analysis:[`验证前者不能推导后者；两者都必须单独有证据。`]},practicePrompt:`列出业务成立必须同时为真的五个条件，并标出证据最弱的一个。`,try:[`除了需求，还有什么能独立杀死这件事？`,`谁有预算，预算真的存在吗？`],avoid:[`用一次痛感强烈的访谈宣布整门生意已验证。`],sources:[`Chapter 3 · Look at the elephant · body11.xhtml`],tags:[`问题重要性`,`风险`,`B2B`]},{id:`MT-035`,chapterId:`chapter-3`,title:`风险住在市场，还是产品里？`,englishTitle:`Product risk vs market risk`,subtitle:`谈话不能证明你造得出、长得大`,minutes:5,thesis:`访谈能回答想不想、付不付；重产品风险必须更早用产品测试。`,keyPoints:[`Market risk 看需求、付费与规模`,`Product risk 看构建、增长与留存`,`风险位置决定验证工具`],body:[`Market risk 是他们想要吗、会付吗、人够多吗；product risk 是你能造吗、能增长吗、他们会持续用吗。演讲者说“只要带来更多订单，我就分成”并不意外，真正难的是平台能否聚集足够订单。`,`农场追踪器、酒吧实时引流、广告、联盟分成和游戏都说明：客户愿意接受“更便宜、更好、更多生意”，不能证明你的产品能兑现。谈话给起点，重产品风险要尽早构建。`],evidence:{label:`书中的两类风险`,details:[`Product risk：Can I build it? Can I grow it? Will they keep using it?`,`Market risk：Do they want it? Will they pay? Are there enough of them?`]},example:{label:`三组反例`,details:[`农民愿换更有效追踪器，创始人却造不出来。`,`酒吧愿为慢夜客流付钱，消费者也想去热闹便宜的派对，但临界规模未被证明。`,`人们买游戏无需重证，风险在游戏好不好、能否被看见。`],analysis:[`同样的正面回答，在不同风险结构里价值完全不同。`]},practicePrompt:`把当前最大未知标成 market 或 product，并为它选择非谈话的补充测试。`,try:[`这项风险能靠客户事实回答吗？`,`我们最小可以构建什么来测试兑现能力？`],avoid:[`用“如果你能做到，我就买”证明自己能做到。`],sources:[`Chapter 3 · Product risk & market risk · body11.xhtml`],tags:[`问题重要性`,`产品判断`,`风险`]},{id:`MT-036`,chapterId:`chapter-3`,title:`会前只带三件最想知道的事`,englishTitle:`List of 3`,subtitle:`用少量关键问题抵抗现场舒适区`,minutes:3,thesis:`每类对象准备当前最模糊的三问；答案会自然产生下一组三问。`,keyPoints:[`不同角色用不同三问`,`不用每人机械重复`,`三问让偶遇也能学习`],visual:`process-loop`,body:[`会前和团队选此刻最重要、最不确定的三件事。客户、伙伴、预算方的三问可以不同。别焦虑“永远正确”，因为每批答案都会让清单更新。`,`不必把整套问题对每个人重问。A 补 1—3，B 补 4，C 补 5—7；已有可靠数据就向前走。清楚三问后，遇到理想客户也能直接问一句，不必先约咖啡。`],evidence:{label:`原书为什么要求预先决定`,details:[`现场即兴容易躲进舒服的琐事。`,`团队在冷静环境里更容易写出不诱导、也更敢问的关键问题。`]},example:{label:`偶遇时的用法`,details:[`没有三问：交换名片，承诺以后约会。`,`有三问：当场问最关键的一句，五分钟内得到新事实。`],analysis:[`准备减少的不是自然感，而是无目标闲聊。`]},practicePrompt:`暂停所有脚本，只留下当前会改变决策的三个问题。`,try:[`我们最想从这类人身上学到什么？`,`哪一问的答案最可能让我们大改？`],avoid:[`为了完整而把已回答的问题每场重问。`],sources:[`Chapter 3 · Prepare your list of 3 · body12.xhtml`],tags:[`提问`,`团队流程`,`会议`]},{id:`MT-037`,chapterId:`chapter-4`,title:`早期学习更像闲聊`,englishTitle:`Keeping it casual`,subtitle:`问题、方案、销售要分阶段，但第一阶段不必约成一场会`,minutes:3,thesis:`把仪式去掉，五分钟自然聊天也能完成一场高质量学习。`,keyPoints:[`三阶段不等于三场日历会议`,`偶遇可直接问关键问题`,`朋友也能提供可靠事实`],body:[`把 problem、solution、sale 分开能减少偏见，但一小时会议加上排期、通勤、复盘，可能吞掉四小时。`,`早期只想知道问题是否真实，没必要为十分钟学习搭一整套仪式。`,`在行业活动遇到演讲者，直接问“你怎么拿到这次机会？”就够。去掉采访标签，短聊反而自然；一晚聊十几次，双方也不觉得欠人情。`],evidence:{label:`作者对三会制的实际观察`,details:[`刚进入品牌广告行业时，他缺乏信誉，连第一场正式问题访谈都难约。`,`有信誉后虽然能约，却发现创始人的时间和注意力不该大量耗在早期会议开销上。`]},example:{label:`会议现场的一句开场`,details:[`不是“能约一小时采访吗”。`,`而是“我很好奇，你怎么拿到这场演讲的？”`],analysis:[`对话立即进入真实经历，也更容易被记住和继续介绍。`]},practicePrompt:`找一个本周自然会遇到目标人群的地方，只带一问。`,try:[`这件事你上次是怎么搞定的？`,`听起来很麻烦，你们怎么处理？`],avoid:[`凡是想了解一点，就先发正式会议邀请。`],sources:[`Chapter 4 · Keeping it casual · body13.xhtml`],tags:[`会议`,`获客`,`核心原则`]},{id:`MT-038`,chapterId:`chapter-4`,title:`什么都约成正式会议，是一种反模式`,englishTitle:`Meeting anti-pattern`,subtitle:`如果对方像在帮你完成任务，场面多半太正式`,minutes:3,thesis:`正式感会制造展示预期，也让你错过已经发生在身边的学习。`,keyPoints:[`日历块不是学习的前提`,`量表与采访套话会拉开距离`,`真好奇本身就有交换价值`],body:[`“感谢接受采访，我只有几个问题”“请按 1 到 5 打分”会把交流变成一项差事。正式感常是面对尴尬时的拐杖，也让对方期待你接下来展示产品。`,`人们其实愿意谈日常烦恼。你可能是很久以来第一个认真听这些小事的人。把正式会留给要展示、销售或深入行业的时候；早期先好好聊天。`],evidence:{label:`原书的识别规则`,details:[`If it feels like they’re doing you a favour by talking to you, it’s probably too formal.`,`过度正式会让团队忽略咖啡馆、活动和酒会里已经出现的机会。`,`原书用约会打比方：两个人已经在咖啡馆自然聊天，相当于第一次约会已经开始；突然中断它去另约“一次咖啡”，反而把现成机会弄得尴尬。`]},example:{label:`办公室经理的啤酒对话`,details:[`作者周末列好大问题，周一去行业活动。`,`几次随意聊天便发现核心问题是催债，不是原先猜的效率。`],analysis:[`casual 不等于无准备；问题在会前已经想清楚。`]},practicePrompt:`把一段采访开场删到只剩共同话题和第一个真实问题。`,try:[`自然承接眼前话题。`,`用好奇而非问卷口吻。`],avoid:[`首先感谢您接受本次用户访谈。`],sources:[`Chapter 4 · The meeting anti-pattern · body13.xhtml`],tags:[`会议`,`获客`,`访谈偏差`]},{id:`MT-039`,chapterId:`chapter-4`,title:`时长由阶段决定`,englishTitle:`Conversation length`,subtitle:`五分钟判断问题，半小时推动成交`,minutes:3,thesis:`越靠近产品与购买，谈话才需要越长；早期别为短答案支付长会议成本。`,keyPoints:[`5 分钟可验问题`,`10–15 分钟可拆流程`,`销售会再预留 30 分钟以上`],body:[`判断问题是否存在和重要，五分钟往往够了；复盘当前目标、流程与替代，常在十到十五分钟完成。行业专家要讲完整结构，才可能需要一小时以上。`,`产品销售会可安排半小时：寒暄与背景、目标/问题/预算、展示、下一步各占一段。早期短聊若先花大量时间排期和通勤，速度就被形式吞掉。`],evidence:{label:`书中的时间刻度`,details:[`5 分钟：问题存在与重要性。`,`10–15 分钟：流程与当前解法。`,`30+ 分钟：已有产品、需要展示并确认 advancement。`]},example:{label:`半小时销售会的粗分配`,details:[`约 5 分钟迟到杂务、5 分钟寒暄、5 分钟问题与预算。`,`约 10 分钟展示，最后 5 分钟确认下一步。`],analysis:[`时间不是固定模板，而是阶段复杂度的结果。`]},practicePrompt:`给下一场会写明唯一目标，并据此把时长砍到刚好够用。`,try:[`若只想验证重要性，先约十分钟。`,`若要推进购买，预留明确 next-step 时间。`],avoid:[`默认所有客户学习都要一小时。`],sources:[`Chapter 4 · How long are meetings? · body14.xhtml`],tags:[`会议`,`团队流程`,`效率`]},{id:`MT-040`,chapterId:`chapter-4`,title:`只透露足够推动话题的最少信息`,englishTitle:`Minimum reveal`,subtitle:`给方向，不给答案`,minutes:3,thesis:`让事实先出现，再决定是否展示点子和索取承诺。`,keyPoints:[`正式会也可保持 casual`,`少量背景用于聚焦`,`快速否证是成功学习`],body:[`作者猜投资人会被大量 dealflow 淹没。寒暄时只问“这么多线索怎么处理”，对方指着墙上十几张便利贴：分析师已筛掉大部分，每位投资人只需跟进约十个候选。`,`五分钟内，问题被否证，对方甚至没意识到自己在评价一个点子。没有赞美、功能建议或未来承诺，只有相关事实。信息给得越少，偏见越少。`],evidence:{label:`原书的最低披露原则`,details:[`Give as little information as possible about your idea while still nudging the discussion in a useful direction.`,`一旦客户事实足够，团队才提出产品方案并转向 commitment。`]},example:{label:`两小时通勤换来五分钟否证`,details:[`作者为会面通勤两小时。`,`真正需要的学习只用了五分钟。`],analysis:[`形式成本很高，但五分钟否证仍比围绕假问题开发便宜。`]},practicePrompt:`把产品介绍压成只够划定话题的一句，后面立刻问现状。`,try:[`我想了解 X 这类工作，你们现在怎么处理？`,`先不讲我们的做法，能看看你们现有流程吗？`],avoid:[`在第一个问题前完整 demo。`],sources:[`Chapter 4 · Putting it together · body14.xhtml`],tags:[`会议`,`提问`,`坏数据`]},{id:`MT-041`,chapterId:`chapter-5`,title:`清掉 zombie leads`,englishTitle:`Commitment & advancement`,subtitle:`友好不等于客户`,minutes:3,thesis:`方案已经出现，就让关系前进一步；不合适也该明确停下。`,keyPoints:[`Commitment 要付出价值`,`Advancement 进入漏斗下一步`,`长期暧昧最危险`],visual:`signal-ladder`,body:[`前期先学事实。有了产品轮廓后，就要展示并索取 commitment。它说明对方愿放弃时间、信誉或钱。`,`Advancement 说的是另一件事：关系进入真实获客漏斗的下一步。`,`不推进会制造 zombie leads：一直见面、一直友好、从不付款。给对方清晰的前进或拒绝机会，两种结果都比“保持联系”有用。`],evidence:{label:`僵尸线索的症状`,details:[`产品会以赞美结束，没有明确 next step。`,`会后只说“开得不错”，对方没有放弃任何有价值的东西。`]},example:{label:`Commitment 与 advancement 怎样重叠`,details:[`要进入下一阶段，需要联系人介绍老板。`,`这既推进销售，也让联系人承担信誉成本。`],analysis:[`对早期学习而言，两者常可视为同一强信号。`]},practicePrompt:`给每条活跃线索写出一项下一步和一项对方需要付出的成本。`,try:[`我们下周能和预算负责人一起确认吗？`,`如果现在不合适，也请直接告诉我。`],avoid:[`那我们保持联系。`],sources:[`Chapter 5 · Commitment and advancement · body15.xhtml`],tags:[`承诺`,`会议`,`销售`]},{id:`MT-042`,chapterId:`chapter-5`,title:`会议必须有结论`,englishTitle:`Meetings succeed or fail`,subtitle:`没有“还不错”这个中间态`,minutes:3,thesis:`产品或销售会结束时若不知道下一步，这场会就是失败的。`,keyPoints:[`赞美不是结论`,`拒绝也是强数据`,`会前先想好 next step`],body:[`成功会议以一个已同意、目标明确的下一步结束。赞美和“假期后再聊”只是停滞。被拒绝并非真正失败，至少你知道位置；因为害怕或没准备而根本没问，才会让会面漂走。`,`你也必须知道下一步是什么。若对方主动问“What are the next steps?”，你却说回去想想，就浪费了一个本来很好的推进信号。`],evidence:{label:`两类常见陷阱`,details:[`向客户索取对点子的意见，得到赞美。`,`没有提出明确 commitment 或 next step。`]},example:{label:`拒绝为什么有价值`,details:[`你提出一个具体试点，对方说不。`,`团队得到强负面数据，不再把这条线索算进管线。`],analysis:[`分辨真实线索需要先把选择摆上桌。`]},practicePrompt:`在邀请发出前，先写好理想 next step 与可接受的拒绝。`,try:[`如果今天判断合适，下一步是……`,`这一步你愿意现在确认吗？`],avoid:[`会后再想该做什么。`],sources:[`Chapter 5 · Meetings succeed or fail · body15.xhtml`],tags:[`承诺`,`会议`,`下一步`]},{id:`MT-043`,chapterId:`chapter-5`,title:`三种对话货币`,englishTitle:`Currencies of conversation`,subtitle:`时间、信誉、钱`,minutes:3,thesis:`对方付出的成本越高，他的好话越可信。`,keyPoints:[`时间承诺能验认真`,`介绍会押上信誉`,`金钱最直观但不是唯一`],visual:`signal-ladder`,body:[`时间可以是目标明确的下次会、认真评 wireframe、持续使用 trial；信誉可以是介绍同事、老板、配偶或律师，或公开案例；金钱包括 LOI、预购与订金。`,`强承诺会叠加货币。整个团队参加付费试用，同时花时间、花钱，也让内部推荐人押上信誉。赞美成本为零，因此证据价值也接近零。`],evidence:{label:`原书的 commitment 清单`,details:[`Time：明确下次会、反馈、非轻量试用。`,`Reputation：引荐、testimonial、case study。`,`Money：LOI、pre-order、deposit。`]},example:{label:`组合承诺`,details:[`联系人推动全队参加付费 trial。`,`若失败，他要向同事解释，还花掉部门预算与使用时间。`],analysis:[`三种成本同时存在，信号远强于“我喜欢”。`]},practicePrompt:`给每个现有信号标出对方实际支付了哪种货币。`,try:[`能否让团队真实使用一周？`,`可以把我介绍给决策者吗？`],avoid:[`用赞美填充 pipeline。`],sources:[`Chapter 5 · The currencies of conversation · body15.xhtml`],tags:[`承诺`,`会议`,`信号强度`]},{id:`MT-044`,chapterId:`chapter-5`,title:`弱信号判读`,englishTitle:`Weak signals`,subtitle:`赞美、拖延、模糊介绍都还不算`,minutes:3,thesis:`把好听但便宜的话，转成今天就能确认的动作。`,keyPoints:[`“喜欢”是零成本`,`“上线通知”常是拖延`,`模糊介绍要问具体`],body:[`“太酷了，我喜欢”是纯赞美。“上线告诉我”常是赞美加拖延，不能记成预购。“准备好时我介绍几个人”略有信号，却要问具体是谁、准备好的标准是什么、为什么不是现在。`,`你当然不能强占别人的人脉。这里只是要分清真 offer 与礼貌姿态。越能转成当前动作，越值得放进管线。`],evidence:{label:`原书的三档弱信号`,details:[`That’s so cool. I love it. → bad meeting。`,`Looks great. Let me know when it launches. → compliment + stall。`,`I can introduce people when you’re ready. → 需具体化。`]},example:{label:`怎样修复 launch stall`,details:[`早期可请介绍老板、技术团队或预算方。`,`稍后可请他做 alpha 用户、小范围上线并同意成为案例。`],analysis:[`真实痛点会让人愿意今天开始推进，而非只等未来。`]},practicePrompt:`把一条模糊承诺追到人名、日期和条件。`,try:[`你想到的具体是谁？`,`对你来说，“准备好”需要满足什么？`],avoid:[`把“上线告诉我”登记为预购。`],sources:[`Chapter 5 · Good/bad meetings · body16.xhtml; body17.xhtml`],tags:[`承诺`,`会议`,`坏数据`]},{id:`MT-045`,chapterId:`chapter-5`,title:`当前承诺才算`,englishTitle:`Current commitment`,subtitle:`“下一步是什么”很好，“我肯定买”很危险`,minutes:4,thesis:`看对方现在承担什么，不看他想象中的未来说得多肯定。`,keyPoints:[`主动问 next steps 是推进`,`肯定购买仍是 fluff`,`trial 强度取决于试用成本`],body:[`“下一步是什么？”通常是好信号，前提是你能回答。`,`“我肯定会买”仍是高危未来承诺，要转成 LOI、预购、订金或介绍决策者。`,`“什么时候能试？”可能很好，也可能只是十秒注册看一眼。企业部署和培训有真实成本；个人试用太轻时，可要求团队持续用一周、两周后做案例，或先留卡、可取消。`],evidence:{label:`试用为何不自动等于承诺`,details:[`设置新软件、培训员工时，免费 trial 也可能很贵。`,`个人 CRM 注册后看一眼再也不回，几乎没有成本。`]},example:{label:`Kickstarter 的强处`,details:[`它不只收集“我会买”。`,`它要求支持者真的拿出信用卡。`],analysis:[`把未来承诺变成当前成本，才有验证价值。`]},practicePrompt:`给你的 trial 定义一项可观察的最低投入。`,try:[`你愿意让团队连续用一周吗？`,`我们现在可以先确认预购吗？`],avoid:[`只统计注册，不看真实使用成本。`],sources:[`Chapter 5 · Next steps; Definitely buy; Trial · body17.xhtml; body18.xhtml`],tags:[`承诺`,`会议`,`试用`]},{id:`MT-046`,chapterId:`chapter-5`,title:`原型购买与团队引荐`,englishTitle:`Strong signals`,subtitle:`两种罕见但清晰的早期信号`,minutes:3,thesis:`愿买粗糙原型或主动带你进团队，需求已超过礼貌层面。`,keyPoints:[`买原型是强金钱承诺`,`团队引荐是 B2B advancement`,`始终不介绍通常是 dead end`],body:[`“原型能卖给我吗？”是作者见过最好的会面结尾之一。对方不等产品成熟，愿用钱承担风险。B2B 里，“什么时候来和团队其他人谈？”同样强，因为企业购买本就需要多人。`,`反过来，联系人若始终不肯让你接触任何其他人，往往已到死路。别让友好掩盖组织现实。`],evidence:{label:`信号为何强`,details:[`购买原型同时承认问题重要，也接受产品不成熟。`,`引荐内部团队让联系人承担信誉，并推进真实购买流程。`]},example:{label:`不断被买走的三脚架`,details:[`产品设计师展示 3D 打印手机三脚架。`,`他已做约十二版原型，因为不断有人要求买走。`],analysis:[`粗糙阶段仍反复成交，是比 demo 赞美更清楚的需求。`]},practicePrompt:`为现阶段设计一个客户可以现在购买或引荐的最小对象。`,try:[`这版原型你愿意现在买下吗？`,`下一次能让谁一起参加？`],avoid:[`等完美上线后再让客户做决定。`],sources:[`Chapter 5 · Prototype; Rest of team · body19.xhtml`],tags:[`承诺`,`B2B`,`原型`]},{id:`MT-047`,chapterId:`chapter-5`,title:`给一次拒绝机会`,englishTitle:`Chance to reject`,subtitle:`不是 real lead，直到请求足够具体`,minutes:3,thesis:`最差的会既没拒绝也没推进；把选择摆上桌，才有东西可学。`,keyPoints:[`no-man’s-land 没有信息`,`具体 commitment 能救场`,`目的只是求清晰`],body:[`烂会常以含糊好话结束，双方既没说不，也没往前。此时提出一项与你阶段相称的 commitment，常能把会救回来。`,`这不是强抢钱包。你只是穿过礼貌，确认他会不会成为客户、伙伴或投资人。若答案是否定，吸收信息、判断是否改策略，然后继续。`],evidence:{label:`原书规则`,details:[`It’s not a real lead until you’ve given them a concrete chance to reject you.`,`目标是确认 must-have 与 real customer，不是让每个人都喜欢。`]},example:{label:`示意案例｜从赞美送客到清晰结果`,details:[`对方用一句笼统赞美结束会面。`,`你提出与当前阶段相称的团队试用；他接受或拒绝，管线终于可更新。`],analysis:[`清晰拒绝比长期僵尸线索便宜；这是教学示意，不是书中逐字对话。`]},practicePrompt:`挑一条最久不动的线索，提出一个可被明确拒绝的下一步。`,try:[`你愿意在周五前确认试点吗？`,`若暂时不优先，我们就先停在这里。`],avoid:[`继续发送无目标的跟进邮件。`],sources:[`Chapter 5 · How to fix a bad meeting · body19.xhtml`],tags:[`承诺`,`会议`,`销售`]},{id:`MT-048`,chapterId:`chapter-5`,title:`别闭眼 pitch`,englishTitle:`Don’t pitch blind`,subtitle:`开始卖以后，仍先问几句`,minutes:3,thesis:`开放问题告诉你为什么；销售动作再确认会不会买。`,keyPoints:[`市场共性不等于个人处境`,`硬 pitch 只给二元反馈`,`大问题靠学习，细调才靠硬卖`],body:[`“我们做 X，要买吗？”只给 yes/no。没卖成时，你不知道是需求、客群、说法还是功能出了问题。即使市场已了解，眼前这个人也有独特目标、预算和限制。`,`产品会先用 Mom Test 问现状，再展示最相关部分并索取承诺。开放学习适合大问题；硬 pitch 适合后期做小调整。`],evidence:{label:`书中的顺序`,details:[`Ask learning questions which pass The Mom Test.`,`Then confirm by selling it。这个节奏既适用于公司生命周期，也适用于单场会议。`]},example:{label:`同一个拒绝的四种可能`,details:[`问题不重要、对象不对、表达没命中，或缺少关键购买条件与必需功能。`,`只问“买吗”无法区分它们。`],analysis:[`先理解语境，拒绝才变得可解释。`]},practicePrompt:`在 demo 前加三个开放问题：目标、现状、预算。`,try:[`你现在最想改善哪一段？`,`这次购买会从哪笔预算出？`],avoid:[`开场第一句就是“我们做 X”。`],sources:[`Chapter 5 · Don’t pitch blind · body19.xhtml`],tags:[`会议`,`承诺`,`提问`]},{id:`MT-049`,chapterId:`chapter-5`,title:`第一批客户有点疯狂`,englishTitle:`Earlyvangelists`,subtitle:`温和认同者通常不会写第一张支票`,minutes:4,thesis:`找那些痛到已经行动，并愿押上钱、时间和信誉的人。`,englishAnchor:`In early stage sales, the real goal is learning. Revenue is just a side-effect.`,keyPoints:[`首批购买本来就不理性`,`四项 earlyvangelist 条件`,`早期销售先优化学习，再看收入`],body:[`年轻 startup 随时可能倒闭、转向或交付失败。首批客户得非常想要，才愿率先冒险。`,`Earlyvangelist 有问题、知道有问题、有预算，还已经拼出临时解法。`,`B2B 里，他会用机动预算试点，甚至替你对抗老板和律师；消费端会预购胶带原型并拉朋友。温和兴趣者可以留着，但别指望他开第一单。`,`早期销售的第一目标仍是学习：哪些人会行动、为什么行动、怎样推进。收入当然重要，但在这个阶段，它首先是找到真实客户后的副作用。`],evidence:{label:`Steve Blank 的四项条件与早期销售规则`,details:[`Have the problem。`,`Know they have the problem。`,`Have the budget。`,`Have cobbled together a makeshift solution。`,`原书规则：In early stage sales, the real goal is learning. Revenue is just a side-effect.`]},example:{label:`两种情绪强度`,details:[`“对，这算个问题。”`,`“这是我生活最糟的一部分，我现在就付钱。”`],analysis:[`后者若伴随预算与 workaround，才接近首批客户。`]},practicePrompt:`从线索里圈出有预算且已做 workaround 的人，优先保持近距离。`,try:[`你现在用什么临时办法？`,`你能用哪笔预算开始试点？`],avoid:[`把所有口头兴趣平均看待。`],sources:[`Chapter 5 · Crazy customers and your first sale · body19.xhtml`],tags:[`承诺`,`细分`,`首批客户`]},{id:`MT-050`,chapterId:`chapter-6`,title:`从 cold 到 warm`,englishTitle:`Cold to warm`,subtitle:`冷启动的目标，是尽快不再冷启动`,minutes:3,thesis:`先想办法凑到一两场，再让好对话启动介绍雪球。`,keyPoints:[`冷联系拒绝率未必有商业意义`,`只需少数对话启动`,`尊重时间换来暖介绍`],body:[`若未来不靠冷呼叫卖产品，联系 100 人被 98 人拒绝，只说明人们不喜欢冷呼叫。手里仍多了两场对话。`,`认真理解这两人的问题、尊重时间，并在结尾问还该找谁，冷线索会逐渐变成 warm intros。冷启动看的不是漂亮回复率，是转介绍链条有没有启动。`],evidence:{label:`先从熟人开始；没有熟人再冷启动`,details:[`若产品来自自己的切身问题（scratch your own itch），通常已经认识同类客户，可以直接找他们聊。只要问题问得好，即使彼此熟悉，也不会自动污染过去行为的事实。`,`没有现成人脉时再用冷联系；The goal of cold conversations is to stop having them。`,`冷拒绝率只有在冷呼叫本身是未来销售渠道时，才可能成为渠道证据。`]},example:{label:`冷 LinkedIn 找零售高管`,details:[`一支团队几乎被英国所有零售高管忽略。`,`只需一位答应，便能开始后续介绍。`],analysis:[`早期目标是拿到入口，不是优化表面成功率。`]},practicePrompt:`本周只设一个目标：拿到两场真实对话和每场一个转介绍请求。`,try:[`谁还会对这件事有一手经验？`,`如果方便，能帮我做个介绍吗？`],avoid:[`因 98 次拒绝就判定需求不存在。`],sources:[`Chapter 6 · Finding conversations; Cold calls · body20.xhtml; body21.xhtml`],tags:[`获客`,`会议`,`冷启动`]},{id:`MT-051`,chapterId:`chapter-6`,title:`偶遇与好借口`,englishTitle:`Serendipity & excuse`,subtitle:`不必把聊天宣布成访谈`,minutes:3,thesis:`真诚地聊双方都关心的主题，点子甚至不用出现。`,keyPoints:[`听见相关经历就自然追`,`好奇心比采访标签自然`,`借口应围绕共同主题`],body:[`在派对听见有人说“下周去东京演讲”，作者直接聊她的职业，既得到洞察，也拿到下次使用原型的承诺。非正式场合无需解释自己正在创业。`,`陌生场景也可用诚实理由开口。称赞咖啡后问豆子故事，能从服务员找到经理，再拿到老板联系方式。好借口围绕共同关心的话题，不是伪装推销。`],evidence:{label:`为什么偶遇不奇怪`,details:[`人们喜欢谈自己，也喜欢谈自己的问题。`,`奇怪感多来自把它想成突袭采访，而非一场有兴趣的对话。`,`如果创始团队里有博士生，研究课题本身就是诚实理由：说明正在研究 X 周围的问题，请对方为论文或研究分享几条一手经验。`]},example:{label:`订婚派对的承诺`,details:[`作者朝谈东京演讲的人走去。`,`对方离开时觉得他对自己职业真有兴趣，还答应下场试原型。`],analysis:[`好的 casual 对话可以同时学习与推进关系。`]},practicePrompt:`准备一句不提产品、却能自然进入主题的开场。`,try:[`我刚听你提到 X，这次是怎么发生的？`,`这里的豆子故事很特别，谁最了解它？`],avoid:[`突然宣布“我想采访你”。`],sources:[`Chapter 6 · Seizing serendipity; Find a good excuse · body21.xhtml`],tags:[`获客`,`会议`,`偶遇`]},{id:`MT-052`,chapterId:`chapter-6`,title:`沉浸与 landing page`,englishTitle:`Immersion & landing pages`,subtitle:`社区给语境，页面给线索`,minutes:3,thesis:`落地页最可靠的价值，是找到愿意继续聊的人，而非单靠转化率宣布验证。`,keyPoints:[`进入客户所在社区`,`沉浸也可能推翻客群`,`对每位高意向注册者继续对话`],body:[`作者想服务高价演讲者，便到处免费演讲、帮主办方，逐渐进入社区。深入后，他反而判断大演讲者与大会议不是好客群。`,`Buffer 的 landing page 常被当成纯量化验证；书中强调真正推动判断的，是创始人给每个留下邮箱的人写信并聊天。页面先筛线索，对话再解释为什么。`],evidence:{label:`两种工具的不同价值`,details:[`社区沉浸带来语言、关系、帮助机会与自然观察。`,`Landing page 和 generic launch 能找出反应最强的人，纯转化数字应谨慎解释。`]},example:{label:`Buffer 的后续动作`,details:[`页面描述价值并收邮箱。`,`Joel Gascoigne 给每位注册者写信、说 hello、继续对话。`],analysis:[`指标告诉你谁靠近，谈话帮助理解靠近的原因。`]},practicePrompt:`给现有注册流程加一个创始人亲自发出的开放式问题。`,try:[`你为什么在今天留下邮箱？`,`你现在用什么办法处理这件事？`],avoid:[`把一个转化率单独称为需求验证。`],sources:[`Chapter 6 · Immerse yourself; Landing pages · body21.xhtml`],tags:[`获客`,`细分`,`落地页`]},{id:`MT-053`,chapterId:`chapter-6`,title:`让客户找上门`,englishTitle:`Bringing them to you`,subtitle:`立一面他们看得见的旗`,minutes:4,thesis:`活动、教学与行业内容能同时带来信誉、对话和更高意愿的线索。`,keyPoints:[`办活动成为连接中心`,`教学测试观点共鸣`,`博客即使没流量也能建立可信度`],body:[`总去追客户时，你处于解释“为什么别挂电话”的弱势。换个方向：办行业 meetup、做 workshop 或 office hours、写行业博客，让对方因为你提供的价值主动靠近。`,`这些动作还会磨清观点：哪些说法有共鸣、谁最投入。不要机械复制别人的招，按自己的行业设计一件客户本来就想参加的事。`],evidence:{label:`书中三条 inbound 路径`,details:[`Organise meetups：以组织者身份获得注意力与信誉。`,`Speaking & teaching：展示专业与鲜明观点。`,`Industry blogging：整理思路，并让冷邮件收件人先看见你值得聊。`]},example:{label:`顶尖大学 knowledge exchange`,details:[`创业者组织三所顶尖大学系主任定期交流难题。`,`其他大学可旁听；他以主持人身份获得可信度，并直接接触大量高质量线索。`],analysis:[`提供一个有用的公共场域，可以重写客户接触的权力关系。`]},practicePrompt:`选一种你两周内能提供的行业价值：小活动、教学或一篇实用文章。`,try:[`邀请目标人群讨论共同难题。`,`活动后只追最投入的人。`],avoid:[`只在活动上做产品路演。`],sources:[`Chapter 6 · Bringing them to you · body21.xhtml`],tags:[`获客`,`会议`,`内容`]},{id:`MT-054`,chapterId:`chapter-6`,title:`暖介绍地图`,englishTitle:`Warm intro map`,subtitle:`你离目标人群没有想象中远`,minutes:4,thesis:`问两三轮“谁认识谁”，再调动顾问、学校、投资人和旧人情。`,keyPoints:[`公开问网络最直接`,`顾问能持续供给可信介绍`,`旧承诺可偶尔兑现但别滥用`],body:[`消费者细分通常离你很近；B2B 也可从共享空间、顾问、教授与投资人向外走。世界很小，难点常只是没人明确开口问。`,`作者用五位小比例持股顾问，每月各见一次，形成每周一批介绍。必要时也可回复旧邮件里的“有需要告诉我”，但这种做法会消耗人情和信任，不宜成为习惯。`],evidence:{label:`书中的介绍来源`,details:[`身边网络与 7 degrees of separation。`,`行业顾问、大学教授、投资人。`,`过去说过“有需要告诉我”的人。`]},example:{label:`三杯啤酒换来满日历`,details:[`作者在共享办公空间站上椅子，问谁认识 McKinsey 员工。`,`团队买了三杯啤酒、聊了三次，离开时拿到一整套介绍。`],analysis:[`公开而具体的请求，比默默假设没人认识更有效。`]},practicePrompt:`画三层介绍链：我认识谁、他认识谁、目标是谁。`,try:[`谁认识在 X 工作的人？`,`怎样介绍能让对方知道我不会浪费时间？`],avoid:[`只盯陌生高管发冷邮件。`],sources:[`Chapter 6 · Creating warm intros · body21.xhtml`],tags:[`获客`,`承诺`,`人脉`]},{id:`MT-055`,chapterId:`chapter-6`,title:`五段式邀约`,englishTitle:`Vision / Framing / Weakness / Pedestal / Ask`,subtitle:`让对方知道为什么值得帮你`,minutes:4,thesis:`说清想改善什么、所处阶段、具体盲区、他为何关键，然后明确求助。`,keyPoints:[`不必先讲产品`,`具体 weakness 让帮助可执行`,`pedestal 说明为何找他`],visual:`process-loop`,body:[`Vision 用半句话说想改善的世界。Framing 交代阶段与边界；若属实，可以直说现在没有东西要卖。`,`Weakness 坦白一个具体盲区，Pedestal 说明为什么偏偏是他的经验有用，最后用 Ask 明确求助。`,`记忆法是 Very Few Wizards Properly Ask。它避开“能采访你吗”的无聊警报，也不会用“想听你的意见”招来赞美。`],evidence:{label:`三种坏 framing 与两封书中邮件`,details:[`Can I interview you? 暗示一场无聊问卷。`,`Can I get your opinion on what we’re doing? 暗示需要赞美。`,`有空喝咖啡吗？没有说明为何值得花时间。`,`第二封广告行业邮件把 Weakness 提前：团队很难看清行业各环节怎样衔接、自己该落在哪里；随后才说明对方最懂这个行业，团队已有资金和产品，但这次不是销售会。`,`五段式主要用于 warm introduction。冷联系更像赌博，不能假定同一模板会产生同样的信任。`]},example:{label:`书中案例｜两种五段式邀约`,details:[`办公租赁邮件——Vision：减少新公司租桌痛苦；Framing：刚开始，没有东西要卖；Weakness：只懂租客，不懂房东；Pedestal + Ask：你出租多年，能否帮我聊聊。`,`广告行业邮件——先承认看不清行业结构，再把对方置于最能指路的位置；最后说明已有产品但本次不是销售会，并请对方喝咖啡指路。`],analysis:[`对方能预见自己如何产生真实帮助，因此更愿意答应；顺序可按邮件风险调整。`]},practicePrompt:`用五段式重写下一封 meeting request，控制在短邮件内。`,try:[`明确一个具体盲区。`,`明确为什么偏偏找这个人。`],avoid:[`只说“想 pick your brain”。`],sources:[`Chapter 6 · Asking for and framing the meeting · body21.xhtml`],tags:[`获客`,`会议`,`提问`]},{id:`MT-056`,chapterId:`chapter-6`,title:`开场拿回方向盘`,englishTitle:`Grab the reins`,subtitle:`电话是有代价的捷径`,minutes:4,thesis:`重述 framing 后立刻问第一题；早期先学会在线下读完整语境。`,keyPoints:[`开场重复缘由并马上提问`,`你负责议程与下一步`,`远程会损失非语言信号与关系`],body:[`会面开始时简短重述 vision、阶段与盲区，若有人介绍可借其 authority，然后立即用对方的具体经历切入。不要让会面默认变成对方审问你的产品。`,`电话和视频更容易被挤进碎片时间，也缺少表情、肢体语言与朋友式闲聊。书中承认有人偏好远程；建议先从线下练起，再把它当经过权衡的取舍，而非逃避尴尬。`],evidence:{label:`为什么要由你控制`,details:[`你设议程、保持主题、提出 next steps。`,`这不是要显得盛气凌人，而是防止会面自动滑向一场过早且糟糕的销售会。`]},example:{label:`大学 spinout 的开场`,details:[`说明想帮助大学孵化学生公司，也承认尚不懂幕后流程。`,`提到引荐人并称赞具体 portfolio 项目，立刻问它如何从课堂走到公司。`],analysis:[`具体问题替代寒暄，也让 pedestal 显得真诚。`]},practicePrompt:`写好会面第一分钟：三句 framing，加一个具体问题。`,try:[`正如邮件里说的，我们想理解……`,`我看到你们的 X，它当初是怎么开始的？`],avoid:[`开场只问“How’s it going?”然后等对方带路。`],sources:[`Chapter 6 · Meeting opening; To commute or to call · body21.xhtml; body22.xhtml`],tags:[`会议`,`获客`,`提问`]},{id:`MT-057`,chapterId:`chapter-6`,title:`先去挑顾问`,englishTitle:`The advisory flip`,subtitle:`用心态切换减少 needy 气息`,minutes:3,thesis:`把任务改成评估行业顾问，你会自然多问、少卖，也拿回主动权。`,keyPoints:[`内部叙事会改变行为`,`不必公开宣布招顾问`,`你从被评估者变成评估者`],body:[`带着“我一定要成交”的暗线去学习，会不断消耗意志力。改成“我要找懂行、愿帮忙、对方向兴奋的人”，同样的问题会自然变成对顾问质量的判断。`,`不必告诉每个人你在招 advisor。这是一种内部姿态：你在评估他们，而非乞求认可，会议的权力关系也会变得平衡。`],evidence:{label:`原书的意志力观点`,details:[`Willpower 是有限资源。`,`改变环境比持续硬扛更可靠，就像节食时先扔掉巧克力。`]},example:{label:`销售会与顾问会的同题不同心态`,details:[`销售暗线：他说什么能让我成交？`,`顾问暗线：他是否真的理解行业，愿意帮助并指出盲区？`],analysis:[`问题内容可能相似，但倾听质量和控制感会不同。`]},practicePrompt:`下一场学习会前，把目标写成“判断他是不是好顾问”。`,try:[`你会怎样解释这个行业的关键分层？`,`我最可能漏掉什么？`],avoid:[`一边说学习，一边在心里只算成交。`],sources:[`Chapter 6 · The advisory flip · body23.xhtml`],tags:[`会议`,`获客`,`心态`]},{id:`MT-058`,chapterId:`chapter-6`,title:`聊到不再有新东西`,englishTitle:`Saturation`,subtitle:`样本量不是固定数字`,minutes:3,thesis:`简单行业、聚焦客群常在 3–5 场饱和；十多场仍矛盾，先收紧细分。`,keyPoints:[`每场都有机会成本`,`停止标准是信息饱和`,`反馈发散是 segment 警报`],body:[`谈话不是越多越好，而是持续到不再听见新东西。简单行业和聚焦客群，三到五场可能已经建立稳定画面。`,`超过十场仍结果天差地别，多半不是“再聊十个”能解决，而是你在混谈不同客户。几乎任何客户问题都应在一周左右形成答案，再转向新问题或构建。`],evidence:{label:`原书的停止规则`,details:[`Keep having conversations until you stop hearing new stuff.`,`销售驱动 B2B 的机会成本较低，因为很多对话同时成为线索。`]},example:{label:`十场仍混乱时先做什么`,details:[`不要机械扩大样本。`,`检查这些人是否有相同目标、流程和购买条件。`],analysis:[`不一致可能来自样本异质，而非真相尚未出现。`]},practicePrompt:`做一张新信息计数表；连续几场无新增时停止，若持续发散则重切 segment。`,try:[`这次新增了什么？`,`这些受访者真是同一类客户吗？`],avoid:[`把“访谈数量”当唯一进度。`],sources:[`Chapter 6 · How many meetings · body24.xhtml`],tags:[`获客`,`细分`,`团队流程`]},{id:`MT-059`,chapterId:`chapter-7`,title:`别被选择淹死`,englishTitle:`Segmentation`,subtitle:`先服务一个明确的人`,minutes:4,thesis:`聚焦让产品、语言和学习信号变得锋利；以后仍可拓宽。`,keyPoints:[`早期问题常是选择太多`,`大公司也从窄入口开始`,`聚焦可同时测试产品与渠道`],body:[`创业公司往往不是饿死，是被选项、线索和功能淹死。`,`Google、PayPal、Evernote 后来都服务了极广的人群，但它们并非从“所有人”起步。书中举的窄入口是：Google 先帮助博士生找冷门代码，eBay 先服务 Pez 糖果盒收藏交易，Evernote 先帮助妈妈保存和分享菜谱。`,`客群模糊会让你不知道从哪开始、无法证明自己错，反馈也会互相打架。聚焦没有永远放弃谁，只是先选一个能往前走的起点。`],evidence:{label:`细分过宽的三个后果`,details:[`选项压垮团队，不知道先做什么。`,`一切都“有点可行”，无法明确否证。`,`反馈混杂，功能和信息都被稀释。`]},example:{label:`书中案例｜营养粉从人人可用到一个货架`,details:[`健身者、餐馆与妈妈都想要不同东西。`,`创始人聚焦在健康食品店购物的幼儿妈妈，并先向小型独立门店请求货架空间，一周后看销量。`,`若门店满意、产品卖得动，下一步可在店内做 tasting，借门店场景直接接触终端消费者。`],analysis:[`一个具体承诺同时验证门店伙伴、触达路径与终端需求；试吃把伙伴学习接到消费者学习。`]},practicePrompt:`写出现在最愿意放弃的两个客群，只保留一个起点。`,try:[`哪类人最可能现在买？`,`我们本周能在哪里找到他们？`],avoid:[`用“所有需要 X 的人”定义客户。`],sources:[`Chapter 7 · Segmentation; Babies or body builders? · body25.xhtml`],tags:[`细分`,`核心原则`,`承诺`]},{id:`MT-060`,chapterId:`chapter-7`,title:`二十种答案，可能是二十种客户`,englishTitle:`Mixed feedback`,subtitle:`反馈越聊越乱，先怀疑 segment`,minutes:4,thesis:`不同目标和流程的人不该共用一张需求表。`,keyPoints:[`宽标签掩盖巨大差异`,`混合反馈会制造 feature creep`,`行业 taxonomy 可帮助切分`],body:[`“广告主”包含夫妻店、电商、大品牌、代理商和唱片公司，愿付 10 美元与 1 万美元的人不会要同一产品。“学生”也可能是博士、预科生、在家教育家长或网络不稳的村庄。`,`所谓二十场访谈，实际可能是对二十种客户各谈一次，等于并行探索二十门生意。找行业专家建立 taxonomy；没有也先做最佳猜测、聚焦，再随学习调整。`],evidence:{label:`Habit 的宽客群代价`,details:[`每个功能总有人喜欢，因此什么都删不掉。`,`每个方向都“多少有效”，所以团队既不能证真也不能证伪。`,`后来聚焦想显得前卫的创意代理商，才看清哪些功能真正工作。`]},example:{label:`“学生”里的五种产品`,details:[`博士要引用；预科生要练习题；家庭教育要 iPad。`,`村庄要多人共机；非洲用户要应对不稳定网络。`],analysis:[`相同人口标签下，目标、限制与购买者都可能不同。`]},practicePrompt:`把最近十位受访者按目标、流程和购买条件重新分组。`,try:[`他们真的共享同一个 must-solve 吗？`,`哪一组的信号最一致？`],avoid:[`把所有冲突解释成产品必须全做。`],sources:[`Chapter 7 · Big brands or mom & pop?; What does it mean? · body25.xhtml`],tags:[`细分`,`坏数据`,`产品判断`]},{id:`MT-061`,chapterId:`chapter-7`,title:`一刀刀切客户`,englishTitle:`Customer slicing`,subtitle:`从谁最想要，切到在哪里能找到`,minutes:4,thesis:`交叉人口、动机与既有行为，直到出现具体可接触的人。`,keyPoints:[`先切谁最想要`,`再找共享动机的人`,`用现有行为找到地点`],visual:`question-path`,body:[`从宽人群问：里面谁最想要？是全部还是部分？为什么？这个动机普遍吗？还有哪些动机？谁也有它？得到更具体的人群和一组问题/目标后，对仍然宽泛的类别继续细分。`,`再看他们现在怎样追求目标或应付问题，这些行为在哪里发生。任何找不到的群体都不够可执行，继续细分到能明确接触。`],evidence:{label:`原书的切片问题`,details:[`Who wants it most? Everyone or only some? Why?`,`Who else shares the motivation? What other motivations exist?`,`What are they already doing, and where can we find those people or behaviours?`]},example:{label:`从“学生”切到公开演讲`,details:[`毕业生担心第一次面试；新作者为新书巡演做准备；非母语博士即将作会议报告。`,`继续看谁已搜索技巧、买书或参加 Toastmasters。`],analysis:[`行为切片比纯人口标签更接近购买动力。`]},practicePrompt:`用六个“谁/为什么”问题和三个“行为/哪里”问题切一次当前客群。`,try:[`这群人里谁现在最急？`,`他们已经聚集在哪里？`],avoid:[`在桌上无限理论化，不出去找第一批人。`],sources:[`Chapter 7 · Customer slicing · body25.xhtml`],tags:[`细分`,`获客`,`提问`]},{id:`MT-062`,chapterId:`chapter-7`,title:`好客群是一对 who–where`,englishTitle:`Who–where pair`,subtitle:`不知道去哪找，就还不够具体`,minutes:4,thesis:`候选客群还要赚钱、好找，并值得你长期为他们工作。`,keyPoints:[`每个 segment 都写 who + where`,`按盈利、可达、个人回报排序`,`已在行动的人更理想`],body:[`“想提高演讲的学生”仍太宽。可切成即将求职的毕业生、首次上电视者、婚礼致辞者、新书巡演作者、非母语博士，再明确通过招生办、出版列表、搜索词或 Toastmasters 找到。`,`候选 who–where pair 用三项排序：profitable、easy to reach、rewarding for us。你会花大量时间理解这些人，若长期厌烦他们，业务会更难。`],evidence:{label:`行为怎样提供 where`,details:[`婚礼致辞者会搜索范文。`,`新作者出现在即将出版列表。`,`认真改善演讲的人会买书、听播客或参加 Toastmasters。`]},example:{label:`作者会怎样选起点`,details:[`从“学生”改成“害怕公开演讲且正在变好的人”。`,`先去一次 Toastmasters，晚上一口气完成十几次 casual 对话。`],analysis:[`聚焦在已有行动的人，同时解决需求强度与可触达性。`]},practicePrompt:`把你的客群用一句话写成“谁，在什么地方/行为里能找到”。`,try:[`他们正在做什么，让我能看见他们？`,`服务他们会是我愿意长期做的事吗？`],avoid:[`只写一个无法触达的心理画像。`],sources:[`Chapter 7 · Customer slicing: who–where pair · body25.xhtml`],tags:[`细分`,`获客`,`创始人适配`]},{id:`MT-063`,chapterId:`chapter-7`,title:`找对使用、付款和否决的人`,englishTitle:`Right people & stakeholders`,subtitle:`职位最响亮的人未必最有用`,minutes:4,thesis:`多边业务、复杂采购和关键伙伴都要分别研究。`,keyPoints:[`别漏掉业务的另一侧`,`伙伴也有目标与约束`,`访谈代表性胜过头衔`],body:[`谈错人有三种路径：客群太宽；漏掉业务的某一侧；复杂购买里漏掉 stakeholder。儿童 app 同时面对孩子和父母；公立学校还可能涉及教师、学生、行政、家长会与纳税人。`,`制造、分销、推广伙伴若是成立条件，也要像客户一样理解。不要只见高级主管；真正使用产品的人即使写在董事会周报里不够体面，也可能最关键。`],evidence:{label:`书中的 stakeholder 提醒`,details:[`多边 marketplace 显然有多组客户，其他业务则可能更隐蔽。`,`关键伙伴的目标与限制若不成立，同样会杀死公司。`]},example:{label:`作者漏掉的青少年`,details:[`做互动广告时，他见了很多西装高管。`,`却没见假定会使用产品的青少年；事后看，后者才是应该谈的人。`],analysis:[`status report 的体面感会扭曲样本选择。`]},practicePrompt:`画出使用者、受益者、付款者、批准者、否决者与伙伴。`,try:[`谁真的每天用？`,`谁能让交易停下？`],avoid:[`只找组织里级别最高的人。`],sources:[`Chapter 7 · Talking to the wrong people · body25.xhtml`],tags:[`细分`,`B2B`,`获客`]},{id:`MT-064`,chapterId:`chapter-8`,title:`打破学习瓶颈`,englishTitle:`Learning bottleneck`,subtitle:`别让“客户说了”成为团队里的王炸`,minutes:4,thesis:`客户学习困在一个人脑中，他就会变成事实独裁者。`,keyPoints:[`转述常等于下命令`,`一手信息也可能被误读`,`prep、review、notes 一起解决`],body:[`商务负责人独自开会，再告诉产品团队“客户要什么”，功能上等于告诉他们“你们该做什么”。一旦拿“客户说的”当终极理由，其他人无法检查问题怎样问、语气怎样、是否只是一个例外。`,`客户事实必须尽快、忠实地进入整个创始团队。共同准备、共同复盘、可检索的好笔记，能避免一个人的脑袋成为唯一真相库。`],evidence:{label:`学习瓶颈的症状`,details:[`你只管产品，我来学需要知道的。`,`因为客户就是这么说的。`,`我没空见人，我得写代码。`]},example:{label:`作者的 CTO 为什么离开`,details:[`CTO 说：“你一直改变我们做的东西，这样永远不会成功。”`,`作者认为学到的内容可能是真的，却没有让团队共同看见和吸收。`],analysis:[`事实没传播，组织上就等于没学到。`]},practicePrompt:`找出目前只有一个人知道的客户判断，把原话和上下文带回全队。`,try:[`我们一起看原始笔记。`,`这条结论是从哪句事实推来的？`],avoid:[`用“客户要求”终止产品讨论。`],sources:[`Chapter 8 · Running the process · body26.xhtml`],tags:[`团队流程`,`笔记`,`客户学习`]},{id:`MT-065`,chapterId:`chapter-8`,title:`会前四件套`,englishTitle:`Prepping`,subtitle:`三问、下一步、当前假设、案头研究`,minutes:4,thesis:`若不知道想学什么，就不要浪费彼此时间开这场会。`,keyPoints:[`团队定三大问题`,`产品阶段先定 commitment`,`网上能查的别占用会面`],visual:`process-loop`,body:[`会前确认三大问题，其中要有那个让人不舒服的问题。已有产品，就先定理想 commitment 和 next step。`,`最多花一小时写下对方可能在意什么，搭一副随时可改的骨架。`,`能靠搜索回答的先查；公司官网、LinkedIn 等基本背景五分钟看完。商务与产品都参与。时间只剩一分钟时，只问：“我们想从这些人身上学到什么？”`],evidence:{label:`挖出隐藏风险的两问`,details:[`如果公司失败，最可能为什么？`,`要取得巨大成功，什么必须为真？`,`它们不要求长篇战略会，团队的第一反应已足够形成学习起点。`]},example:{label:`用户生成卡通社区`,details:[`可能没人愿意创作卡通。`,`也可能作品太差，无人愿看。`],analysis:[`两种风险需要不同的技术与对话测试，先说清才能选工具。`]},practicePrompt:`用十五分钟写三问、理想下一步和两条当前猜测。`,try:[`我们想从这些人身上学到什么？`,`哪些答案五分钟搜索就能找到？`],avoid:[`无准备地出现，再靠闲聊找方向。`],sources:[`Chapter 8 · Prepping · body26.xhtml`],tags:[`团队流程`,`会议`,`提问`]},{id:`MT-066`,chapterId:`chapter-8`,title:`复盘客户，也复盘提问`,englishTitle:`Reviewing`,subtitle:`让全队学到，也让手艺变好`,minutes:4,thesis:`会后尽快过原话、结论和提问失误；最佳会面人数通常是两人。`,keyPoints:[`更新信念与三问`,`检查哪些问题有效`,`一人聊、一人记最稳`],body:[`会后和团队过关键原话、主要发现与会中问题，更新已有判断和下一组三问。还要复盘 meta 层：哪些问题诱导，哪里漏了强信号，下次怎样更好。`,`做重大决策的人都应偶尔在场，包括技术负责人。两人通常最佳：一人聊、一人记并补漏；三人围着一位受访者容易造成压力。熟练后单人可以，但更难自我纠偏。`],evidence:{label:`为什么 review 不是可选小事`,details:[`它让学习从一个人脑中进入纸面与全队。`,`它减少争吵、提高决策质量，也把访谈从神秘天赋变成可练的 craft。`]},example:{label:`害羞的新手怎样开始`,details:[`可请朋友陪前几场，自己先做 note-taker。`,`随着理解流程与领域，自信会逐步增加。`],analysis:[`confidence 是领域相关的，练习比硬撑更有效。`]},practicePrompt:`为每场会固定十分钟复盘：事实、结论、提问手艺各一栏。`,try:[`哪一问最有效？`,`我们错过了哪个信号？`],avoid:[`只发一段“会议摘要”便开始开发。`],sources:[`Chapter 8 · Reviewing; Who should show up · body27.xhtml`],tags:[`团队流程`,`笔记`,`会议`]},{id:`MT-067`,chapterId:`chapter-8`,title:`创始人必须在房间里`,englishTitle:`Founders in the room`,subtitle:`客户学习不能外包给 hired gun`,minutes:3,thesis:`商业模式可重复前，创始人要亲耳听见坏消息与温吞信号。`,keyPoints:[`二手坏消息很难吸收`,`外包者有润色动机`,`可外包安排，不能外包理解`],body:[`雇人回来报告“问题不存在”，创始人很难真正消化；信号若只是冷淡，更容易被润色成“有兴趣”。直到商业模式有效、销售或营销流程可重复，founders 应亲自在场。`,`你可以请别人安排或主持，只要自己也听、问、更新判断。少数特殊团队能例外，但不该把例外当默认流程。`],evidence:{label:`为什么 hired gun 容易带回坏信号`,details:[`他需要证明自己的工作有价值。`,`明确坏消息尚可汇报，模糊“meh”最容易被美化。`]},example:{label:`可委托与不可委托`,details:[`可委托：寻找对象、安排日程、协助主持。`,`不可委托：亲耳判断情绪、上下文与结论是否成立。`],analysis:[`学习责任与行政工作可以分开。`]},practicePrompt:`安排每位重大决策者本月亲自参加至少一场客户对话。`,try:[`产品和技术负责人轮流在场。`,`复盘时从一手观察开始。`],avoid:[`只读外包访谈报告。`],sources:[`Chapter 8 · Who should show up · body27.xhtml`],tags:[`团队流程`,`会议`,`创始人`]},{id:`MT-068`,chapterId:`chapter-8`,title:`记录信号，不记流水账`,englishTitle:`Signal notes`,subtitle:`让情绪、生活与购买线索可排序`,minutes:5,thesis:`尽量保留准确原话，并用轻量符号标出真正会影响判断的内容。`,keyPoints:[`原话与转述要区分`,`强情绪和生活事实分开标`,`购买、预算与跟进不能丢`],body:[`关键原话用引号标明，可用于营销、融资与团队争议；其他地方记大意即可。书中符号分三组：情绪 :) :( :|；生活 ☇ 痛点、⨅ 目标、☐ 障碍、⤴ workaround、^ 背景；具体 ☑ 标准、$ 钱、♀ 人或公司、☆ 跟进。`,`不必照抄这套。目的不是记密码，而是让信号可快速扫描、分类和重组。情绪与痛点组合，会比一句语气平淡的痛点描述更值得追。`],evidence:{label:`12 个信号及其用途`,details:[`情绪决定同一句“有问题”的重量。`,`生活符号记录 pain、goal、obstacle、workaround、context。`,`具体符号提醒功能/购买标准、预算流程、人名与后续动作。`]},example:{label:`IT 政策是 obstacle`,details:[`员工想用云服务，也讨厌现有方案。`,`公司 IT 政策阻止切换；他可能用私人手机或回家处理，形成 workaround。`],analysis:[`只记录痛点会漏掉真正决定采用的组织障碍。`]},practicePrompt:`给下一场笔记只选六个最常用符号，并确保每条一眼可分类。`,try:[`逐字原话加引号。`,`人名、预算与承诺都加跟进标记。`],avoid:[`写满整页，却找不到哪句最重要。`],sources:[`Chapter 8 · How to write it down · body28.xhtml`],tags:[`笔记`,`团队流程`,`信号`]},{id:`MT-069`,chapterId:`chapter-8`,title:`可找、可排、会再看`,englishTitle:`Retrievable notes`,subtitle:`媒介不求高级，只求真的复盘`,minutes:4,thesis:`笔记若找不到、排不了、没人看，就等于没记。`,keyPoints:[`可排序、合并、长期找回`,`长录音常变成信息坟场`,`突然对话先捕捉，之后再转存`],body:[`好笔记要可重排、可与队友合并、永久可找，也不混在待办和灵感噪音里。普通日记本与长录音常因搜索成本过高而从不再看。`,`表格和 Evernote 便于检索，但会中敲电脑可能失礼；专用本可用；作者最喜欢一条信号一张 index card。casual 对话突然发生时，纸盘、啤酒垫或报纸都行，回来再转存。`],evidence:{label:`原书的四项媒介标准与录音边界`,details:[`Able to be sorted and rearranged。`,`Able to combine with team notes。`,`Permanent and retrievable。`,`Not mixed with random noise。`,`若要录音，先征得同意。原书建议说明自己怕漏掉重要内容，录音不会分享或发布；多数人会答应。`,`录音会暴露这不是一场完全随意的闲聊，因此会破坏 Keeping it Casual 的“隐身”效果；而且长录音若没有索引，仍可能永远不再听。`,`若当场记笔记不合适，就专心聊；结束后立刻到一旁把关键原话、事实和跟进写下来。`]},example:{label:`书中做法｜index cards 与无笔记场景`,details:[`每张卡只放一条 quote 或 learning，附日期、姓名与符号。`,`复盘时铺桌分类；旧问题失效时，可直接抽出全部 lightning cards 找已确认的新痛点。`,`酒吧或会议里的突然对话，作者常在结束后马上退到角落补记；纸盘、啤酒垫和报纸也比事后凭记忆可靠。`],analysis:[`随机访问与物理重排，让团队更容易真正使用笔记；现场不便记录时，速度比媒介完美更重要。`]},practicePrompt:`选一种团队能在一分钟内找到三个月前原话的存储方式。`,try:[`一条信号一个单元。`,`会后马上补日期、对象与来源。`],avoid:[`录完整音频却从不索引或复听。`],sources:[`Chapter 8 · Where to write it down · body28.xhtml`],tags:[`笔记`,`团队流程`,`检索`]},{id:`MT-070`,chapterId:`chapter-8`,title:`before / during / after`,englishTitle:`The process`,subtitle:`一套够轻的客户学习循环`,minutes:5,thesis:`流程为减少浪费、加速团队学习，不是给“做过访谈”打勾。`,keyPoints:[`会前选人、三问、假设`,`会中纠偏、记录、推进`,`会后复盘、更新、再问`],visual:`process-loop`,body:[`Before：选一个聚焦、找得到的 segment。团队定三大学习目标，准备理想 commitment，选对人，写下当前猜测，先做 desk research。`,`During：frame 会面，保持 casual；提出符合 The Mom Test 的问题，拨开赞美、钉住 fluff、深挖信号。该记的记，该推进时推进。`,`After：团队一起过笔记与原话，转入长期系统，更新判断和计划，再定下一组三问。谈话若不适合回答当前问题，就别为了给创业清单打勾，硬做一份半吊子问卷。`],evidence:{label:`走过场的九个警报`,details:[`你说得比对方多。`,`对方在赞美你或你的点子。`,`你讲了点子，却不知道接下来会发生什么。`,`你没有笔记。`,`你没有和团队一起看过笔记。`,`意外答案没有改变你的想法。`,`你问的问题里，没有一个让自己害怕。`,`你不清楚这些对话正在回答哪个大问题。`,`你甚至不清楚为什么要开这场会。`]},example:{label:`原书 Cheatsheet｜完整分组索引`,details:[`八项关键能力：问好问题；避开坏数据；保持 casual；推动 commitment 与 advancement；frame 会面；细分客户；会前准备与会后复盘；记好笔记。`,`The Mom Test 三条：谈对方的生活，不谈自己的点子；问过去的具体事实，不问未来的泛泛意见；少说，多听。`,`三种纠偏动作：拨开赞美；把 fluff 钉回具体过去；深挖意见、点子、请求与情绪。`,`六类错误：钓赞美；暴露 ego（Pathos Problem）；过度 pitch；过度正式；成为学习瓶颈；收集赞美而非事实与承诺。`,`会前六步：选聚焦可找的客群；定三大学习目标；需要时先定理想下一步与承诺；找对谈话对象；写下当前猜测；能案头研究的先查。`,`会中六步：frame 会面；保持 casual；问符合 The Mom Test 的问题；拨赞美、钉 fluff、挖信号；记笔记；需要时推动承诺与下一步。`,`会后四步：团队复盘笔记与关键原话；需要时转入长期存储；更新判断与计划；决定下一组三大问题。`,`有效会议的三种结果：Facts——具体事实；Commitment——对方付出时间、信誉或钱；Advancement——关系进入真实漏斗的下一步。`,`没有推动 commitment/advancement 的五个警报：满管线 zombie leads；产品会以赞美结束；没有明确下一步；只说会议“开得不错”；对方没有放弃任何有价值的东西。`,`五段式 framing：Vision、Framing、Weakness、Pedestal、Ask。`,`笔记图例：:) 兴奋；:( 愤怒；:| 尴尬；☇ 痛点；⨅ 目标/JTBD；☐ 障碍；⤴ workaround；^ 背景；☑ 功能请求或购买标准；$ 金钱/预算/采购；♀ 具体人或公司；☆ 跟进。`,`会前最重要的一问：我们想从这些人身上学到什么？`],analysis:[`After 会自然变成下一轮 Before 的输入；Cheatsheet 是导航，不替代各篇里的条件和例子。`]},practicePrompt:`把下一批三场会放进同一张 before/during/after 清单。`,try:[`会前写清目标，会后当天复盘。`,`每轮结束只保留新的三大问题。`],avoid:[`访谈完成后直接把录音丢进文件夹。`],sources:[`Chapter 8 · The process · body28.xhtml`,`Conclusion cheatsheet · body30.xhtml`],tags:[`团队流程`,`会议`,`笔记`]},{id:`MT-071`,chapterId:`chapter-8`,title:`方法应该让你更快`,englishTitle:`This stuff is fast`,subtitle:`不是多一层客户研究官僚`,minutes:3,thesis:`准备按小时算，初轮学习按一两周算；尽快给客户一个可承诺的东西。`,keyPoints:[`一小时准备已够`,`别数月只谈不做`,`持续学习应嵌入增长`],body:[`不要花一周准备几场会；一小时后就出去。不要数月全职访谈才动产品；用一周、最多两周找方向，然后做出能换取 commitment 的东西。更多准备往往只是拖延。`,`客户学习会贯穿公司生命，但应通过 casual 对话嵌在增长旁边，不是取代构建。书的目的，是用最短时间从对话中获得尽可能多的有效信息，然后回去建设公司。`],evidence:{label:`原书的时间盒`,details:[`Prep：up to an hour。`,`Initial conversations：a week, maybe two。`,`之后继续学习，但不必占用“真正的时间”。`]},example:{label:`学习的结束信号`,details:[`你已经找到方向。`,`下一步不是再访谈十人，而是给客户一个能付出时间、信誉或钱的对象。`],analysis:[`承诺把学习从话语推进到现实。`]},practicePrompt:`为当前学习阶段设一个最晚构建日期，并写下那时要索取的承诺。`,try:[`一小时后开始联系。`,`一周后做出可试、可买或可承诺的东西。`],avoid:[`用继续研究逃避交付。`],sources:[`Chapter 8 · This stuff is fast · body28.xhtml`],tags:[`团队流程`,`承诺`,`速度`]},{id:`MT-072`,chapterId:`outro`,title:`练习，不求完美`,englishTitle:`Practice, not perfection`,subtitle:`问坏问题不可怕，没发现、没修才可怕`,minutes:3,thesis:`这是一门手艺；团队温和复盘、及时纠偏，比一次完美更重要。`,keyPoints:[`懂方法仍会犯错`,`觉察让谈话可恢复`,`复盘不要攻击自己或队友`],body:[`作者写结语前一天，仍在重要会面里滑进 pitch。学过方法，不代表从此不犯错。`,`进步是更早发现：自己正在诱导、接赞美、讲太多，或者漏掉了信号。`,`会后与团队复盘，别因一次失误责怪自己或合伙人。曾支持创业者的人通常愿意理解；必要时感谢、道歉，下次问得好一点。`],evidence:{label:`结语里的真实承认`,details:[`作者说自己仍会问 dumb questions。`,`多数坏对话可以修；目标不是完美，而是比以前更好。`]},example:{label:`一次失误的正确处理`,details:[`会中发现 pitch：停下并接回事实。`,`会后记录触发点，与团队讨论下次怎样更早察觉。`],analysis:[`错误只有在被隐藏或重复时才会固化。`]},practicePrompt:`写下最近一次偏航，不评价人，只记录信号、影响与下次动作。`,try:[`我们在哪里开始跑偏？`,`下次用哪句话恢复？`],avoid:[`把一次坏问题归因成“我不适合见客户”。`],sources:[`Conclusion · Conclusion and cheatsheet · body29.xhtml`],tags:[`团队流程`,`会议`,`心态`]},{id:`MT-073`,chapterId:`outro`,title:`直接劈开那个结`,englishTitle:`Hack the Gordian Knot`,subtitle:`流程服务结果，不服务仪式`,minutes:3,thesis:`若一个直接动作能产生真实承诺，就别沉迷“正确验证姿势”。`,keyPoints:[`方法也会变成拖延`,`真实行动优先于讨论验证`,`trial 是强反馈`],body:[`新学一套方法后，人容易迷上怎样正确解开 Gordian Knot。书中一群人替私教讨论怎样验证警察是不是更好客群：找谁、问什么、市场多大。`,`私教只问了一句“为什么不直接打电话”，二十分钟后带着一场 trial 回来。流程有价值，但如果真实世界的大门就在眼前，先推门。`],evidence:{label:`Gordian Knot 的提醒`,details:[`传统任务是耐心解开复杂绳结。`,`Alexander 直接一剑劈开，跳到结果。`,`作者用这个故事提醒别把新流程变成新的迷信。`]},example:{label:`私教与警局`,details:[`私教在客户间通勤，非计费时间太高。`,`警局可让他在同一地点服务多人。`,`他直接致电，约到试点。`],analysis:[`一个真实 trial 同时回答接触、意愿与执行问题，胜过长时间纸面争论。`]},practicePrompt:`问自己：这个未知能否用一次电话、预售或小试点直接回答？`,try:[`今天就提出 trial。`,`用最短真实动作替代一周讨论。`],avoid:[`为了遵守流程而绕开显而易见的实验。`],sources:[`Conclusion · Hack it · body29.xhtml`],tags:[`团队流程`,`承诺`,`行动`]},{id:`MT-074`,chapterId:`outro`,title:`下场做`,englishTitle:`Get your hands dirty`,subtitle:`工具帮你看路，创业仍要亲自走`,minutes:2,thesis:`startup 更像 craft；真正熟练来自真实对话、发布和修正。`,keyPoints:[`书不能替代行动`,`小项目也能训练判断`,`下一步只需一人一问`],body:[`问题、清单和流程只是工具。作者认为自己从发布小项目学到的，比只读书和博客更多。把方法收藏齐，不会自动长出判断力；判断力来自现实里的观察、失误和修正。`,`读完后的最小下一步很小：选当前三大问题中的一个，找一个相关的人，聊五分钟。然后写下事实，回到团队。`],evidence:{label:`原书最后的行动提醒、延伸入口与版本说明`,details:[`Startups are more craft than science。You learn by doing。Make it happen。`,`书中给出的延伸入口：momtestbook.com 提供 slides、videos 与其他资料；Twitter @robfitz 用于交流问题或反馈建议。`,`thestartuptoolkit.com 是作者关于 early-stage startup 的博客，书中建议订阅 RSS/邮件并浏览归档。`,`foundercentric.com 提供创业教育资料、课程、workshop、视频与 facilitation guides；书中联系邮箱为 aloha@foundercentric.com。`,`标题页元数据：The Mom Test: how to talk to customers and learn if your business is a good idea when everybody is lying to you；作者 Rob Fitzpatrick；版本 v1.04；@robfitz；August 2013；a foundercentric.com book。`,`body32.xhtml 是致谢与思想来源，不另拆顺序文章。逐行反馈致谢包括 Daniel Tenner、Andreas Klinger、Veronica Torras、Dave Chapman、Salim Virani、Sabrina Kiefer、Madeleine Evans、Spike Morelli、Adele Barlow、Orsolya Toth。`,`书中明确提到的思想影响包括 Steve Blank、Eric Ries、Amy Hoy、Brant Cooper、Richard Rumelt、A.G. Lafley / Roger Martin、Neil Rackham、Derek Sivers；封面由 Devin Hunt 制作，作者图片来自 heisenbergmedia.com。`]},example:{label:`课程结束后的第一步`,details:[`先别读下一篇方法文章。`,`找一位目标客户，问“上一次是什么时候”。`,`记录一条事实与一个新问题。`],analysis:[`这套学习只有进入现实才算完成。`]},practicePrompt:`现在选一个人，发出一条只包含具体求助与一个问题的消息。`,try:[`我想理解 X，上次发生是什么时候？`,`聊完立刻写下事实与下一问。`],avoid:[`把“继续准备”当成行动。`],sources:[`Title/version/author/imprint · body.xhtml`,`Thanks! and further-practice links · body31.xhtml`,`Acknowledgements and influences · body32.xhtml`],tags:[`核心原则`,`行动`,`团队流程`]}].map(e=>{let t=x.get(e.chapterId);if(!t)throw Error(`Unknown chapter: ${e.chapterId}`);let{body:n,evidence:r,example:i,practicePrompt:a,try:o,avoid:s,...c}=e,l={kind:`example`,label:i.label,summary:i.summary??``,details:i.details,children:i.analysis?.length?[{kind:`analysis`,label:`这段材料说明什么`,summary:``,details:i.analysis}]:void 0};return{...c,chapter:t.title,sections:[{heading:c.subtitle,paragraphs:n}],deepDives:[{kind:`evidence`,label:r.label,summary:r.summary??``,details:r.details,ch
