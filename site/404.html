<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Not found · Stuff</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #f2f0e9; color: #171c1a; font: 16px/1.6 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { width: min(620px, 100%); padding: 42px; border: 1px solid #c9c5ba; background: #fbfaf6; box-shadow: 10px 10px 0 #171c1a; }
    small { color: #b44426; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; }
    h1 { margin: 14px 0 12px; font: 700 clamp(44px, 10vw, 86px)/.95 Georgia, serif; letter-spacing: -.05em; }
    p { color: #59615e; }
    a { display: inline-block; margin-top: 14px; color: inherit; font-weight: 800; text-underline-offset: 4px; }
  </style>
</head>
<body>
  <main>
    <small>404 / misplaced stuff</small>
