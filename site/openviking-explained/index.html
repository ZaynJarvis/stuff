openai`) and dispatches: `volcengine` maps to `VolcEngineVLM`, `openai`/`azure` to `OpenAIVLM`, `openai-codex` to `CodexVLM`, `kimi` to `KimiVLM`, `glm` to `GLMVLM`; anything else falls through to `LiteLLMVLMProvider`. `create()` does no name validation, so unknown providers land on the LiteLLM catch-all. The `VALID_PROVIDERS` list in `vlm/registry.py` only backs `get_available_providers()`. Lazy imports inside each branch keep missing optional dependencies from breaking import-time loading.","zh":"`VLMFactory.create()` 是构造 VLM 后端的唯一入口：读取 `config.provider`（缺省回退 `config.backend`，再回退 `openai`）直接 if/elif 分派，未知名称落到 `LiteLLMVLMProvider` 兜底，并不做校验；`vlm/registry.py` 的名单只供 `get_available_providers()` 列举。分支内懒加载导入，可选依赖缺失不影响 import。"},"code":[{"lang":"python","title":{"en":"Provider dispatch with LiteLLM fallback","zh":"provider 分派与 LiteLLM 兜底"},"text":"provider = (config.get(\"provider\") or config.get(\"backend\") or \"openai\").lower()\n\nif provider == \"volcengine\":\n    from .backends.volcengine_vlm import VolcEngineVLM\n\n    return VolcEngineVLM(config)\n# …\nelse:\n    from .backends.litellm_vlm import LiteLLMVLMProvider\n\n    return LiteLLMVLMProvider(config)","sourcePath":"openviking/models/vlm/base.py","sourceLines":"302-307,329-332"}],"io":{"inputs":[{"en":"config dict with provider/backend key","zh":"含 provider/backend 的 config"},{"en":"model name and api_key","zh":"模型名和 api_key"}],"outputs":[{"en":"VLMBase subclass instance","zh":"VLMBase 子类实例"},{"en":"list of available provider names","zh":"可用提供方名称列表"}]},"family":"model-providers"},{"id":"model-providers.vlm.backends","parent":"model-providers.vlm","name":"VLM Backends","kind":"model","sourcePath":"openviking/models/vlm/backends/openai_vlm.py","symbol":"OpenAIVLM","sourceLines":"77-466","pipelines":["write","retrieve","manage.session-lifecycle"],"summary":{"en":"Six concrete VLM backend implementations: OpenAI, VolcEngine, Codex, Kimi, GLM, and LiteLLM.","zh":"六个具体 VLM 后端：OpenAI、VolcEngine、Codex、Kimi、GLM、LiteLLM。"},"article":{"en":"Six backends live under `openviking/models/vlm/backends/`. `OpenAIVLM` wraps the `openai` SDK and is the base class the provider subclasses extend. It handles Azure endpoints and reasoning-model parameter constraints. Tool-call parsing is built in. `VolcEngineVLM`, `KimiVLM`, `GLMVLM`, and `CodexVLM` subclass it to override provider-specific details like `api_base` and headers. `LiteLLMVLMProvider` is the catch-all backend using `litellm.acompletion`. All backends share `retry_sync`/`retry_async` from `model_retry`; the OpenAI-SDK-based ones therefore construct the SDK client with `max_retries=0`, because letting the SDK retry as well would stack two layers of exponential backoff.","zh":"`openviking/models/vlm/backends/` 下有六个后端。`OpenAIVLM` 基于 `openai` SDK，处理 Azure、推理模型参数和工具解析。四个子类覆盖提供方细节，`LiteLLMVLMProvider` 用 `litellm` 兜底。所有后端共用 `model_retry` 重试。基于 `openai` SDK 的后端把客户端 `max_retries` 置 0，重试统一交给 `model_retry`，避免双重退避。"},"io":{"inputs":[{"en":"HTTP requests to provider APIs","zh":"发往提供方 API 的 HTTP 请求"},{"en":"SDK client configuration","zh":"SDK 客户端配置"},{"en":"prompt, image, and tool payloads","zh":"prompt/图片/工具载荷"}],"outputs":[{"en":"provider raw response objects","zh":"提供方原始响应对象"},{"en":"parsed VLMResponse instances","zh":"解析后的 VLMResponse 实例"}]},"family":"model-providers"},{"id":"model-providers.vlm.structured","parent":"model-providers.vlm","name":"Structured VLM","kind":"model","sourcePath":"openviking/models/vlm/llm.py","symbol":"StructuredVLM","sourceLines":"148-288","pipelines":["write","manage.session-lifecycle"],"summary":{"en":"Wrapper that obtains reliably machine-parseable JSON or Pydantic model output from a VLM.","zh":"包装 VLM 以获取可机器解析的 JSON 或 Pydantic 模型输出。"},"article":{"en":"`StructuredVLM` wraps a `VLMBase` obtained lazily via `VLMFactory.create`. `complete_json()` appends a JSON-schema prompt and parses through `parse_json_from_response()`, trying direct `json.loads`, code-block extraction, regex extraction, and `json_repair.loads`. `complete_model()` validates the parsed dict against a Pydantic model class. `get_vision_completion` passes through to the underlying VLM without JSON wrapping. This is used wherever the system needs reliably machine-parseable output — memory extraction, entity resolution.","zh":"`StructuredVLM` 包装 `VLMBase`。`complete_json()` 追加 JSON schema 提示，交给 `parse_json_from_response()` 解析。`complete_model()` 用 Pydantic 校验。`get_vision_completion` 直接透传。"},"io":{"inputs":[{"en":"natural language prompt","zh":"自然语言 prompt"},{"en":"JSON schema dict","zh":"JSON schema 字典"},{"en":"Pydantic model class","zh":"Pydantic 模型类"}],"outputs":[{"en":"parsed JSON dict","zh":"解析后的 JSON 字典"},{"en":"validated Pydantic model instance","zh":"校验后的 Pydantic 模型实例"},{"en":"raw VLM vision response","zh":"原始 VLM 视觉响应"}]},"family":"model-providers"},{"id":"model-providers.rerank","parent":"model-providers","name":"Rerank","kind":"model","sourcePath":"openviking/models/rerank/base.py","symbol":"RerankBase","sourceLines":"39-176","pipelines":["retrieve"],"summary":{"en":"Rerank clients that rescore document lists against a query, returning relevance scores.","zh":"重排序客户端，按查询重新打分，返回原始顺序的相关性分数。"},"article":{"en":"`RerankBase` in `openviking/models/rerank/base.py` is the minimal base class; all rerank clients share token tracking through a module-level `TokenUsageTracker` singleton defined in that file. `RerankClient` lives in `volcengine_rerank.py` and is the VikingDB native client, sending V4-signed requests via the volcengine SDK's `SignerV4`. Its `from_config()` classmethod doubles as the cross-provider factory — a quirk worth knowing when reading the code. It dispatches on `config._effective_provider()` to `CohereRerankClient` (`cohere_rerank.py`), `LiteLLMRerankClient` (`litellm_rerank.py`), or `OpenAIRerankClient` (`openai_rerank.py`), and otherwise constructs itself. All return `Optional[List[float]]`; `None` signals failure so callers can fall back to vector similarity.","zh":"`RerankBase` 是重排序最小基类，所有客户端共用模块级 `TokenUsageTracker` 单例记 token 用量。`RerankClient` 定义在 `volcengine_rerank.py`，是 VikingDB 原生客户端，其 `from_config()` 兼任跨提供方工厂，按 `config._effective_provider()` 分派到 Cohere/LiteLLM/OpenAI 或返回自身；返回 `Optional[List[float]]`，`None` 即失败。"},"io":{"inputs":[{"en":"query string","zh":"查询字符串"},{"en":"document list","zh":"文档列表"},{"en":"provider config dict","zh":"提供方 config 字典"}],"outputs":[{"en":"relevance scores in original order","zh":"原始顺序的相关性分数"},{"en":"token usage deltas","zh":"token 用量增量"}]},"family":"model-providers"},{"id":"model-providers.retry-failover","parent":"model-providers","name":"Retry & Failover","kind":"processing","sourcePath":"openviking/utils/model_retry.py","symbol":"classify_api_error, retry_sync, retry_async, PrimaryBackupSwitcher, OrderedCredentialSwitcher","sourceLines":"139-706","pipelines":["write","retrieve","manage.session-lifecycle"],"summary":{"en":"Error classification, retry loops, and credential switchers shared by all model provider clients.","zh":"所有模型提供方共用的错误分类、重试循环和凭证切换器。"},"article":{"en":"`classify_api_error()` in `openviking/utils/model_retry.py` matches exception text against seven error classes: permanent, auth, content_safety, input_too_large, quota_exceeded, transient, and unknown. The check order is deliberate: `content_safety` is tested before `permanent` so a moderation rejection whose message embeds '400' is not misclassified, and `quota_exceeded` before `transient` so a '429' is not endlessly retried as a transient error. `retry_sync` and `retry_async` loop on transient errors with exponential backoff (base 0.5s, max 8s, jitter). `PrimaryBackupSwitcher` manages a primary/backup topology with sticky failback after 600s or 200 requests. `OrderedCredentialSwitcher` manages an N-credential ring. Both are thread-safe via `threading.Lock`.","zh":"`classify_api_error()` 匹配七类错误，检查顺序有讲究：content_safety 在 permanent 前，免得含 \"400\" 的审核拒绝被误判；quota_exceeded 在 transient 前，免得 \"429\" 被当瞬时错误重试。`retry_sync`/`retry_async` 对瞬时错误指数退避。`PrimaryBackupSwitcher` 管主备，`OrderedCredentialSwitcher` 管 N 凭证环形切换，都用 `threading.Lock`。"},"code":[{"lang":"python","title":{"en":"Why classification order matters","zh":"错误分类为何讲究顺序"},"text":"def classify_api_error(error: Exception) -> str:\n    \"\"\"Classify an API error into one of the ERROR_CLASS_* categories.\n\n    Order matters:\n    - ``content_safety`` is checked before ``permanent`` so a moderation\n      rejection that happens to embed \"400\" in its message is not misclassified.\n    - ``auth`` (401/403) is separated from ``permanent`` (400): auth errors are\n      credential-level and may be resolved by switching credentials, whereas a\n      400 is a request-level error that fails on every credential of the same\n      model.\n    - ``quota_exceeded`` is checked before ``transient`` because quota errors\n      typically include \"429\" / \"TooManyRequests\" which would otherwise match\n      the transient category.\n# …","sourcePath":"openviking/utils/model_retry.py","sourceLines":"139-151"}],"io":{"inputs":[{"en":"API exceptions from provider calls","zh":"提供方调用的 API 异常"},{"en":"credential-indexed client instances","zh":"按凭证索引的客户端实例"},{"en":"request attempt counters","zh":"请求尝试计数器"}],"outputs":[{"en":"error class string","zh":"错误类别字符串"},{"en":"retry or switch decision","zh":"重试或切换决策"},{"en":"active credential index","zh":"当前活跃凭证索引"}]},"family":"model-providers"},{"id":"model-providers.token-usage","parent":"model-providers","name":"Token Usage","kind":"operations","sourcePath":"openviking/models/vlm/token_usage.py","symbol":"TokenUsageTracker, ModelTokenUsage, TokenUsage","sourceLines":"12-244","pipelines":["write","retrieve","manage.session-lifecycle"],"summary":{"en":"Process-wide token usage tracker aggregating per-model per-provider prompt/completion deltas.","zh":"进程级 token 用量跟踪器，按模型和提供方聚合计量增量。"},"article":{"en":"`TokenUsage` is a dataclass holding `prompt_tokens`, `completion_tokens`, `total_tokens`, `call_count`, and `last_updated`. `ModelTokenUsage` aggregates `TokenUsage` by provider within a model. `TokenUsageTracker` holds a dict of `model_name` to `ModelTokenUsage`; each caller updates its own tracker after its API calls. There is no single shared instance: `embedder/base.py` and `rerank/base.py` each define their own `_get_token_tracker()` returning their own module-level singleton (two distinct instances), while VLMs create per-instance trackers in `VLMBase.__init__`. The `merge()` static method combines several trackers into a new one.","zh":"`TokenUsage` 存 prompt/completion/total token 及调用数，`ModelTokenUsage` 按提供方聚合，`TokenUsageTracker` 维护模型到用量的字典。embedder 与 rerank 各有一个模块级单例，VLM 实例各自自建 tracker，互不共享；`merge()` 把多个 tracker 合并成新实例。"},"io":{"inputs":[{"en":"per-call prompt and completion tokens","zh":"每次调用的 prompt/completion token"},{"en":"model name and provider name","zh":"模型名和提供方名称"}],"outputs":[{"en":"aggregated usage dict per model","zh":"按模型聚合的用量字典"},{"en":"total token and call counts","zh":"总 token 数和调用次数"}]},"family":"model-providers"},{"id":"model-providers.prompts","parent":"model-providers","name":"Prompt Templates","kind":"processing","sourcePath":"openviking/prompts/manager.py","symbol":"PromptManager, render_prompt","sourceLines":"52-304","pipelines":["write","retrieve"],"summary":{"en":"YAML+Jinja2 prompt template library with a thread-safe manager, overridable per deployment.","zh":"YAML+Jinja2 提示词模板库，线程安全加载，可按部署覆盖。"},"article":{"en":"The instructions behind every LLM call in OpenViking are not hardcoded — they live as YAML files under `openviking/prompts/templates/`, organized into 11 categories (compression, indexing, memory, parsing, retrieval, semantic, vision, and more). Each file carries metadata, typed variables with defaults and `max_length` truncation, a Jinja2 template body, and optional `output_schema` and `llm_config`.\n\n`PromptManager` resolves the templates directory at runtime in a fixed order: explicit argument, the `OPENVIKING_PROMPT_TEMPLATES_DIR` environment variable, the `prompts.templates_dir` config key, then the bundled directory — so an operator can rewrite LLM behavior without touching code. A template missing from an override directory falls back to the bundled copy per file, and the cache is guarded by an `RLock`. Most callers go through the module-level `render_prompt()`, which wraps a global singleton: the intent analyzer, the semantic processor, and the memory type registry all read from here.","zh":"LLM 的指令不写死在代码里，而是放在 `openviking/prompts/templates/` 下的 YAML+Jinja2 模板中，按 11 个类目组织。`PromptManager` 依次按显式参数、`OPENVIKING_PROMPT_TEMPLATES_DIR` 环境变量、配置项、内置目录解析模板位置，改 LLM 行为不必改代码；单个模板缺失时回退内置副本，缓存用 `RLock` 保证线程安全。调用方多经模块级 `render_prompt()` 走全局单例。"},"io":{"inputs":[{"en":"prompt ID (category.name)","zh":"prompt ID（类目.名称）"},{"en":"variables dict for substitution","zh":"用于替换的变量字典"},{"en":"template override dir (env/config)","zh":"模板覆盖目录（环境变量/配置）"}],"outputs":[{"en":"rendered prompt string","zh":"渲染后的 prompt 字符串"},{"en":"per-prompt LLM config dict","zh":"模板附带的 LLM 配置字典"}]},"family":"model-providers"},{"id":"retrieve","parent":null,"name":"Retrieve","kind":"processing","sourcePath":"openviking/retrieve/__init__.py","symbol":"retrieve module","sourceLines":"1-33","pipelines":["retrieve"],"summary":{"en":"Two-stage context retrieval: intent analysis splits user queries into typed sub-queries, then hierarchical vector search with rerank returns ranked matches.","zh":"两阶段上下文检索：意图分析拆查询为类型化子查询，再经分层向量搜索与重排返回匹配结果。"},"article":{"en":"Retrieve turns a raw user question into relevant context. A single question often maps to several context types (memory, resource, skill), so retrieval splits by intent first; each subtree then searches independently, which improves recall. Intent analysis performs that split: an LLM reads the session summary, recent messages, and the current query, then produces a QueryPlan of zero or more TypedQueries tagged by context type.\n\nHierarchicalRetriever processes each TypedQuery. The query embeds once, then the retriever walks the VikingFS directory tree. THINKING mode seeds from L0/L1 global results (L0 is the directory abstract `.abstract.md`, L1 the overview `.overview.md`; L2 leaf files are terminal hits) and reranks directory candidates before recursively exploring promising branches. Parent and child scores blend by alpha, and traversal converges when either the top-k URIs stay unchanged or the candidate pool stops growing for three consecutive rounds. QUICK mode does a single flat vector search with URI dedup.\n\nThree entry points use this engine. `find` runs one query with no session context. `search` runs intent analysis first and fans out multiple queries concurrently. `recall` (TypeQuotaRecall) takes a different path: it calls `find` per memory type with per-type quotas and peer penalties, then renders a bounded XML block.","zh":"Retrieve 把用户的原始问题变成相关上下文。一个问题往往同时涉及 memory、resource、skill 几类上下文，先按意图拆分再分别检索，召回更全。意图分析由 LLM 读入会话摘要、最近消息和当前查询，产出按类型标注的 TypedQuery，组成 QueryPlan。\n\n每条 TypedQuery 交给 HierarchicalRetriever：查询嵌入一次后沿 VikingFS 目录树遍历。THINKING 模式从 L0/L1 全局检索取种子，重排目录候选后递归探索高分分支，top-k 连续 3 轮不变即收敛；QUICK 模式只做单次平面搜索并按 URI 去重。\n\n引擎有三个入口：`find` 执行单条查询，不带会话上下文；`search` 先做意图分析，再并发展开子查询；`recall` 按记忆类型分配额召回，渲染有字符上限的 XML 块。"},"io":{"inputs":[{"en":"User query string","zh":"用户查询文本"},{"en":"Session compression summary","zh":"会话压缩摘要"},{"en":"Recent message history","zh":"最近消息历史"},{"en":"Target directory URI(s)","zh":"目标目录 URI"}],"outputs":[{"en":"Ranked MatchedContext list","zh":"排序后的 MatchedContext 列表"},{"en":"QueryPlan with TypedQueries","zh":"含 TypedQuery 的 QueryPlan"},{"en":"Partitioned FindResult","zh":"分区的 FindResult"},{"en":"Bounded XML recall block","zh":"有字符上限的 XML 召回块"}]},"family":"retrieve"},{"id":"retrieve.vikingfs-retrieval-adapter","parent":"retrieve","name":"Find / Search","kind":"service","sourcePath":"openviking/storage/viking_fs.py","symbol":"VikingFS.find / VikingFS.search","sourceLines":"1973-2210","pipelines":["retrieve"],"summary":{"en":"Retrieval orchestration on VikingFS: `find` runs a single query, `search` adds intent analysis and concurrent execution, both return partitioned FindResult.","zh":"VikingFS 检索：`find` 单查询，`search` 加意图分析并发，均返回分区 FindResult。"},"article":{"en":"`VikingFS.find()` and `VikingFS.search()` are the two retrieval entry points exposed by VikingFS, the storage interface. `find` builds one TypedQuery and calls HierarchicalRetriever exactly once. `search` calls IntentAnalyzer to produce a QueryPlan when session context exists, then fans out all resulting typed queries concurrently via `asyncio.gather`. Results assemble into memories, resources, and skills lists. Use `find` for a one-shot query with no session state; use `search` when session context (summary and recent messages) is available to sharpen intent — without session context, `search` falls back to a single plain TypedQuery.","zh":"`VikingFS.find()` 与 `VikingFS.search()` 是两个检索入口：前者单查询，直调 HierarchicalRetriever；后者先经 IntentAnalyzer 拆出子查询再并发执行。有会话上下文用 `search`，否则用 `find`。"},"io":{"inputs":[{"en":"Search query string","zh":"搜索查询文本"},{"en":"Target directory URI(s)","zh":"目标目录 URI"},{"en":"Session info dict","zh":"会话信息字典"},{"en":"Score threshold / filter","zh":"分数阈值与过滤条件"}],"outputs":[{"en":"Partitioned FindResult","zh":"分区的 FindResult"},{"en":"QueryPlan (search only)","zh":"QueryPlan（仅 search）"},{"en":"Per-query QueryResult list","zh":"每条查询的 QueryResult 列表"}]},"family":"retrieve"},{"id":"retrieve.intent-analyzer","parent":"retrieve","name":"IntentAnalyzer","kind":"processing","sourcePath":"openviking/retrieve/intent_analyzer.py","symbol":"IntentAnalyzer.analyze","sourceLines":"38-177","pipelines":["retrieve"],"summary":{"en":"Builds prompt from session context and calls query-planner LLM to produce a QueryPlan of TypedQueries. Used only by `search`.","zh":"根据会话上下文构造 prompt，调用 query-planner 模型生成含 TypedQuery 的 QueryPlan。仅 `search` 入口使用。"},"article":{"en":"Intent analysis exists because one question can map to several context types — a \"how do I configure the embedder\" query touches both resource docs and past memories — and splitting by type lets each subtree search independently. IntentAnalyzer generates the plan from session state: it truncates the compression summary to 30,000 characters (roughly 10,000 tokens, bounding prompt size), takes recent messages, and combines them with the current query and target directory abstract into a prompt. Fine-tuned planner models get specialized prompts; others fall back to the default. The query-planner LLM returns JSON parsed into TypedQueries.","zh":"IntentAnalyzer 根据会话状态生成检索计划。它将压缩摘要截断到 30000 字符，取最近消息，连同当前查询和目标目录摘要拼成 prompt。微调过的 planner 模型用专用 prompt，其余模型使用默认提示词模板。query-planner LLM 返回的 JSON 解析成 TypedQuery。"},"code":[{"lang":"python","title":{"en":"Model-specific planner prompt dispatch","zh":"按模型分发 planner 提示词"},"text":"# Model-specific query-planner prompts. Models not listed here keep using the\n# default intent-analysis prompt for backward compatibility.\nQUERY_PLANNER_PROMPT_BY_MODEL: dict[str, str] = {\n    \"ollama/guoxuter/ov_intent_analysis_sft:v7_q8\": \"retrieval.ov_intent_analysis_sft_v7\",\n    \"ollama/guoxuter/ov_intent_analysis_sft:v4_q8\": \"retrieval.ov_intent_analysis_sft_v4\",\n}\n\n\ndef resolve_intent_analysis_prompt_id(query_planner: Any) -> str:\n    \"\"\"Return the prompt id expected by the configured query-planner model.\"\"\"\n    model = getattr(query_planner, \"model\", None)\n    if not isinstance(model, str):\n        return DEFAULT_INTENT_ANALYSIS_PROMPT\n    return QUERY_PLANNER_PROMPT_BY_MODEL.get(model.strip(), DEFAULT_INTENT_ANALYSIS_PROMPT)","sourcePath":"openviking/retrieve/intent_analyzer.py","sourceLines":"22-35"}],"io":{"inputs":[{"en":"Compression summary","zh":"压缩摘要"},{"en":"Recent message history","zh":"最近消息历史"},{"en":"Current user query","zh":"当前用户查询"},{"en":"Target directory abstract","zh":"目标目录摘要"}],"outputs":[{"en":"QueryPlan with TypedQueries","zh":"含 TypedQuery 的 QueryPlan"},{"en":"Session context summary","zh":"会话上下文摘要"},{"en":"LLM reasoning text","zh":"LLM 推理解释文本"}]},"family":"retrieve"},{"id":"retrieve.hierarchical-retriever","parent":"retrieve","name":"Retriever","kind":"processing","sourcePath":"openviking/retrieve/hierarchical_retriever.py","symbol":"HierarchicalRetriever.retrieve","sourceLines":"46-612","pipelines":["retrieve"],"summary":{"en":"Core retrieval engine. Embeds query, runs QUICK flat search or THINKING recursive traversal with rerank and hotness blending.","zh":"核心检索引擎。嵌入查询后执行 QUICK 平面搜索或 THINKING 递归遍历，含重排和热度融合。"},"article":{"en":"HierarchicalRetriever powers every `find` and `search` call. It embeds the query once via `embed_compat`. QUICK mode runs a flat vector search and deduplicates by URI. THINKING mode seeds from global hits on L0 directory abstracts (`.abstract.md`) and L1 overviews (`.overview.md`); L2 leaf files are terminal hits. It then recursively traverses the directory tree with per-level rerank, converging after three rounds with stable top-k URIs or a non-growing candidate pool. Parent and child scores blend via `score_propagation_alpha` — final = alpha * child + (1 - alpha) * parent; the default 1.0 uses only the child score, lower values let a promising parent directory boost its children. Results convert to MatchedContext with optional hotness blending.","zh":"HierarchicalRetriever 驱动所有检索调用，查询经 `embed_compat` 嵌入一次。QUICK 模式做平面搜索并按 URI 去重；THINKING 模式从 L0/L1 取种子，逐层重排、递归探索目录树，top-k 连续 3 轮不变即收敛。结果转成 MatchedContext，可融合热度分。"},"code":[{"lang":"python","title":{"en":"Retriever tuning constants","zh":"检索器调优常量"},"text":"class RetrieverMode(str):\n    THINKING = \"thinking\"\n    QUICK = \"quick\"\n\n\nclass HierarchicalRetriever:\n    \"\"\"Hierarchical retriever with dense and sparse vector support.\"\"\"\n\n    MAX_CONVERGENCE_ROUNDS = 3  # Stop after multiple rounds with unchanged topk\n    MAX_RELATIONS = 5  # Maximum relations per resource\n    DIRECTORY_DOMINANCE_RATIO = 1.2  # Directory score must exceed max child score\n    GLOBAL_SEARCH_TOPK = 10  # Global retrieval count (more candidates = better rerank precision)\n    MAX_PARALLEL_CHILD_SEARCHES = 4  # Limit per-request fan-out against remote vector stores\n    LEVEL_URI_SUFFIX = {0: \".abstract.md\", 1: \".overview.md\"}","sourcePath":"openviking/retrieve/hierarchical_retriever.py","sourceLines":"41-54"}],"io":{"inputs":[{"en":"TypedQuery","zh":"TypedQuery"},{"en":"Dense / sparse query vectors","zh":"稠密/稀疏查询向量"},{"en":"Target directory URIs","zh":"目标目录 URI"},{"en":"Rerank config","zh":"重排配置"}],"outputs":[{"en":"Ranked MatchedContext list","zh":"排序的 MatchedContext 列表"},{"en":"QueryResult with searched dirs","zh":"含搜索目录的 QueryResult"},{"en":"Retrieval stats record","zh":"检索统计记录"},{"en":"Per-query latency","zh":"单查询延迟"}]},"family":"retrieve"},{"id":"retrieve.type-quota-recall","parent":"retrieve","name":"TypeQuotaRecall","kind":"processing","sourcePath":"openviking/retrieve/type_quota_recall.py","symbol":"search_type_quota_recall","sourceLines":"288-498","pipelines":["retrieve","manage.session-lifecycle"],"summary":{"en":"Recalls memory types with per-type quotas and peer penalties, renders bounded XML that degrades from full to summary to URI.","zh":"按记忆类型召回，有类型配额和 peer 惩罚，渲染有字符上限的 XML，从全文降级到摘要再到 URI。"},"article":{"en":"`search_type_quota_recall` implements a memory-focused recall strategy. It independently searches events, entities, preferences, and experiences subtrees via `service.search.find()`, each with its own quota. Score penalties down-rank memories from other peers so the actor's own memories rank first. After dedup, full content reads back through the service layer's `fs.read()` and renders into an XML block that falls back through three levels: full content, summary, URI-only. The XML block honors a hard `max_chars` budget (default 6500) — every rendered fragment counts against it, and an entry that cannot fit even as a bare URI is dropped and counted.","zh":"`search_type_quota_recall` 按 events、entities、preferences、experiences 四类分别检索，各类型有独立配额，其他 peer 的结果扣分。去重后读取全文，渲染有字符上限的 XML 块，按全文、摘要、仅 URI 三级降级，放不下的条目丢弃并计数。"},"code":[{"lang":"python","title":{"en":"Char-budget degradation cascade","zh":"字符预算降级级联"},"text":"        # VikingBot's heuristic only budgets full fragments, but max_chars is\n        # this API's contract: every rendered fragment counts. Fallbacks keep\n        # degrading (summary -> uri) and drop entirely once nothing fits.\n        if mode != \"full\":\n            fragment_chars = len(fragment) + (1 if total_chars else 0)\n            if total_chars + fragment_chars > max_chars and mode == \"summary\":\n                mode = \"uri\"\n                fragment = _uri_fragment(index, uri, score)\n                fragment_chars = len(fragment) + (1 if total_chars else 0)\n            if total_chars + fragment_chars > max_chars:\n                dropped += 1\n                continue\n            total_chars += fragment_chars","sourcePath":"openviking/retrieve/type_quota_recall.py","sourceLines":"428-440"}],"io":{"inputs":[{"en":"Recall query string","zh":"召回查询文本"},{"en":"Per-type quotas","zh":"各类型配额"},{"en":"Peer scope and penalties","zh":"peer 范围与惩罚"},{"en":"Memory target roots","zh":"记忆根目录"}],"outputs":[{"en":"RecallResult with entries","zh":"含条目的 RecallResult"},{"en":"Rendered XML block","zh":"渲染后的 XML 块"},{"en":"Recall stats (origins, dropped)","zh":"召回统计（来源，丢弃数）"}]},"family":"retrieve"},{"id":"retrieve.hotness-scorer","parent":"retrieve","name":"HotnessScorer","kind":"processing","sourcePath":"openviking/retrieve/memory_lifecycle.py","symbol":"hotness_score","sourceLines":"19-64","pipelines":["retrieve"],"summary":{"en":"Pure function computing 0-1 hotness from access frequency (sigmoid log1p) and recency (7-day half-life exponential decay).","zh":"纯函数，从访问频率（sigmoid log1p）和时效性（7 天半衰期指数衰减）算出 0-1 热度分。"},"article":{"en":"`hotness_score` is a pure function that returns a hotness value between 0 and 1. The frequency component runs `log1p(active_count)` through a sigmoid curve. The recency component applies exponential decay with a configurable half-life, which defaults to 7 days. `log1p` compresses large access counts and the sigmoid bounds the frequency term in (0,1) so it never dominates recency. HierarchicalRetriever blends semantic scores with hotness as (1 - alpha) * semantic + alpha * hotness, where alpha is `retrieval.hotness_alpha`; it defaults to 0.0, so the hotness boost is off unless configured.","zh":"`hotness_score` 是纯函数，输出 0-1 热度分：频率取 `log1p(active_count)` 经 sigmoid，时效按半衰期（默认 7 天）指数衰减，两者相乘。检索时按 `retrieval.hotness_alpha` 混入语义分，默认 0.0 即不启用。"},"code":[{"lang":"python","title":{"en":"Hotness formula: frequency x recency","zh":"热度公式：频率 × 时效"},"text":"# --- frequency component ---\nfreq = 1.0 / (1.0 + math.exp(-math.log1p(active_count)))\n\n# --- recency component ---\nif updated_at is None:\n    return 0.0\n# …\nage_days = max((now - updated_at).total_seconds() / 86400.0, 0.0)\ndecay_rate = math.log(2) / half_life_days\nrecency = math.exp(-decay_rate * age_days)\n\nreturn freq * recency","sourcePath":"openviking/retrieve/memory_lifecycle.py","sourceLines":"47-64"}],"io":{"inputs":[{"en":"active_count (access count)","zh":"active_count（访问次数）"},{"en":"updated_at timestamp","zh":"updated_at 时间戳"},{"en":"half_life_days config","zh":"half_life_days 配置"}],"outputs":[{"en":"Hotness score 0.0-1.0","zh":"0.0-1.0 热度分"}]},"family":"retrieve"},{"id":"retrieve.stats-collector","parent":"retrieve","name":"Stats Collector","kind":"operations","sourcePath":"openviking/retrieve/retrieval_stats.py","symbol":"RetrievalStatsCollector.record_query","sourceLines":"78-178","pipelines":["retrieve"],"summary":{"en":"Thread-safe singleton accumulating per-query retrieval metrics; pushes to Prometheus-compatible datasource on each record.","zh":"线程安全单例，累计每次查询的检索指标，每次记录时推送到 Prometheus 兼容数据源。"},"article":{"en":"RetrievalStatsCollector is a thread-safe singleton that accumulates aggregate metrics from every `HierarchicalRetriever.retrieve()` call. It tracks total query counts, result counts, score ranges, per-context-type query counts, rerank usage and fallback counts (two separate counters), and latency. A single module-level collector aggregates metrics across every retriever instance — find, search, and recall all funnel through it — so the observer reports system-wide retrieval quality rather than per-call stats. Each `record_query()` pushes data to `RetrievalStatsDataSource` for Prometheus metrics scraping. It provides `snapshot()` for observer reads and `reset()` for test teardown.","zh":"RetrievalStatsCollector 是线程安全单例，累计查询数、结果数、分数范围、各类型查询数、重排使用与回退次数和延迟。`record_query()` 向 `RetrievalStatsDataSource` 推送供 Prometheus 抓取，`snapshot()` 读取，`reset()` 清零。"},"io":{"inputs":[{"en":"Per-query result count","zh":"单查询结果数"},{"en":"Per-query scores","zh":"单查询分数"},{"en":"Per-query latency","zh":"单查询延迟"},{"en":"Rerank flags","zh":"重排标志位"}],"outputs":[{"en":"RetrievalStats snapshot","zh":"RetrievalStats 快照"},{"en":"Prometheus metrics emit","zh":"Prometheus 指标推送"}]},"family":"retrieve"},{"id":"retrieve.retrieval-observer","parent":"retrieve","name":"Observer","kind":"operations","sourcePath":"openviking/storage/observers/retrieval_observer.py","symbol":"RetrievalObserver.get_status_table","sourceLines":"16-80","pipelines":["retrieve"],"summary":{"en":"Reads RetrievalStatsCollector snapshot and formats tabulate status table; flags zero-result rates above 50% as unhealthy.","zh":"读 RetrievalStatsCollector 快照，用 tabulate 出状态表，零结果率超 50% 标不健康。"},"article":{"en":"RetrievalObserver reads the global RetrievalStatsCollector via lazy import (which avoids circular dependencies) and formats aggregate metrics through `get_status_table()`. The tabulate-rendered output includes a summary section with total queries, avg results per query, zero-result rate, score range, rerank stats, and latency, plus a per-context-type breakdown. Zero-result rates at or above 50% — the hardcoded class constant `UNHEALTHY_ZERO_RESULT_RATE`, an empirical heuristic rather than a derived value — trigger an unhealthy status; error flagging additionally waits for at least 5 recorded queries.","zh":"RetrievalObserver 懒加载读取 RetrievalStatsCollector 快照，`get_status_table()` 用 tabulate 渲染汇总区（查询数、零结果率、重排统计、延迟等）和按类型分项。零结果率达 50% 即标记不健康。"},"io":{"inputs":[{"en":"RetrievalStats snapshot","zh":"RetrievalStats 快照"},{"en":"Zero-result threshold","zh":"零结果率阈值"}],"outputs":[{"en":"Formatted status table","zh":"格式化的状态表"},{"en":"Health boolean flag","zh":"健康布尔标志"}]},"family":"retrieve"},{"id":"runtime-operations","parent":null,"name":"Runtime Operations","kind":"operations","sourcePath":"","symbol":"","sourceLines":"","pipelines":[],"summary":{"en":"Coordinates background maintenance, observability, and operator tooling subsystems across OpenViking runtime.","zh":"协调 OpenViking 运行时的后台维护、可观测性和运维工具子系统。"},"article":{"en":"Operators need to inspect and control always-on subsystems in OpenViking without touching business code. The Runtime Operations family groups those subsystems.\n\nTwo branches sit under this family. Background Jobs covers three clusters. Watch auto-refresh: the Watch Scheduler executes due watch tasks, and the Watch Manager persists their definitions. Async task lifecycle: the Task Tracker answers status polls from an in-memory cache backed by its durable Task Store child. Admin maintenance: the Reindexer rebuilds vector and semantic indexes, and Legacy Migration moves old agent/session data into user-owned namespaces.\n\nThe second branch is Observability. The Observability Event Bus — a small process-local pub/sub — fans events out to the metrics collector pipeline and the usage/audit projector: business code emits one event, and the metrics and audit consumers each receive it independently. Per-operation telemetry feeds its snapshot summaries into the metrics bridge and the OTel tracer, the wait tracker gives write requests completion semantics, and observers pull subsystem status directly. Business paths stay free of direct metric or audit calls, and operators get a unified view of system health, throughput, and usage.","zh":"运维要能查看和控制 OpenViking 的常驻子系统，又不想改动业务代码。Runtime Operations 家族把它们集中到一起。\n\n家族分两支。后台作业一支分三组。watch 自动刷新：Watch Scheduler 执行到期任务，Watch Manager 持久化任务定义。异步任务：Task Tracker 缓存应答状态查询，Task Store 落盘。管理维护：Reindexer 重建索引，Legacy Migration 迁移旧数据。\n\n另一支是可观测性。Event Bus（进程内发布订阅）把事件扇给指标采集流水线和用量/审计投影：业务代码发一个事件，两类消费者独立接收，业务路径不必直连指标或审计。操作遥测把快照汇总送进指标桥和 OTel tracer，wait tracker 让写请求可等待完成，observer 直接拉取子系统状态。运维获得健康、吞吐和用量的统一视图。"},"io":{"inputs":[{"en":"Operator CLI/API commands","zh":"运维 CLI/API 指令"},{"en":"Subsystem health signals","zh":"子系统健康信号"},{"en":"Observability events","zh":"可观测性事件"}],"outputs":[{"en":"Prometheus metrics","zh":"Prometheus 指标"},{"en":"Audit log projections","zh":"审计日志投影"},{"en":"Health status tables","zh":"健康状态表格"},{"en":"Task lifecycle snapshots","zh":"任务生命周期快照"}]},"family":"runtime-operations"},{"id":"runtime-operations.background-jobs","parent":"runtime-operations","name":"Background Jobs","kind":"operations","sourcePath":"openviking/resource/watch_scheduler.py","symbol":"WatchScheduler","sourceLines":"","pipelines":["write","retrieve","manage.watch-tasks","manage.context-fs"],"summary":{"en":"Timer-driven watch refresh, async task lifecycle tracking, and admin maintenance jobs running off the request path.","zh":"定时 watch 刷新、异步任务生命周期跟踪和管理员维护作业，均在请求路径之外运行。"},"article":{"en":"OpenViking keeps long-running maintenance off the request path, and this branch is the machinery that runs it. Three small clusters map to three trigger styles. A timer loop drives watch auto-refresh: `WatchScheduler` executes due tasks while `WatchManager` persists their definitions. API calls with `wait=false` drive the async task lifecycle: `TaskTracker` answers status polls from memory, with its `PersistentTaskStore` child as the durable cold path. Explicit admin commands drive the Reindexer and Legacy Migration.\n\nThe triggers differ; the operational needs do not. State must survive process restarts, so everything durable lands in VikingFS or AGFS. Background work must not trample foreground writes, so reindex takes a tree-mode URI lock and the scheduler caps concurrency with a semaphore. And progress must be visible, so reindex registers its lifecycle in `TaskTracker`, giving operators one polling surface instead of one per job.","zh":"OpenViking 把长时间运行的维护工作挪出请求路径，这一支就是执行它们的机器。三个小集群对应三种触发方式：定时循环驱动 watch 自动刷新，`WatchScheduler` 执行到期任务，`WatchManager` 持久化任务定义；`wait=false` 的 API 调用驱动异步任务生命周期，`TaskTracker` 用内存缓存应答状态轮询，子节点 `PersistentTaskStore` 作为落盘冷路径；管理员命令驱动 Reindexer 和 Legacy Migration，前者重建向量与语义索引，后者把旧的 agent/session 数据迁进用户命名空间。\n\n触发方式各不相同，运维诉求却一致。状态要撑过进程重启，所以持久化都走 VikingFS 或 AGFS；后台工作不能踩到前台写入，所以重建索引拿树模式 URI 锁、调度器用信号量限制并发；进度要可见，所以重建索引在 `TaskTracker` 登记生命周期，运维只需盯一个轮询入口。"},"io":{"inputs":[{"en":"Timer ticks and due watch tasks","zh":"定时触发与到期 watch 任务"},{"en":"Async task lifecycle events","zh":"异步任务生命周期事件"},{"en":"Admin reindex/migration commands","zh":"管理员重建/迁移命令"}],"outputs":[{"en":"Re-ingested watched resources","zh":"重新摄入的被 watch 资源"},{"en":"Durable task and watch state","zh":"持久化的任务与 watch 状态"},{"en":"Rebuilt indexes, migrated namespaces","zh":"重建的索引与迁移后的命名空间"}]},"family":"runtime-operations"},{"id":"runtime-operations.watch-scheduler","parent":"runtime-operations.background-jobs","name":"Watch Scheduler","kind":"service","sourcePath":"openviking/resource/watch_scheduler.py","symbol":"WatchScheduler","sourceLines":"30-422","pipelines":["manage.watch-tasks"],"summary":{"en":"Periodically executes due watch tasks through ResourceService re-ingestion, bounded by a concurrency semaphore.","zh":"通过 ResourceService 重新摄入定期执行到期 watch 任务，受并发信号量约束。"},"article":{"en":"WatchScheduler runs a background loop that asks WatchManager for the next execution time and sleeps only until then, capped at the check interval (default 60 s) — so short-interval watches fire on time, not on a fixed 60 s cadence. It pulls due tasks from WatchManager and executes each through `ResourceService.add_resource` with the original user's `RequestContext`; a semaphore caps concurrent executions at 4 by default. Watched Feishu documents carry OAuth state that expires; the scheduler refreshes stale tokens before re-ingesting, and a permanent refresh failure deactivates the task. A missing target URI or a not-found source path also deactivates the task automatically.","zh":"WatchScheduler 后台循环自适应休眠到下一个到期任务（上限 60 秒），到期任务经 `ResourceService.add_resource` 以原用户 `RequestContext` 重新摄入，并发默认上限 4。飞书 OAuth token 过期先刷新，目标或源不存在自动停用。"},"code":[{"lang":"python","title":{"en":"Adaptive sleep until the next due task","zh":"自适应休眠到下一个到期任务"},"text":"sleep_seconds = self._check_interval\nif self._watch_manager:\n    next_time = await self._watch_manager.get_next_execution_time()\n    if next_time is not None:\n        now = datetime.now()\n        sleep_seconds = min(\n            self._check_interval,\n            max(0.0, (next_time - now).total_seconds()),\n        )\nawait asyncio.sleep(sleep_seconds)","sourcePath":"openviking/resource/watch_scheduler.py","sourceLines":"166-175"}],"io":{"inputs":[{"en":"Due watch tasks from WatchManager","zh":"WatchManager 到期 watch 任务"},{"en":"Feishu OAuth auth state","zh":"飞书 OAuth 授权状态"},{"en":"User RequestContext","zh":"用户 RequestContext"}],"outputs":[{"en":"Resource re-ingestion calls","zh":"资源重新摄入调用"},{"en":"Deactivated watch tasks","zh":"停用的 watch 任务"}]},"family":"runtime-operations"},{"id":"runtime-operations.watch-manager","parent":"runtime-operations.background-jobs","name":"Watch Manager","kind":"service","sourcePath":"openviking/resource/watch_manager.py","symbol":"WatchManager","sourceLines":"149-926","pipelines":["manage.watch-tasks"],"summary":{"en":"CRUD for WatchTask definitions with VikingFS-backed atomic persistence and URI conflict detection.","zh":"WatchTask 定义的增删改查，VikingFS 原子持久化，支持 URI 冲突检测。"},"article":{"en":"`WatchManager` handles CRUD for `WatchTask` records, persisting them atomically to `viking://resources/.watch_tasks.json` with tmp/backup rotation. Writes go to a `.tmp` URI first and the previous copy is kept as `.bak`, so a crash mid-write never corrupts the only copy; on load, a corrupt main JSON falls back to the backup. It enforces URI conflict detection so two watch tasks cannot target the same destination URI: otherwise two watches would overwrite each other's content on every refresh cycle. Permissions are role-scoped: ROOT can manage all tasks, ADMIN any task in the same account, USER only tasks they created. Internal hooks keep watch tasks consistent when resources move or are deleted across the system.","zh":"WatchManager 负责 WatchTask 记录的增删改查，将记录原子写入 viking://resources/.watch_tasks.json，并带有 tmp/backup 轮换。它执行 URI 冲突检测，权限按 ROOT/管理员同账户/用户仅本人分级，资源移动或删除时通过内部钩子保持任务一致。"},"code":[{"lang":"python","title":{"en":"Atomic save: tmp, then bak, then main","zh":"原子保存：tmp→bak→main 轮换"},"text":"await self._viking_fs.write_file(self.STORAGE_TMP_URI, content, ctx=ctx)\n\n# …\n\ntry:\n    if await self._viking_fs.exists(self.STORAGE_URI, ctx=ctx):\n        await self._viking_fs.mv(self.STORAGE_URI, self.STORAGE_BAK_URI, ctx=ctx)\nexcept Exception as e:\n    logger.warning(f\"[WatchManager] Failed to rotate task storage backup: {e}\")\n\nawait self._viking_fs.mv(self.STORAGE_TMP_URI, self.STORAGE_URI, ctx=ctx)","sourcePath":"openviking/resource/watch_manager.py","sourceLines":"292-306"}],"io":{"inputs":[{"en":"Watch task CRUD requests","zh":"Watch 任务增删改查请求"},{"en":"Resource move/delete hooks","zh":"资源移动/删除钩子"}],"outputs":[{"en":"Persisted WatchTask JSON","zh":"持久化 WatchTask JSON"},{"en":"URI conflict rejections","zh":"URI 冲突拒绝"}]},"family":"runtime-operations"},{"id":"runtime-operations.task-tracker","parent":"runtime-operations.background-jobs","name":"Task Tracker","kind":"service","sourcePath":"openviking/service/task_tracker.py","symbol":"TaskTracker","sourceLines":"141-529","pipelines":["write","retrieve","manage.watch-tasks"],"summary":{"en":"Process-global singleton tracking async operation lifecycle with TTL cleanup and secret-sanitized records.","zh":"进程级单例，跟踪异步操作生命周期，带 TTL 清理和敏感信息脱敏。"},"article":{"en":"Background async operations in OpenViking (session commit with wait=false, admin reindex, and similar long-running work) leave callers needing to poll status without holding the original request open. TaskTracker handles this.\n\nIt keeps a TaskRecord dict with states PENDING, RUNNING, COMPLETED, and FAILED. A TTL cleanup loop removes completed tasks after 24 hours and failed tasks after 7 days, capped at 10,000 total records. Error messages are sanitized by stripping secrets (sk-, cr_, ghp_, Bearer tokens) and truncating to 500 characters. Results exclude user_key fields.\n\nOpenVikingService installs the tracker during storage initialization. Queries can scope results by account_id and user_id. An atomic create_if_no_running() call prevents duplicate reindex tasks. When a task is not in the in-memory cache, the tracker loads it from PersistentTaskStore on demand.","zh":"OpenViking 中的后台异步操作（wait=false 的会话提交、管理员重建索引等）让调用方需要轮询状态，又不想保持原始请求挂起。TaskTracker 解决了这个问题。\n\n它维护 TaskRecord 字典，状态包括 PENDING、RUNNING、COMPLETED、FAILED。TTL 清理循环 24 小时后清除已完成任务，7 天后清除失败任务，总量上限 10,000 条。错误信息脱敏：去除 sk-、cr_、ghp_、Bearer 等密钥，截断到 500 字符，结果不含 user_key 字段。\n\nOpenVikingService 在存储初始化阶段安装 tracker。查询可按 account_id 和 user_id 限定范围。原子操作 create_if_no_running() 防止重复重建索引，缓存未命中的任务按需从 PersistentTaskStore 加载。"},"code":[{"lang":"python","title":{"en":"Secret patterns and error sanitization","zh":"密钥模式与错误信息脱敏"},"text":"_SENSITIVE_PATTERNS = re.compile(\n    r\"(sk-|cr_|ghp_|ntn_|xox[baprs]-|Bearer\\s+)[a-zA-Z0-9._-]+\",\n    re.IGNORECASE,\n)\n\n_MAX_ERROR_LEN = 500\n_SENSITIVE_RESULT_KEYS = {\"user_key\"}\n# …\ndef _sanitize_error(error: str) -> str:\n    \"\"\"Remove potential secrets from error messages.\"\"\"\n    sanitized = _SENSITIVE_PATTERNS.sub(\"[REDACTED]\", error)\n    if len(sanitized) > _MAX_ERROR_LEN:\n        sanitized = sanitized[:_MAX_ERROR_LEN] + \"...[truncated]\"\n    return sanitized","sourcePath":"openviking/service/task_tracker.py","sourceLines":"108-122"}],"io":{"inputs":[{"en":"Async operation lifecycle events","zh":"异步操作生命周期事件"},{"en":"Owner-scoped query requests","zh":"按归属范围的查询请求"}],"outputs":[{"en":"TaskRecord state snapshots","zh":"TaskRecord 状态快照"},{"en":"Sanitized error/result payloads","zh":"脱敏的错误/结果载荷"}]},"family":"runtime-operations"},{"id":"runtime-operations.task-store","parent":"runtime-operations.task-tracker","name":"Task Store","kind":"storage","sourcePath":"openviking/service/task_store.py","symbol":"PersistentTaskStore","sourceLines":"40-140","pipelines":["manage.watch-tasks"],"summary":{"en":"Serializes TaskRecord objects as JSON files in AGFS account-scoped task directories for durable state.","zh":"将 TaskRecord 序列化为 JSON 文件，写入 AGFS 账户范围任务目录，供持久化使用。"},"article":{"en":"`PersistentTaskStore` implements the `TaskStore` protocol, serializing `TaskRecord` objects as JSON files into AGFS account-scoped task directories. All read, write, ls, and rm operations route through `AsyncAGFSClient`. Directory creation is idempotent via `AGFSAlreadyExistsError` catch. `TaskTracker` keeps a hot in-memory cache for fast status reads; this store is the cold path that survives process restarts and repopulates the cache on a miss.","zh":"PersistentTaskStore 实现 TaskStore 协议，将 TaskRecord 序列化为 JSON 文件，写入 AGFS 账户隔离的任务目录。所有操作通过 AsyncAGFSClient 路由，目录创建幂等。TaskTracker 以内存缓存为热路径，本存储为冷路径：进程重启或缓存未命中时按需回填。"},"io":{"inputs":[{"en":"TaskRecord objects","zh":"TaskRecord 对象"},{"en":"Account/user scope identifiers","zh":"账户/用户范围标识"}],"outputs":[{"en":"JSON files in AGFS task dirs","zh":"AGFS 任务目录中的 JSON 文件"}]},"family":"runtime-operations"},{"id":"runtime-operations.reindex-executor","parent":"runtime-operations.background-jobs","name":"Reindexer","kind":"processing","sourcePath":"openviking/service/reindex_executor.py","symbol":"ReindexExecutor","sourceLines":"103-1442","pipelines":["write"],"summary":{"en":"Orchestrates non-destructive admin reindex of vector and semantic indexes with tree-mode URI locking.","zh":"编排管理员对向量和语义索引的非破坏性重建索引，带 URI 树模式锁。"},"article":{"en":"`ReindexExecutor` orchestrates admin-triggered rebuilds of vector and semantic indexes. Two modes are available: `vectors_only` re-embeds existing content, and `semantic_and_vectors` also regenerates directory abstracts through `SemanticProcessor`. It takes the URI lock with `lock_mode=\"tree\"`, which locks the entire URI subtree, so concurrent writes anywhere under that prefix are blocked while reindex runs. The rebuild is non-destructive: existing records stay in place and remain readable throughout, because content is re-embedded and upserted through the embedding queue rather than dropped and rebuilt. It walks the VikingFS tree reading content and marker files, then enqueues `Context` objects with `Vectorize` payloads via `EmbeddingMsgConverter`.","zh":"`ReindexExecutor` 编排管理员触发的索引重建。两种模式：`vectors_only` 重嵌入，`semantic_and_vectors` 还重生成摘要。获取树模式锁后遍历 VikingFS，构建 `Context` 通过 `EmbeddingMsgConverter` 入队。"},"code":[{"lang":"python","title":{"en":"Tree-mode lock guards the whole reindex","zh":"树模式锁保护整个重建过程"},"text":"async with LockContext(get_lock_manager(), [path], lock_mode=\"tree\") as lock_handle:\n    run = _ReindexRunContext(\n        ctx=ctx,\n        counters=counters,\n        lock=BorrowedLockLease.from_handle(get_lock_manager(), lock_handle),\n    )\n    if object_type == \"global_namespace\":\n        await self._reindex_global_namespace(\n            uri=uri,\n            mode=mode,\n            run=run,\n        )","sourcePath":"openviking/service/reindex_executor.py","sourceLines":"408-419"}],"io":{"inputs":[{"en":"Admin reindex request (uri, mode)","zh":"管理员重建索引请求（uri，模式）"},{"en":"VikingFS tree content","zh":"VikingFS 树内容"}],"outputs":[{"en":"Embedding queue messages","zh":"嵌入队列消息"},{"en":"Rebuilt vector/semantic records","zh":"重建的向量/语义记录"}]},"family":"runtime-operations"},{"id":"runtime-operations.legacy-migration","parent":"runtime-operations.background-jobs","name":"Legacy Migration","kind":"processing","sourcePath":"openviking/service/legacy_migration.py","symbol":"LegacyDataMigration","sourceLines":"149-801","pipelines":["manage.context-fs"],"summary":{"en":"Plans and executes migration of legacy agent/session data into user-owned namespace layout.","zh":"规划并执行旧版 agent/session 数据到用户拥有的命名空间布局的迁移。"},"article":{"en":"Legacy data lived under agent- and session-scoped trees (e.g. `/local/{account_id}/agent`, `/local/{account_id}/session`) that did not attribute records to a real user; the migration copies them into user-owned namespaces so ownership is explicit. `preflight()` scans legacy directory trees and produces a `MigrationPlan` with `TreeCopy` operations, validating user IDs and flagging orphaned accounts. `run()` first registers any missing users via `api_key_manager.register_user()` so the target owner actually exists, then copies file trees along with associated vector records through AGFS. `cleanup()` removes source directories after migration completes.","zh":"`LegacyDataMigration` 将旧版 agent 和会话数据迁移到用户命名空间。`preflight()` 扫描目录树生成 `MigrationPlan`，校验 user_id 并标记孤立账户。`run()` 通过 AGFS 复制文件树和向量记录，`cleanup()` 完成后删除源目录。"},"io":{"inputs":[{"en":"Legacy agent/session trees","zh":"遗留 agent/session 目录树"},{"en":"API key registry","zh":"API 密钥注册表"}],"outputs":[{"en":"MigrationPlan with TreeCopy ops","zh":"含 TreeCopy 操作的 MigrationPlan"},{"en":"Migrated user namespaces","zh":"迁移后的用户命名空间"}]},"family":"runtime-operations"},{"id":"runtime-operations.observability","parent":"runtime-operations","name":"Observability","kind":"operations","sourcePath":"openviking/observability/events.py","symbol":"try_publish_event","sourceLines":"137-148","pipelines":["write","retrieve","manage.session-lifecycle","manage.watch-tasks"],"summary":{"en":"Event bus, metrics, telemetry, tracing, wait tracking, and observers reporting system behavior and cost.","zh":"事件总线、指标、遥测、追踪、等待跟踪和 observer，报告系统行为与开销。"},"article":{"en":"This branch answers two questions — what is the system doing, and what did it cost — while business code instruments each operation exactly once.\n\nThe hub is the `ObservabilityEventBus`: business code publishes one best-effort event, and the metrics collector pipeline and the usage/audit projector subscribe independently, so dropping either consumer never touches a business call site. `MetricRegistry` sits behind `/metrics`, enforcing label contracts and per-metric series caps so cardinality cannot drift upward silently. Per-operation telemetry wraps each API operation and hands the resulting snapshot both to the metrics bridge for aggregation and to the OTel span, so traces and API responses show the same timing and token numbers. The wait tracker gives write requests completion semantics, and the observers skip the event stream entirely, pulling live status from queues, locks, and VikingDB for the CLI and health endpoints.\n\nTwo transport idioms coexist deliberately: push for facts about what already happened, pull for the current state of a subsystem.","zh":"这一支回答两个问题：系统在做什么、代价是多少——而业务代码每个操作只埋一次点。\n\n中枢是 `ObservabilityEventBus`：业务代码发布一条尽力而为的事件，指标采集流水线和用量/审计投影各自订阅、互不影响，砍掉任何一个消费者都不必改业务调用点。`MetricRegistry` 守在 `/metrics` 背后，强制标签契约和每指标系列上限，让基数不会悄悄膨胀。操作遥测包住每次 API 操作，产出的快照一路交给指标桥做聚合，一路回填到 OTel span，链路追踪和 API 响应看到的是同一份耗时与 token 数据。Wait Tracker 给写请求补上等待完成的语义；Observer 系列则绕开事件流，直接从队列、锁、VikingDB 拉取即时状态，供 CLI 和健康端点使用。\n\n推与拉两种通道是有意并存的：推负责已经发生的事实，拉负责子系统的当前状态。"},"io":{"inputs":[{"en":"Observability events from business code","zh":"业务代码发布的可观测性事件"},{"en":"Operation telemetry snapshots","zh":"操作遥测快照"},{"en":"Subsystem status queries","zh":"子系统状态查询"}],"outputs":[{"en":"Prometheus metrics and OTel traces","zh":"Prometheus 指标与 OTel 追踪"},{"en":"Usage/audit projections","zh":"用量/审计投影"},{"en":"Health status tables","zh":"健康状态表格"},{"en":"Write-completion signals","zh":"写完成信号"}]},"family":"runtime-operations"},{"id":"runtime-operations.observers","parent":"runtime-operations.observability","name":"Observers","kind":"operations","sourcePath":"openviking/storage/observers/base_observer.py","symbol":"BaseObserver","sourceLines":"12-49","pipelines":[],"summary":{"en":"Operator-facing health and status views of OpenViking subsystems, formatted as tabulate tables.","zh":"面向运维人员的 OpenViking 子系统健康和状态视图，以 tabulate 表格格式输出。"},"article":{"en":"The observer family provides operator-facing, read-only health and status views of all major OpenViking subsystems. Observers give the CLI and health endpoints a uniform read interface so operator tooling does not need to import queue, RAGFS, VikingDB, or lock internals to render a status table. `BaseObserver` defines `get_status_table()`, `is_healthy()`, and `has_errors()`. Specialized observers pull stats from queues, RAGFS, retrieval quality, model token usage, VikingDB collections, and lock handles. `LockObserver` flags locks held over 600 seconds. Results return as `tabulate` tables.","zh":"Observer 为 CLI 和健康端点提供统一只读接口，运维工具无需导入子系统内部即可渲染状态表。`BaseObserver` 定义状态表与健康检查，各 observer 从队列、RAGFS、检索、模型用量、VikingDB 和锁拉取数据。`LockObserver` 标记超时锁，输出 `tabulate` 表格。"},"io":{"inputs":[{"en":"Subsystem state queries","zh":"子系统状态查询"},{"en":"Queue/FS/retrieval/model/DB/lock stats","zh":"队列/文件/检索/模型/DB/锁统计"}],"outputs":[{"en":"Formatted health/status tables","zh":"格式化的健康/状态表格"},{"en":"Hanging lock alerts","zh":"挂起锁告警"}]},"family":"runtime-operations"},{"id":"runtime-operations.metrics-registry","parent":"runtime-operations.observability","name":"Metrics Registry","kind":"service","sourcePath":"openviking/metrics/core/registry.py","symbol":"MetricRegistry","sourceLines":"62-341","pipelines":[],"summary":{"en":"Process-global in-memory metric store with label contract enforcement and per-metric series bounds.","zh":"进程级全局指标存储，强制执行标签契约，限制每指标系列数量。"},"article":{"en":"Prometheus metrics explode in cardinality without a controlled write path. `MetricRegistry` is the process-global in-memory store behind the `/metrics` endpoint that sets and enforces those rules.\n\nOnce a metric name registers with a specific label key set, every subsequent write to that metric must use the same keys, preventing ad-hoc label additions from blowing up series count. A per-metric series limit `max_series_per_metric` drops excess series and increments `openviking_metrics_dropped_series_total`, so operators can detect when write pressure is building.\n\n`init_metrics_from_server_config()` builds the registry, collector manager, event router, and Prometheus and OTel exporters. `shutdown_metrics()` cleanly detaches exporters on shutdown. Allowlisted metrics may optionally carry `account_id` labels. Business code never writes to the registry directly — all metric updates flow exclusively through typed collectors.","zh":"Prometheus 指标写入若不受控，标签基数会急剧膨胀。`MetricRegistry` 是进程级全局内存存储，支撑 `/metrics` 端点，规定指标写入规则。\n\n一个指标名注册了某组标签键后，后续写入必须使用相同的键，防止随意添加标签导致基数膨胀。每个指标设 `max_series_per_metric` 系列数量上限，丢弃超限系列并递增 dropped_series 计数器。\n\n`init_metrics_from_server_config()` 构建 registry、collector manager、event router 和 exporter。`shutdown_metrics()` 干净卸载 exporter。白名单指标可选带 `account_id` 标签。业务代码不直接写入，所有指标更新通过 collector 流转。"},"code":[{"lang":"python","title":{"en":"Registry contract and the 2048-series cap","zh":"Registry 读写契约与 2048 系列上限"},"text":"class MetricRegistry:\n    \"\"\"\n    MetricRegistry holds Counter/Gauge/Histogram families in memory.\n\n    The exporter reads current values via `iter_counters/iter_gauges/iter_histograms`.\n    Collectors should use the unified write helpers (`inc_counter/set_gauge/observe_histogram`)\n    to keep call sites consistent and reduce accidental label misuse.\n    \"\"\"\n\n    def __init__(self, *, max_series_per_metric: int = 2048) -> None:\n        # …\n        self._counters: dict[str, _CounterFamily] = {}\n        self._gauges: dict[str, _GaugeFamily] = {}\n        self._histograms: dict[str, _HistogramFamily] = {}","sourcePath":"openviking/metrics/core/registry.py","sourceLines":"62-83"}],"io":{"inputs":[{"en":"Metric name/label/value writes","zh":"指标名/标签/值写入"},{"en":"Collector refresh results","zh":"Collector 刷新结果"}],"outputs":[{"en":"Bounded metric series","zh":"受控基数的指标系列"},{"en":"Prometheus /metrics endpoint data","zh":"Prometheus /metrics 端点数据"}]},"family":"runtime-operations"},{"id":"runtime-operations.metrics-collector-pipeline","parent":"runtime-operations.metrics-registry","name":"Collectors","kind":"processing","sourcePath":"openviking/metrics/bootstrap.py","symbol":"create_default_collector_manager","sourceLines":"49-117","pipelines":[],"summary":{"en":"Orchestrates per-scrape metric collection and routes observability events to typed collectors.","zh":"编排每次抓取时的指标采集，将可观测性事件路由到各类型 collector。"},"article":{"en":"`CollectorManager` coordinates metric collection before each Prometheus scrape. It registers two collector categories: per-scrape refresh for lightweight in-process reads like queue counters, and TTL/stale-while-refresh (SWR) protected collectors for slower subsystems like model usage probes. Stale collectors trigger Stale-While-Refresh: return immediately, refresh in background. `EventCollectorRouter` receives events from the shared bus and dispatches them via `collector.receive()` into `MetricRegistry`.","zh":"`CollectorManager` 在 Prometheus 抓取前协调指标采集，注册两类 collector：per-scrape 刷新用于轻量读取，TTL/SWR（先返回旧值、后台刷新）保护的用于较慢子系统。`EventCollectorRouter` 从事件总线分发到 `MetricRegistry`。"},"io":{"inputs":[{"en":"Prometheus scrape triggers","zh":"Prometheus 抓取触发"},{"en":"Observability events from bus","zh":"来自事件总线的可观测性事件"}],"outputs":[{"en":"MetricRegistry series updates","zh":"MetricRegistry 系列更新"},{"en":"Stale-while-refresh results","zh":"过期即刷新结果"}]},"family":"runtime-operations"},{"id":"runtime-operations.telemetry-operation","parent":"runtime-operations.observability","name":"Op Telemetry","kind":"service","sourcePath":"openviking/telemetry/execution.py","symbol":"run_with_telemetry","sourceLines":"155-263","pipelines":["write","retrieve","manage.session-lifecycle","manage.watch-tasks"],"summary":{"en":"Per-operation collector that accumulates timing and quality metrics during a single API operation.","zh":"单次操作级 collector，在一次 API 操作期间累计耗时和质量指标。"},"article":{"en":"Every API operation in OpenViking — a search request, a resource write, a session commit — produces timing and quality data operators want to see. `OperationTelemetry` is the per-operation collector that gathers this data without cluttering business call sites.\n\n`run_with_telemetry()` is the entry point. It creates the collector, binds it to the current context through `bind_telemetry()`, optionally creates an OTel span for distributed tracing, executes the wrapped async function, and finishes the collector with status ok or error depending on outcome.\n\nThe resulting `TelemetrySnapshot` carries the operation name, `telemetry_id`, and a summary dict with `duration_ms`, token counts, GPU vector-search (`cuvs`, the GPU index library behind the embedded VectorDB) timing breakdowns such as `preflight_ms` and `gpu_search_ms`, plus route and filter buckets. Snapshots feed `TelemetryBridgeEventDataSource` for metrics aggregation and attach to API responses when the client explicitly requests a telemetry payload.","zh":"OpenViking 中每个 API 操作都产生耗时和质量数据，`OperationTelemetry` 是单次操作级 collector，在不干扰业务调用点的前提下收集这些数据。\n\n`run_with_telemetry()` 是入口。它创建 collector，通过 `bind_telemetry()` 绑定到当前上下文，可选创建 OTel span，然后执行被包装的异步函数，最后以 ok 或 error 状态完成。\n\n产出的 `TelemetrySnapshot` 包含操作名、`telemetry_id` 和 summary 字典，字段有 `duration_ms`、token 计数、GPU 向量检索（`cuvs`）耗时分解和 route/filter/algorithm 分桶。快照发往 `TelemetryBridgeEventDataSource` 供指标聚合。"},"io":{"inputs":[{"en":"Wrapped async operation function","zh":"包装的异步操作函数"},{"en":"Operation name and context","zh":"操作名和上下文"}],"outputs":[{"en":"TelemetrySnapshot with timing/token data","zh":"含耗时/token 数据的 TelemetrySnapshot"},{"en":"OTel span creation signals","zh":"OTel span 创建信号"}]},"family":"runtime-operations"},{"id":"runtime-operations.telemetry-tracer","parent":"runtime-operations.telemetry-operation","name":"OTel Tracer","kind":"service","sourcePath":"openviking/telemetry/tracer.py","symbol":"init_tracer","sourceLines":"183-283","pipelines":[],"summary":{"en":"OpenTelemetry SDK tracing integration with OTLP export, W3C context propagation, and log trace_id injection.","zh":"OpenTelemetry SDK 追踪集成，支持 OTLP 导出、W3C 上下文传播和日志 trace_id 注入。"},"article":{"en":"The tracer module integrates OpenTelemetry SDK tracing into OpenViking operations. It configures an OTLP span exporter with gRPC or HTTP transport and `BatchSpanProcessor`. W3C trace context is extracted from incoming HTTP headers and injected into downstream calls. `TraceIdLoggingFilter` inserts the current `trace_id` into Python logging records. `OperationSpanAttributes.from_telemetry_snapshot()` (defined in the adjacent `span_models` module) backfills finished `TelemetrySnapshot` data onto the operation span, so the OTel trace carries the same timing and token counts the API response shows.","zh":"OpenTelemetry 集成：OTLP exporter 加 `BatchSpanProcessor`，W3C 上下文入站提取、注入下游，`TraceIdLoggingFilter` 注入 `trace_id`；`span_models.OperationSpanAttributes` 把快照回填到 span。"},"io":{"inputs":[{"en":"Operation spans","zh":"操作 span"},{"en":"W3C trace context headers","zh":"W3C 追踪上下文头"}],"outputs":[{"en":"OTLP-exported distributed traces","zh":"OTLP 导出的分布式追踪"},{"en":"trace_id in log records","zh":"日志记录中的 trace_id"}]},"family":"runtime-operations"},{"id":"runtime-operations.request-wait-tracker","parent":"runtime-operations.observability","name":"Wait Tracker","kind":"service","sourcePath":"openviking/telemetry/request_wait_tracker.py","symbol":"RequestWaitTracker","sourceLines":"29-220","pipelines":["write","manage.watch-tasks"],"summary":{"en":"Tracks per-request queue completion by telemetry_id, enabling wait-for-embedding-completion semantics.","zh":"按 telemetry_id 追踪每请求的队列完成情况，支持等待嵌入完成的语义。"},"article":{"en":"When a client writes content with wait semantics, the write API returns only after that request's semantic and embedding work is done — `RequestWaitTracker` is what it blocks on. A process-global singleton, it tracks per-request queue completion by `telemetry_id`. Write operations register message root IDs when enqueuing semantic or embedding messages. Queue workers call `mark_semantic_done` or `mark_embedding_done` on completion, or `mark_semantic_failed` / `mark_embedding_failed` on failure. `is_complete()` returns True once both the pending semantic and pending embedding root sets are empty; `wait_for_request()` polls it every 0.05 s by default and raises `TimeoutError` past the deadline.","zh":"`RequestWaitTracker` 是进程级单例，按 `telemetry_id` 追踪队列完成情况。worker 完成调 `mark_*_done`、失败调 `mark_*_failed`；`is_complete()` 在两类根集合均空时返回 True，`wait_for_request()` 轮询加超时。"},"code":[{"lang":"python","title":{"en":"Complete = both root sets empty","zh":"完成 = 两类待处理根集合清空"},"text":"def is_complete(self, telemetry_id: str) -> bool:\n    if not telemetry_id:\n        return True\n    with self._lock:\n        state = self._states.get(telemetry_id)\n        if state is None:\n            return True\n        return not state.pending_semantic_roots and not state.pending_embedding_roots","sourcePath":"openviking/telemetry/request_wait_tracker.py","sourceLines":"168-175"}],"io":{"inputs":[{"en":"Queue root registrations","zh":"队列根 ID 注册"},{"en":"Worker completion signals","zh":"Worker 完成信号"}],"outputs":[{"en":"Per-request queue readiness state","zh":"每请求队列就绪状态"},{"en":"Queue status structured dict","zh":"队列状态结构化字典"}]},"family":"runtime-operations"},{"id":"runtime-operations.usage-audit","parent":"runtime-operations.observability","name":"Usage Audit","kind":"service","sourcePath":"openviking/observability/usage_audit/runtime.py","symbol":"UsageAuditRuntime","sourceLines":"30-116","pipelines":[],"summary":{"en":"Async batch persistence of observability events into SQLite-backed usage and audit query projections.","zh":"将可观测性事件异步批量持久化到 SQLite 支撑的用量和审计查询投影。"},"article":{"en":"The Usage/Audit subsystem builds product-level usage and audit projections from observability events. `UsageAuditRuntime` is assembled from four components: `SQLiteUsageAuditStore` persists to a local SQLite file, `UsageAuditWorker` drains its `asyncio.Queue` in batches and flushes on a configurable interval (default 1.0 s), `UsageAuditSubscriber` bridges the event bus, and `UsageAuditQueryService` serves token series, heatmap, and audit log queries. The store persists timestamps in UTC; the query service resolves the viewer's timezone per request (an IANA name from the `?timezone=` query parameter, falling back to a configured default) so day-level usage buckets align to the viewer's local midnight instead of splitting at UTC midnight.","zh":"Usage/Audit 子系统从可观测性事件构建用量和审计投影。`SQLiteUsageAuditStore` 持久化到 SQLite，`UsageAuditWorker` 批量写入，`UsageAuditSubscriber` 桥接事件总线，`UsageAuditQueryService` 提供查询，按时区重分桶。"},"io":{"inputs":[{"en":"Observability events from bus","zh":"来自事件总线的可观测性事件"}],"outputs":[{"en":"SQLite usage/audit projections","zh":"SQLite 用量/审计投影"},{"en":"Query service responses","zh":"查询服务响应"}]},"family":"runtime-operations"},{"id":"runtime-operations.observability-event-bus","parent":"runtime-operations.observability","name":"Event Bus","kind":"service","sourcePath":"openviking/observability/events.py","symbol":"ObservabilityEventBus","sourceLines":"42-81","pipelines":[],"summary":{"en":"Thread-safe process-local fan-out dispatcher for best-effort observability events.","zh":"线程安全的进程内扇出分发器，用于尽力而为的可观测性事件。"},"article":{"en":"`ObservabilityEventBus` is a thread-safe, process-local fan-out dispatcher. It maintains a dict of named subscribers and fans each `ObservabilityEvent` out to all of them. Events carry `event_name`, payload dict, and context IDs (`request_id`, `account_id`, `user_id`) from the current observability context. The interface is small: `register()` and `unregister()` manage subscribers, `publish()` handles delivery. Delivery is best-effort: a subscriber that raises only produces a warning log and every other subscriber still receives the event; registering a name that already exists replaces that subscriber. Business code calls `try_publish_event()` to publish to the global bus instance.","zh":"`ObservabilityEventBus` 是进程内扇出分发器，维护命名 subscriber 字典，把 `ObservabilityEvent` 扇给各 subscriber。事件含 `event_name`、payload、上下文 ID。业务代码用 `try_publish_event()` 向全局实例发布。"},"code":[{"lang":"python","title":{"en":"The event envelope","zh":"事件信封结构"},"text":"@dataclass(frozen=True, slots=True)\nclass ObservabilityEvent:\n    \"\"\"One normalized in-process observability event.\"\"\"\n\n    event_name: str\n    payload: dict[str, Any]\n    timestamp: datetime = field(default_factory=lambda: datetime.now(timezone.utc))\n    request_id: str | None = None\n    account_id: str | None = None\n    user_id: str | None = None","sourcePath":"openviking/observability/events.py","sourceLines":"23-32"}],"io":{"inputs":[{"en":"In-process observability events","zh":"进程内可观测性事件"},{"en":"Subscriber registrations","zh":"Subscriber 注册"}],"outputs":[{"en":"Fan-out dispatch to subscribers","zh":"扇出分发到 subscriber"}]},"family":"runtime-operations"},{"id":"service-layer","parent":null,"name":"Service Layer","kind":"service","sourcePath":"openviking/service/core.py","symbol":"OpenVikingService","sourceLines":"53-557","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.relations","manage.watch-tasks","manage.pack-backup","manage.auth-tenant"],"summary":{"en":"Composition root that wires all services, storage, queues, and model providers into a running OpenViking system.","zh":"OpenViking 运行时组合根，装配所有服务、存储、队列和模型提供者。"},"article":{"en":"OpenVikingService is the composition root and lifecycle manager for the system. It exists because operations against storage carry coordinated side-effects — semantic refresh, memory cleanup, watch-task sync — and because wiring must happen once, in one place, in a safe order: queue workers start only after VikingFS is ready, so recovered tasks cannot race initialization. `__init__` acquires the data-directory process lock, resolves encryption binding config, builds storage and queue infrastructure, installs the global TaskTracker, and creates the embedder from configuration.\n\n`initialize()` follows a strict wiring order. It creates the context collection on VikingDBManager, builds VikingFS from the embedder and retrieval config, then constructs the resource processor, directory initializer, privacy config service, skill processor, and session compressor. After starting LockManager and WatchScheduler, it wires sub-services via `set_dependencies` and `set_viking_fs`, attaches UnderstandingParseProcessor to the EXTERNAL_PARSE queue, spins up queue workers, and registers itself for process-wide resolution.\n\n`close()` reverses the sequence: it stops background tasks and schedulers, marks VikingDBManager closing, stops the queue manager, and clears process-wide registration.","zh":"OpenVikingService 是系统组合根和生命周期管理器。这一层存在的原因：存储操作往往伴随语义刷新、记忆清理、watch 同步等副作用，需要统一协调；装配也必须在单一位置按安全顺序完成——队列 worker 在 VikingFS 就绪后才启动，恢复任务才不会与初始化竞争。`__init__` 获取数据目录进程锁，解析加密绑定配置，构建存储与队列基础设施，安装全局 TaskTracker，从配置创建 embedder。\n\n`initialize()` 按严格顺序装配：在 VikingDBManager 创建 context collection，构建 VikingFS 与各处理器；启动 LockManager、WatchScheduler 后接入子服务，将 `UnderstandingParseProcessor` 挂到 `EXTERNAL_PARSE` 队列，最后启动队列 worker 并注册自身。\n\n`close()` 反向执行：停止后台任务与调度器，标记 VikingDBManager 关闭，停止队列管理器，清除进程级注册。"},"io":{"inputs":[{"en":"OpenViking config","zh":"OpenViking 配置"},{"en":"User identifier","zh":"用户标识"},{"en":"Data directory path","zh":"数据目录路径"}],"outputs":[{"en":"Initialized service instance","zh":"已初始化服务实例"},{"en":"Wired sub-services","zh":"已装配子服务"},{"en":"Started queue workers","zh":"已启动队列 worker"}]},"code":[{"lang":"python","title":{"en":"Deferred sub-service wiring","zh":"子服务延迟装配顺序"},"text":"# Wire up sub-services\nself._fs_service.set_dependencies(\n    viking_fs=self._viking_fs,\n    vikingdb=self._vikingdb_manager,\n    privacy_config_service=self._privacy_config_service,\n    resource_memory_link_service=self._resource_memory_link_service,\n    watch_scheduler=self._watch_scheduler,\n)\nself._relation_service.set_viking_fs(self._viking_fs)\nself._pack_service.set_dependencies(\n    viking_fs=self._viking_fs,\n    vector_store=self._vikingdb_manager,\n)\nself._search_service.set_viking_fs(self._viking_fs)","sourcePath":"openviking/service/core.py","sourceLines":"377-390"}],"family":"service-layer"},{"id":"service-layer.fs","parent":"service-layer","name":"FSService","kind":"service","sourcePath":"openviking/service/fs_service.py","symbol":"FSService","sourceLines":"41-717","pipelines":["write","retrieve","manage.context-fs"],"summary":{"en":"Upper-layer API for VikingFS operations; read ops delegate directly, write ops coordinate semantic refresh and memory cleanup.","zh":"VikingFS 操作的上层 API，读操作直接委托，写操作协调语义刷新和记忆清理。"},"article":{"en":"FSService provides the upper-layer API for VikingFS filesystem operations. Read methods validate the incoming URI and delegate directly to VikingFS. Write operations carry side-effects beyond the filesystem layer: `rm` cleans up memory references and enqueues a SemanticMsg delete-refresh on the parent directory; `write` delegates to ContentWriteCoordinator which persists content and triggers semantic and vector refresh; `mv` coordinates with WatchManager to sync watch task target URIs when resources move.","zh":"FSService 在 VikingFS 之上提供文件操作上层 API。读操作校验 URI 后直接委托。写操作协调文件系统之外的副作用：`rm` 清理记忆引用并在父目录入队 SemanticMsg 删除刷新；`write` 委托 `ContentWriteCoordinator` 持久化内容并触发语义与向量刷新；`mv` 与 WatchManager 同步 watch 任务目标 URI。"},"io":{"inputs":[{"en":"viking:// URI","zh":"viking:// URI"},{"en":"Operation parameters","zh":"操作参数"},{"en":"Request context","zh":"请求上下文"}],"outputs":[{"en":"File or directory listing","zh":"文件或目录列表"},{"en":"Write operation result","zh":"写操作结果"},{"en":"Semantic refresh enqueued","zh":"已入队语义刷新"}]},"code":[{"lang":"python","title":{"en":"rm() side-effect choreography","zh":"rm() 删除前后的副作用编排"},"text":"uri = validate_viking_uri(uri)\nviking_fs = self._ensure_initialized()\ncleanup_result: Optional[Dict[str, Any]] = None\ncontext_type = context_type_for_uri(uri)\nrefresh_parent_uri = self._semantic_refresh_parent_uri(uri, context_type)\nmemory_overview_uri = self._memory_overview_parent_uri(uri, context_type)\nresult = await viking_fs.rm(uri, recursive=recursive, ctx=ctx)\nawait self._sync_watch_after_rm(uri, context_type=context_type)","sourcePath":"openviking/service/fs_service.py","sourceLines":"199-206"}],"family":"service-layer"},{"id":"service-layer.resource","parent":"service-layer","name":"ResourceService","kind":"service","sourcePath":"openviking/service/resource_service.py","symbol":"ResourceService","sourceLines":"116-1417","pipelines":["write","manage.watch-tasks"],"summary":{"en":"Orchestrates ingestion of external resources and skills into OpenViking namespaces, with watch task management.","zh":"编排将外部资源和技能摄入 OpenViking 命名空间，并管理 watch 任务。"},"article":{"en":"ResourceService orchestrates ingestion of external resources and skills into OpenViking namespaces. `add_resource()` resolves the target URI and dispatches by type: Git repos go to background tasks via TaskTracker because clone-plus-parse is slow and should not block the caller; when local path resolution is disabled (server mode) and `wait` is false, files requiring the understanding API are reserved with LockManager and enqueued to EXTERNAL_PARSE with a lock handoff so the parse worker inherits the lease; everything else — the default — processes inline via ResourceProcessor. After processing it links the resource reason to user memories, and watch tasks are created or canceled based on `watch_interval`. `add_skill()` delegates to SkillProcessor.","zh":"ResourceService 编排将外部资源和技能摄入 OpenViking 命名空间。`add_resource()` 解析目标 URI 后按类型分发：Git 仓库进后台任务；服务器模式下需 understanding API 的文件经 `LockManager` 预留后入队 `EXTERNAL_PARSE`；其余默认内联处理。处理完成后将添加原因桥接到用户记忆，watch 任务按 `watch_interval` 启停。`add_skill()` 委托 `SkillProcessor`。"},"io":{"inputs":[{"en":"Source path or URL","zh":"源路径或 URL"},{"en":"Target viking:// URI","zh":"目标 viking:// URI"},{"en":"Ingestion options","zh":"摄入选项"}],"outputs":[{"en":"Ingestion result","zh":"摄入结果"},{"en":"Background task ID","zh":"后台任务 ID"},{"en":"Watch task created","zh":"已创建 watch 任务"}]},"family":"service-layer"},{"id":"service-layer.search","parent":"service-layer","name":"SearchService","kind":"service","sourcePath":"openviking/service/search_service.py","symbol":"SearchService","sourceLines":"35-155","pipelines":["retrieve"],"summary":{"en":"Thin facade over VikingFS semantic search; validates queries, resolves image URIs, and optionally enriches with session context.","zh":"VikingFS 语义搜索的薄封装，校验查询、解析图片 URI，可选注入会话上下文。"},"article":{"en":"SearchService is a thin facade over VikingFS semantic search. It provides two entry points: `search()` optionally enriches the query with Session context by calling `session.get_context_for_search(query)`, and `find()` accepts a bare query string.\n\nBoth methods validate that the query is non-empty, resolve one or more `target_uri` values, convert any `viking://` image references to data URIs via `VikingFS.read_file_bytes`, and delegate respectively to `viking_fs.search()` and `viking_fs.find()`.","zh":"SearchService 是 VikingFS 语义搜索的薄封装，提供两个入口：`search()` 经 `session.get_context_for_search()` 注入上下文，`find()` 接受纯查询字符串。两者均校验查询非空、解析 `target_uri`、将 `viking://` 图片转为 data URI，分别委托 `viking_fs`。"},"io":{"inputs":[{"en":"Search query string","zh":"搜索查询字符串"},{"en":"Target URI or URI list","zh":"目标 URI 列表"},{"en":"Optional session context","zh":"可选会话上下文"}],"outputs":[{"en":"Ranked FindResult","zh":"排序后的 FindResult"},{"en":"Matched file URIs","zh":"匹配的文件 URI"}]},"code":[{"lang":"python","title":{"en":"Facade steps before delegation","zh":"委托前的门面处理步骤"},"text":"resolved_image_url = await self._resolve_image_url(image_url, ctx)\n_ensure_non_empty_query(query, resolved_image_url)\ntarget_uri = validate_optional_viking_uris(target_uri, field_name=\"target_uri\")\nviking_fs = self._ensure_initialized()\n\nsession_info = None\nif session and not resolved_image_url:\n    session_info = await session.get_context_for_search(query)\n\nresult = await viking_fs.search(\n    query=query,\n    # …\n)","sourcePath":"openviking/service/search_service.py","sourceLines":"95-114"}],"family":"service-layer"},{"id":"service-layer.session","parent":"service-layer","name":"SessionService","kind":"service","sourcePath":"openviking/service/session_service.py","symbol":"SessionService","sourceLines":"33-332","pipelines":["manage.session-lifecycle","write"],"summary":{"en":"Manages full session lifecycle: create, load, list, delete, commit with message archival and background memory extraction.","zh":"管理完整会话生命周期：创建、加载、列表、删除、提交（含消息归档和后台记忆提取）。"},"article":{"en":"SessionService manages the full session lifecycle from creation to deletion. `create()` validates uniqueness and optionally sets a MemoryPolicy. `get()` loads an existing session; with `auto_create=True` it creates the session when missing — by default (`auto_create=False`) a missing session raises NotFoundError. `sessions()` lists sessions from both the canonical user-scoped path and the legacy root for backward compatibility.\n\n`commit()` delegates to `session.commit_async()` for two-phase submission — message archival followed by background memory extraction — tracked by TaskTracker. `extract()` manually triggers `SessionCompressorV2.extract_long_term_memories()` on accumulated session messages.","zh":"SessionService 管理会话全生命周期。`get()` 默认要求会话已存在，`auto_create=True` 时缺失则创建；`sessions()` 同时扫描规范用户路径与旧版 `viking://session` 根以向后兼容。`commit()` 调用 `session.commit_async()` 两阶段提交——消息归档加后台记忆提取——由 TaskTracker 跟踪。`extract()` 触发 `SessionCompressorV2` 提取长期记忆。"},"io":{"inputs":[{"en":"Session ID","zh":"会话 ID"},{"en":"Request context","zh":"请求上下文"},{"en":"Memory policy","zh":"记忆策略"}],"outputs":[{"en":"Session object","zh":"Session 对象"},{"en":"Commit task ID","zh":"提交任务 ID"},{"en":"Session list","zh":"会话列表"}]},"family":"service-layer"},{"id":"service-layer.relation","parent":"service-layer","name":"RelationService","kind":"service","sourcePath":"openviking/service/relation_service.py","symbol":"RelationService","sourceLines":"20-74","pipelines":["manage.relations"],"summary":{"en":"Manages URI-to-URI links stored as .relations.json in VikingFS, with thin validating wrappers.","zh":"管理 VikingFS 中 .relations.json 存储的 URI 链接，是薄校验封装。"},"article":{"en":"RelationService manages URI-to-URI links persisted as `.relations.json` in VikingFS. `relations()` returns the complete link list for a given source URI. `link()` validates the from_uri and target to_uris, then calls `viking_fs.link()`. `unlink()` removes a single target URI from the source relation list. Each public method is a thin validating wrapper that delegates storage to VikingFS. Relations give agents explicit, user-declared connections — each target carries a reason — that they can follow via `relations()`, complementing what semantic search alone surfaces.","zh":"RelationService 管理 VikingFS 中 `.relations.json` 存储的 URI 链接。`relations()` 返回链接列表，`link()` 校验 `from_uri` 与 `to_uris` 后添加链接，`unlink()` 移除目标 URI，实际存储委托 VikingFS。关系为显式的用户声明连接（每条带 reason），供客户端经 `relations()` 追随，补充语义检索。"},"io":{"inputs":[{"en":"Source URI","zh":"源 URI"},{"en":"Target URI or URI list","zh":"目标 URI"},{"en":"Link reason","zh":"链接原因"}],"outputs":[{"en":"Relation list","zh":"关系列表"},{"en":"Link or unlink confirmation","zh":"链接或取消确认"}]},"family":"service-layer"},{"id":"service-layer.pack","parent":"service-layer","name":"PackService","kind":"service","sourcePath":"openviking/service/pack_service.py","symbol":"PackService","sourceLines":"24-135","pipelines":["manage.pack-backup"],"summary":{"en":"OVPack format export, import, backup, and restore operations delegated to storage.ovpack functions.","zh":"OVPack 格式的导出、导入、备份和恢复，委托给 storage.ovpack 函数。"},"article":{"en":"PackService handles OVPack format export, import, backup, and restore operations. `export_ovpack()` serializes a URI subtree into a local `.ovpack` file, optionally including vector data. `backup_ovpack()` exports all public scopes as a restore-only archive. `import_ovpack()` restores an archive under a specified parent URI with conflict resolution modes. `restore_ovpack()` restores a backup to its original public scope roots. All operations delegate to `ovpack.operations`.","zh":"PackService 处理 OVPack 导入导出与备份恢复：`export_ovpack()` 将 URI 子树序列化为 `.ovpack` 文件；`backup_ovpack()` 导出全部公共作用域为仅供恢复的归档；`import_ovpack()` 在指定父 URI 下恢复，支持 `on_conflict`（fail/overwrite/skip）与 `vector_mode`；`restore_ovpack()` 还原至原公共作用域根。均委托 `ovpack.operations`。"},"io":{"inputs":[{"en":"Source URI or file path","zh":"源 URI 或文件路径"},{"en":"Target parent URI","zh":"目标父 URI"},{"en":"Conflict resolution mode","zh":"冲突解决模式"}],"outputs":[{"en":"Exported .ovpack file","zh":"已导出 .ovpack 文件"},{"en":"Imported resource URI","zh":"已导入资源 URI"}]},"family":"service-layer"},{"id":"service-layer.debug","parent":"service-layer","name":"DebugService","kind":"operations","sourcePath":"openviking/service/debug_service.py","symbol":"ObserverService, DebugService","sourceLines":"62-286","pipelines":[],"summary":{"en":"Aggregates component-level health observations from queue, VikingDB, models, lock, retrieval, and filesystem into SystemStatus.","zh":"聚合队列、VikingDB、模型、锁、检索和文件系统的组件级健康观察，输出 SystemStatus。"},"article":{"en":"DebugService wraps ObserverService which aggregates component-level health observations from six subsystems — queue, VikingDB, models (VLM, embedding, rerank), lock, retrieval, and filesystem — into a unified SystemStatus. `system()` returns the aggregate with `is_healthy` and a list of component error strings. `is_healthy()` provides a quick boolean health check across all components. `get_filesystem_stats()` calls `agfs_client.get_stats()` for filesystem metrics.","zh":"DebugService 封装 ObserverService，将六个子系统——队列、Vik
