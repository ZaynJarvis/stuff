    document.querySelectorAll('[data-i18n]').forEach(node => {
      node.textContent = t(node.dataset.i18n);
    });
  };

  return {
    t, pick, setLang, applyStatic,
    get lang() { return lang; },
    onChange: (fn) => listeners.push(fn),
  };
})();

/* ===== data.js ===== */
// Runtime graph model built from the inlined OV_DATA manifests.
// Owns node/edge lookups, visibility under an expansion state, and edge lifting.
OV.data = (() => {
  const D = window.OV_DATA;
  const nodes = new Map();          // id -> node
  const children = new Map();       // id -> [node] (manifest order)
  const roots = [];

  for (const n of D.nodes) nodes.set(n.id, n);
  for (const n of D.nodes) {
    if (n.parent == null) { roots.push(n); continue; }
    if (!children.has(n.parent)) children.set(n.parent, []);
    children.get(n.parent).push(n);
  }

  const childrenOf = id => children.get(id) || [];
  const isLeaf = id => childrenOf(id).length === 0;
  const get = id => nodes.get(id);

  const ancestors = (id) => {           // [root, ..., parent] excluding id
    const out = [];
    let n = nodes.get(id);
    while (n && n.parent != null) { n = nodes.get(n.parent); if (n) out.unshift(n); }
    return out;
  };
  const depth = id => ancestors(id).length;

  // deepest visible ancestor-or-self of `id` under expansion set `exp`
  const liftTo = (id, exp) => {
    const chain = [...ancestors(id).map(n => n.id), id];
    let vis = chain[0];
    for (let i = 0; i < chain.length - 1; i++) {
      if (exp.has(chain[i])) vis = chain[i + 1]; else break;
    }
    return vis;
  };

  // all nodes visible under expansion set (roots always; children of expanded visible parents)
  const visibleNodes = (exp) => {
    const out = [];
    const walk = (n) => {
      out.push(n);
      if (exp.has(n.id)) for (const c of childrenOf(n.id)) walk(c);
    };
    for (const r of roots) walk(r);
    return out;
  };

  // Lift raw edges to the visible graph; bundle everything between the same
  // pair of visible nodes into ONE undirected conduit. Direction survives as
  // fw/bw counts and is only shown when a route is highlighted.
  const TYPE_RANK = { persist: 4, call: 3, async: 2, model: 1, control: 0 };
  const liftedEdges = (exp) => {
    const groups = new Map();
    for (const e of D.edges) {
      const a = liftTo(e.from, exp);
      const b = liftTo(e.to, exp);
      if (a === b) continue;
      const [lo, hi] = a < b ? [a, b] : [b, a];
      const key = lo + '|' + hi;
      if (!groups.has(key)) groups.set(key, { from: lo, to: hi, type: e.type, count: 0, fw: 0, bw: 0, raw: [] });
      const g = groups.get(key);
      g.count++;
      if (a === lo) g.fw++; else g.bw++;
      g.raw.push(e);
      if (TYPE_RANK[e.type] > TYPE_RANK[g.type]) g.type = e.type;
    }
    return [...groups.values()];
  };

  // Pipeline path segments lifted to visible nodes: consecutive distinct pairs.
  const liftedPipeline = (pipeId, exp) => {
    const p = D.pipelines[pipeId];
    if (!p) return { nodes: new Set(), segs: [] };
    const nodeSet = new Set();
    const segs = [];
    const seen = new Set();
    for (const path of p.paths || []) {
      const lifted = [];
      for (const id of path.nodes || []) {
        const v = liftTo(id, exp);
        nodeSet.add(v);
        if (lifted[lifted.length - 1] !== v) lifted.push(v);
      }
      for (let i = 0; i < lifted.length - 1; i++) {
        const key = lifted[i] + '|' + lifted[i + 1];
        if (seen.has(key)) continue;
        seen.add(key);
        segs.push({ from: lifted[i], to: lifted[i + 1] });
      }
    }
    return { nodes: nodeSet, segs };
  };

  return {
    meta: D.meta,
    pipelines: D.pipelines,
    overview: D.overview,
    nodes, roots, get, childrenOf, isLeaf, ancestors, depth,
    liftTo, visibleNodes, liftedEdges, liftedPipeline,
  };
})();

/* ===== camera.js ===== */
// Orthographic tilted camera. Board plane (x, y) with elevation z; tilt
// rotates around the horizontal axis so y compresses and z lifts tiles.
// Focus is only ever a continuous move of this camera — never a scene change.
OV.camera = (() => {
  const U = OV.util;
  const TILT_OVERVIEW = 21 * Math.PI / 180;
  const TILT_FOCUS = 10 * Math.PI / 180;

  const cam = {
    x: 0, y: 0,          // board point at viewport centre
    scale: 1,
    vw: 1, vh: 1,        // canvas viewport size (CSS px)
    fitScale: 1,         // scale at which the whole board fits (tilt reference)
  };

  let tween = null;      // {t0..t1 targets}
  let vel = { x: 0, y: 0 };   // pan inertia, board units / frame

  const tilt = () => {
    if (U.reducedMotion) return TILT_OVERVIEW;   // no tilt interpolation
    // flatten continuously as we zoom past the fit scale
    return U.map(cam.scale, cam.fitScale * 1.35, cam.fitScale * 3.6, TILT_OVERVIEW, TILT_FOCUS);
  };

  const project = (x, y, z = 0) => {
    const t = tilt();
    return {
      x: (x - cam.x) * cam.scale + cam.vw / 2,
      y: ((y - cam.y) * Math.cos(t) - (z || 0) * Math.sin(t)) * cam.scale + cam.vh / 2,
    };
  };
  // inverse at z = 0
  const unproject = (sx, sy) => {
    const t = tilt();
    return {
      x: (sx - cam.vw / 2) / cam.scale + cam.x,
      y: (sy - cam.vh / 2) / (cam.scale * Math.cos(t)) + cam.y,
    };
  };

  const setViewport = (w, h) => { cam.vw = w; cam.vh = h; };

  const scaleFor = (rect, pad = 60) => {
    const t = U.reducedMotion ? TILT_OVERVIEW : TILT_OVERVIEW; // fit computed at overview tilt
    const sw = (cam.vw - pad * 2) / rect.w;
    const sh = (cam.vh - pad * 2) / (rect.h * Math.cos(t));
    return Math.min(sw, sh);
  };

  const stopTween = () => { tween = null; };

  const tweenTo = (target, ms) => {
    if (U.reducedMotion || ms <= 0) {
      Object.assign(cam, target);
      tween = null;
      return;
    }
    tween = {
      from: { x: cam.x, y: cam.y, scale: cam.scale },
      to: { x: target.x ?? cam.x, y: target.y ?? cam.y, scale: target.scale ?? cam.scale },
      start: performance.now(),
      ms,
    };
  };

  const fitTo = (rect, ms = 760, pad = 60) => {
    const s = scaleFor(rect, pad);
    tweenTo({ x: rect.x + rect.w / 2, y: rect.y + rect.h / 2, scale: s }, ms);
  };

  const setFitReference = (rect) => { cam.fitScale = scaleFor(rect); };

  const zoomAt = (sx, sy, factor) => {
    stopTween();
    const before = unproject(sx, sy);
    cam.scale = U.clamp(cam.scale * factor, cam.fitScale * 0.45, cam.fitScale * 14);
    const after = unproject(sx, sy);
    cam.x += before.x - after.x;
    cam.y += before.y - after.y;
  };

  const panBy = (dxScreen, dyScreen) => {
    stopTween();
    const t = tilt();
    cam.x -= dxScreen / cam.scale;
    cam.y -= dyScreen / (cam.scale * Math.cos(t));
  };

  const flick = (vxScreen, vyScreen) => {
    if (U.reducedMotion) return;
    const t = tilt();
    vel.x = -vxScreen / cam.scale;
    vel.y = -vyScreen / (cam.scale * Math.cos(t));
  };

  // advance animations; returns true if the camera moved (needs repaint)
  const step = (now) => {
    let moved = false;
    if (tween) {
      const k = U.clamp((now - tween.start) / tween.ms, 0, 1);
      const e = U.easeInOutCubic(k);
      cam.x = U.lerp(tween.from.x, tween.to.x, e);
      cam.y = U.lerp(tween.from.y, tween.to.y, e);
      cam.scale = U.lerp(tween.from.scale, tween.to.scale, e);
      if (k >= 1) tween = null;
      moved = true;
    } else if (Math.abs(vel.x) > 0.02 || Math.abs(vel.y) > 0.02) {
      cam.x += vel.x; cam.y += vel.y;
      vel.x *= 0.90; vel.y *= 0.90;
      moved = true;
    }
    return moved;
  };

  const cancelInertia = () => { vel.x = 0; vel.y = 0; };

  return { cam, tilt, project, unproject, setViewport, tweenTo, fitTo, setFitReference, zoomAt, panBy, flick, step, stopTween, cancelInertia };
})();

/* ===== layout.js ===== */
// Deterministic layout: a pure function of the expansion set.
// Families sit in a designed board plan; children shelf-pack inside their
// parent's floorplate. No force simulation — expand/collapse morphs between
// two solved layouts.
OV.layout = (() => {
  const data = OV.data;

  // board units
  const TILE_W = 168, TILE_H = 88;
  const TITLE_H = 30;               // engraved title band on an open floorplate
  const PAD = 20;                   // floorplate inner padding
  const GAP = 18;                   // gap between sibling tiles
  const ROW_GAP = 66;               // gap between top-level rows (conduit channels)
  const COL_GAP = 60;               // gap between top-level columns

  // elevation (board units; projected via sin(tilt))
  const LIFT = 26;                  // collapsed tile height
  const PLATE = 7;                  // open floorplate thickness
  const CHILD_RAISE = 14;           // children float above their parent plate

  const KIND_SIZE = {
    integration: [148, 56],
    client: [168, 84],
    service: [172, 88],
    processing: [172, 84],
    queue: [180, 70],
    storage: [180, 92],
    model: [156, 74],
    operations: [164, 80],
    deployment: [160, 60],
    namespace: [168, 84],
  };

  // board plan: rows on the baseboard, rails outside it.
  // leftRail holds the data model — not a runtime module but the vocabulary
  // every module reads and writes, so it sits apart from the baseboard grid.
  const PLAN = {
    topRail: ['agent-integrations'],
    leftRail: ['context-model'],
    rows: [
      ['client-transport'],
      ['session-memory', 'service-layer', 'retrieve'],
      ['context-ingestion', 'storage-fabric'],
      ['runtime-operations'],
    ],
    rightRail: ['model-providers'],
    bottomRail: ['deployment'],
  };
  // packing hints: how a family arranges its children when open
  const HINTS = {
    'agent-integrations': 'row',
    'deployment': 'row',
    'model-providers': 'column',
  };

  const labelW = (name) => name.length * 7.4 + 42;

  const baseSize = (node) => {
    const [w, h] = KIND_SIZE[node.kind] || [TILE_W, TILE_H];
    return { w: Math.max(w, Math.min(labelW(node.name), 250)), h };
  };

  // ---- sizing pass (bottom-up) --------------------------------------------

  // returns {w, h, kids?: [{node, w, h, rows}]}
  const sizeOf = (node, exp, hint) => {
    if (!exp.has(node.id) || data.isLeaf(node.id)) return baseSize(node);

    const kids = data.childrenOf(node.id).map(k => ({
      node: k,
      size: sizeOf(k, exp, HINTS[k.id]),
    }));

    const mode = hint || HINTS[node.id];
    let shelves;
    if (mode === 'row') {
      shelves = [kids];
    } else if (mode === 'column') {
      shelves = kids.map(k => [k]);
    } else {
      // shelf packing toward a wide-ish plate
      const area = kids.reduce((s, k) => s + (k.size.w + GAP) * (k.size.h + GAP), 0);
      const targetW = Math.max(Math.sqrt(area * 1.85), ...kids.map(k => k.size.w));
      shelves = [[]];
      let rowW = 0;
      for (const k of kids) {
        const cur = shelves[shelves.length - 1];
        if (cur.length && rowW + GAP + k.size.w > targetW) {
          shelves.push([k]); rowW = k.size.w;
        } else {
          cur.push(k); rowW += (cur.length > 1 ? GAP : 0) + k.size.w;
        }
      }
    }

    const rowsW = shelves.map(r => r.reduce((s, k) => s + k.size.w, 0) + GAP * (r.length - 1));
    const rowsH = shelves.map(r => Math.max(...r.map(k => k.size.h)));
    const w = Math.max(...rowsW, labelW(node.name)) + PAD * 2;
    const h = rowsH.reduce((s, x) => s + x, 0) + GAP * (shelves.length - 1) + PAD * 2 + TITLE_H;
    return { w, h, shelves, rowsW, rowsH };
  };

  // ---- placement pass (top-down) ------------------------------------------

  const placeChildren = (node, size, rect, exp, out, level) => {
    if (!size.shelves) return;
    const zBase = rect.z0 + PLATE + CHILD_RAISE;
    let cy = rect.y + TITLE_H + PAD;
    for (let i = 0; i < size.shelves.length; i++) {
      const row = size.shelves[i];
      let cx = rect.x + (rect.w - size.rowsW[i]) / 2;
      for (const k of row) {
        const r = {
          x: cx, y: cy + (size.rowsH[i] - k.size.h) / 2,
          w: k.size.w, h: k.size.h,
          z0: zBase,
          zh: exp.has(k.node.id) && !data.isLeaf(k.node.id) ? PLATE : LIFT * Math.pow(0.86, level),
          open: exp.has(k.node.id) && !data.isLeaf(k.node.id),
          level: level + 1,
        };
        out.set(k.node.id, r);
        placeChildren(k.node, k.size, r, exp, out, level + 1);
        cx += k.size.w + GAP;
      }
      cy += size.rowsH[i] + GAP;
    }
  };

  // solve the whole board for an expansion set
  const solve = (exp) => {
    const out = new Map();
    const rootSize = new Map();
    for (const r of data.roots) rootSize.set(r.id, sizeOf(r, exp, HINTS[r.id]));

    const placeRoot = (id, x, y) => {
      const node = data.get(id);
      if (!node) return { x, y, w: 0, h: 0 };
      const s = rootSize.get(id);
      const rect = {
        x, y, w: s.w, h: s.h,
        z0: 0,
        zh: exp.has(id) && !data.isLeaf(id) ? PLATE : LIFT,
        open: exp.has(id) && !data.isLeaf(id),
        level: 0,
      };
      out.set(id, rect);
      placeChildren(node, s, rect, exp, out, 0);
      return rect;
    };

    // rows on the baseboard, centred on x = 0
    let y = 0;
    const rowRects = [];
    for (const row of PLAN.rows) {
      const present = row.filter(id => data.get(id));
      if (!present.length) continue;
      const widths = present.map(id => rootSize.get(id).w);
      const totalW = widths.reduce((s, w) => s + w, 0) + COL_GAP * (present.length - 1);
      const rowH = Math.max(...present.map(id => rootSize.get(id).h));
      let x = -totalW / 2;
      for (const id of present) {
        const s = rootSize.get(id);
        rowRects.push(placeRoot(id, x, y + (rowH - s.h) / 2));
        x += s.w + COL_GAP;
      }
      y += rowH + ROW_GAP;
    }

    // baseboard bounds
    const BPAD = 46;
    let bx0 = Infinity, by0 = Infinity, bx1 = -Infinity, by1 = -Infinity;
    for (const r of rowRects) {
      bx0 = Math.min(bx0, r.x); by0 = Math.min(by0, r.y);
      bx1 = Math.max(bx1, r.x + r.w); by1 = Math.max(by1, r.y + r.h);
    }
    const board = { x: bx0 - BPAD, y: by0 - BPAD, w: bx1 - bx0 + BPAD * 2, h: by1 - by0 + BPAD * 2 };

    // top rail: integrations tabs docked just above the board edge
    for (const id of PLAN.topRail) {
      if (!data.get(id)) continue;
      const s = rootSize.get(id);
      placeRoot(id, board.x + (board.w - s.w) / 2, board.y - s.h - 26);
    }
    // left rail: the data-model reference plate, set apart from the baseboard
    for (const id of PLAN.leftRail || []) {
      if (!data.get(id)) continue;
      const s = rootSize.get(id);
      placeRoot(id, board.x - s.w - 64, board.y + (board.h - s.h) / 2);
    }
    // right rail: model plug-in boxes outside the board
    for (const id of PLAN.rightRail) {
      if (!data.get(id)) continue;
      const s = rootSize.get(id);
      placeRoot(id, board.x + board.w + 54, board.y + (board.h - s.h) / 2);
    }
    // bottom rail: deployment chassis below the board
    for (const id of PLAN.bottomRail) {
      if (!data.get(id)) continue;
      const s = rootSize.get(id);
      placeRoot(id, board.x + (board.w - s.w) / 2, board.y + board.h + 34);
    }
    // any family the plan doesn't know: append under the board
    let spillX = board.x;
    for (const r of data.roots) {
      if (out.has(r.id)) continue;
      const s = rootSize.get(r.id);
      placeRoot(r.id, spillX, board.y + board.h + 140);
      spillX += s.w + COL_GAP;
    }

    // world bounds (everything, incl. rails)
    let wx0 = board.x, wy0 = board.y, wx1 = board.x + board.w, wy1 = board.y + board.h;
    for (const [, r] of out) {
      wx0 = Math.min(wx0, r.x); wy0 = Math.min(wy0, r.y);
      wx1 = Math.max(wx1, r.x + r.w); wy1 = Math.max(wy1, r.y + r.h);
    }
    const world = { x: wx0 - 30, y: wy0 - 30, w: wx1 - wx0 + 60, h: wy1 - wy0 + 60 };

    return { rects: out, board, world };
  };

  return { solve, TITLE_H, PAD, GAP, LIFT, PLATE, CHILD_RAISE };
})();

/* ===== routes.js ===== */
// Conduit routing: orthogonal graphite channels inset into the board, bundled
// at module boundary ports, with bridge structures at crossings and engraved
// direction notches (never floating arrows).
OV.routes = (() => {
  // rect helpers on animated rects {x,y,w,h}
  const cx = r => r.x + r.w / 2;
  const cy = r => r.y + r.h / 2;

  const LANE = 15;
  // tight fan-out: at most one lane either side of the port midpoint
  const LANE_SEQ = [0, 1, -1];
  const laneOffset = (i) => LANE_SEQ[i % LANE_SEQ.length] * LANE;

  // port on a rect side with lane offset
  const port = (r, side, off) => {
    switch (side) {
      case 'l': return { x: r.x, y: cy(r) + off, side };
      case 'r': return { x: r.x + r.w, y: cy(r) + off, side };
      case 't': return { x: cx(r) + off, y: r.y, side };
      case 'b': return { x: cx(r) + off, y: r.y + r.h, side };
    }
  };

  // Build polyline routes for edge groups. rects: Map id -> animated rect.
  // opts.noLanes: all conduits use side midpoints (pipeline overlays).
  const build = (edgeGroups, rects, opts = {}) => {
    const usage = new Map();  // nodeId|side -> count (for lane spreading)
    const use = (id, side) => {
      if (opts.noLanes) return 0;
      const k = id + '|' + side;
      const n = usage.get(k) || 0;
      usage.set(k, n + 1);
      return laneOffset(n);
    };

    const routes = [];
    for (const e of edgeGroups) {
      const a = rects.get(e.from), b = rects.get(e.to);
      if (!a || !b) continue;
      const dx = cx(b) - cx(a), dy = cy(b) - cy(a);
      let pts;
      if (Math.abs(dx) >= Math.abs(dy)) {
        const sA = dx >= 0 ? 'r' : 'l', sB = dx >= 0 ? 'l' : 'r';
        const pA = port(a, sA, use(e.from, sA));
        const pB = port(b, sB, use(e.to, sB));
        const edgeA = dx >= 0 ? a.x + a.w : a.x;
        const edgeB = dx >= 0 ? b.x : b.x + b.w;
        const midX = (edgeA + edgeB) / 2;
        pts = pA.y === pB.y
          ? [pA, pB]
          : [pA, { x: midX, y: pA.y }, { x: midX, y: pB.y }, pB];
      } else {
        const sA = dy >= 0 ? 'b' : 't', sB = dy >= 0 ? 't' : 'b';
        const pA = port(a, sA, use(e.from, sA));
        const pB = port(b, sB, use(e.to, sB));
        const edgeA = dy >= 0 ? a.y + a.h : a.y;
        const edgeB = dy >= 0 ? b.y : b.y + b.h;
        const midY = (edgeA + edgeB) / 2;
        pts = pA.x === pB.x
          ? [pA, pB]
          : [pA, { x: pA.x, y: midY }, { x: pB.x, y: midY }, pB];
      }
      routes.push({ ...e, pts, bridges: [] });
    }

    // crossings: vertical vs horizontal segments of different routes.
    // The later route bridges over the earlier one.
    const segs = [];
    routes.forEach((r, ri) => {
      for (let i = 0; i < r.pts.length - 1; i++) {
        const p = r.pts[i], q = r.pts[i + 1];
        segs.push({ ri, i, p, q, horiz: Math.abs(p.y - q.y) < 0.001 });
      }
    });
    for (let i = 0; i < segs.length; i++) {
      for (let j = i + 1; j < segs.length; j++) {
        const A = segs[i], B = segs[j];
        if (A.ri === B.ri || A.horiz === B.horiz) continue;
        const H = A.horiz ? A : B, V = A.horiz ? B : A;
        const [hx0, hx1] = [Math.min(H.p.x, H.q.x), Math.max(H.p.x, H.q.x)];
        const [vy0, vy1] = [Math.min(V.p.y, V.q.y), Math.max(V.p.y, V.q.y)];
        const M = 8; // ignore near-endpoint touches
        if (V.p.x > hx0 + M && V.p.x < hx1 - M && H.p.y > vy0 + M && H.p.y < vy1 - M) {
          const later = A.ri > B.ri ? A : B;
          routes[later.ri].bridges.push({ seg: later.i, x: V.p.x, y: H.p.y });
        }
      }
    }
    return routes;
  };

  // direction notch positions: engraved ticks near the destination
  const notches = (pts) => {
    const total = [];
    let len = 0;
    for (let i = 0; i < pts.length - 1; i++) {
      const d = Math.hypot(pts[i + 1].x - pts[i].x, pts[i + 1].y - pts[i].y);
      total.push({ i, d, at: len });
      len += d;
    }
    const out = [];
    for (const f of [0.72]) {
      const target = len * f;
      for (const s of total) {
        if (target >= s.at && target <= s.at + s.d && s.d > 24) {
          const t = (target - s.at) / s.d;
          const p = pts[s.i], q = pts[s.i + 1];
          out.push({
            x: p.x + (q.x - p.x) * t,
            y: p.y + (q.y - p.y) * t,
            dx: (q.x - p.x) / s.d,
            dy: (q.y - p.y) / s.d,
          });
          break;
        }
      }
    }
    return out;
  };

  return { build, notches };
})();

/* ===== render.js ===== */
// Scene: owns the animated state of the board (rect tweens, cover lifts,
// appear/disappear staggers) and paints it. Layout gives targets; the scene
// morphs between them. Idle scene stays quiet — motion only explains change.
OV.scene = (() => {
  const U = OV.util, C = OV.colors, data = OV.data, layout = OV.layout, cam = OV.camera;

  const EXPAND_MS = U.reducedMotion ? 0 : 560;   // total sequence < 620ms
  const STAGGER_MS = U.reducedMotion ? 0 : 36;

  // animated node visuals: id -> {x,y,w,h,z0,zh,open,level,alpha,coverT, anim}
  const vis = new Map();
  let solved = null;               // last layout solve
  let boardRect = { x: 0, y: 0, w: 100, h: 100 };
  let worldRect = { x: 0, y: 0, w: 100, h: 100 };
  let animating = false;
  let removing = new Map();        // id -> visual fading out

  const state = {
    expanded: new Set(),
    selected: null,
    hover: null,
    pipeline: null,                // null | 'write' | 'retrieve' | manage subflow id
  };

  // --- transitions ---------------------------------------------------------

  const tween = (obj, to, ms, delay = 0, onDone) => {
    obj.anim = { from: { ...obj }, to, start: performance.now() + delay, ms: Math.max(ms, 1), onDone };
    animating = true;
  };

  const applyLayout = (originId) => {
    solved = layout.solve(state.expanded);
    boardRect = solved.board;
    worldRect = solved.world;
    cam.setFitReference(worldRect);

    const targetIds = new Set(solved.rects.keys());
    // exits: nodes no longer visible shrink toward their lifted ancestor
    for (const [id, v] of vis) {
      if (targetIds.has(id)) continue;
      vis.delete(id);
      if (U.reducedMotion) continue;
      const host = solved.rects.get(data.liftTo(id, state.expanded));
      removing.set(id, v);
      tween(v, {
        x: host ? host.x + host.w / 2 - v.w * 0.3 : v.x + v.w * 0.2,
        y: host ? host.y + host.h / 2 - v.h * 0.3 : v.y + v.h * 0.2,
        w: v.w * 0.6, h: v.h * 0.6, alpha: 0,
      }, EXPAND_MS * 0.6, 0, () => removing.delete(id));
    }
    if (U.reducedMotion) removing.clear();

    // entries + moves
    const siblingIndex = new Map();
    for (const [id, t] of solved.rects) {
      const target = { x: t.x, y: t.y, w: t.w, h: t.h, z0: t.z0, zh: t.zh, alpha: 1 };
      let v = vis.get(id);
      if (!v) {
        const node = data.get(id);
        const parent = node.parent ? solved.rects.get(node.parent) : null;
        const idx = node.parent ? (siblingIndex.get(node.parent) || 0) : 0;
        if (node.parent) siblingIndex.set(node.parent, idx + 1);
        v = parent
          ? { x: parent.x + parent.w / 2 - t.w * 0.35, y: parent.y + parent.h / 2 - t.h * 0.35,
              w: t.w * 0.7, h: t.h * 0.7, z0: t.z0, zh: t.zh, alpha: 0 }
          : { ...target, alpha: 0 };
        vis.set(id, v);
        tween(v, target, EXPAND_MS * 0.55, idx * STAGGER_MS);
      } else if (v.x !== t.x || v.y !== t.y || v.w !== t.w || v.h !== t.h || v.z0 !== t.z0 || v.zh !== t.zh) {
        tween(v, target, EXPAND_MS);
      }
      v.open = t.open;
      v.level = t.level;
      if (v.coverT === undefined) v.coverT = t.open ? 1 : 0;
      // cover lift/settle
      const coverTarget = t.open ? 1 : 0;
      if (v.coverT !== coverTarget) {
        v.coverAnim = { from: v.coverT, to: coverTarget, start: performance.now(), ms: EXPAND_MS };
        animating = true;
      }
      if (U.reducedMotion) { Object.assign(v, target); v.anim = null; v.coverT = coverTarget; v.coverAnim = null; }
    }
  };

  const setExpanded = (id, open) => {
    if (open) state.expanded.add(id); else {
      // collapsing also collapses everything inside
      const drop = (nid) => {
        state.expanded.delete(nid);
        for (const c of data.childrenOf(nid)) drop(c.id);
      };
      drop(id);
    }
    applyLayout(id);
  };

  const step = (now) => {
    let busy = false;
    const adv = (v) => {
      if (v.anim) {
        const a = v.anim;
        const k = U.clamp((now - a.start) / a.ms, 0, 1);
        if (now >= a.start) {
          const e = U.easeInOutCubic(k);
          for (const key of ['x', 'y', 'w', 'h', 'z0', 'zh', 'alpha']) {
            if (a.to[key] !== undefined) v[key] = U.lerp(a.from[key], a.to[key], e);
          }
        }
        if (k >= 1) { v.anim = null; if (a.onDone) a.onDone(); }
        busy = true;
      }
      if (v.coverAnim) {
        const a = v.coverAnim;
        const k = U.clamp((now - a.start) / a.ms, 0, 1);
        v.coverT = U.lerp(a.from, a.to, U.easeInOutCubic(k));
        if (k >= 1) v.coverAnim = null;
        busy = true;
      }
    };
    for (const [, v] of vis) adv(v);
    for (const [, v] of removing) adv(v);
    animating = busy;
    return busy;
  };

  // --- painting ------------------------------------------------------------

  let grain = null;
  const makeGrain = () => {
    grain = document.createElement('canvas');
    grain.width = grain.height = 180;
    const g = grain.getContext('2d');
    const rnd = U.seeded(7);
    for (let i = 0; i < 2600; i++) {
      const v = rnd();
      g.fillStyle = v > 0.5 ? 'rgba(40,43,45,0.028)' : 'rgba(255,255,255,0.05)';
      g.fillRect(rnd() * 180, rnd() * 180, 1, 1);
    }
  };

  const KIND_FILL = {
    deployment: () => U.mix(C.baseboard, C.graphite, 0.16),
    model: () => U.mix(C.tile, C.retrieve, 0.045),
    default: () => C.tile,
  };

  // full styling is reserved for highlighted (hovered/selected) routes;
  // the idle board draws every conduit as a quiet solid hairline instead
  const EDGE_STYLE = {
    call:    { width: 2.6, alpha: 0.52, dash: null },
    async:   { width: 2.6, alpha: 0.52, dash: [9, 7] },
    persist: { width: 3.8, alpha: 0.55, dash: null },
    model:   { width: 2.2, alpha: 0.50, dash: [2.5, 5.5] },
    control: { width: 1.6, alpha: 0.40, dash: null },
  };

  const strokeRoute = (ctx, route, style, color) => {
    const pts = route.pts;
    const bridges = route.bridges || [];
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.setLineDash(style.dash || []);
    ctx.strokeStyle = color;
    ctx.lineWidth = style.width;
    ctx.beginPath();
    const R = 10;
    for (let i = 0; i < pts.length - 1; i++) {
      const p = pts[i], q = pts[i + 1];
      const segBridges = bridges.filter(b => b.seg === i)
        .sort((a, b) => Math.hypot(a.x - p.x, a.y - p.y) - Math.hypot(b.x - p.x, b.y - p.y));
      if (i === 0) ctx.moveTo(p.x, p.y);
      let cur = p;
      for (const b of segBridges) {
        const d = Math.hypot(q.x - p.x, q.y - p.y);
        const ux = (q.x - p.x) / d, uy = (q.y - p.y) / d;
        const g = 7;
        ctx.lineTo(b.x - ux * g, b.y - uy * g);
        // bridge hop: small arc perpendicular to the direction of travel
        const hx = uy === 0 ? b.x : b.x - 9;
        const hy = uy === 0 ? b.y - 9 : b.y;
        ctx.quadraticCurveTo(hx, hy, b.x + ux * g, b.y + uy * g);
        cur = { x: b.x + ux * g, y: b.y + uy * g };
      }
      if (i < pts.length - 2) {
        const r = pts[i + 2];
        const d1 = Math.hypot(q.x - cur.x, q.y - cur.y);
        const d2 = Math.hypot(r.x - q.x, r.y - q.y);
        const rr = Math.min(R, d1 / 2, d2 / 2);
        const u1 = { x: (q.x - cur.x) / (d1 || 1), y: (q.y - cur.y) / (d1 || 1) };
        const u2 = { x: (r.x - q.x) / (d2 || 1), y: (r.y - q.y) / (d2 || 1) };
        ctx.lineTo(q.x - u1.x * rr, q.y - u1.y * rr);
        ctx.quadraticCurveTo(q.x, q.y, q.x + u2.x * rr, q.y + u2.y * rr);
      } else {
        ctx.lineTo(q.x, q.y);
      }
    }
    ctx.stroke();
    ctx.setLineDash([]);
  };

  const drawNotches = (ctx, pts, color) => {
    for (const n of OV.routes.notches(pts)) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      // chevron pointing along direction of travel
      const s = 5.5;
      ctx.moveTo(n.x - n.dx * s - n.dy * s, n.y - n.dy * s + n.dx * s);
      ctx.lineTo(n.x, n.y);
      ctx.lineTo(n.x - n.dx * s + n.dy * s, n.y - n.dy * s - n.dx * s);
      ctx.stroke();
    }
  };

  const hatchTop = (ctx, x, y, w, h, kind) => {
    ctx.save();
    U.roundRect(ctx, x, y, w, h, 8);
    ctx.clip();
    ctx.strokeStyle = U.rgba(C.graphite, 0.055);
    ctx.lineWidth = 1.4;
    if (kind === 'processing') {
      for (let d = -h; d < w; d += 9) {
        ctx.beginPath(); ctx.moveTo(x + d, y + h); ctx.lineTo(x + d + h, y); ctx.stroke();
      }
    } else if (kind === 'queue') {
      for (let yy = y + 8; yy < y + h - 4; yy += 9) {
        ctx.beginPath(); ctx.moveTo(x + 8, yy); ctx.lineTo(x + w - 8, yy); ctx.stroke();
      }
    }
    ctx.restore();
  };

  const pipeColor = (pipeId) => pipeId && pipeId.startsWith('manage') ? C.manage : C[pipeId] || C.brass;

  const draw = (ctx, now) => {
    const t = cam.tilt();
    const tanT = Math.tan(t), cosT = Math.cos(t);
    const dpr = window.devicePixelRatio || 1;
    const { vw, vh, scale, x: cx0, y: cy0 } = { vw: cam.cam.vw, vh: cam.cam.vh, scale: cam.cam.scale, x: cam.cam.x, y: cam.cam.y };

    // background + grain (screen space)
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = C.canvas;
    ctx.fillRect(0, 0, vw, vh);
    if (!grain) makeGrain();
    ctx.save();
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = ctx.createPattern(grain, 'repeat');
    ctx.fillRect(0, 0, vw, vh);
    ctx.restore();

    // board space transform (y compressed by tilt; elevation = translate -z*tanT)
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale * cosT,
      dpr * (vw / 2 - cx0 * scale), dpr * (vh / 2 - cy0 * scale * cosT));

    // baseboard
    const b = boardRect;
    ctx.save();
    ctx.shadowColor = 'rgba(40,43,45,0.18)';
    ctx.shadowBlur = 26 * scale * dpr;
    ctx.shadowOffsetY = 8 * scale * dpr;
    ctx.fillStyle = C.baseboard;
    U.roundRect(ctx, b.x, b.y, b.w, b.h, 26);
    ctx.fill();
    ctx.restore();
    ctx.strokeStyle = U.rgba(C.graphite, 0.12);
    ctx.lineWidth = 1.5;
    U.roundRect(ctx, b.x + 7, b.y + 7, b.w - 14, b.h - 14, 20);
    ctx.stroke();

    // conduits — two tiers. Idle: every route is a quiet solid hairline, no
    // dashes, no chevrons, no bridges, weight hinting at edge count. Hovering
    // or selecting a module lifts its incident routes to full styling.
    const edges = data.liftedEdges(state.expanded);
    const rectMap = new Map([...vis].map(([id, v]) => [id, v]));
    const built = OV.routes.build(edges, rectMap);
    const focusId = state.hover || state.selected;
    const baseDim = state.pipeline ? 0.55 : 1;   // recede further while a pipeline is lit
    const hot = [];
    for (const r of built) {
      if (focusId && (r.from === focusId || r.to === focusId)) { hot.push(r); continue; }
      const w = 1.5 + Math.min(r.count, 6) * 0.3;
      const a = (0.12 + Math.min(r.count, 5) * 0.015) * baseDim;
      strokeRoute(ctx, { ...r, bridges: [] }, { width: w, dash: null }, U.rgba(C.graphite, a));
    }
    for (const r of hot) {
      const style = EDGE_STYLE[r.type] || EDGE_STYLE.call;
      const w = style.width + Math.min(r.count - 1, 3) * 0.7;
      ctx.save(); ctx.translate(0, 1.1);
      strokeRoute(ctx, r, { ...style, width: w + 1.6 }, 'rgba(255,255,255,0.4)');
      ctx.restore();
      strokeRoute(ctx, r, { ...style, width: w }, U.rgba(C.graphite, style.alpha));
      if (r.fw) drawNotches(ctx, r.pts, U.rgba(C.graphite, 0.65));
      if (r.bw) drawNotches(ctx, [...r.pts].reverse(), U.rgba(C.graphite, 0.65));
      if (r.type === 'persist') strokeRoute(ctx, r, { width: 1.2, dash: null }, 'rgba(255,255,255,0.5)');
    }

    // active pipeline overlay
    let pipeNodes = null;
    if (state.pipeline) {
      const info = data.liftedPipeline(state.pipeline, state.expanded);
      pipeNodes = info.nodes;
      const col = pipeColor(state.pipeline);
      const pRoutes = OV.routes.build(info.segs.map(s => ({ ...s, type: 'call', count: 1 })), rectMap, { noLanes: true });
      for (const r of pRoutes) {
        strokeRoute(ctx, r, { width: 4.4, dash: null }, U.rgba(col, 0.78));
        drawNotches(ctx, r.pts, U.rgba(col, 0.95));
        // one restrained pulse per segment
        if (!U.reducedMotion) {
          const phase = (now / 2400) % 1;
          const pts = r.pts;
          let len = 0; const L = [];
          for (let i = 0; i < pts.length - 1; i++) { const d = Math.hypot(pts[i+1].x-pts[i].x, pts[i+1].y-pts[i].y); L.push(d); len += d; }
          let target = phase * len, acc = 0;
          for (let i = 0; i < L.length; i++) {
            if (target <= acc + L[i]) {
              const k = (target - acc) / L[i];
              const px = pts[i].x + (pts[i+1].x - pts[i].x) * k;
              const py = pts[i].y + (pts[i+1].y - pts[i].y) * k;
              const g = ctx.createRadialGradient(px, py, 0, px, py, 16);
              g.addColorStop(0, U.rgba(col, 0.32));
              g.addColorStop(1, U.rgba(col, 0));
              ctx.fillStyle = g;
              ctx.beginPath(); ctx.arc(px, py, 16, 0, Math.PI * 2); ctx.fill();
              break;
            }
            acc += L[i];
          }
        }
      }
    }

    // drawables sorted back-to-front
    const drawables = [];
    for (const [id, v] of vis) drawables.push({ id, v, kindKey: v.z0, yKey: v.y + v.h });
    for (const [id, v] of removing) drawables.push({ id, v, kindKey: v.z0, yKey: v.y + v.h });
    drawables.sort((a, b) => a.kindKey - b.kindKey || a.yKey - b.yKey);

    const covers = [];
    for (const d of drawables) {
      const { id, v } = d;
      const node = data.get(id);
      if (!node) continue;
      const dimmed = pipeNodes && !pipeNodes.has(id) && !v.open;
      const alpha = (v.alpha ?? 1) * (dimmed ? 0.45 : 1);
      if (alpha <= 0.01) continue;
      ctx.globalAlpha = alpha;

      const zTop = v.z0 + v.zh;
      const yTop = -zTop * tanT;      // elevation offsets
      const yBase = -v.z0 * tanT;
      const openPlate = v.open || (v.coverT > 0 && v.coverT < 1 && v.open);

      // ground shadow at the surface the tile stands on
      ctx.save();
      ctx.shadowColor = 'rgba(40,43,45,0.22)';
      ctx.shadowBlur = (6 + v.zh * 0.5) * scale * dpr;
      ctx.shadowOffsetY = 3 * scale * dpr;
      ctx.fillStyle = 'rgba(40,43,45,0.10)';
      U.roundRect(ctx, v.x + 2, v.y + yBase + 3, v.w - 4, v.h - 4, 9);
      ctx.fill();
      ctx.restore();

      // the data-model family is not a runtime module: render it as a warm
      // brass "reference plate" so it reads as a different class of thing.
      const isConcept = node.family === 'context-model';
      const baseFill = isConcept
        ? U.mix(C.tile, C.brass, 0.15)
        : (KIND_FILL[node.kind] || KIND_FILL.default)();
      const frontFill = U.mix(baseFill, C.graphite, 0.22);
      const sideR = v.open ? 10 : 9;

      // front/side extrusion: darker slab at base, top face above it
      ctx.fillStyle = frontFill;
      U.roundRect(ctx, v.x, v.y + yBase, v.w, v.h, sideR);
      ctx.fill();

      const topFill = v.open ? U.mix(baseFill, C.baseboard, 0.5) : baseFill;
      ctx.fillStyle = topFill;
      U.roundRect(ctx, v.x, v.y + yTop, v.w, v.h, sideR);
      ctx.fill();

      // storage slabs: strata lines on the front face
      if (node.kind === 'storage' && !v.open) {
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 1.1;
        const fh = zTop * tanT;
        for (const f of [0.38, 0.72]) {
          const yy = v.y + v.h + yTop + fh * f;
          ctx.beginPath(); ctx.moveTo(v.x + 6, yy); ctx.lineTo(v.x + v.w - 6, yy); ctx.stroke();
        }
      }

      if (!v.open) hatchTop(ctx, v.x, v.y + yTop, v.w, v.h, node.kind);

      // model plug notch
      if (node.kind === 'model' && !v.open) {
        ctx.fillStyle = U.rgba(C.graphite, 0.25);
        ctx.fillRect(v.x - 6, v.y + yTop + v.h / 2 - 9, 6, 18);
      }
      // integration pin marks reaching toward the board
      if (node.kind === 'integration' && !v.open && v.level === 1) {
        ctx.strokeStyle = U.rgba(C.graphite, 0.3);
        ctx.lineWidth = 2;
        for (let i = 1; i <= 3; i++) {
          const px = v.x + (v.w * i) / 4;
          ctx.beginPath(); ctx.moveTo(px, v.y + v.h + yBase); ctx.lineTo(px, v.y + v.h + yBase + 8); ctx.stroke();
        }
      }

      // borders — concept plate gets a solid brass keyline; runtime namespaces
      // keep the quiet dashed graphite edge; everything else a thin hairline
      if (isConcept) {
        ctx.strokeStyle = U.rgba(C.brass, 0.72);
        ctx.lineWidth = 1.6;
      } else {
        ctx.strokeStyle = node.kind === 'namespace' && !v.open
          ? U.rgba(C.graphite, 0.35) : U.rgba(C.graphite, 0.16);
        ctx.lineWidth = 1.2;
        if (node.kind === 'namespace' && !v.open) ctx.setLineDash([5, 4]);
      }
      U.roundRect(ctx, v.x, v.y + yTop, v.w, v.h, sideR);
      ctx.stroke();
      ctx.setLineDash([]);

      // engraved reference-plate frame on the collapsed data-model root
      if (isConcept && v.level === 0 && !v.open) {
        ctx.strokeStyle = U.rgba(C.brass, 0.4);
        ctx.lineWidth = 1;
        U.roundRect(ctx, v.x + 4, v.y + yTop + 4, v.w - 8, v.h - 8, Math.max(sideR - 3, 3));
        ctx.stroke();
      }

      if (v.open) {
        // engraved title band
        ctx.strokeStyle = U.rgba(C.graphite, 0.14);
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(v.x + 10, v.y + yTop + layout.TITLE_H);
        ctx.lineTo(v.x + v.w - 10, v.y + yTop + layout.TITLE_H);
        ctx.stroke();
      }

      // pipeline port dot for participating collapsed tiles
      if (pipeNodes && pipeNodes.has(id) && !v.open) {
        ctx.fillStyle = pipeColor(state.pipeline);
        ctx.beginPath();
        ctx.arc(v.x + 12, v.y + yTop + 12, 3.4, 0, Math.PI * 2);
        ctx.fill();
      }

      // selection / hover
      if (state.selected === id) {
        ctx.strokeStyle = C.brass;
        ctx.lineWidth = 2.6;
        U.roundRect(ctx, v.x - 3, v.y + yTop - 3, v.w + 6, v.h + 6, sideR + 3);
        ctx.stroke();
      } else if (state.hover === id) {
        ctx.fillStyle = 'rgba(255,255,255,0.14)';
        U.roundRect(ctx, v.x, v.y + yTop, v.w, v.h, sideR);
        ctx.fill();
      }

      // lifting cover during expand/collapse
      if (v.coverT > 0.01 && v.coverT < 0.99) {
        covers.push({ v, node });
      }
      ctx.globalAlpha = 1;
    }

    // covers render above everything of their module
    for (const { v } of covers) {
      const lift = U.reducedMotion ? 0 : v.coverT * 46;
      const zC = v.z0 + layout.LIFT + lift;
      const yC = -zC * tanT;
      ctx.globalAlpha = (1 - v.coverT) * 0.92;
      ctx.fillStyle = C.tile;
      U.roundRect(ctx, v.x, v.y + yC, v.w, v.h, 10);
      ctx.fill();
      ctx.strokeStyle = U.rgba(C.graphite, 0.18);
      ctx.lineWidth = 1.2;
      U.roundRect(ctx, v.x, v.y + yC, v.w, v.h, 10);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    lastPipeNodes = pipeNodes;
    return { pipeNodes };
  };
  let lastPipeNodes = null;

  // topmost node whose top face contains the screen point
  const hitTest = (sx, sy) => {
    const t = cam.tilt(), tanT = Math.tan(t);
    const p = cam.unproject(sx, sy);   // board coords at z=0
    const items = [...vis.entries()].sort((a, b) =>
      (b[1].z0 - a[1].z0) || ((b[1].y + b[1].h) - (a[1].y + a[1].h)));
    for (const [id, v] of items) {
      const zTop = v.z0 + v.zh;
      const yOff = -zTop * tanT;
      if (p.x >= v.x && p.x <= v.x + v.w && p.y >= v.y + yOff && p.y <= v.y + v.h + yOff) {
        return id;
      }
    }
    return null;
  };

  const rectOf = id => vis.get(id) || null;
  // solved (post-animation) rect — use for camera framing decisions
  const targetRectOf = id => (solved && solved.rects.get(id)) || vis.get(id) || null;

  return {
    state, vis, setExpanded, applyLayout, step, draw, hitTest, rectOf, targetRectOf,
    get board() { return boardRect; },
    get world() { return worldRect; },
    get isAnimating() { return animating; },
    get pipeActive() { return lastPipeNodes; },
  };
})();

/* ===== labels.js ===== */
// DOM label layer: crisp, screen-aligned, horizontal text above the canvas.
// Identifiers always render in English; only the small kind tag translates.
OV.labels = (() => {
  const U = OV.util, cam = OV.camera, data = OV.data, scene = OV.scene;
  const host = document.getElementById('labels');
  const pool = new Map();   // id -> {el, nameEl, kindEl}

  const ensure = (id, node) => {
    let L = pool.get(id);
    if (!L) {
      const el = U.el('div', 'node-label', host);
      const nameEl = U.el('span', 'label-name', el);
      const kindEl = U.el('span', 'label-kind', el);
      nameEl.textContent = node.name;
      L = { el, nameEl, kindEl, kind: null };
      pool.set(id, L);
    }
    return L;
  };

  const update = () => {
    const seen = new Set();
    const pipeNodes = scene.pipeActive;
    const tilt = cam.tilt(), tanT = Math.tan(tilt);
    const scale = cam.cam.scale;

    for (const [id, v] of scene.vis) {
      const node = data.get(id);
      if (!node || (v.alpha ?? 1) < 0.35) continue;
      const wPx = v.w * scale;
      const isRoot = node.parent == null;
      if (wPx < (isRoot ? 34 : 54)) continue;

      seen.add(id);
      const L = ensure(id, node);
      const zTop = v.z0 + v.zh;
      const nameLen = Math.max(node.name.length, 4);
      let bx, by, fs;
      if (v.open) {
        bx = v.x + v.w / 2;
        by = v.y - zTop * tanT + OV.layout.TITLE_H / 2 + 1;
        // engraved caps title: never wider than the plate
        fs = Math.min(
          U.clamp(OV.layout.TITLE_H * 0.42 * scale, 10, 16),
          (wPx - 24) / (nameLen * 0.74),
        );
      } else {
        bx = v.x + v.w / 2;
        by = v.y + v.h / 2 - zTop * tanT;
        // damped proportional sizing, hard-capped so the name fits the tile
        fs = Math.min(
          U.clamp(13 * Math.sqrt(wPx / 150), 10, 21),
          (wPx - 14) / (nameLen * 0.60),
          v.h * scale * 0.42,
        );
      }
      if (fs < 8) { L.el.style.display = 'none'; continue; }
      L.el.style.display = '';
      const p = cam.project(bx, by, 0);
      L.el.style.transform = `translate3d(${p.x.toFixed(1)}px, ${p.y.toFixed(1)}px, 0) translate(-50%, -50%)`;
      L.el.style.fontSize = fs.toFixed(1) + 'px';
      L.el.style.maxWidth = Math.max(wPx - 12, 44) + 'px';
      L.el.classList.toggle('dim', !!(pipeNodes && !pipeNodes.has(id) && !v.open));
      L.el.classList.toggle('plate', !!v.open);

      // the data-model root always carries its brass "Data Model" tag, so it
      // is named as the vocabulary layer even when small — never a bare tile
      const isConceptRoot = node.family === 'context-model' && node.parent == null;
      L.el.classList.toggle('concept', isConceptRoot);
      const showKind = isConceptRoot || (!v.open && fs >= 12.5 && v.h * scale > 52);
      const kindTxt = showKind
        ? (isConceptRoot ? OV.i18n.t('dataModelTag') : OV.i18n.t('kinds.' + node.kind))
        : '';
      if (L.kind !== kindTxt) {
        L.kindEl.textContent = kindTxt;
        L.kind = kindTxt;
      }
    }

    for (const [id, L] of pool) {
      if (!seen.has(id)) { L.el.remove(); pool.delete(id); }
    }
  };

  return { update };
})();

/* ===== minimap.js ===== */
// Minimap: flat top-down overview of the whole board with the current
// viewport rectangle. Click or drag to recenter the camera.
OV.minimap = (() => {
  const U = OV.util, C = OV.colors, cam = OV.camera, data = OV.data, scene = OV.scene;
  const el = document.getElementById('minimap');
  const ctx = el.getContext('2d');
  const W = el.width, H = el.height;

  let mapScale = 1, ox = 0, oy = 0;

  const toMap = (x, y) => ({ x: (x - ox) * mapScale, y: (y - oy) * mapScale });
  const toBoard = (mx, my) => ({ x: mx / mapScale + ox, y: my / mapScale + oy });

  const draw = () => {
    const world = scene.world;
    mapScale = Math.min((W - 12) / world.w, (H - 12) / world.h);
    ox = world.x - (W / mapScale - world.w) / 2;
    oy = world.y - (H / mapScale - world.h) / 2;

    ctx.clearRect(0, 0, W, H);

    const b = scene.board;
    const bb = toMap(b.x, b.y);
    ctx.fillStyle = U.rgba(C.baseboard, 0.9);
    U.roundRect(ctx, bb.x, bb.y, b.w * mapScale, b.h * mapScale, 4);
    ctx.fill();

    for (const [id, v] of scene.vis) {
      const node = data.get(id);
      if (!node || node.parent != null && !v.open && v.level > 1) continue;
      if (node.parent != null && v.level > 0) continue;   // roots only, keep it calm
      const p = toMap(v.x, v.y);
      ctx.fillStyle = v.open ? U.rgba(C.brass, 0.35) : U.rgba(C.graphite, 0.28);
      U.roundRect(ctx, p.x, p.y, Math.max(v.w * mapScale, 2), Math.max(v.h * mapScale, 2), 2);
      ctx.fill();
    }

    // viewport rect
    const t = cam.tilt();
    const vw = cam.cam.vw / cam.cam.scale;
    const vh = cam.cam.vh / (cam.cam.scale * Math.cos(t));
    const p = toMap(cam.cam.x - vw / 2, cam.cam.y - vh / 2);
    ctx.strokeStyle = C.brass;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(p.x, p.y, vw * mapScale, vh * mapScale);
  };

  let dragging = false;
  const recenter = (ev) => {
    const r = el.getBoundingClientRect();
    const b = toBoard((ev.clientX - r.left) * (W / r.width), (ev.clientY - r.top) * (H / r.height));
    cam.tweenTo({ x: b.x, y: b.y }, dragging ? 0 : 420);
  };
  el.addEventListener('pointerdown', (ev) => { dragging = true; el.setPointerCapture(ev.pointerId); recenter(ev); });
  el.addEventListener('pointermove', (ev) => { if (dragging) recenter(ev); });
  el.addEventListener('pointerup', () => { dragging = false; });

  return { draw };
})();

/* ===== sidebar.js ===== */
// Fixed article sidebar: identifier + hierarchy path, bilingual article,
// inputs/outputs, pipeline chips, source evidence with copy + pinned GitHub link.
OV.sidebar = (() => {
  const U = OV.util, data = OV.data, i18n = OV.i18n;
  const $ = id => document.getElementById(id);
  let currentId = null;

  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // minimal markup: paragraphs on blank lines, `code` spans
  const articleHtml = (text) =>
    esc(text || '').split(/\n\s*\n/).map(p =>
      '<p>' + p.trim().replace(/`([^`]+)`/g, '<code>$1</code>') + '</p>'
    ).join('');

  const ghHref = (path, lines) => {
    const m = (lines || '').match(/^(\d+)(?:-(\d+))?/);
    return data.meta.github + '/blob/' + data.meta.commit + '/' + path
      + (m ? '#L' + m[1] + (m[2] ? '-L' + m[2] : '') : '');
  };

  // verbatim snippet with provenance caption; used by node articles and the overview
  const codeFigure = (block, host) => {
    const fig = U.el('figure', 'sb-code', host);
    if (block.title) U.el('figcaption', 'sb-code-title', fig).textContent = i18n.pick(block.title);
    const pre = U.el('pre', '', fig);
    U.el('code', '', pre).textContent = block.text;
    if (block.sourcePath) {
      const src = U.el('a', 'sb-code-src', fig);
      src.textContent = block.sourcePath + (block.sourceLines ? ':' + block.sourceLines : '');
      src.href = ghHref(block.sourcePath, block.sourceLines);
      src.target = '_blank';
      src.rel = 'noopener';
    }
    return fig;
  };

  const pipeChip = (p) => {
    const mode = p.startsWith('manage') ? 'manage' : p;
    const label = p.startsWith('manage') ? i18n.t('subflows.' + p) : i18n.t('pipelineNames.' + p);
    return `<span class="pipe-chip p-${mode}">${esc(label)}</span>`;
  };

  const copyText = async (text, btn) => {
    let ok = false;
    try { await navigator.clipboard.writeText(text); ok = true; } catch {}
    if (!ok) {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { ok = document.execCommand('copy'); } catch {}
      ta.remove();
    }
    if (ok && btn) {
      const orig = btn.textContent;
      btn.textContent = i18n.t('copied');
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1400);
    }
  };

  // Overview: the editorial front page shown when nothing is selected.
  const renderOverview = () => {
    const host = $('sb-overview');
    const ov = data.overview;
    if (!host || !ov) return;
    host.innerHTML = '';
    for (const p of ov.intro[i18n.lang] || ov.intro.en) {
      U.el('p', 'sb-ov-p', host).innerHTML =
        esc(p).replace(/`([^`]+)`/g, '<code>$1</code>');
    }
    if (ov.quickstart) {
      U.el('h2', 'sb-ov-h', host).textContent = i18n.t('quickstartTitle');
      codeFigure(ov.quickstart, host);
    }
    if (ov.path?.length) {
      U.el('h2', 'sb-ov-h', host).textContent = i18n.t('startTitle');
      const list = U.el('ol', 'sb-ov-path', host);
      for (const stop of ov.path) {
        const node = data.get(stop.node);
        if (!node) continue;
        const li = U.el('li', '', list);
        const btn = U.el('button', 'sb-ov-stop', li);
        btn.textContent = node.name;
        btn.onclick = () => OV.app.selectNode(stop.node, { reveal: true });
        U.el('span', 'sb-ov-why', li).textContent = i18n.pick(stop.why);
      }
    }
    U.el('h2', 'sb-ov-h', host).textContent = i18n.t('howTitle');
    U.el('p', 'sb-ov-p sb-ov-how', host).textContent = i18n.t('emptyBody');
  };

  const render = (id) => {
    currentId = id;
    const empty = $('sidebar-empty'), content = $('sidebar-content');
    if (!id || !data.get(id)) {
      empty.hidden = false; content.hidden = true;
      renderOverview();
      return;
    }
    const node = data.get(id);
    empty.hidden = true; content.hidden = false;

    $('sb-name').textContent = node.name;
    $('sb-kind').textContent = i18n.t('kinds.' + node.kind);
    $('sb-article').innerHTML = articleHtml(i18n.pick(node.article));
    const codeHost = $('sb-codeblocks');
    codeHost.innerHTML = '';
    for (const block of node.code || []) codeFigure(block, codeHost);

    const li = (rec) => `<li>${esc(i18n.pick(rec))}</li>`;
    $('sb-inputs').innerHTML = (node.io?.inputs || []).map(li).join('') || '<li>—</li>';
    $('sb-outputs').innerHTML = (node.io?.outputs || []).map(li).join('') || '<li>—</li>';
    $('sb-pipelines').innerHTML = (node.pipelines || []).map(pipeChip).join('') ||
      `<span class="pipe-chip" style="color:var(--muted);border-color:var(--muted)">—</span>`;

    // source evidence
    const evList = $('sb-evidence-list');
    evList.innerHTML = '';
    const evSection = evList.closest('.sb-evidence');
    if (node.sourcePath) {
      evSection.style.display = '';
      const item = U.el('div', 'evidence-item', evList);
      const pathDiv = U.el('div', 'evidence-path', item);
      pathDiv.textContent = node.sourcePath + (node.sourceLines ? ':' + node.sourceLines : '');
      if (node.symbol) {
        const symDiv = U.el('div', 'evidence-symbol', item);
        symDiv.textContent = node.symbol;
      }
      const actions = U.el('div', 'evidence-actions', item);
      // "Copy local path" only makes sense when a local repo root is configured;
      // public builds ship without one, so the GitHub permalink stands alone.
      if (data.meta.localRoot) {
        const copyBtn = U.el('button', '', actions);
        copyBtn.textContent = i18n.t('copyPath');
        copyBtn.onclick = () => copyText(data.meta.localRoot + '/' + node.sourcePath, copyBtn);
      }
      const gh = U.el('a', '', actions);
      gh.textContent = i18n.t('openGitHub');
      gh.target = '_blank';
      gh.rel = 'noopener';
      const lines = (node.sourceLines || '').match(/^(\d+)(?:-(\d+))?/);
      gh.href = data.meta.github + '/blob/' + data.meta.commit + '/' + node.sourcePath
        + (lines ? '#L' + lines[1] + (lines[2] ? '-L' + lines[2] : '') : '');
    } else {
      evSection.style.display = 'none';
    }

    // actions
    const expandBtn = $('sb-expand');
    if (data.isLeaf(id)) {
      expandBtn.style.display = 'none';
    } else {
      expandBtn.style.display = '';
      expandBtn.textContent = OV.scene.state.expanded.has(id) ? i18n.t('collapse') : i18n.t('expand');
      expandBtn.onclick = () => OV.app.toggleExpand(id);
    }
    $('sb-focus').textContent = i18n.t('focusOn');
    $('sb-focus').onclick = () => OV.app.focusOn(id);
  };

  i18n.onChange(() => render(currentId));

  return { render, get currentId() { return currentId; } };
})();

/* ===== interactions.js ===== */
// Pointer, wheel, pinch and keyboard interaction on the board canvas.
OV.interactions = (() => {
  const cam = OV.camera, scene = OV.scene;
  const canvas = document.getElementById('board');

  const pointers = new Map();
  let drag = null;          // {x, y, moved, vx, vy, t, id}
  let pinch = null;         // {d, cx, cy}
  let lastTap = { t: 0, id: null };

  const pos = (ev) => {
    const r = canvas.getBoundingClientRect();
    return { x: ev.clientX - r.left, y: ev.clientY - r.top };
  };

  canvas.addEventListener('pointerdown', (ev) => {
    canvas.setPointerCapture(ev.pointerId);
    const p = pos(ev);
    pointers.set(ev.pointerId, p);
    cam.cancelInertia();
    cam.stopTween();
    if (pointers.size === 2) {
      const [a, b] = [...pointers.values()];
      pinch = { d: Math.hypot(a.x - b.x, a.y - b.y), cx: (a.x + b.x) / 2, cy: (a.y + b.y) / 2 };
      drag = null;
    } else {
      drag = { ...p, moved: 0, vx: 0, vy: 0, t: performance.now() };
    }
  });

  canvas.addEventListener('pointermove', (ev) => {
    const p = pos(ev);
    if (pointers.has(ev.pointerId)) pointers.set(ev.pointerId, p);

    if (pinch && pointers.size === 2) {
      const [a, b] = [...pointers.values()];
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      const cx = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
      if (pinch.d > 0) cam.zoomAt(cx, cy, d / pinch.d);
      cam.panBy(cx - pinch.cx, cy - pinch.cy);
      pinch = { d, cx, cy };
      return;
    }
    if (drag && pointers.size === 1) {
      const now = performance.now();
      const dx = p.x - drag.x, dy = p.y - drag.y;
      drag.moved += Math.abs(dx) + Math.abs(dy);
      if (drag.moved > 4) {
        canvas.classList.add('dragging');
        cam.panBy(dx, dy);
        const dt = Math.max(now - drag.t, 1);
        drag.vx = dx / dt * 16; drag.vy = dy / dt * 16;
      }
      drag.x = p.x; drag.y = p.y; drag.t = now;
      return;
    }
    // hover
    const hit = scene.hitTest(p.x, p.y);
    if (hit !== scene.state.hover) {
      scene.state.hover = hit;
      canvas.style.cursor = hit ? 'pointer' : 'grab';
      OV.app.requestPaint();
    }
  });

  const endPointer = (ev) => {
    pointers.delete(ev.pointerId);
    if (pointers.size < 2) pinch = null;
    if (!drag) return;
    const wasDrag = drag.moved > 5;
    canvas.classList.remove('dragging');
    if (wasDrag) {
      cam.flick(drag.vx, drag.vy);
      drag = null;
      return;
    }
    drag = null;
    // click / double click
    const p = pos(ev);
    const id = scene.hitTest(p.x, p.y);
    const now = performance.now();
    const isDouble = id && lastTap.id === id && now - lastTap.t < 340;
    lastTap = { t: now, id };
    if (isDouble) { OV.app.focusOn(id); return; }
    if (id) OV.app.clickNode(id); else OV.app.selectNode(null);
  };
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);

  canvas.addEventListener('wheel', (ev) => {
    ev.preventDefault();
    const p = pos(ev);
    const k = ev.ctrlKey ? 0.012 : 0.0022;   // trackpad pinch reports ctrlKey
    cam.zoomAt(p.x, p.y, Math.exp(-ev.deltaY * k));
    OV.app.requestPaint();
  }, { passive: false });

  window.addEventListener('keydown', (ev) => {
    if (ev.target !== document.body) return;
    if (ev.key === 'f' || ev.key === 'F') OV.app.fit();
    if (ev.key === 'Escape') OV.app.selectNode(null);
  });

  return {};
})();

/* ===== app.js ===== */
// App shell: boot, render loop, top rail (pipelines, breadcrumbs, language),
// selection/expansion/focus orchestration, mobile fallback.
OV.app = (() => {
  const U = OV.util, data = OV.data, cam = OV.camera, scene = OV.scene, i18n = OV.i18n;
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  let needsPaint = true;

  const requestPaint = () => { needsPaint = true; };

  // ---- selection / expansion / focus ---------------------------------------

  const selectNode = (id, opts = {}) => {
    scene.state.selected = id;
    OV.sidebar.render(id);
    if (id && opts.reveal) {
      // make sure ancestors are expanded so the node is visible
      let changed = false;
      for (const a of data.ancestors(id)) {
        if (!data.isLeaf(a.id) && !scene.state.expanded.has(a.id)) {
          scene.state.expanded.add(a.id);
          changed = true;
        }
      }
      if (changed) scene.applyLayout(id);
      ensureVisible(id);
    }
    renderBreadcrumbs();
    syncHash();
    requestPaint();
  };

  const ensureVisible = (id, pad = 90) => {
    const r = scene.targetRectOf(id);
    if (!r) return;
    const tl = cam.project(r.x - pad, r.y - pad, 0);
    const br = cam.project(r.x + r.w + pad, r.y + r.h + pad, 0);
    const out = tl.x < 0 || tl.y < 58 || br.x > cam.cam.vw || br.y > cam.cam.vh;
    const tooBig = (br.x - tl.x) > cam.cam.vw || (br.y - tl.y) > cam.cam.vh;
    if (out || tooBig) cam.fitTo({ x: r.x - pad, y: r.y - pad, w: r.w + pad * 2, h: r.h + pad * 2 }, 620);
  };

  const toggleExpand = (id) => {
    const open = !scene.state.expanded.has(id);
    scene.setExpanded(id, open);
    if (open) ensureVisible(id);
    OV.sidebar.render(OV.sidebar.currentId);   // refresh expand/collapse button
    renderBreadcrumbs();
    requestPaint();
  };

  const clickNode = (id) => {
    if (!data.isLeaf(id)) toggleExpand(id);
    selectNode(id);
  };

  const focusOn = (id) => {
    const r = scene.targetRectOf(id);
    if (!r) return;
    selectNode(id);
    const pad = Math.max(r.w, r.h) * 0.18 + 40;
    cam.fitTo({ x: r.x - pad, y: r.y - pad, w: r.w + pad * 2, h: r.h + pad * 2 }, 760);
  };

  const fit = () => cam.fitTo(scene.world, 620);

  // ---- top rail --------------------------------------------------------------

  const renderBreadcrumbs = () => {
    const host = document.getElementById('breadcrumbs');
    host.innerHTML = '';
    const mk = (label, fn) => {
      const b = U.el('button', 'crumb', host);
      b.textContent = label;
      b.onclick = fn;
      return b;
    };
    mk(i18n.t('overview'), () => { selectNode(null); fit(); });
    const id = scene.state.selected;
    if (!id) return;
    const chain = [...data.ancestors(id), data.get(id)];
    for (const n of chain) {
      U.el('span', 'crumb-sep', host).textContent = '›';
      mk(n.name, () => selectNode(n.id, { reveal: true }));
    }
  };

  // ---- shareable deep links: #n=<nodeId>&lang=zh&pipe=<pipelineId> -----------

  let applyingHash = false;
  const syncHash = () => {
    if (applyingHash) return;
    const parts = [];
    if (scene.state.selected) parts.push('n=' + encodeURIComponent(scene.state.selected));
    if (i18n.lang !== 'en') parts.push('lang=' + i18n.lang);
    if (scene.state.pipeline) parts.push('pipe=' + scene.state.pipeline);
    const next = parts.length ? '#' + parts.join('&') : '';
    if (next === location.hash) return;
    try { history.replaceState(null, '', next || location.pathname + location.search); }
    catch { location.hash = next; }   // some file:// contexts refuse replaceState
  };

  const applyHash = () => {
    const h = location.hash.slice(1);
    if (!h) return;
    applyingHash = true;
    const p = new URLSearchParams(h);
    // absent params reset to defaults, so live hash edits don't leave stale state
    setLangUI(p.get('lang') === 'zh' ? 'zh' : 'en');
    const pipe = p.get('pipe');
    scene.state.pipeline = (pipe && data.pipelines[pipe]) ? pipe : null;
    if (pipe && pipe.startsWith('manage.')) managePipe = pipe;
    renderPipeButtons();
    const n = p.get('n');
    applyingHash = false;
    if (n && data.get(n)) {
      selectNode(n, { reveal: true });
      focusOn(n);
    } else requestPaint();
  };

  const PIPES = ['explore', 'write', 'retrieve', 'manage'];
  let managePipe = 'manage.context-fs';

  const renderPipeButtons = () => {
    const host = document.getElementById('pipeline-switch');
    host.innerHTML = '';
    const active = scene.state.pipeline;
    const activeMode = active == null ? 'explore' : active.startsWith('manage') ? 'manage' : active;
    for (const p of PIPES) {
      const b = U.el('button', 'pipe-btn' + (activeMode === p ? ' active' : ''), host);
      b.dataset.pipe = p;
      b.setAttribute('role', 'tab');
      b.textContent = p === 'explore' ? i18n.t('explore') : i18n.t('pipelineNames.' + p);
      b.onclick = () => {
        scene.state.pipeline = p === 'explore' ? null : p === 'manage' ? managePipe : p;
        renderPipeButtons();
        syncHash();
        requestPaint();
      };
    }
    const sub = document.getElementById('manage-subflows');
    sub.hidden = activeMode !== 'manage';
    if (activeMode === 'manage') {
      sub.innerHTML = '';
      for (const sf of Object.keys(data.pipelines).filter(k => k.startsWith('manage.'))) {
        const b = U.el('button', 'subflow-btn' + (scene.state.pipeline === sf ? ' active' : ''), sub);
        b.textContent = i18n.t('subflows.' + sf);
        b.onclick = () => {
          managePipe = sf;
          scene.state.pipeline = sf;
          renderPipeButtons();
          syncHash();
          requestPaint();
        };
      }
    }
  };

  const setLangUI = (l) => {
    i18n.setLang(l);
    document.querySelectorAll('.lang-btn').forEach(x => x.classList.toggle('active', x.dataset.lang === l));
    syncHash();
  };

  // ---- mobile fallback --------------------------------------------------------

  const buildFallback = () => {
    const host = document.getElementById('fallback');
    host.hidden = false;
    host.innerHTML = '';
    U.el('p', 'fb-note', host).textContent = i18n.t('fallbackNote');
    for (const p of data.overview?.intro?.[i18n.lang] || data.overview?.intro?.en || []) {
      U.el('p', 'fb-intro', host).textContent = p;
    }
    const walk = (n, box) => {
      const item = U.el('div', 'fb-node', box);
      U.el('h3', '', item).textContent = n.name;
      if (n.sourcePath) U.el('div', 'fb-src', item).textContent = n.sourcePath + (n.symbol ? ' · ' + n.symbol : '');
      U.el('p', '', item).textContent = i18n.pick(n.article) || i18n.pick(n.summary);
      for (const b of n.code || []) {
        const pre = U.el('pre', 'fb-code', item);
        pre.textContent = b.text;
      }
      for (const c of data.childrenOf(n.id)) walk(c, box);
    };
    for (const r of data.roots) {
      const fam = U.el('section', 'fb-family', host);
      U.el('h2', '', fam).textContent = r.name;
      U.el('p', '', fam).textContent = i18n.pick(r.summary);
      for (const c of data.childrenOf(r.id)) walk(c, fam);
    }
  };

  // ---- render loop ---------------------------------------------------------------

  const resize = () => {
    const wrap = document.getElementById('canvas-wrap');
    const dpr = window.devicePixelRatio || 1;
    const w = wrap.clientWidth, h = wrap.clientHeight;
    if (!w || !h) return;
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    cam.setViewport(w, h);
    requestPaint();
  };

  // catch camera changes that happen outside tweens (drag, pinch, minimap)
  let lastCam = { x: NaN, y: NaN, s: NaN, t: NaN, vw: NaN, vh: NaN };
  const camDirty = () => {
    const c = cam.cam, t = cam.tilt();
    if (c.x === lastCam.x && c.y === lastCam.y && c.scale === lastCam.s &&
        t === lastCam.t && c.vw === lastCam.vw && c.vh === lastCam.vh) return false;
    lastCam = { x: c.x, y: c.y, s: c.scale, t, vw: c.vw, vh: c.vh };
    return true;
  };

  const frame = (now) => {
    const camMoved = cam.step(now);
    const sceneMoved = scene.step(now);
    const pulse = !!scene.state.pipeline && !U.reducedMotion;
    if (camMoved || sceneMoved || needsPaint || pulse || camDirty()) {
      needsPaint = false;
      scene.draw(ctx, now);
      OV.labels.update();
      OV.minimap.draw();
    }
    requestAnimationFrame(frame);
  };

  // ---- boot -----------------------------------------------------------------------

  let booted = false;
  const boot = () => {
    if (booted) return;
    booted = true;
    document.getElementById('hint').textContent = i18n.t('hint');
    document.getElementById('minimap').title = i18n.t('overview');
    i18n.applyStatic();
    renderPipeButtons();
    renderBreadcrumbs();
    OV.sidebar.render(null);
    buildFallback();

    document.getElementById('fit-btn').onclick = fit;
    for (const b of document.querySelectorAll('.lang-btn')) {
      b.onclick = () => setLangUI(b.dataset.lang);
    }
    i18n.onChange(() => {
      i18n.applyStatic();
      document.getElementById('hint').textContent = i18n.t('hint');
      renderPipeButtons();
      renderBreadcrumbs();
      buildFallback();
      requestPaint();
    });

    window.addEventListener('resize', () => { resize(); });

    resize();
    scene.applyLayout(null);
    cam.setFitReference(scene.world);
    cam.cam.scale = cam.cam.fitScale;
    cam.cam.x = scene.world.x + scene.world.w / 2;
    cam.cam.y = scene.world.y + scene.world.h / 2;
    applyHash();
    window.addEventListener('hashchange', applyHash);
    requestAnimationFrame(frame);
  };

  document.addEventListener('DOMContentLoaded', boot);
  if (document.readyState !== 'loading') boot();

  return { selectNode, clickNode, toggleExpand, focusOn, fit, requestPaint };
})();

</script>
