ingDB、模型、锁、检索、文件系统——的健康观察汇总为统一的 SystemStatus。`system()` 返回聚合状态，含 `is_healthy` 与组件错误列表；`is_healthy()` 提供快速布尔检查。`get_filesystem_stats()` 经 `agfs_client.get_stats()` 获取文件系统指标。"},"io":{"inputs":[{"en":"System state query","zh":"系统状态查询"},{"en":"Optional request context","zh":"可选请求上下文"}],"outputs":[{"en":"SystemStatus aggregate","zh":"SystemStatus 聚合"},{"en":"Component health table","zh":"组件健康表"}]},"family":"service-layer"},{"id":"service-layer.resource-memory-link","parent":"service-layer","name":"Memory Links","kind":"processing","sourcePath":"openviking/service/resource_memory_link_service.py","symbol":"ResourceMemoryLinkService","sourceLines":"117-699","pipelines":["write"],"summary":{"en":"Bridges resource ingestion events to memory system via synthetic session commits, keeping resource files immutable.","zh":"通过合成会话提交把资源摄入事件桥接到记忆系统，保持资源文件不可变。"},"article":{"en":"ResourceMemoryLinkService bridges resource ingestion events to the memory system through synthetic session commits, keeping resource files immutable and storing all traceability in memory metadata. `on_resource_added()` creates or reuses a dedicated reason session, injects a synthetic user message, sets a targeted memory policy, and calls `SessionService.commit_async()` for background extraction. `before_resource_delete()` scans user memory files for references to the deleted URI and unlinks them. Operations are serialized through a session lock.","zh":"ResourceMemoryLinkService 经合成会话提交把资源摄入事件桥接到记忆系统，资源文件保持不可变，可追溯性全存于记忆元数据。`on_resource_added()` 创建或复用专用 reason 会话，设置定向记忆策略，注入合成用户消息后经 `commit_async()` 后台提取；`before_resource_delete()` 扫描用户记忆文件中对被删 URI 的引用并解除。操作经会话锁串行化。"},"io":{"inputs":[{"en":"Resource URI","zh":"资源 URI"},{"en":"Addition reason or deletion event","zh":"添加原因或删除事件"},{"en":"Request context","zh":"请求上下文"}],"outputs":[{"en":"Synthetic session commit","zh":"合成会话提交"},{"en":"Memory traceability updated","zh":"记忆可追溯已更新"},{"en":"Memory references unlinked","zh":"记忆引用已解除"}]},"code":[{"lang":"python","title":{"en":"Synthetic reason-session commit","zh":"合成 reason 会话提交"},"text":"async with self._reason_session_lock:\n    session = await self._session_service.get(\n        session_id,\n        ctx,\n        auto_create=True,\n    )\n    session.meta.memory_policy = _resource_reason_memory_policy(target_peer_id)\n    # …\n    session.add_messages([message_spec])\n    commit_result = await self._session_service.commit_async(\n        session_id,\n        ctx,\n        keep_recent_count=0,\n    )","sourcePath":"openviking/service/resource_memory_link_service.py","sourceLines":"172-201"}],"family":"service-layer"},{"id":"session-memory","parent":null,"name":"Session & Memory","kind":"processing","sourcePath":"openviking/session/__init__.py","symbol":"session package","sourceLines":"1-52","pipelines":["write","retrieve","manage.session-lifecycle"],"summary":{"en":"Core conversation state and memory management: messages -> archive + async extraction + training -> persistent memory.","zh":"会话状态与记忆管理核心：消息归档、异步提取、训练生成持久记忆"},"article":{"en":"OpenViking agents need conversation state that survives process restarts and grows into useful long-term memory. The session-memory family owns this full lifecycle.\n\nMessages enter through `SessionService`, which creates `Session` instances. A commit call triggers two phases. Phase 1 runs synchronously, archiving the live message list to `history/archive_NNN` under a `LockContext` distributed filesystem lock so no two processes corrupt the archive.\n\nPhase 2 runs in the background. It generates a Working Memory v2 seven-section summary, extracts long-term user and agent memories via `SessionCompressorV3`, links related memory items through `viking_fs.link()`, and submits training cases to the streaming trainer. Future sessions retrieve and build on this persisted state. Within the family, session-lifecycle runs the commit, memory-extraction turns archived text into memory operations, memory-apply batches and writes them safely, memory-policy scopes what gets extracted, and training learns from extracted cases.","zh":"OpenViking 代理需要跨进程存活的会话状态，以及能积累成长的长期记忆。session-memory 家族管理这条链路的全生命周期。\n\n消息由 `SessionService` 进入，创建 `Session` 实例。调用 commit 触发两阶段流程。第一阶段同步执行：在 `LockContext` 分布式文件锁保护下，将实时消息列表归档到 `history/archive_NNN`，防止并发写入损坏数据。\n\n第二阶段在后台运行。它生成 Working Memory v2 七段摘要，通过 `SessionCompressorV3` 提取长期用户和代理记忆，经 `viking_fs.link()` 建立记忆关联，并向流式训练器提交训练样本。后续会话可直接检索这些持久记忆并继续积累。 家族内部：session-lifecycle 负责提交，memory-extraction 生成记忆操作，memory-apply 安全写入，memory-policy 限定提取范围，training 从案例中学习。"},"io":{"inputs":[{"en":"conversation messages","zh":"对话消息"},{"en":"commit triggers","zh":"提交触发信号"},{"en":"memory policy dict","zh":"记忆策略字典"},{"en":"request context","zh":"请求上下文"}],"outputs":[{"en":"archived history files","zh":"归档历史文件"},{"en":"persistent memory files","zh":"持久记忆文件"},{"en":"policy state in SessionMeta","zh":"SessionMeta策略状态"},{"en":"training case submissions","zh":"训练样本提交"}]},"family":"session-memory"},{"id":"session-memory.session-lifecycle","parent":"session-memory","name":"Session Lifecycle","kind":"service","sourcePath":"openviking/session/session.py","symbol":"Session (+ SessionService in session_service.py)","sourceLines":"350-420","pipelines":["write","manage.session-lifecycle"],"summary":{"en":"Runtime session object: holds live messages, runs two-phase commit, assembles context for prompts.","zh":"运行时会话对象，持有消息并执行两阶段提交，组装提示上下文"},"article":{"en":"`Session` holds live conversation messages and `SessionMeta` metadata including token counts, commit count, and the active memory policy. Session is the unit of durability: it holds live messages plus SessionMeta so the agent has continuity across restarts. Its `commit_async()` runs two phases. Phase 1 archives under the `LockContext` filesystem lock so concurrent commits cannot interleave, and writes archive messages.jsonl BEFORE trimming the live list so an archive failure cannot drop history. Phase 2 runs as an `asyncio` background task so the caller immediately receives a `task_id` for tracking. `get_session_context()` assembles the latest archive overview with live messages for prompt injection, respecting a token budget (default 128k) so the assembled context stays within the model's window. `SessionService` is a thin facade that creates configured `Session` instances.","zh":"`Session` 持有实时消息和 `SessionMeta`（token 计数、提交次数、记忆策略）。`commit_async()` 分两阶段：先在 `LockContext` 锁下归档消息，再由后台任务执行记忆提取、Working Memory 生成和关系链接，调用方立即获得任务 ID。`get_session_context()` 在 token 预算内组装上下文，`SessionService` 负责创建 `Session`。"},"io":{"inputs":[{"en":"incoming messages","zh":"输入消息"},{"en":"commit call","zh":"提交调用"},{"en":"memory policy","zh":"记忆策略"},{"en":"token budget","zh":"token预算"}],"outputs":[{"en":"archive files on VikingFS","zh":"VikingFS归档文件"},{"en":"async extraction task","zh":"异步提取任务"},{"en":"assembled session context","zh":"会话上下文"},{"en":"usage count increments","zh":"使用计数递增"}]},"code":[{"lang":"python","title":{"en":"Two-phase commit skeleton","zh":"两阶段提交骨架"},"text":"# Use filesystem-based distributed lock so this works across workers/processes.\nsession_path = self._viking_fs._uri_to_path(self._session_uri, ctx=self.ctx)\nasync with LockContext(get_lock_manager(), [session_path], lock_mode=\"exact\"):\n    # …\n    # Persist archive raw messages before trimming live messages so\n    # an archive write failure cannot drop live conversation history.\n    # …\n    self._messages = retained_messages\n# …\nasyncio.create_task(\n    self._run_memory_extraction(\n        # …\n    )\n)","sourcePath":"openviking/session/session.py","sourceLines":"1143-1255"}],"family":"session-memory"},{"id":"session-memory.memory-policy","parent":"session-memory","name":"Memory Policy","kind":"namespace","sourcePath":"openviking/session/memory_policy.py","symbol":"MemoryPolicy","sourceLines":"52-106","pipelines":["manage.session-lifecycle"],"summary":{"en":"Dataclass controlling per-commit extraction scope: self/peer/WM/memory_type gates, validated against registry.","zh":"控制每次提交的提取范围：自身/对方/工作记忆/记忆类型开关"},"article":{"en":"`MemoryPolicy` controls what gets extracted during each session commit. It exposes four configuration controls: `self_enabled` for memories about the requesting user, `peer_enabled` for memories about other agents, `memory_types` to filter by type name, and `working_memory_enabled` for working memory overview generation. The commit body is a dict of targets, e.g. `{\"self\": {\"enabled\": true}, \"peer\": {\"enabled\": false}, \"memory_types\": [\"preference\"], \"working_memory\": {\"enabled\": true}}` — a scoped commit passes self-only, the default enables everything. The policy parses from the commit body dictionary, validates against `MemoryTypeRegistry`, and persists in `SessionMeta` so it survives restarts.","zh":"`MemoryPolicy` 控制每次提交的记忆提取范围。四个开关分别控制自身记忆、对方记忆、按类型过滤和 Working Memory 生成。从 commit 请求体解析，类型名经 `MemoryTypeRegistry` 提供的已知集合校验后存入 `SessionMeta`，重启后仍然有效。默认全部启用。"},"io":{"inputs":[{"en":"commit body policy dict","zh":"提交策略字典"},{"en":"MemoryTypeRegistry names","zh":"记忆类型注册表名称"}],"outputs":[{"en":"validated extraction scope","zh":"验证后提取范围"},{"en":"persisted policy in SessionMeta","zh":"SessionMeta持久策略"}]},"family":"session-memory"},{"id":"session-memory.memory-extraction","parent":"session-memory","name":"Memory Extraction","kind":"processing","sourcePath":"openviking/session/compressor_v3.py","symbol":"SessionCompressorV3","sourceLines":"87-747","pipelines":["write"],"summary":{"en":"Extraction orchestrator: archived messages + policy -> LLM ReAct loop -> resolved ops + training cases.","zh":"提取编排器：归档消息经 LLM ReAct 循环生成记忆操作和训练样本"},"article":{"en":"Raw conversation text has no structure the system can retrieve later. `SessionCompressorV3` turns it into actionable memory operations.\n\nArchived messages and the current `MemoryPolicy` enter the extractor. Its `extract_long_term_memories()` at line 254 creates a ReAct `ExtractLoop` with `SessionExtractContextProvider`, which lets the LLM read existing memories before deciding what to create or edit. A single prompt call could not do this safely: the LLM must inspect existing memory files before choosing between create, edit, or skip. A fast path handles batch training `CaseSpec` messages directly without full ReAct iteration.\n\nAfter extraction, `train_from_extracted_cases()` at line 544 submits any case-type items to `StreamingPolicyTrainer` for online policy optimization. The extractor also writes a `memory_diff.json` audit record per archive so operators can inspect what changed.","zh":"原始对话文本没有可检索的结构。`SessionCompressorV3` 将其转化为可执行的记忆操作。\n\n归档消息和当前 `MemoryPolicy` 进入提取器。`extract_long_term_memories()`（第254行）创建 ReAct `ExtractLoop` 和 `SessionExtractContextProvider`，让 LLM 在决定创建或修改前先读取已有记忆。单次提示无法安全做到这一点——LLM 需要先查看已有记忆文件，才能在创建、修改或跳过之间做选择。批量训练 `CaseSpec` 消息已具备提取器所需格式，走快速通道直接提交，跳过完整的 LLM 迭代循环。\n\n提取完成后，`train_from_extracted_cases()`（第544行）将 case 类型条目提交给 `StreamingPolicyTrainer` 做在线策略优化。提取器还为每次归档写入 `memory_diff.json` 审计记录，方便运维追踪记忆变更。"},"io":{"inputs":[{"en":"archived messages","zh":"归档消息"},{"en":"MemoryPolicy","zh":"记忆策略"},{"en":"existing memory files","zh":"已有记忆文件"},{"en":"LLM completions","zh":"LLM补全"}],"outputs":[{"en":"resolved memory operations","zh":"解析后记忆操作"},{"en":"training case submissions","zh":"训练样本提交"},{"en":"memory_diff.json audit","zh":"审计记录文件"},{"en":"ReAct tool calls","zh":"ReAct工具调用"}]},"code":[{"lang":"python","title":{"en":"Fast path vs full ReAct extraction","zh":"快速通道与完整 ReAct 提取"},"text":"message_list = list(messages)\nfast_path_case = _training_case_from_first_message(message_list, allowed_memory_types)\nif fast_path_case is not None:\n    return await self._commit_training_case_fast_path(\n        # …\n    )\n\nresult = await self._extract_user_memories(\n    # …\n)\ntrain_result = await self.train_from_extracted_cases(\n    cases=result.cases,\n    # …\n)","sourcePath":"openviking/session/compressor_v3.py","sourceLines":"267-300"}],"family":"session-memory"},{"id":"session-memory.memory-extraction.context-provider","parent":"session-memory.memory-extraction","name":"Context Provider","kind":"processing","sourcePath":"openviking/session/memory/session_extract_context_provider.py","symbol":"SessionExtractContextProvider","sourceLines":"56-80","pipelines":["write"],"summary":{"en":"Builds extraction prompt with pre-fetched existing memories and normalized images for the ReAct loop.","zh":"为 ReAct 循环构建提取提示，预取已有记忆并归一化图片内容"},"article":{"en":"`SessionExtractContextProvider` implements the `ExtractContextProvider` interface for session memory extraction. It builds the system instruction text (extraction goal, formatting rules) and provides memory type schemas via `get_memory_schemas()`. `ExtractLoop` assembles the schema JSON and combines both into the final system prompt. Before the ReAct loop starts, `prefetch()` performs one batched semantic search across all multi-file schema directories and directly reads single-file schema files — it does not do directory listing and does not read `.overview.md` files. In `eager_prefetch` mode it additionally reads the top-N search hits up front. Prefetching loads existing memories into the first turn so the LLM starts with context, reducing tool-call rounds. Image message parts get VLM-normalized descriptions. During the ReAct loop only the `read` tool is exposed (`get_tools()` returns `[\"read\"]`, or `[]` in `eager_prefetch` mode).","zh":"`SessionExtractContextProvider` 实现 `ExtractContextProvider` 接口，构建含提取目标、对话格式规则和记忆模式 JSON 的系统指令。ReAct 循环前 `prefetch()` 对多文件模式目录批量语义搜索、直接读取单文件模式文件，让 LLM 第一轮就带上已有记忆。图片消息由 VLM 归一化。循环中仅暴露 `read` 工具。"},"io":{"inputs":[{"en":"session messages","zh":"会话消息"},{"en":"memory type schemas","zh":"记忆类型模式"},{"en":"existing memory files","zh":"已有记忆文件"},{"en":"image message parts","zh":"图片消息片段"}],"outputs":[{"en":"system instruction prompt","zh":"系统指令提示"},{"en":"prefetch results","zh":"预取结果"},{"en":"VLM-normalized images","zh":"VLM归一化图片"},{"en":"memory tool execution results","zh":"记忆工具执行结果"}]},"family":"session-memory"},{"id":"session-memory.memory-apply","parent":"session-memory","name":"Memory Apply","kind":"processing","sourcePath":"openviking/session/memory/streaming_memory_updater.py","symbol":"StreamingMemoryUpdater + MemoryUpdater","sourceLines":"120-168","pipelines":["write"],"summary":{"en":"Batches concurrent memory writes, merges patches, applies per-field strategies to VikingFS files.","zh":"批量合并并发记忆写入，按字段策略写入 VikingFS 记忆文件"},"article":{"en":"Multiple sessions can commit concurrently. If each one wrote memory files directly, directory-level locks would serialize everything and race conditions would corrupt data. The memory-apply layer solves this concurrency problem.\n\n`StreamingMemoryUpdater` receives `MemoryUpdateRequest` objects from concurrent commits. It buffers incoming requests and merges overlapping patches using `PatchMergeContextProvider` before delegating downstream to the actual writer. This batching avoids directory-level locks while keeping writes consistent across concurrent sessions.\n\n`MemoryUpdater` is the executor that performs the actual filesystem writes. Its `apply_operations()` method writes to VikingFS using per-field `MergeOp` strategies defined by each `MemoryTypeSchema`: `PATCH` for editable fields, `REPLACE` for full overwrites, `SUM` for incrementing counters, and `IMMUTABLE` for protected fields that cannot change. Link arrays are merged separately by `merge_links()` from the `link_merge` module. Delete operations handle canonical merge and backlink propagation across related memory items.","zh":"多个会话可能同时提交。如果各自直接写记忆文件，目录锁会让所有写入串行化，竞态条件还会损坏数据。memory-apply 层解决这个问题。\n\n`StreamingMemoryUpdater` 接收并发的 `MemoryUpdateRequest`，缓冲后用 `PatchMergeContextProvider` 合并重叠补丁再下发。这避免了目录锁，同时保持写入一致性。\n\n`MemoryUpdater` 执行实际写入。`apply_operations()` 按 `MemoryTypeSchema` 定义的逐字段 `MergeOp` 策略写入 VikingFS：`PATCH` 对文本字段应用 SEARCH/REPLACE 差异合并，`REPLACE` 整体覆盖，`SUM` 对计数器做加法，`IMMUTABLE` 保护 created_at 等字段不被改动。链接数组由 `link_merge` 模块的 `merge_links()` 单独合并。删除操作处理规范合并和反向链接传播。"},"io":{"inputs":[{"en":"MemoryUpdateRequest objects","zh":"记忆更新请求对象"},{"en":"concurrent commit operations","zh":"并发提交操作"},{"en":"MemoryTypeSchema definitions","zh":"记忆类型模式定义"}],"outputs":[{"en":"VikingFS memory file writes","zh":"VikingFS记忆文件写入"},{"en":"merged patch results","zh":"合并补丁结果"},{"en":"delete operation results","zh":"删除操作结果"}]},"code":[{"lang":"python","title":{"en":"Per-field MergeOp dispatch","zh":"逐字段 MergeOp 合并"},"text":"# Process fields defined in schema (apply merge_op)\nfor field in schema.fields:\n    if field.name in resolved_op.memory_fields:\n        patch_value = resolved_op.memory_fields[field.name]\n        # …\n        # Use merge_op to process field value\n        merge_op = MergeOpFactory.from_field(field)\n        try:\n            new_value = merge_op.apply(current_value, patch_value)\n        # …\n        metadata[field.name] = new_value","sourcePath":"openviking/session/memory/memory_updater.py","sourceLines":"994-1019"}],"family":"session-memory"},{"id":"session-memory.memory-apply.isolation-handler","parent":"session-memory.memory-apply","name":"Isolation Handler","kind":"processing","sourcePath":"openviking/session/memory/memory_isolation_handler.py","symbol":"MemoryIsolationHandler","sourceLines":"36-60","pipelines":["write","manage.relations"],"summary":{"en":"Resolves write URIs by self/peer identity from message context, routes to correct user namespace.","zh":"根据消息身份解析写入 URI，路由到正确的用户或对等体命名空间"},"article":{"en":"`MemoryIsolationHandler` resolves where each memory item gets written on disk. It computes the `RoleScope` from identity information in session messages, then routes writes accordingly: self memories go to `viking://user/{user_id}/memories/`, while memories about other agents go to the peers directory. Operations are filtered by `MemoryPolicy` and `allowed_peer_ids` before routing. After filling in identity fields, `calculate_memory_uris()` applies the schema URI template to produce the final storage path.","zh":"`MemoryIsolationHandler` 根据会话消息中的身份信息计算 `RoleScope`，把每条记忆写入正确的命名空间：自身记忆写入 `viking://user/{user_id}/memories/`，关于其他代理的记忆写入 peers 目录。操作先按 `MemoryPolicy` 和 `allowed_peer_ids` 过滤，再由 `calculate_memory_uris()` 套用模式 URI 模板生成最终路径。"},"io":{"inputs":[{"en":"RequestContext","zh":"请求上下文"},{"en":"memory type schema","zh":"记忆类型模式"},{"en":"message peer ids","zh":"消息对等ID"},{"en":"MemoryPolicy filters","zh":"记忆策略过滤"}],"outputs":[{"en":"resolved write URIs","zh":"解析后写入URI"},{"en":"scoped memory operations","zh":"作用域记忆操作"},{"en":"filled identity fields","zh":"填充后身份字段"}]},"family":"session-memory"},{"id":"session-memory.memory-type-registry","parent":"session-memory","name":"Type Registry","kind":"namespace","sourcePath":"openviking/session/memory/memory_type_registry.py","symbol":"MemoryTypeRegistry","sourceLines":"28-80","pipelines":["write"],"summary":{"en":"Loads YAML memory type templates into in-memory schemas used by extraction and apply.","zh":"加载 YAML 记忆类型模板，提供提取和写入共用的内存模式"},"article":{"en":"`MemoryTypeRegistry` is the single source of truth for memory schemas. Extraction uses it to tell the LLM what fields exist, the isolation handler takes URI templates from it, and the updater takes per-field MergeOp strategies. Schemas come from YAML files in the bundled memory templates directory resolved via `PromptManager`, so operators can add or override memory types without code changes. The three-tier loading order is: built-in templates first, then experimental templates when `experimental_memory_switch` is enabled, then a configurable custom directory — later tiers replace earlier ones.","zh":"`MemoryTypeRegistry` 是记忆模式的单一事实来源：提取用它生成模式 JSON，隔离处理取 URI 模板，写入取字段合并策略。模式来自内置记忆模板目录的 YAML 文件，按内置、实验（`experimental_memory_switch`）、自定义目录三层加载，后加载的覆盖先前的。"},"io":{"inputs":[{"en":"YAML memory type templates","zh":"YAML记忆类型模板"},{"en":"custom templates directory","zh":"自定义模板目录"},{"en":"experimental memory switch","zh":"实验记忆开关"}],"outputs":[{"en":"MemoryTypeSchema objects","zh":"记忆类型模式对象"},{"en":"type name list","zh":"类型名称列表"},{"en":"field merge strategies","zh":"字段合并策略"}]},"family":"session-memory"},{"id":"session-memory.tool-result-externalization","parent":"session-memory","name":"Tool Results","kind":"storage","sourcePath":"openviking/session/tool_result_store.py","symbol":"ToolResultStore + ToolResultSynopsis","sourceLines":"100-150","pipelines":["write","manage.session-lifecycle"],"summary":{"en":"Externalizes large tool outputs to VikingFS with a content-aware synopsis stub in the message.","zh":"将大型工具输出外置到 VikingFS，消息中保留内容感知摘要"},"article":{"en":"When a tool output exceeds a size threshold or turn budget, `ToolResultStore` externalizes it to VikingFS and replaces the inline message body with a compact preview stub. `ToolResultSynopsis` detects the output's structural type and generates a content-aware summary. The store supports offset-based reads, substring search, and listing by tool name.","zh":"工具调用输出超过大小阈值或轮次预算时，`ToolResultStore` 将其外置到 VikingFS，消息内联替换为预览占位。`ToolResultSynopsis` 检测输出结构类型生成摘要。存储支持偏移读取、子串搜索和按工具名列举。"},"io":{"inputs":[{"en":"oversized tool output","zh":"超大工具输出"},{"en":"tool id and name","zh":"工具ID和名称"},{"en":"session URI","zh":"会话URI"},{"en":"output content type","zh":"输出内容类型"}],"outputs":[{"en":"externalized file at tool-results/","zh":"tool-results外置文件"},{"en":"content-aware synopsis stub","zh":"内容感知摘要占位"},{"en":"SHA-256 digest metadata","zh":"SHA-256摘要元数据"}]},"family":"session-memory"},{"id":"session-memory.skill-operations","parent":"session-memory","name":"Skill Ops","kind":"processing","sourcePath":"openviking/session/skill/skill_operation_updater.py","symbol":"SkillOperationUpdater","sourceLines":"46-80","pipelines":["write"],"summary":{"en":"Applies extracted skill operations as markdown files in the VikingFS skills/ directory.","zh":"将提取的技能操作写入 VikingFS skills 目录下的 Markdown 文件"},"article":{"en":"`SkillOperationUpdater` applies extracted skill operations to actual skill files on VikingFS. For each upsert operation it either creates a new skill Markdown file or patches an existing one using `MergeOpFactory` merge strategies. It works alongside `SkillProcessor` and `ContentWriteCoordinator` so skill assets get written and indexed for retrieval. In the legacy V2 path, duplicate operations are removed by `dedup.py` before apply; the V3 training path calls `apply_operations()` via `SkillPolicyUpdater` without a prior dedup step. Activation is gated by `config.memory.session_skill_extraction_enabled` and requires an available `skill_processor`.","zh":"`SkillOperationUpdater` 将技能提取结果写入 VikingFS。对 upsert 操作创建新 Markdown 或用 `MergeOpFactory` 补丁现有文件。配合 `SkillProcessor` 和 `ContentWriteCoordinator` 写入索引。V2 旧路径先经 `dedup.py` 去重；由配置开关 `session_skill_extraction_enabled` 控制激活，且需要可用的 `skill_processor`。"},"io":{"inputs":[{"en":"resolved skill operations","zh":"解析后技能操作"},{"en":"existing skill markdown files","zh":"现有技能Markdown"},{"en":"skill processor instance","zh":"技能处理器实例"}],"outputs":[{"en":"created skill markdown files","zh":"新建技能Markdown"},{"en":"updated skill markdown files","zh":"更新技能Markdown"},{"en":"indexed skill assets","zh":"索引技能资产"},{"en":"deduped operations","zh":"去重后操作"}]},"family":"session-memory"},{"id":"session-memory.training","parent":"session-memory","name":"Training","kind":"processing","sourcePath":"openviking/session/train/__init__.py","symbol":"training framework package","sourceLines":"1-190","pipelines":["write"],"summary":{"en":"Rollout-driven policy optimization: cases -> rollouts -> analysis -> gradient -> updated experience/skill files.","zh":"滚动驱动策略优化：从案例到分析再到梯度，更新经验技能文件"},"article":{"en":"The training sub-system implements rollout-driven policy optimization, turning extracted cases into updates for both experience and skill memory policies. A rollout means executing a training case against the LLM and observing what happens; a case is a structured training example extracted from conversation. A semantic gradient is the analyzer's structured judgment of what should change in a memory file to produce better behavior.\n\nIt runs in two modes. Online mode: at commit time the compressor analyzes each extracted case and submits the resulting gradients via `submit_gradients()`; `StreamingPolicyTrainer` buffers them and applies policy updates in batches. Offline mode: `OfflinePolicyOptimizationPipeline` runs batch train and eval over a curated case set.\n\nThe shared pipeline runs five stages. `RolloutExecutor` executes cases against the LLM to produce rollout data. `TrajectoryRolloutAnalyzer` extracts structured trajectories and semantic gradients from the results. `ExperienceGradientEstimator` filters those gradients to target real memory files on disk, and `PatchMergePolicyOptimizer` plans the specific file changes needed. Finally, `MemoryFilePolicyUpdater` or `SkillPolicyUpdater` applies the plan to VikingFS.\n\nTraining triggers automatically during commit when case memory items are extracted.","zh":"训练子系统通过滚动驱动的策略优化，将提取的案例转化为经验和技能记忆的策略更新。滚动（rollout）指对 LLM 执行一个训练案例并观察结果；语义梯度是分析器对记忆文件应如何改进的结构化判断。\n\n在线模式下，提交时由压缩器分析案例并提交梯度，`StreamingPolicyTrainer` 缓冲后批量更新策略文件。离线模式下，`OfflinePolicyOptimizationPipeline` 对案例集做批量训练评估。\n\n共用管线分五个阶段。`RolloutExecutor` 对 LLM 执行案例，`TrajectoryRolloutAnalyzer` 提取轨迹和语义梯度。随后 `ExperienceGradientEstimator` 过滤梯度指向真实文件，`PatchMergePolicyOptimizer` 规划变更。最后由 `MemoryFilePolicyUpdater` 或 `SkillPolicyUpdater` 写入 VikingFS。\n\n提交时提取到 case 条目自动触发训练。"},"io":{"inputs":[{"en":"training cases","zh":"训练案例"},{"en":"rollout execution results","zh":"滚动执行结果"},{"en":"current ExperienceSet","zh":"当前经验集"},{"en":"LLM completions","zh":"LLM补全"}],"outputs":[{"en":"updated experience files","zh":"更新后经验文件"},{"en":"updated skill policy files","zh":"更新后技能策略"},{"en":"evaluation metrics","zh":"评估指标"},{"en":"trajectory memory entries","zh":"轨迹记忆条目"}]},"family":"session-memory"},{"id":"session-memory.training.pipeline","parent":"session-memory.training","name":"Offline Pipeline","kind":"processing","sourcePath":"openviking/session/train/pipeline.py","symbol":"OfflinePolicyOptimizationPipeline","sourceLines":"43-80","pipelines":["write"],"summary":{"en":"Batch train/eval orchestrator composing rollout, analysis, gradient, and policy update stages.","zh":"批量训练评估编排器，组合滚动、分析、梯度和策略更新各阶段"},"article":{"en":"`OfflinePolicyOptimizationPipeline` composes the training interfaces for batch processing and evaluation. It wires together `PolicySnapshotter`, `RolloutExecutor`, `RolloutAnalyzer`, `GradientEstimator`, `PolicyOptimizer`, and `PolicyUpdater` through an internal `BatchPolicyTrainer` orchestrator. The `train()` method runs the full pipeline from case loading through to policy application, while `eval()` only executes rollouts and analysis without writing changes. `PipelineLifecycleHook` callbacks provide progress reporting and event recording throughout execution. Use `train()` to run the full optimization loop over a curated case set; use `eval()` to measure current policy quality without writing any changes — useful for comparing policy versions.","zh":"`OfflinePolicyOptimizationPipeline` 通过内部 `BatchPolicyTrainer` 编排器串联滚动执行、分析、梯度估计和策略更新组件。`train()` 执行从案例加载到策略应用的全流程；`eval()` 只执行滚动和分析、不写入变更，适合在不改动策略的情况下评估质量。`PipelineLifecycleHook` 提供进度报告和事件记录。"},"io":{"inputs":[{"en":"CaseLoader cases","zh":"案例加载器案例"},{"en":"ExperienceSet policy","zh":"经验集策略"},{"en":"pipeline config","zh":"管线配置"},{"en":"lifecycle hooks","zh":"生命周期钩子"}],"outputs":[{"en":"updated policy set","zh":"更新后策略集"},{"en":"evaluation metrics","zh":"评估指标"},{"en":"progress events","zh":"进度事件"}]},"family":"session-memory"},{"id":"session-memory.training.rollout-analysis","parent":"session-memory.training","name":"Rollout Analysis","kind":"processing","sourcePath":"openviking/session/train/components/trajectory_analyzer.py","symbol":"TrajectoryRolloutAnalyzer","sourceLines":"60-120","pipelines":["write"],"summary":{"en":"LLM analyzes rollouts to extract structured trajectories and semantic gradients for policy learning.","zh":"LLM 分析滚动结果，提取结构化轨迹和语义梯度供策略学习"},"article":{"en":"`TrajectoryRolloutAnalyzer` takes a `Rollout` (a training case paired with conversation messages) and uses an LLM to analyze what happened during execution. It extracts structured `Trajectory` objects capturing step-by-step agent actions with their outcomes, and `SemanticGradient` objects identifying what should change in experience or skill memories to improve future results. The analyzer serves both the online streaming path and the offline batch pipeline. Each trajectory gets a storage URI under `viking://user/{user_id}/memories/trajectories/`.","zh":"`TrajectoryRolloutAnalyzer` 接收 `Rollout`（训练案例加对话消息），用 LLM 分析执行过程：`Trajectory` 记录代理的逐步操作及其结果，`SemanticGradient` 指出经验或技能记忆应改进的方向。同时服务在线流式和离线批量管线，每条轨迹存储在 `viking://user/{user_id}/memories/trajectories/`。"},"io":{"inputs":[{"en":"rollout case and messages","zh":"滚动案例和消息"},{"en":"LLM","zh":"LLM"},{"en":"analyzer context config","zh":"分析器上下文配置"}],"outputs":[{"en":"Trajectory objects","zh":"轨迹对象"},{"en":"SemanticGradient objects","zh":"语义梯度对象"},{"en":"trajectory storage URIs","zh":"轨迹存储URI"}]},"family":"session-memory"},{"id":"session-memory.training.gradient-estimator","parent":"session-memory.training","name":"Gradient Estimator","kind":"processing","sourcePath":"openviking/session/train/components/gradient_estimator.py","symbol":"ExperienceGradientEstimator","sourceLines":"41-80","pipelines":["write"],"summary":{"en":"Filters analysis gradients against current ExperienceSet, produces patch gradients targeting real files.","zh":"将分析梯度与现有经验集比对，产出指向真实文件的补丁梯度"},"article":{"en":"Rollout analysis produces raw gradients that need targeting to real memory files on disk. `ExperienceGradientEstimator` takes the analysis results and the current `ExperienceSet` as inputs. It reads existing experience files from VikingFS for comparison against the proposed gradient content, then produces actionable `PatchSemanticGradient` objects with `before_file` and `after_file` representations. The estimator serves both the online `StreamingPolicyTrainer` for per-case submission and the `BatchPolicyTrainer` for offline processing.","zh":"滚动分析产出的原始梯度需要锚定到真实记忆文件。`ExperienceGradientEstimator` 读入分析结果和 `ExperienceSet`，从 VikingFS 读取已有文件比对，经过滤后产出 `PatchSemanticGradient`，附带 before_file 和 after_file 表示。"},"io":{"inputs":[{"en":"rollout analysis results","zh":"滚动分析结果"},{"en":"current ExperienceSet","zh":"当前经验集"},{"en":"existing experience files","zh":"现有经验文件"}],"outputs":[{"en":"filtered SemanticGradients","zh":"过滤后语义梯度"},{"en":"PatchSemanticGradient objects","zh":"补丁语义梯度对象"}]},"family":"session-memory"},{"id":"session-memory.training.streaming-trainer","parent":"session-memory.training","name":"Policy Trainer","kind":"processing","sourcePath":"openviking/session/train/components/policy_trainer.py","symbol":"StreamingPolicyTrainer","sourceLines":"130-260","pipelines":["write"],"summary":{"en":"Online trainer: buffers per-case gradient submissions from commits, applies policy updates in batches.","zh":"在线训练器：缓冲每次提交的梯度，按批量触发策略更新"},"article":{"en":"`StreamingPolicyTrainer` is the online training path. It has two entry points: `submit_rollout()` runs rollout analysis and gradient estimation inside the trainer; `submit_gradients()` (the path used by session commits) accepts pre-computed gradients and skips both. Either way gradients go into an in-memory buffer (`StreamingBatcher`); a policy update fires when the buffer reaches `max_gradients_per_update` or the oldest gradient waits `max_wait_seconds`, then `MemoryFilePolicyUpdater` or `SkillPolicyUpdater` writes to VikingFS. Multiple trainers are keyed by `StreamingPolicyTrainerKey` so experience and skill policies train independently. The trainer is shared process-wide through the `get_streaming_policy_trainer()` singleton accessor.","zh":"`StreamingPolicyTrainer` 是在线训练路径。`submit_rollout()` 在内部完成分析与梯度估计；会话提交路径改用 `submit_gradients()` 直接提交已算好的梯度。梯度先进入缓冲区，按条数或等待时间批量触发策略更新并写入 VikingFS。按 `StreamingPolicyTrainerKey` 区分经验与技能训练器，进程内共享单例。"},"io":{"inputs":[{"en":"per-case gradient submissions","zh":"逐案例梯度提交"},{"en":"rollout data","zh":"滚动数据"},{"en":"trainer config","zh":"训练器配置"}],"outputs":[{"en":"updated experience files","zh":"更新后经验文件"},{"en":"updated skill policy files","zh":"更新后技能策略"},{"en":"buffered gradient state","zh":"缓冲梯度状态"}]},"code":[{"lang":"python","title":{"en":"Batching contract (docstring)","zh":"批量更新契约（docstring）"},"text":"@dataclass(slots=True)\nclass StreamingPolicyTrainer:\n    \"\"\"Long-lived rollout trainer that batches concurrent semantic gradients.\n\n    ``submit_rollout`` analyzes a rollout and estimates gradients immediately,\n    then appends those gradients to an in-memory buffer.  A policy update is\n    automatically triggered either when the buffer reaches\n    ``max_gradients_per_update`` or when the oldest buffered gradient waits at\n    least ``max_wait_seconds``.  If the submitting call triggers a count-based\n    flush, it waits for optimizer/apply completion before returning.\n    \"\"\"","sourcePath":"openviking/session/train/components/policy_trainer.py","sourceLines":"129-139"}],"family":"session-memory"},{"id":"storage-fabric","parent":null,"name":"Storage Fabric","kind":"storage","sourcePath":"openviking/storage/__init__.py","symbol":"storage package","sourceLines":"1-80","pipelines":[],"summary":{"en":"Unify content and vector persistence behind URI-based abstractions.","zh":"以 viking:// URI 统一内容与向量持久化层"},"article":{"en":"The Storage Fabric is the persistence foundation of OpenViking. Content storage and vector index storage are kept separate, so callers don't directly touch disk paths or database handles.\n\nContent lives in AGFS/RAGFS, a Rust file system that supports local disk, S3, and in-memory backends. Vectors and metadata live in a pluggable vector database behind a common adapter interface. VikingFS provides a `viking://` URI abstraction over both backends, and `FileEncryptor` adds envelope encryption for files at rest.\n\nThe package exports singletons for `VikingFS`, `QueueManager`, and the vector backend. Heavy native modules load lazily via `__getattr__` so that importing `openviking.storage` never blocks on native library initialization during parallel import. Between writes and queries, `QueueManager` runs named queues for embedding generation and semantic sidecar extraction, backed by AGFS so messages survive restarts.","zh":"Storage Fabric 是 OpenViking 的持久化基础。内容存储和向量索引存储各自独立，调用方不直接接触磁盘路径或数据库句柄。\n\n内容放在 AGFS/RAGFS 里——一个 Rust 文件系统，支持本地磁盘、S3 兼容存储和内存后端。向量和元数据走可插拔的向量数据库，统一 adapter 接口隔离后端差异。`VikingFS` 用 `viking://` URI 覆盖两套后端，`FileEncryptor` 为静态文件做信封加密。\n\n包导出 `VikingFS`、`QueueManager` 和向量后端单例。重量级原生模块通过 `__getattr__` 懒加载，避免并行 import 时卡在原生库初始化上。写入和查询之间，`QueueManager` 跑 Embedding、Semantic 等命名队列，处理嵌入生成和语义摘要提取，消息落在 AGFS 上，重启后仍在。"},"io":{"inputs":[{"en":"viking:// URI requests","zh":"viking:// URI 请求"},{"en":"file content bytes","zh":"文件内容字节"},{"en":"query filter expressions","zh":"查询过滤表达式"},{"en":"Embedding/Semantic messages","zh":"Embedding/Semantic 消息"}],"outputs":[{"en":"file read/write results","zh":"文件读写结果"},{"en":"vector search hits","zh":"向量搜索命中"},{"en":"encrypted file blobs","zh":"加密文件二进制"},{"en":"queue processing status","zh":"队列处理状态"}]},"family":"storage-fabric"},{"id":"storage-fabric.vikingfs","parent":"storage-fabric","name":"VikingFS","kind":"service","sourcePath":"openviking/storage/viking_fs.py","symbol":"VikingFS","sourceLines":"253-4200","pipelines":["write","retrieve","manage.context-fs","manage.relations"],"summary":{"en":"Maps viking:// URIs to account-scoped AGFS paths and exposes file plus semantic operations.","zh":"viking:// URI 到账户隔离路径映射，提供文件与语义操作"},"article":{"en":"`VikingFS` is the RAGFS-based file system for OpenViking. Every call enters as a `viking://` URI; `_uri_to_path()` converts it to `/local/{account_id}/{remainder}`, giving each account an isolated namespace. Path traversal attempts — `.`, `..`, backslashes, and drive-prefixed paths like `C:` — are rejected before any operation runs.\n\nThe interface splits into two API groups. Basic RAGFS commands — `read`, `write`, `mkdir`, `rm`, `mv`, `grep`, `stat`, `ls` — forward to `AsyncAGFSClient`, which runs blocking calls off the event loop. Semantic capabilities — `abstract`, `overview`, `find`, `search`, `relations`, `link`, `unlink` — combine file reads with vector store queries. On `rm` and `mv` it synchronizes vector index records so the search index stays aligned with the file tree.\n\nAccess control uses `RequestContext` with namespace- and visibility-based checks: `_ensure_access` for reads, `_ensure_mutable_access` for writes (adds hidden-actor-peer and supported-namespace checks), `_ensure_delete_access` for removals. `bind_request_context` lets internal call paths inherit the current caller identity instead of threading it through every signature.","zh":"`VikingFS` 是基于 RAGFS 的 OpenViking 文件系统。调用以 `viking://` URI 进入，`_uri_to_path()` 转成 `/local/{account_id}/{remainder}`，每账户隔离命名空间。路径穿越形式——`.`、`..`、反斜杠、Windows 盘符（如 `C:`）——在任何操作执行前全部被拒绝。\n\nAPI 分两组：基础命令——`read`、`write`、`mkdir`、`rm`、`mv`、`grep`、`stat`、`ls`——转发给 `AsyncAGFSClient`，阻塞调用移出事件循环不卡 async 链；语义能力——`abstract`、`overview`、`find`、`search`、`relations`、`link`、`unlink`——结合文件读取与向量查询。`rm` 和 `mv` 同步向量索引记录，保持搜索与文件树一致。\n\n访问控制用 `RequestContext` 做命名空间和可见性检查：读用 `_ensure_access`，写加隐藏 actor-peer 视图和受支持命名空间校验，删除在此基础上再检查。`bind_request_context` 让内部调用继承当前身份不用层层传参。"},"io":{"inputs":[{"en":"viking:// URI + RequestContext","zh":"viking:// URI 和请求上下文"},{"en":"file content for write","zh":"待写入文件内容"},{"en":"search query + filters","zh":"搜索查询和过滤条件"}],"outputs":[{"en":"file bytes or stat metadata","zh":"文件字节或元数据"},{"en":"semantic search results","zh":"语义搜索结果"},{"en":"directory listing","zh":"目录列表"},{"en":"vector sync confirmation","zh":"向量同步确认"}]},"family":"storage-fabric"},{"id":"storage-fabric.vikingfs.content-write","parent":"storage-fabric.vikingfs","name":"Content Write","kind":"processing","sourcePath":"openviking/storage/content_write.py","symbol":"ContentWriteCoordinator","sourceLines":"47-865","pipelines":["write","manage.session-lifecycle"],"summary":{"en":"Coordinates locked file writes with downstream semantic enqueue and optional wait-for-completion.","zh":"协调加锁文件写入与下游语义队列入队，支持等待完成模式"},"article":{"en":"`ContentWriteCoordinator` handles file writes end to end. It takes a `viking://` URI, content, and `RequestContext`, acquires a path lock through `LockManager` so two writers cannot interleave bytes on the same file or race the downstream semantic re-enqueue, persists bytes via `VikingFS.write_file()`, and enqueues a `SemanticMsg` for asynchronous sidecar regeneration. The `wait` flag with `timeout` turns the enqueue into a blocking call that returns downstream `semantic_status` and `vector_status`.","zh":"`ContentWriteCoordinator` 端到端处理文件写入。接收 URI、内容和 `RequestContext`，经 `LockManager` 获取路径锁防止并发写入交错或与下游语义入队竞争，调 `VikingFS.write_file()` 持久化字节并入队 `SemanticQueue` 触发异步侧车重生成。`wait` 标志加 `timeout` 把入队改为阻塞调用，返回下游 `semantic_status` 和 `vector_status`。"},"io":{"inputs":[{"en":"URI + content + RequestContext","zh":"URI、内容和请求上下文"},{"en":"lock handle from LockManager","zh":"LockManager 锁句柄"}],"outputs":[{"en":"write result dict","zh":"写入结果字典"},{"en":"SemanticMsg enqueue","zh":"SemanticMsg 入队"},{"en":"queue processing status","zh":"队列处理状态"}]},"code":[{"lang":"python","title":{"en":"Lock / write / enqueue / release sequence","zh":"加锁 / 写入 / 入队 / 释放流程"},"text":"        acquired = await lock_manager.acquire_exact_path(handle, lock_path)\n        # ...\n            await self._write_in_place(\n                # ...\n            )\n            content_written = True\n            await self._enqueue_semantic_refresh(\n                root_uri=root_uri,\n                changed_uri=uri,\n                # ...\n            )\n            semantic_enqueued = True\n            await lock_manager.release(handle)","sourcePath":"openviking/storage/content_write.py","sourceLines":"249-279"}],"family":"storage-fabric"},{"id":"storage-fabric.agfs","parent":"storage-fabric","name":"AGFS / RAGFS","kind":"storage","sourcePath":"openviking/pyagfs/__init__.py","symbol":"RAGFSBindingClient","sourceLines":"99-190","pipelines":["write","retrieve","manage.context-fs","manage.pack-backup"],"summary":{"en":"Rust-based POSIX file operations on local/S3/memory backends.","zh":"Rust 实现的 POSIX 文件操作，支持本地、S3、内存后端"},"article":{"en":"AGFS (now branded RAGFS) is the Rust content storage engine for OpenViking. It is a full Rust reimplementation of the original Go AGFS project, consumed in-process through the `ragfs-python` PyO3 binding. The `pyagfs` package loads the binding via `_load_rust_binding()`, preferring the pip-installed `ragfs_python` and falling back to vendored `.so`/`.dylib` in `openviking/lib/`. `AsyncAGFSClient` wraps the synchronous client to run blocking calls off the event loop.\n\nSupported backends include `localfs`, S3-compatible, and in-memory stores. The Rust engine exposes a `PluginRegistry` that mounts specialized filesystem plugins — `kvfs`, `localfs`, `memfs`, `queuefs`, `s3fs`, `serverinfofs`, `sqlfs` — at configurable mount points. Optional cache crates (`ragfs-cache-redis`, `mooncake`, `yuanrong`) provide read-through caching layers.","zh":"AGFS（现称 RAGFS）是 OpenViking 的 Rust 内容存储引擎。它是原始 Go 版 AGFS 的完整 Rust 重实现，通过 `ragfs-python` PyO3 绑定在进程内消费。`pyagfs` 包通过 `_load_rust_binding()` 加载绑定：优先加载 pip 安装的 `ragfs_python`，找不到时回退到 `openviking/lib/` 下自带的 `.so`/`.dylib`。`AsyncAGFSClient` 用 `asyncio.to_thread` 把阻塞 IO 移出事件循环，避免卡住 async 调用链。\n\nRust 引擎通过 `PluginRegistry` 挂载专用文件系统插件——`kvfs` 键值、`localfs` 本地磁盘、`memfs` 内存临时数据、`queuefs` 消息持久化、`s3fs` S3 兼容对象存储、`serverinfofs` 运行时元数据、`sqlfs` SQL 后端——各在可配置挂载点。可选缓存 crate 提供读透缓存加速。"},"io":{"inputs":[{"en":"POSIX file path + operation","zh":"POSIX 文件路径和操作"},{"en":"file bytes for write","zh":"待写入文件字节"}],"outputs":[{"en":"file bytes or stat","zh":"文件字节或 stat"},{"en":"directory listing entries","zh":"目录列表条目"},{"en":"grep match lines","zh":"grep 匹配行"}]},"family":"storage-fabric"},{"id":"storage-fabric.agfs.ragfs-engine","parent":"storage-fabric.agfs","name":"RAGFS Engine","kind":"storage","sourcePath":"crates/ragfs/src/plugins/mod.rs","symbol":"PluginRegistry plugin mounts","sourceLines":"1-15","pipelines":["write","retrieve","manage.context-fs"],"summary":{"en":"Rust filesystem engine with PluginRegistry mounting per-backend plugins.","zh":"Rust 文件系统引擎，PluginRegistry 挂载各后端插件"},"article":{"en":"The RAGFS engine is a Rust crate consumed in-process through `ragfs-python`. Its `PluginRegistry` mounts filesystem plugins at configurable paths: `kvfs` for key-value stores, `localfs` for disk, `memfs` for ephemeral data, `queuefs` for message persistence, `s3fs` for S3-compatible object storage, `serverinfofs` for runtime metadata, and `sqlfs` for SQL-backed storage. Each plugin implements the `FileSystem` trait; `MountableFS` routes operations by path prefix. Optional cache crates (`ragfs-cache-redis`, `mooncake`, `yuanrong`) sit between the registry and the backend plugin.","zh":"RAGFS 引擎是 Rust crate，通过 `ragfs-python` 在进程内消费。`PluginRegistry` 在可配置路径挂载文件系统插件：`kvfs` 键值存储、`localfs` 本地磁盘、`memfs` 内存临时数据、`queuefs` 消息持久化、`s3fs` S3 兼容对象存储、`serverinfofs` 运行时元数据、`sqlfs` SQL 后端。各插件实现 `FileSystem` trait，`MountableFS` 按路径前缀路由。可选缓存 crate 插在注册表和后端插件之间。"},"io":{"inputs":[{"en":"plugin registration calls","zh":"插件注册调用"},{"en":"POSIX file operations","zh":"POSIX 文件操作"}],"outputs":[{"en":"mounted filesystem routes","zh":"挂载后文件系统路由"},{"en":"plugin-specific read/write results","zh":"插件专属读写结果"}]},"family":"storage-fabric"},{"id":"storage-fabric.vector-index","parent":"storage-fabric","name":"Vector Index","kind":"service","sourcePath":"openviking/storage/viking_vector_index_backend.py","symbol":"VikingVectorIndexBackend","sourceLines":"652-1390","pipelines":["write","retrieve","manage.relations"],"summary":{"en":"Singleton facade managing per-account vector CRUD, hybrid search, and collection lifecycle.","zh":"单例门面，管理每账户向量 CRUD、混合搜索与集合生命周期"},"article":{"en":"`VikingVectorIndexBackend` is a singleton facade for vector index management across all accounts. It creates `_SingleAccountBackend` instances on demand, each bound to an `account_id` but all sharing one underlying `CollectionAdapter`. This sharing avoids RocksDB LOCK contention when multiple accounts hit the same physical store simultaneously.\n\nThe facade handles collection lifecycle — `create_collection`, `drop_collection`, `collection_exists` — and per-record CRUD operations: `upsert`, `get`, `delete`, `exists`, `fetch_by_uri`. Search supports hybrid queries (dense semantic embedding plus sparse keyword matching) with `FilterExpr` conditions and `PathScope` prefix limits. URI-based helpers like `remove_by_uri` and `_remove_descendants` cascade deletes through directory subtrees.\n\n`VikingDBManager` extends it with `QueueManager` integration, so embedding requests go through the Embedding queue instead of blocking the caller. `VikingDBManagerProxy` binds a `RequestContext` for tenant-scoped access control across all operations.","zh":"`VikingVectorIndexBackend` 是单例门面，真正管理全账户向量索引。按需创建 `_SingleAccountBackend` 实例，各绑定 `account_id`，共享同 `CollectionAdapter`，避免多账户同时访问同一物理存储时的 RocksDB LOCK 文件竞争——这是多租户场景下的关键设计决策，显著降低了文件锁冲突和系统资源浪费。\n\n门面管集合生命周期——`create_collection`、`drop_collection`、`collection_exists`——和单条记录操作：`upsert`、`get`、`delete`、`exists`、`fetch_by_uri`。搜索支持稠密语义向量加稀疏关键词匹配的混合查询，可带 `FilterExpr` 条件和 `PathScope` 前缀限制，基于 URI 的方法沿目录子树级联删除，保证索引与文件树始终保持同步。\n\n`VikingDBManager` 集成 `QueueManager`，嵌入请求走 Embedding 队列不阻塞调用线程；`VikingDBManagerProxy` 绑定 `RequestContext` 实现租户级访问控制，所有操作都带调用者身份上下文。"},"io":{"inputs":[{"en":"account_id + vector records","zh":"账户 ID 和向量记录"},{"en":"search vectors + filters","zh":"搜索向量和过滤条件"},{"en":"collection lifecycle commands","zh":"集合生命周期命令"}],"outputs":[{"en":"upsert/delete confirmations","zh":"upsert/删除确认"},{"en":"ranked search results","zh":"排序后搜索结果"},{"en":"fetched record metadata","zh":"取回的记录元数据"}]},"family":"storage-fabric"},{"id":"storage-fabric.vector-index.adapters","parent":"storage-fabric.vector-index","name":"DB Adapters","kind":"integration","sourcePath":"openviking/storage/vectordb_adapters/factory.py","symbol":"create_collection_adapter","sourceLines":"17-50","pipelines":["write","retrieve"],"summary":{"en":"Factory that creates backend-specific CollectionAdapter instances from a config name.","zh":"根据配置后端名称创建对应 CollectionAdapter 实例的工厂"},"article":{"en":"The adapter factory in `vectordb_adapters/factory.py` maps seven backend names to `CollectionAdapter` subclasses: `local` (CuVS-accelerated), `cuvs`, `http`, `opengauss`, `qdrant`, `volcengine`, `vikingdb`. `create_collection_adapter()` looks up `config.backend` in `_ADAPTER_REGISTRY`, with dynamic class-path import as fallback. Each adapter implements the `ICollection` interface and truncates text fields to `VIKINGDB_TEXT_FIELD_BYTE_LIMIT` (1 MiB) at valid UTF-8 boundaries.","zh":"适配器工厂在 `vectordb_adapters/factory.py` 中将七个后端名称映射到 `CollectionAdapter` 子类：`local`（CuVS 加速）、`cuvs`、`http`、`opengauss`、`qdrant`、`volcengine`、`vikingdb`。`create_collection_adapter()` 按 `config.backend` 查 `_ADAPTER_REGISTRY`，含点的名称回退到动态导入。适配器实现 `ICollection`，upsert 前将文本字段截断到 `VIKINGDB_TEXT_FIELD_BYTE_LIMIT`（1 MiB），在合法 UTF-8 边界处切分，避免产生乱码。"},"io":{"inputs":[{"en":"VectorDBBackendConfig","zh":"向量数据库后端配置"},{"en":"vector records for upsert","zh":"待 upsert 向量记录"},{"en":"search vectors + keywords","zh":"搜索向量和关键词"}],"outputs":[{"en":"CollectionAdapter instance","zh":"CollectionAdapter 实例"},{"en":"ranked search results","zh":"排序后搜索结果"},{"en":"upsert/delete status","zh":"upsert/删除状态"}]},"code":[{"lang":"python","title":{"en":"Backend registry and factory lookup","zh":"后端注册表与工厂查找"},"text":"_ADAPTER_REGISTRY: dict[str, type[CollectionAdapter]] = {\n    \"local\": LocalCollectionAdapter,\n    \"cuvs\": CuVSCollectionAdapter,\n    \"http\": HttpCollectionAdapter,\n    # ...\n    \"vikingdb\": VikingDBPrivateCollectionAdapter,\n}\n\ndef create_collection_adapter(config) -> CollectionAdapter:\n    \"\"\"Unified factory entrypoint for backend-specific collection adapters.\"\"\"\n    backend = config.backend\n    adapter_cls = _ADAPTER_REGISTRY.get(backend)\n    # ...\n    return adapter_cls.from_config(config)","sourcePath":"openviking/storage/vectordb_adapters/factory.py","sourceLines":"17-50"}],"family":"storage-fabric"},{"id":"storage-fabric.vector-index.local-vectordb","parent":"storage-fabric.vector-index","name":"Local VectorDB","kind":"storage","sourcePath":"openviking/storage/vectordb/collection/collection.py","symbol":"ICollection / LocalCollection","sourceLines":"21-117","pipelines":["write","retrieve"],"summary":{"en":"Embedded zero-dependency vector database with dense+sparse hybrid search and TTL.","zh":"零依赖嵌入式向量数据库，支持稠密加稀疏混合搜索和 TTL"},"article":{"en":"The `local` backend is a full embedded vector database shipped inside the OpenViking wheel — no external DB required. `LocalCollection` implements `ICollection` with dense vector and sparse keyword hybrid search, TTL auto-expiry via `BackgroundScheduler` periodic cleanup, and on-demand index rebuild. The C++ SIMD engine compiles to three abi3 variants (`sse3`, `avx2`, `avx512`) selected at import time by CPU capability detection. It is the default backend for development and small deployments.","zh":"`local` 后端是完整嵌入式向量数据库，随 OpenViking 打包，无需外部数据库。`LocalCollection` 实现 `ICollection`，支持稠密向量加稀疏关键词混合搜索、`BackgroundScheduler` 定期 TTL 过期清理、按需索引重建。C++ SIMD 引擎编译为三种 abi3 变体（`sse3`、`avx2`、`avx512`），导入时按 CPU 能力自动选择。是开发和小规模部署的默认后端。"},"io":{"inputs":[{"en":"vector records for upsert","zh":"待 upsert 向量记录"},{"en":"dense + sparse search vectors","zh":"稠密和稀疏搜索向量"},{"en":"collection config (TTL, dimensions)","zh":"集合配置（TTL、维度）"}],"outputs":[{"en":"ranked hybrid search results","zh":"排序后混合搜索结果"},{"en":"upsert/delete status","zh":"upsert/删除状态"},{"en":"TTL-expired record cleanup","zh":"TTL 过期记录清理"}]},"family":"storage-fabric"},{"id":"storage-fabric.queuefs","parent":"storage-fabric","name":"QueueFS","kind":"queue","sourcePath":"openviking/storage/queuefs/queue_manager.py","symbol":"QueueManager","sourceLines":"63-402","pipelines":["write","manage.watch-tasks"],"summary":{"en":"Named message queues with AGFS-backed persistence and worker threads.","zh":"命名消息队列，AGFS 持久化加工作线程"},"article":{"en":"`QueueManager` manages named queues backed by the AGFS QueueFS plugin at a configurable `mount_point` (default `/queue`). It creates three standard queues: `EmbeddingQueue`, `SemanticQueue`, and `ExternalParse`. Each `NamedQueue` serializes messages to AGFS-backed storage, provides enqueue/dequeue with error tracking and requeue support, and runs concurrent worker threads.\n\n`SemanticQueue` coalesces rapid re-enqueues of the same parent directory. Memory-context messages use a 45-second dedupe window (`_MEMORY_PARENT_SEMANTIC_DEDUPE_SEC`); resource/skill-context messages use version-based coalescing via a `coalesce_key` that increments on each re-enqueue. This prevents redundant LLM calls when a batch write touches the same directory repeatedly.","zh":"`QueueManager` 管理 AGFS QueueFS 插件的命名队列，挂载点可配置。内置三个标准队列：`EmbeddingQueue`、`SemanticQueue`、`ExternalParse`。消息序列化到 AGFS，支持错误追踪和并发工作线程。`SemanticQueue` 合并同目录快速重复入队：memory 消息用 45 秒时间窗去重，resource/skill 用版本号 `coalesce_key` 机制，避免批量写入触发重复 LLM 调用。"},"io":{"inputs":[{"en":"Embedding/Semantic messages","zh":"Embedding/Semantic 消息"},{"en":"queue config + handlers","zh":"队列配置和处理器"}],"outputs":[{"en":"dequeued handler calls","zh":"出队处理器调用"},{"en":"error tracking records","zh":"错误追踪记录"},{"en":"requeue decisions","zh":"重新入队决定"}]},"family":"storage-fabric"},{"id":"storage-fabric.transactions","parent":"storage-fabric","name":"Locks & Redo","kind":"processing","sourcePath":"openviking/storage/transaction/lock_manager.py","symbol":"LockManager","sourceLines":"35-598","pipelines":["write","manage.session-lifecycle"],"summary":{"en":"Path-based lock lifecycle management plus redo-log crash recovery markers.","zh":"基于路径的锁生命周期管理，加 redo 日志崩溃恢复标记"},"article":{"en":"`LockManager` is the global singleton managing path-based lock lifecycle. It acquires exact single-path locks (type `E`) and directory-subtree tree locks (type `T`) via `PathLockEngine`. Each lock file on AGFS carries a fencing token in `owner_id:timestamp_ns:type` format, so a stale lock holder cannot silently overwrite a newer writer's state. `RedoLog` provides crash recovery by writing pending-task markers before operations and re-executing leftovers at startup.","zh":"`LockManager` 是全局单例，管理基于路径的锁生命周期。通过 `PathLockEngine` 获取精确单路径锁（`E` 型）和目录子树树锁（`T` 型）。每把锁在 AGFS 上写带 fencing token 的锁文件，格式 `owner_id:timestamp_ns:type`——防止旧锁持有者在新锁生效后仍写入，覆盖更新的状态。`RedoLog` 提供崩溃恢复：操作前写待执行标记，启动时重新执行残留标记。"},"io":{"inputs":[{"en":"path lock requests","zh":"路径锁请求"},{"en":"redo task markers","zh":"redo 任务标记"}],"outputs":[{"en":"lock handles with fencing tokens","zh":"含 fencing token 的锁句柄"},{"en":"redo recovery on startup","zh":"启动时 redo 恢复"}]},"family":"storage-fabric"},{"id":"storage-fabric.ovpack","parent":"storage-fabric","name":"OVPack","kind":"processing","sourcePath":"openviking/storage/ovpack/operations.py","symbol":"export_ovpack/import_ovpack/backup_ovpack/restore_ovpack","sourceLines":"264-706","pipelines":["manage.pack-backup"],"summary":{"en":"URI subtree to .ovpack ZIP archive export/import plus public-scope backup and restore.","zh":"URI 子树与 .ovpack ZIP 归档互转，支持公开作用域备份恢复"},"article":{"en":"OVPack handles `.ovpack` ZIP archive export/import and public-scope backup/restore. `export_ovpack()` packages a URI subtree with a `manifest.json` containing `format_version`, `kind`, `root`, `entries`, plus `index_records.jsonl` for vector metadata. `import_ovpack()` validates manifests, resolves conflicts via `fail`/`overwrite`/`skip`, and restores vector snapshots in `auto`/`recompute`/`require` modes. `backup_ovpack()` exports all public scopes as a restore-only package.","zh":"OVPack 负责 `.ovpack` ZIP 归档的导入导出，以及公开作用域备份恢复。公开作用域指 `viking://resources` 等非用户私有路径。\n\n`export_ovpack()` 打包 URI 子树，生成 `manifest.json`（含 `format_version`、`kind`、`root`、`entries`）和向量元数据 `index_records.jsonl`。`import_ovpack()` 校验清单，冲突时 `fail` 直接报错、`overwrite` 替换、`skip` 跳过；向量恢复 `auto` 自动判断、`recompute` 强制重新计算、`require` 必须用快照。`backup_ovpack()` 导出全部公开作用域为恢复专用包。"},"io":{"inputs":[{"en":"URI subtree for export","zh":"待导出 URI 子树"},{"en":".ovpack file path","zh":".ovpack 文件路径"},{"en":"conflict resolution mode","zh":"冲突解决模式"}],"outputs":[{"en":".ovpack ZIP archive","zh":".ovpack ZIP 归档"},{"en":"imported file tree","zh":"导入后文件树"},{"en":"vector snapshot restore","zh":"向量快照恢复"}]},"family":"storage-fabric"},{"id":"storage-fabric.encryption","parent":"storage-fabric","name":"Encryption","kind":"processing","sourcePath":"openviking/crypto/encryptor.py","symbol":"FileEncryptor","sourceLines":"57-332","pipelines":["write","retrieve"],"summary":{"en":"Envelope encryption (OVE1 format) for file content at rest using per-file random keys.","zh":"OVE1 信封加密，每文件随机密钥，保护静态文件内容"},"article":{"en":"`FileEncryptor` implements OVE1 envelope encryption for file content at rest. Each file gets its own random 256-bit File Key. The Account Key that encrypts the File Key derives from the Root Key via HKDF-SHA256, using salt `openviking-kek-salt-v1` and info `openviking:kek:v1:{account_id}`. `RootKeyProvider` supports three backends: `LocalFileProvider`, `VaultProvider`, and `VolcengineKMSProvider`. Encryption uses AES-256-GCM with a random IV and 16-byte authentication tag.","zh":"`FileEncryptor` 实现 OVE1 信封加密。每文件独立随机 256 位密钥，由 Root Key 派生的 Account Key 加密。`RootKeyProvider` 支持本地文件、Vault、火山引擎 KMS 三种后端。加密用 AES-256-GCM，随机 IV 加 16B 认证标签。"},"io":{"inputs":[{"en":"plaintext bytes + account_id","zh":"明文字节和账户 ID"},{"en":"encrypted ciphertext","zh":"加密密文"}],"outputs":[{"en":"OVE1 encrypted bytes","zh":"OVE1 加密字节"},{"en":"decrypted plaintext","zh":"解密后明文"},{"en":"encryption metrics","zh":"加密指标"}]},"code":[{"lang":"python","title":{"en":"Envelope encryption: key generation + wrap","zh":"信封加密：密钥生成与封装"},"text":"        try:\n            file_key = secrets.token_bytes(32)\n            data_iv = secrets.token_bytes(12)\n            encrypted_content = await self._aes_gcm_encrypt(file_key, data_iv, plaintext)\n            encrypted_file_key, key_iv = await self.provider.encrypt_file_key(file_key, account_id)\n            return self._build_envelope(\n                self._provider_type,\n                encrypted_file_key,\n                key_iv,\n                data_iv,\n                encrypted_content,\n            )","sourcePath":"openviking/crypto/encryptor.py","sourceLines":"117-128"}],"family":"storage-fabric"},{"id":"storage-fabric.expr","parent":"storage-fabric","name":"Filter Expr","kind":"namespace","sourcePath":"openviking/storage/expr.py","symbol":"FilterExpr","sourceLines":"1-71","pipelines":["retrieve"],"summary":{"en":"Frozen dataclass-based filter expression AST for vector store query construction.","zh":"基于冻结数据类的过滤表达式 AST，用于向量库查询构建"},"article":{"en":"`FilterExpr` is a frozen dataclass union providing type-safe query filters for vector store operations. Supported expressions cover logical composition (`And`, `Or`), equality (`Eq`), set membership (`In`), numeric range (`Range` with `gte`/`gt`/`lte`/`lt`), substring match (`Contains`), temporal filtering (`TimeRange`), backend-specific passthrough (`RawDSL` — for backend-specific features not yet covered by the typed AST), and URI prefix scoping (`PathScope` with optional `depth`; `depth=-1` means unlimited). `VikingVectorIndexBackend.search()`, `VikingFS.find()`, and `VikingFS.search()` consume these expressions.","zh":"`FilterExpr` 是冻结数据类联合类型，为向量查询提供类型安全的过滤表达式 AST。支持逻辑组合（`And`、`Or`）、等值（`Eq`）、集合包含（`In`）、数值范围（`Range` 带 `gte`/`gt`/`lte`/`lt`）、子串匹配（`Contains`）、时间过滤（`TimeRange`）、后端透传（`RawDSL`，用于类型 AST 尚未覆盖的后端特性）和 URI 前缀作用域（`PathScope` 带可选 `depth`，`-1` 表示不限）。"},"io":{"inputs":[{"en":"filter field names + values","zh":"过滤字段名和值"},{"en":"URI prefix for scoping","zh":"作用域 URI 前缀"}],"outputs":[{"en":"FilterExpr AST nodes","zh":"FilterExpr AST 节点"},{"en":"backend-compatible filters","zh":"后端兼容过滤条件"}]},"code":[{"lang":"python","title":{"en":"Filter expression dataclass union","zh":"过滤表达式数据类联合类型"},"text":"@dataclass(frozen=True)\nclass Range:\n    field: str\n    gte: Any | None = None\n    # ...\n\n@dataclass(frozen=True)\nclass PathScope:\n    \"\"\"Path prefix scope expression with optional depth control.\"\"\"\n    field: str\n    path: str\n    depth: int = -1\n\nFilterExpr = Union[And, Or, Eq, In, Range, Contains, TimeRange, RawDSL, PathScope]","sourcePath":"openviking/storage/expr.py","sourceLines":"34-70"}],"family":"storage-fabric"},{"id":"storage-fabric.schemas","parent":"storage-fabric","name":"Schemas","kind":"namespace","sourcePath":"openviking/storage/collection_schemas.py","symbol":"CollectionSchemas","sourceLines":"58-859","pipelines":["write","retrieve"],"summary":{"en":"Centralized context collection schema factory plus embedding dequeue handler that vectorizes and upserts.","zh":"集中式上下文集合 schema 工厂，加嵌入出队处理器向量化后 upsert"},"article":{"en":"`CollectionSchemas` provides centralized schema definitions. `context_collection()` returns a schema for the unified context vector collection. Fields include `id`, `uri`, `type`, `context_type`, `level`, `name`, `description`, `tags`, `search_tags`, `abstract`, `vector`, `sparse_vector`, and metadata: `created_at`, `updated_at`, `active_count`, `account_id`, `owner_user_id`. `TextEmbeddingHandler` processes `EmbeddingMsg` dequeue events, calls the configured embedder to generate dense and sparse vectors, applies a `CircuitBreaker`, and upserts the complete record. Embedding compatibility keys stored in the collection description trigger re-embedding when the embedder changes.","zh":"`CollectionSchemas` 提供集中式 schema 定义。`context_collection()` 返回统一上下文向量集合的 schema，含 `id`、`uri`、`type`、`context_type`、`level`、`name`、`description`、`tags`、`search_tags`、`abstract`、`vector`、`sparse_vector` 及元数据字段。`TextEmbeddingHandler` 处理出队，调 embedder 生成向量，经 `CircuitBreaker` 后 upsert。兼容性键在集合描述里存 embedder 名称加版本，不匹配时触发全量重向量化。"},"io":{"inputs":[{"en":"EmbeddingMsg from queue","zh":"队列 EmbeddingMsg"},{"en":"collection name + dimension","zh":"集合名和维度"}],"outputs":[{"en":"context collection schema","zh":"上下文集合 schema"},{"en":"vectorized records upserted","zh":"向量化记录 upsert"},{"en":"embedding compatibility keys","zh":"嵌入兼容性键"}]},"family":"storage-fabric"}],"edges":[{"evidence":"openviking_cli/client/_http_compat.py:110 - AsyncHTTPClient inherits from import_openviking_sdk().AsyncHTTPClient","from":"agent-integrations.cli","label":"delegates HTTP to","to":"agent-integrations.sdk.python","type":"call","_fam":"agent-integrations","family":"agent-integrations"},{"evidence":"examples/claude-code-memory-plugin/servers/mcp-proxy.mjs:17 - imports createOpenVikingMcpProxy from shared/mcp-proxy-core.mjs","from":"agent-integrations.editor-plugins.claude-code","label":"uses shared core for MCP proxy","to":"agent-integrations.editor-plugins.core","type":"call","_fam":"agent-integrations","family":"agent-integrations"},{"evidence":"examples/pi-coding-agent-extension/recall.ts:3 - imports buildRecallBlock from shared/recall-core.mjs","from":"agent-integrations.editor-plugins.pi","label":"uses shared core for recall","to":"agent-integrations.editor-plugins.core","type":"call","_fam":"agent-integrations","family":"agent-integrations"},{"evidence":"examples/memory-plugin-shared/lib/recall-core.mjs:252-259 - postRecall() sends POST /api/v1/search/recall via fetchJSON, a raw HTTP call to the server","from":"agent-integrations.editor-plugins.core","label":"calls HTTP recall API","to":"client-transport.http-server","type":"call","_fam":"agent-integrations","family":"agent-integrations"},{"evidence":"openviking/integrations/langchain/client.py:57 - OpenVikingConnection dataclass holds url/api_key for creating HTTP client; ensure_client() creates AsyncHTTPClient","from":"agent-integrations.langchain.retrieval","label":"uses OpenVikingConnection -> HTTP","to":"agent-integrations.sdk.python","type":"call","_fam":"agent-i aths":[{"name":{"en":"session-lifecycle-create","zh":"session-lifecycle-create"},"nodes":["service-layer.session","storage-fabric.vikingfs"]},{"name":{"en":"session-lifecycle-resume","zh":"session-lifecycle-resume"},"nodes":["service-layer.session","storage-fabric.vikingfs"]},{"name":{"en":"session-lifecycle-commit-archive","zh":"session-lifecycle-commit-archive"},"nodes":["service-layer.session","storage-fabric.vikingfs","runtime-operations.task-tracker","session-memory.memory-extraction"]}]},"manage.relations":{"paths":[{"name":{"en":"relations","zh":"relations"},"nodes":["service-layer.relation","storage-fabric.vikingfs","service-layer.relation","storage-fabric.vikingfs","service-layer.relation","storage-fabric.vikingfs"]}]},"manage.watch-tasks":{"paths":[{"name":{"en":"watch-tasks-registration","zh":"watch-tasks-registration"},"nodes":["service-layer.resource","runtime-operations.watch-manager"]},{"name":{"en":"watch-tasks-execution","zh":"watch-tasks-execution"},"nodes":["runtime-operations.watch-scheduler","runtime-operations.watch-manager","runtime-operations.watch-scheduler","service-layer.resource","runtime-operations.watch-manager"]}]},"manage.pack-backup":{"paths":[{"name":{"en":"pack-backup-export","zh":"pack-backup-export"},"nodes":["service-layer.pack","storage-fabric.ovpack","storage-fabric.vikingfs","storage-fabric.ovpack","storage-fabric.vikingfs"]},{"name":{"en":"pack-backup-import","zh":"pack-backup-import"},"nodes":["service-layer.pack","storage-fabric.ovpack","storage-fabric.vikingfs","storage-fabric.ovpack","storage-fabric.vector-index"]}]},"manage.auth-tenant":{"paths":[{"name":{"en":"auth-tenant","zh":"auth-tenant"},"nodes":["client-transport.auth","context-model.identity-isolation"]}]}},"overview":{"intro":{"en":["OpenViking is an open-source context database for AI agents. Instead of scattering RAG plumbing across a vector store, a memory library, and ad-hoc files, it keeps everything an agent knows in one place, as three kinds of context: resources (what you give it), memories (what it learns), and skills (what it can do).","Every context is a virtual file under a `viking://` URI, so an agent can `ls`, `tree`, `grep`, and `read` its own knowledge — vector search is one door in, not the only one. On write, content is layered: a ~100-token abstract (L0) for search, a ~2k-token overview (L1) for navigation and rerank, full detail (L2) loaded only on demand. That layering is where the token savings come from.","Two verbs read it back: `find` is a single fast query; `search` adds LLM intent analysis, session context, and rerank. Memory writes itself — commit a session and extraction runs in the background, filing what mattered. It runs embedded in-process (`ov.OpenViking(path=...)`) or as a server on port 1933 behind REST, MCP, and the `ov` CLI. Same API either way.","This board is the runtime drawn honestly. Ten component families sit on the baseboard; off to the left, set apart, is the data model they all share — the Context record, viking:// URIs, identity, messages — kept separate because it defines vocabulary rather than doing work. Every family expands in place, and every leaf pins to exact source lines at one commit. Toggle Write, Retrieve, or Manage in the top rail to follow code-traced paths. For evidence it works, the README carries LoCoMo and HotpotQA numbers, and the core design (VikingMem) was accepted at VLDB 2026."],"zh":["OpenViking 是一个面向 AI Agent 的开源上下文数据库。它不把 RAG 拆成向量库、记忆库加一堆散落文件，而是把 Agent 知道的一切收进一处，分成三类上下文：资源（你给它的）、记忆（它学到的）、技能（它会做的）。","每条上下文都是 `viking://` URI 下的虚拟文件，Agent 可以对自己的知识 `ls`、`tree`、`grep`、`read`——向量检索只是入口之一。写入时内容自动分层：约 100 token 的摘要（L0）管检索，约 2k token 的概览（L1）管导航和重排，全文（L2）按需加载。省 token 的关键就在这层结构里。","读取靠两个动词：`find` 快，一次查询直接返回；`search` 多走一步 LLM 意图分析，带上会话上下文再重排。记忆则自己长出来：会话提交后，后台自动提炼值得留下的内容。它可以内嵌进程运行（`ov.OpenViking(path=...)`），也可以起一个 1933 端口的服务，走 REST、MCP 或 `ov` 命令行，API 完全一致。","这块板子画的就是运行时本身。十个组件族排在基板上；左侧单独摆着它们共享的数据模型——Context 记录、viking:// URI、身份、消息——它定义的是词汇，本身不干活，所以放在一边。每个族都能原位展开，叶 <script>
/* ===== util.js ===== */
// Shared namespace + small helpers. No dependencies, plain script (file:// safe).
window.OV = window.OV || {};

OV.util = (() => {
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const map = (v, a0, a1, b0, b1) => lerp(b0, b1, clamp((v - a0) / (a1 - a0), 0, 1));

  // easing
  const easeInOutCubic = t => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);
  const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
  // gentle lift overshoot for expand (disabled under reduced motion)
  const easeOutBackSoft = t => {
    const c = 0.9;
    const x = t - 1;
    return 1 + (c + 1) * x * x * x + c * x * x;
  };

  const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // parse '#rrggbb' or 'rgb(r,g,b)' into [r, g, b]
  const parseColor = (c) => {
    if (c[0] === '#') {
      const n = parseInt(c.slice(1), 16);
      return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }
    return c.match(/\d+/g).slice(0, 3).map(Number);
  };
  const rgba = (c, a) => {
    const [r, g, b] = parseColor(c);
    return `rgba(${r},${g},${b},${a})`;
  };
  // blend two colors, t toward b — accepts hex or rgb() strings
  const mix = (ca, cb, t) => {
    const a = parseColor(ca), b = parseColor(cb);
    return `rgb(${Math.round(lerp(a[0], b[0], t))},${Math.round(lerp(a[1], b[1], t))},${Math.round(lerp(a[2], b[2], t))})`;
  };

  // deterministic tiny PRNG for grain texture (seeded, stable across loads)
  const seeded = (seed) => () => {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    return seed / 0x7fffffff;
  };

  const el = (tag, cls, parent) => {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (parent) parent.appendChild(e);
    return e;
  };

  const roundRect = (ctx, x, y, w, h, r) => {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  };

  return { clamp, lerp, map, easeInOutCubic, easeOutCubic, easeOutBackSoft, reducedMotion, rgba, mix, seeded, el, roundRect };
})();

OV.colors = {

      queue: { en: 'Queue', zh: '队列' },

      model: { en: 'Model', zh: '模型' },
      operations: { en: 'Operations', zh: '运维' },

      cur = cur[rest] !== undefined ? cur[rest] : parts.slice(1).reduce((c, p) => c && c[p], cur);
    }

    return cur[lang] || cur.en || key;
  };
  // pick from a {en, zh} record in the data manifest
  const pick = (rec) => {
    if (rec == null) return '';
    if (typeof rec === 'string') return rec;
    return rec[lang] || rec.en || '';
  };

  const setLang = (l) => {
    if (l === lang) return;
    lang = l;
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    for (const fn of listeners) fn(l);
