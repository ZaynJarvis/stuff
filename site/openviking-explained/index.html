<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>OpenViking Understanding — Strata Foundry</title>
<style>
/* OpenViking Understanding — Strata Foundry
   Offline single-file explorer. Warm tactile systems board. */

:root {
  --canvas: #EAE3D7;
  --baseboard: #D9D0BE;
  --tile: #F8F4EB;
  --sidebar: #FCFAF5;
  --graphite: #282B2D;
  --muted: #747068;
  --write: #E86E4C;
  --retrieve: #2F65C5;
  --manage: #5F8764;
  --brass: #B38D4D;
  --rail-h: 58px;
  --sidebar-w: 358px;

  --sans: "Manrope", "Avenir Next", "Segoe UI Variable", system-ui, -apple-system,
          "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  --serif: "Source Serif 4", "Source Serif Pro", Georgia, "Iowan Old Style",
           "Songti SC", "Noto Serif SC", "SimSun", serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--canvas);
  color: var(--graphite);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* ---------- top rail ---------- */

#toprail {
  height: var(--rail-h);
  flex: 0 0 var(--rail-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px 0 18px;
  background: color-mix(in srgb, var(--tile) 72%, var(--canvas));
  border-bottom: 1px solid color-mix(in srgb, var(--graphite) 14%, transparent);
  gap: 12px;
  z-index: 30;
}
.rail-left { display: flex; align-items: center; gap: 18px; min-width: 0; }
.rail-right { display: flex; align-items: center; gap: 10px; }

.wordmark { display: flex; flex-direction: column; line-height: 1.1; white-space: nowrap; }
.wordmark-name { font-weight: 700; font-size: 15px; letter-spacing: 0.02em; }
.wordmark-sub { font-size: 10.5px; color: var(--muted); letter-spacing: 0.05em; }

#breadcrumbs { display: flex; align-items: center; gap: 2px; font-size: 12.5px; overflow: hidden; white-space: nowrap; }
#breadcrumbs .crumb {
  background: none; border: 0; font: inherit; color: var(--muted);
  cursor: pointer; padding: 4px 6px; border-radius: 6px; font-family: var(--sans);
}
#breadcrumbs .crumb:hover { background: color-mix(in srgb, var(--brass) 14%, transparent); color: var(--graphite); }
#breadcrumbs .crumb:last-child { color: var(--graphite); font-weight: 600; }
#breadcrumbs .crumb-sep { color: color-mix(in srgb, var(--muted) 55%, transparent); font-size: 11px; }

#pipeline-switch { display: flex; background: color-mix(in srgb, var(--graphite) 7%, transparent); border-radius: 9px; padding: 3px; }
.pipe-btn {
  border: 0; background: none; font-family: var(--sans); font-size: 12.5px; font-weight: 600;
  color: var(--muted); padding: 5px 12px; border-radius: 7px; cursor: pointer;
  transition: background 160ms, color 160ms;
}
.pipe-btn:hover { color: var(--graphite); }
.pipe-btn.active { background: var(--tile); box-shadow: 0 1px 2px rgba(40,43,45,0.14); }
.pipe-btn.active[data-pipe="write"] { color: var(--write); }
.pipe-btn.active[data-pipe="retrieve"] { color: var(--retrieve); }
.pipe-btn.active[data-pipe="manage"] { color: var(--manage); }

#manage-subflows { display: flex; gap: 4px; flex-wrap: nowrap; }
#manage-subflows[hidden] { display: none; }
.subflow-btn {
  border: 1px solid color-mix(in srgb, var(--manage) 38%, transparent);
  background: none; color: var(--manage); font-family: var(--sans);
  font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px; cursor: pointer;
  transition: background 160ms;
  white-space: nowrap;
}
.subflow-btn:hover { background: color-mix(in srgb, var(--manage) 10%, transparent); }
.subflow-btn.active { background: var(--manage); color: var(--sidebar); border-color: var(--manage); }

.rail-btn {
  border: 1px solid color-mix(in srgb, var(--graphite) 18%, transparent);
  background: var(--tile); color: var(--graphite); font-family: var(--sans);
  font-size: 12.5px; font-weight: 600; padding: 5px 12px; border-radius: 8px; cursor: pointer;
}
.rail-btn:hover { border-color: var(--brass); }

#lang-switch { display: flex; background: color-mix(in srgb, var(--graphite) 7%, transparent); border-radius: 9px; padding: 3px; }
.lang-btn {
  border: 0; background: none; font-family: var(--sans); font-size: 12px; font-weight: 700;
  color: var(--muted); padding: 4px 10px; border-radius: 7px; cursor: pointer;
}
.lang-btn.active { background: var(--tile); color: var(--graphite); box-shadow: 0 1px 2px rgba(40,43,45,0.14); }

/* ---------- stage ---------- */

#stage { flex: 1; display: flex; min-height: 0; }
#canvas-wrap { position: relative; flex: 1; min-width: 0; overflow: hidden; }
#board { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
#board.dragging { cursor: grabbing; }

#labels { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.node-label {
  position: absolute; transform: translate(-50%, -50%);
  font-family: var(--sans); font-weight: 650; color: var(--graphite);
  white-space: nowrap; pointer-events: none; text-align: center;
  text-shadow: 0 1px 0 rgba(248,244,235,0.7), 0 0 6px rgba(248,244,235,0.5);
  transition: opacity 200ms;
}
.node-label .label-name {
  display: block; overflow: hidden; text-overflow: ellipsis;
}
.node-label .label-kind {
  display: block; font-size: 0.58em; font-weight: 700; letter-spacing: 0.15em;
  color: color-mix(in srgb, var(--muted) 78%, transparent); text-transform: uppercase;
  margin-top: 1px;
}
.node-label.plate .label-name {
  text-transform: uppercase; letter-spacing: 0.11em; font-weight: 700;
  color: color-mix(in srgb, var(--graphite) 64%, transparent);
}
.node-label.dim { opacity: 0.34; }
/* data-model reference plate: brass tag, always legible */
.node-label.concept .label-kind {
  color: var(--brass); font-weight: 800; opacity: 0.95;
  margin-top: 2px;
}

#minimap {
  position: absolute; right: 14px; bottom: 14px;
  background: color-mix(in srgb, var(--tile) 82%, transparent);
  border: 1px solid color-mix(in srgb, var(--graphite) 20%, transparent);
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(40,43,45,0.13);
  cursor: pointer;
  z-index: 20;
}

.hint {
  position: absolute; left: 14px; bottom: 14px;
  font-size: 11.5px; color: var(--muted);
  background: color-mix(in srgb, var(--tile) 82%, transparent);
  border: 1px solid color-mix(in srgb, var(--graphite) 12%, transparent);
  padding: 6px 10px; border-radius: 8px;
  pointer-events: none;
  max-width: 45%;
}

/* ---------- sidebar ---------- */

#sidebar {
  width: var(--sidebar-w); flex: 0 0 var(--sidebar-w);
  background: var(--sidebar);
  border-left: 1px solid color-mix(in srgb, var(--graphite) 13%, transparent);
  overflow-y: auto;
  padding: 22px 22px 34px;
  z-index: 25;
}

#sidebar-empty { padding-top: 12px; }
.sidebar-empty-title { font-weight: 700; font-size: 16px; color: var(--graphite); margin-bottom: 8px; letter-spacing: -0.01em; }

.sb-name { font-family: var(--sans); font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 3px; }
.sb-kind { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--brass); margin-bottom: 16px; }

.sb-article { font-family: var(--serif); font-size: 15.5px; line-height: 1.78; }
.sb-article p { margin-bottom: 12px; }
.sb-article code {
  font-family: var(--mono); font-size: 0.82em;
  background: color-mix(in srgb, var(--graphite) 6%, transparent);
  padding: 1px 4px; border-radius: 4px; overflow-wrap: anywhere;
}

/* ---------- code figures (node snippets + overview quickstart) ---------- */

.sb-code { margin: 4px 0 14px; }
.sb-code-title {
  font-family: var(--sans); font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--brass);
  margin-bottom: 5px;
}
.sb-code pre {
  background: color-mix(in srgb, var(--graphite) 5%, var(--tile));
  border: 1px solid color-mix(in srgb, var(--graphite) 11%, transparent);
  border-radius: 8px;
  padding: 10px 12px;
  overflow-x: auto;
}
.sb-code code {
  font-family: var(--mono); font-size: 11px; line-height: 1.6;
  color: var(--graphite);
  background: none; padding: 0;
  white-space: pre;
}
.sb-code-src {
  display: inline-block; margin-top: 4px;
  font-family: var(--mono); font-size: 10.5px; color: var(--muted);
  text-decoration: none; word-break: break-all;
}
.sb-code-src:hover { color: var(--retrieve); text-decoration: underline; }

/* ---------- overview (empty state) ---------- */

#sb-overview { margin-top: 14px; }
.sb-ov-p { font-family: var(--serif); font-size: 14.5px; line-height: 1.75; color: var(--graphite); margin-bottom: 11px; }
.sb-ov-p code {
  font-family: var(--mono); font-size: 0.82em;
  background: color-mix(in srgb, var(--graphite) 6%, transparent);
  padding: 1px 4px; border-radius: 4px; overflow-wrap: anywhere;
}
.sb-ov-h {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin: 20px 0 10px;
  padding-top: 14px; border-top: 1px solid color-mix(in srgb, var(--graphite) 10%, transparent);
}
.sb-ov-path { list-style: none; counter-reset: stop; }
.sb-ov-path li {
  counter-increment: stop;
  position: relative; padding: 0 0 12px 30px;
}
.sb-ov-path li::before {
  content: counter(stop);
  position: absolute; left: 0; top: 1px;
  width: 19px; height: 19px; border-radius: 50%;
  background: color-mix(in srgb, var(--brass) 16%, transparent);
  color: var(--brass); font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.sb-ov-path li:not(:last-child)::after {
  content: ""; position: absolute; left: 9px; top: 23px; bottom: 2px;
  width: 1px; background: color-mix(in srgb, var(--brass) 30%, transparent);
}
.sb-ov-stop {
  background: none; border: 0; padding: 0; cursor: pointer;
  font-family: var(--sans); font-size: 13.5px; font-weight: 700; color: var(--graphite);
  text-align: left;
}
.sb-ov-stop:hover { color: var(--brass); }
.sb-ov-why { display: block; font-size: 12.5px; line-height: 1.55; color: var(--muted); margin-top: 2px; }
.sb-ov-how { font-family: var(--sans); font-size: 12.5px; color: var(--muted); }

.sb-io { margin-top: 18px; padding-top: 14px; border-top: 1px solid color-mix(in srgb, var(--graphite) 10%, transparent); }
.sb-io h2, .sb-evidence h2 { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.sb-io h3 { font-size: 10.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--brass); margin: 8px 0 4px; }
.sb-io-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
.sb-io ul { list-style: none; }
.sb-io li { font-size: 12.5px; line-height: 1.5; padding: 3px 0 3px 12px; position: relative; }
.sb-io li::before { content: ""; position: absolute; left: 0; top: 10px; width: 5px; height: 5px; border-radius: 1px; background: color-mix(in srgb, var(--graphite) 38%, transparent); }

.sb-pipelines { display: flex; flex-wrap: wrap; gap: 5px; }
.pipe-chip {
  font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
  border: 1px solid; letter-spacing: 0.03em;
}
.pipe-chip.p-write { color: var(--write); border-color: color-mix(in srgb, var(--write) 45%, transparent); background: color-mix(in srgb, var(--write) 8%, transparent); }
.pipe-chip.p-retrieve { color: var(--retrieve); border-color: color-mix(in srgb, var(--retrieve) 45%, transparent); background: color-mix(in srgb, var(--retrieve) 8%, transparent); }
.pipe-chip.p-manage { color: var(--manage); border-color: color-mix(in srgb, var(--manage) 45%, transparent); background: color-mix(in srgb, var(--manage) 8%, transparent); }

.sb-evidence { margin-top: 18px; padding-top: 14px; border-top: 1px solid color-mix(in srgb, var(--graphite) 10%, transparent); }
.evidence-item {
  background: color-mix(in srgb, var(--graphite) 4%, transparent);
  border: 1px solid color-mix(in srgb, var(--graphite) 9%, transparent);
  border-radius: 8px; padding: 9px 11px; margin-bottom: 8px;
}
.evidence-path { font-family: var(--mono); font-size: 11.5px; word-break: break-all; line-height: 1.55; }
.evidence-symbol { font-family: var(--mono); font-size: 11.5px; color: var(--brass); margin-top: 2px; }
.evidence-actions { display: flex; gap: 10px; margin-top: 7px; }
.evidence-actions a, .evidence-actions button {
  font-family: var(--sans); font-size: 11px; font-weight: 600; color: var(--retrieve);
  background: none; border: 0; cursor: pointer; padding: 0; text-decoration: none;
}
.evidence-actions a:hover, .evidence-actions button:hover { text-decoration: underline; }
.evidence-actions .copied { color: var(--manage); }

.sb-actions { display: flex; gap: 8px; margin-top: 20px; }
.sb-btn {
  flex: 1; border: 1px solid color-mix(in srgb, var(--graphite) 20%, transparent);
  background: var(--tile); font-family: var(--sans); font-size: 12.5px; font-weight: 600;
  color: var(--graphite); padding: 8px 10px; border-radius: 8px; cursor: pointer;
}
.sb-btn:hover { border-color: var(--brass); color: var(--brass); }

/* focus outline for keyboard users */
button:focus-visible, a:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--brass); outline-offset: 2px;
}

/* ---------- mobile / narrow fallback ---------- */

#fallback { display: none; }

@media (max-width: 720px) {
  #stage { display: none; }
  #toprail #pipeline-switch, #toprail #manage-subflows, #toprail #fit-btn, #toprail #breadcrumbs { display: none; }
  #fallback {
    display: block; flex: 1; overflow-y: auto; padding: 18px 16px 40px;
    background: var(--sidebar);
  }
  #fallback[hidden] { display: block; }
  .fb-note { font-size: 12px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
  .fb-intro { font-family: var(--serif); font-size: 14px; line-height: 1.7; margin-bottom: 12px; }
  .fb-code {
    font-family: var(--mono); font-size: 10.5px; line-height: 1.55;
    background: color-mix(in srgb, var(--graphite) 5%, var(--tile));
    border: 1px solid color-mix(in srgb, var(--graphite) 11%, transparent);
    border-radius: 8px; padding: 8px 10px; margin-top: 6px; overflow-x: auto;
  }
  .fb-family { margin-bottom: 26px; }
  .fb-family > h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .fb-node { margin: 12px 0 12px 0; padding-left: 12px; border-left: 2px solid color-mix(in srgb, var(--brass) 40%, transparent); }
  .fb-node h3 { font-size: 13.5px; font-weight: 700; margin-bottom: 2px; }
  .fb-node .fb-src { font-family: var(--mono); font-size: 10px; color: var(--muted); word-break: break-all; }
  .fb-node p { font-family: var(--serif); font-size: 13.5px; line-height: 1.65; margin-top: 5px; }
}

/* tablet: keep canvas, tighten rail */
@media (min-width: 721px) and (max-width: 1040px) {
  :root { --sidebar-w: 300px; }
  #manage-subflows { display: none !important; }
}

/* ---------- reduced motion ---------- */

@media (prefers-reduced-motion: reduce) {
  * { transition-duration: 1ms !important; }
}

          <button id="sb-expand" class="sb-btn"></button>
        </div>
      </article>
    </aside>
  </main>

  <!-- Mobile / narrow fallback: readable article list -->
  <div id="fallback" hidden></div>
</div>

window.OV_DATA = {"meta":{"commit":"2f5b2e27e101a1cbd591a7477b57a024bdb3534e","github":"https://github.com/volcengine/OpenViking","localRoot":""},"nodes":[{"id":"agent-integrations","parent":null,"name":"Integrations","kind":"integration","sourcePath":"","symbol":"","sourceLines":"","pipelines":[],"summary":{"en":"External agents and tools reach OpenViking through protocol-translating adapters at this boundary.","zh":"OpenViking 的外部接入层，各类代理和工具通过协议适配进入系统。"},"article":{"en":"OpenViking sits behind a boundary. Every external agent, editor plugin, CLI user, or bot reaches it through one of these adapters. Each one translates an external protocol — HTTP, MCP stdio, LangChain interfaces, editor lifecycle hooks — into OpenViking's native API.\n\nThe integration patterns fall into a few groups. SDK clients wrap HTTP for programmatic use. The MCP server exposes tools for editor plugins. LangChain adapters fit OpenViking into LangGraph agent runtimes. Editor plugin harnesses inject recall context and capture conversations at lifecycle hooks. VikingBot connects through a proxy router and a FUSE filesystem mount.\n\nThis family documents the boundary only. It does not describe what happens inside OpenViking after a request crosses in.","zh":"OpenViking 对外有一层边界。外部代理、编辑器插件、命令行用户、聊天机器人，都通过这层边界进入。每个适配器把外部协议（HTTP、MCP stdio、LangChain 接口、编辑器生命周期钩子）转换为 OpenViking 原生 API。\n\n接入方式分几类。SDK 客户端封装 HTTP，供程序直接调用。MCP 服务器把操作暴露成工具给编辑器插件。LangChain 适配器让 OpenViking 融入 LangGraph 代理运行时。编辑器插件在生命周期钩子处注入回忆上下文并捕获对话。VikingBot 则通过代理路由和 FUSE 文件系统挂载接入。\n\n这组文档只讲边界，不描述请求进入 OpenViking 之后的内部流程。"},"io":{"inputs":[{"en":"HTTP requests","zh":"HTTP 请求"},{"en":"MCP JSON-RPC messages","zh":"MCP JSON-RPC 消息"},{"en":"CLI commands","zh":"CLI 命令"},{"en":"Editor lifecycle events","zh":"编辑器生命周期事件"}],"outputs":[{"en":"API responses","zh":"API 响应"},{"en":"MCP tool results","zh":"MCP 工具结果"},{"en":"Terminal output","zh":"终端输出"},{"en":"Injected context blocks","zh":"注入的上下文块"}]},"family":"agent-integrations"},{"id":"agent-integrations.sdk","parent":"agent-integrations","name":"SDK Clients","kind":"service","sourcePath":"sdk/python/openviking_sdk/client.py","symbol":"VikingURI / Session","sourceLines":"95-153","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.watch-tasks","manage.pack-backup","manage.auth-tenant"],"summary":{"en":"Typed client libraries (Python and Go) that wrap HTTP communication with OpenViking for programmatic access.","zh":"提供 Python 和 Go 两种类型化客户端库，封装 HTTP 通信供程序调用。"},"article":{"en":"OpenViking exposes typed client libraries so code can call it without hand-rolling HTTP. Two implementations exist. Python is the primary one — the CLI, LangChain adapters, and VikingClient all build on it. Go stands alone, for Go services that want to integrate without spawning a Python process.\n\nBoth wrap the same HTTP surface. They attach authentication headers (X-API-Key, X-OpenViking-Account, X-OpenViking-User, X-OpenViking-Actor-Peer), map server error codes to typed exceptions, and provide convenience methods for search, session management, resource CRUD, filesystem operations, and watch tasks.\n\nThe Python SDK also supports gateway token routing (X-Gateway-Token) for VikingBot proxy mode, and ships both async and sync variants.","zh":"OpenViking 提供类型化客户端库，调用方无需手写 HTTP。现有两种实现。Python 是主力，CLI、LangChain 适配器、VikingClient 都基于它。Go 版本独立，供不想启动 Python 进程的 Go 服务使用。\n\n两者封装同一套 HTTP 接口。都附带认证头（X-API-Key、X-OpenViking-Account、X-OpenViking-User、X-OpenViking-Actor-Peer），把服务端错误码映射成类型化异常，提供搜索、会话管理、资源增删改查、文件系统操作、watch 任务等方法。\n\nPython SDK 还支持 VikingBot 代理模式的网关令牌路由（X-Gateway-Token），同时提供异步和同步两种变体。"},"io":{"inputs":[{"en":"Method calls with params","zh":"带参数的方法调用"},{"en":"API key and identity","zh":"API 密钥和身份"},{"en":"Session context","zh":"会话上下文"}],"outputs":[{"en":"Typed response objects","zh":"类型化响应对象"},{"en":"Typed exceptions","zh":"类型化异常"},{"en":"Async or sync results","zh":"异步或同步结果"}]},"family":"agent-integrations"},{"id":"agent-integrations.sdk.python","parent":"agent-integrations.sdk","name":"Python SDK","kind":"client","sourcePath":"sdk/python/openviking_sdk/client.py","symbol":"AsyncHTTPClient","sourceLines":"238-298","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.watch-tasks","manage.pack-backup"],"summary":{"en":"AsyncHTTPClient and SyncHTTPClient with auth headers, typed errors, and Session wrappers for OpenViking API calls.","zh":"AsyncHTTPClient 与 SyncHTTPClient，带认证头、类型化错误和 Session 封装。"},"article":{"en":"The primary OpenViking client library. `AsyncHTTPClient` creates an `httpx.AsyncClient` with identity headers (`X-API-Key`, `X-OpenViking-Account`, `X-OpenViking-User`, `X-OpenViking-Actor-Peer`). `SyncHTTPClient` wraps async methods via `run_async` so callers without a running event loop can use the same API. `Session` and `SyncSession` scope message commit and context retrieval to a single session ID. Server error codes map to typed exceptions. Gateway token routing via `X-Gateway-Token` supports VikingBot proxy mode. The CLI and other adapters build on this SDK.","zh":"OpenViking 主力客户端库。`AsyncHTTPClient` 创建带认证头的 `httpx.AsyncClient`，`SyncHTTPClient` 通过 `run_async` 包装异步方法。`Session` 与 `SyncSession` 提供会话级封装，把消息提交和上下文获取绑定到单个会话 ID。服务端错误码映射为类型化异常，支持 VikingBot 网关令牌路由。"},"code":[{"lang":"python","title":{"en":"Identity headers on initialize","zh":"初始化时的身份头"},"text":"async def initialize(self) -> None:\n    headers: Dict[str, str] = {}\n    if self._api_key:\n        headers[\"X-API-Key\"] = self._api_key\n    if self._account:\n        headers[\"X-OpenViking-Account\"] = self._account\n    if self._user_id:\n        headers[\"X-OpenViking-User\"] = self._user_id\n    if self._actor_peer_id:\n        headers[\"X-OpenViking-Actor-Peer\"] = self._actor_peer_id\n    headers.update(self._extra_headers)\n    self._http = httpx.AsyncClient(\n        base_url=self._url,\n# …","sourcePath":"sdk/python/openviking_sdk/client.py","sourceLines":"282-294"}],"io":{"inputs":[{"en":"Python method calls","zh":"Python 方法调用"},{"en":"API key and headers","zh":"API 密钥和请求头"},{"en":"Session ID","zh":"会话 ID"}],"outputs":[{"en":"Parsed JSON responses","zh":"解析后的 JSON 响应"},{"en":"Typed exception classes","zh":"类型化异常类"},{"en":"Async awaitables","zh":"异步 awaitable"}]},"family":"agent-integrations"},{"id":"agent-integrations.sdk.go","parent":"agent-integrations.sdk","name":"Go SDK","kind":"client","sourcePath":"sdk/go/client.go","symbol":"Client / NewClient","sourceLines":"14-62","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.watch-tasks"],"summary":{"en":"Standalone Go HTTP client using net/http with JSON serialization for OpenViking integration.","zh":"独立 Go HTTP 客户端，用 net/http 和 JSON 序列化接入 OpenViking。"},"article":{"en":"A standalone Go HTTP client for OpenViking using standard `net/http` and JSON serialization. The `Client` struct holds connection parameters; `NewClient` validates the base URL and configures a timeout. Methods cover semantic search, session management, resource CRUD, and filesystem operations. Built for Go services that need OpenViking access without a Python process.","zh":"独立 Go HTTP 客户端，用标准 `net/http` 和 JSON 序列化接入 OpenViking。`Client` 结构体持有连接参数，`NewClient` 校验 URL 并配置超时。方法覆盖语义搜索、会话管理、资源增删和文件系统操作，供 Go 服务无需 Python 进程即可使用。"},"io":{"inputs":[{"en":"Go method invocations","zh":"Go 方法调用"},{"en":"API key and base URL","zh":"API 密钥和基础 URL"},{"en":"Search or session params","zh":"搜索或会话参数"}],"outputs":[{"en":"Parsed Go structs","zh":"解析后的 Go 结构体"},{"en":"Go error values","zh":"Go 错误值"},{"en":"HTTP response bodies","zh":"HTTP 响应体"}]},"family":"agent-integrations"},{"id":"agent-integrations.cli","parent":"agent-integrations","name":"CLI","kind":"client","sourcePath":"crates/ov_cli/src/main.rs","symbol":"fn main","sourceLines":"2524-2540","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.relations","manage.watch-tasks","manage.pack-backup","manage.auth-tenant"],"summary":{"en":"Rust binary (ov) with TUI and structured output; Python wrapper locates and execv's it.","zh":"Rust 二进制 ov 提供 TUI 和结构化输出，Python 包装器定位并 execv 执行。"},"article":{"en":"The OpenViking command-line interface. The Rust binary `ov` (built from `crates/ov_cli/`) provides a TUI, command palette, structured output, config wizard, i18n, and all CLI commands. A thin Python wrapper (`openviking_cli/rust_cli.py`) serves as the pip-installable entry point, locating the Rust binary and `execv`-ing it with a priority cascade: dev build first, wheel-bundled second, system PATH last. A `doctor` subcommand runs without the Rust binary. `compact_request_body` strips `null` fields from request payloads so a newer CLI can talk to an older server that rejects unknown fields.","zh":"OpenViking 命令行入口。Rust 二进制 `ov` 由 `crates/ov_cli/` 构建，提供 TUI、命令面板、结构化输出、配置向导和国际化。薄 Python 包装器作为 pip 安装入口，按优先级级联查找二进制并 `execv` 执行。`doctor` 子命令无需 Rust 二进制。"},"code":[{"lang":"python","title":{"en":"Binary discovery order","zh":"二进制查找优先级"},"text":"def main():\n    \"\"\"\n    极简入口点：查找 ov 二进制并执行\n\n    按优先级查找：\n    0. Python-native 子命令（doctor）\n    1. ./target/release/ov（开发环境）\n    2. Wheel 自带：{package_dir}/openviking/bin/ov\n    3. PATH 查找：系统全局安装的 ov\n    \"\"\"\n    # 0. Python-native subcommands (no Rust binary needed)\n    if len(sys.argv) > 1 and sys.argv[1] == \"doctor\":\n        from openviking_cli.doctor import main as doctor_main","sourcePath":"openviking_cli/rust_cli.py","sourceLines":"42-54"}],"io":{"inputs":[{"en":"CLI arguments","zh":"CLI 参数"},{"en":"Stdin input","zh":"标准输入"},{"en":"Config file settings","zh":"配置文件设置"}],"outputs":[{"en":"Terminal TUI rendering","zh":"终端 TUI 渲染"},{"en":"Structured output","zh":"结构化输出"},{"en":"Process exit code","zh":"进程退出码"}]},"family":"agent-integrations"},{"id":"agent-integrations.editor-plugins","parent":"agent-integrations","name":"Editor Plugins","kind":"service","sourcePath":"examples/memory-plugin-shared/sync.mjs","symbol":"TARGETS","sourceLines":"1-27","pipelines":["retrieve","manage.session-lifecycle"],"summary":{"en":"Editor and agent-harness plugins that inject recall context and capture conversations via lifecycle hooks.","zh":"编辑器和代理框架插件，通过生命周期钩子注入回忆上下文并捕获对话。"},"article":{"en":"A family of editor and agent-harness plugins that integrate OpenViking at the prompt-injection and lifecycle-hook level. All plugins share a common core (`memory-plugin-shared/lib`) that is synced into each plugin directory.\n\nThe shared core provides recall (semantic search to context block injection), capture (conversation to session messages to commit), session model (deriving OpenViking session IDs from harness session IDs), credential resolution (from `ovcli.conf`, `ov.conf`, env vars), and an MCP proxy (stdio to streamable HTTP).\n\nSupported harnesses: Claude Code, Codex, Cursor, OpenCode, Trae, and Pi. Each plugin wires the shared core into the harness's specific lifecycle hook system.","zh":"一组编辑器和代理框架插件，在提示注入和生命周期钩子层面集成 OpenViking。所有插件共享一个核心库（`memory-plugin-shared/lib`），同步到各插件目录。\n\n共享核心提供五项能力，包括 recall（语义搜索后注入上下文块）、capture（对话转会话消息后提交）、session model（从框架自带会话 ID 派生 OpenViking 会话 ID）、credential resolution（从 `ovcli.conf`、`ov.conf`、环境变量解析密钥）、MCP proxy（stdio 转可流式 HTTP）。这五项合起来构成一个完整插件：凭据解析解决连接，会话模型解决身份，recall 与 capture 解决记忆读写，MCP 代理解决工具暴露。\n\n支持的框架：Claude Code、Codex、Cursor、OpenCode、Trae、Pi。每个插件把共享核心接入各自框架的生命周期钩子系统。"},"io":{"inputs":[{"en":"Editor lifecycle events","zh":"编辑器生命周期事件"},{"en":"User prompts","zh":"用户提示"},{"en":"Conversation history","zh":"对话历史"}],"outputs":[{"en":"Injected context blocks","zh":"注入的上下文块"},{"en":"Captured session messages","zh":"捕获的会话消息"},{"en":"MCP tool results","zh":"MCP 工具结果"}]},"family":"agent-integrations"},{"id":"agent-integrations.editor-plugins.core","parent":"agent-integrations.editor-plugins","name":"Shared Core","kind":"processing","sourcePath":"examples/memory-plugin-shared/lib/recall-core.mjs","symbol":"buildRecallEndpointBody","sourceLines":"1-36","pipelines":["retrieve","manage.session-lifecycle"],"summary":{"en":"Shared library copied into every editor plugin: recall, capture, session model, credentials, MCP proxy.","zh":"所有编辑器插件共用的核心库：recall、capture、会话模型、凭据、MCP 代理。"},"article":{"en":"The shared library copied into every editor plugin directory via a sync script. `recall-core.mjs` builds a type-quota recall request (events, entities, preferences, experiences), calls the recall API, and formats results into an `<openviking-context>` XML block for prompt injection. Each memory type gets its own budget — preferences are capped at 3 and experiences default to 0 — so one high-volume type cannot consume the whole recall result. Other modules handle message normalization, session ID derivation, stdio-to-HTTP MCP proxying, and credential resolution.","zh":"所有编辑器插件共享的核心库。`recall-core.mjs` 构建类型配额回忆请求，调用回忆 API 后将结果格式化为 `<openviking-context>` XML 块注入提示。类型配额给每类记忆独立预算，高频事件不会挤占偏好和实体信息。其余模块负责消息规范化、会话 ID 派生、stdio 转 HTTP 代理和凭据解析。"},"code":[{"lang":"javascript","title":{"en":"Type-quota recall body","zh":"类型配额回忆请求体"},"text":"export function buildRecallEndpointBody(cfg = {}) {\n  const limit = Math.max(Number(cfg.recallLimit || 0), 1);\n  const body = {\n    query: \"\",\n    quotas: {\n      events: limit,\n      entities: limit,\n      preferences: Math.max(1, Math.min(limit, 3)),\n      experiences: 0,\n    },\n    max_chars: Math.max(Number(cfg.recallMaxContentChars || 0) * limit, 1000),\n    min_score: Number.isFinite(Number(cfg.scoreThreshold)) ? Number(cfg.scoreThreshold) : 0.35,\n    render: true,\n  };","sourcePath":"examples/memory-plugin-shared/lib/recall-core.mjs","sourceLines":"20-33"}],"io":{"inputs":[{"en":"User query text","zh":"用户查询文本"},{"en":"Conversation history","zh":"对话历史"},{"en":"Credential files","zh":"凭据文件"}],"outputs":[{"en":"Recall context XML blocks","zh":"回忆上下文 XML 块"},{"en":"Normalized messages","zh":"规范化后的消息"},{"en":"Proxied MCP responses","zh":"代理后的 MCP 响应"}]},"family":"agent-integrations"},{"id":"agent-integrations.editor-plugins.claude-code","parent":"agent-integrations.editor-plugins","name":"Claude Code","kind":"integration","sourcePath":"examples/claude-code-memory-plugin/hooks/hooks.json","symbol":"hooks","sourceLines":"1-110","pipelines":["retrieve","manage.session-lifecycle"],"summary":{"en":"Claude Code integration via lifecycle hooks (session, recall, capture, URI guard) and local MCP proxy.","zh":"通过生命周期钩子和本地 MCP 代理将 OpenViking 集成到 Claude Code。"},"article":{"en":"Integrates OpenViking with Claude Code through lifecycle hooks and an MCP proxy. `hooks.json` injects recall context, captures conversation, and validates `viking://` URIs at session start, prompt submit, tool use, pre-compact, and session end. The MCP proxy runs as a local stdio server forwarding JSON-RPC to `/mcp`. Resolves effective peer ID from workspace configuration.","zh":"通过生命周期钩子和 MCP 代理将 OpenViking 集成到 Claude Code。`hooks.json` 在会话创建、提示提交、工具使用、对话结束等节点注入回忆、捕获消息、校验 `viking://` URI。MCP 代理作为本地 stdio 服务器转发 JSON-RPC 到 `/mcp`。"},"io":{"inputs":[{"en":"Claude Code lifecycle events","zh":"Claude Code 生命周期事件"},{"en":"User prompts","zh":"用户提示"},{"en":"Tool invocations","zh":"工具调用"}],"outputs":[{"en":"Injected recall context","zh":"注入的回忆上下文"},{"en":"Committed session messages","zh":"提交的会话消息"},{"en":"MCP tool responses","zh":"MCP 工具响应"}]},"family":"agent-integrations"},{"id":"agent-integrations.editor-plugins.pi","parent":"agent-integrations.editor-plugins","name":"Pi Extension","kind":"integration","sourcePath":"examples/pi-coding-agent-extension/recall.ts","symbol":"RecallManager","sourceLines":"10-33","pipelines":["retrieve","manage.session-lifecycle"],"summary":{"en":"Pi coding agent extension with recall injection, session capture, and OpenViking tool exposure.","zh":"Pi 编程代理扩展，含回忆注入、会话捕获和 OpenViking 工具暴露。"},"article":{"en":"Integrates OpenViking recall into the Pi coding agent. `RecallManager` calls `buildRecallBlock` from the shared core and caches the result. `injectRecall()` prepends an `<openviking-context>` block to the latest user message with idempotency checking. Uses shared credential resolution and session model. Session capture and OpenViking tool exposure are provided in separate modules.","zh":"为 Pi 编程代理集成 OpenViking 回忆。`RecallManager` 调用共享核心的 `buildRecallBlock` 并缓存结果。`injectRecall()` 在最新用户消息前插入 `<openviking-context>` 块，含幂等性检查。使用共享凭据解析和会话模型，另有会话捕获和工具暴露模块。"},"io":{"inputs":[{"en":"Pi agent prompts","zh":"Pi 代理提示"},{"en":"Message arrays","zh":"消息数组"},{"en":"Credential config","zh":"凭据配置"}],"outputs":[{"en":"Augmented messages","zh":"增强后的消息"},{"en":"Cached recall results","zh":"缓存的回忆结果"},{"en":"Tool call outputs","zh":"工具调用输出"}]},"family":"agent-integrations"},{"id":"agent-integrations.langchain","parent":"agent-integrations","name":"LangChain","kind":"service","sourcePath":"openviking/integrations/langchain/client.py","symbol":"OpenVikingConnection","sourceLines":"57-71","pipelines":["write","retrieve","manage.session-lifecycle"],"summary":{"en":"Adapters exposing OpenViking as LangChain retrievers, LangGraph middleware, stores, and tools.","zh":"把 OpenViking 适配为 LangChain 检索器、LangGraph 中间件、存储和工具。"},"article":{"en":"Adapters that expose OpenViking as LangChain components and LangGraph middleware, fitting OpenViking into existing LangGraph agent runtimes. Four integration points cover retrieval, context injection, persistence, and tool exposure.\n\n`OpenVikingRetriever` extends `BaseRetriever` and calls `find` or `search` to return LangChain `Document` objects with `openviking_` prefixed metadata. `OpenVikingContextMiddleware` injects recall context into the system prompt before LLM calls and captures conversation messages to the OpenViking session after agent turns. `OpenVikingStore` extends LangGraph `BaseStore`, persisting values as JSON records with a markdown projection for semantic retrieval. The `create_openviking_tools` factory creates `StructuredTool` instances with `viking_` prefixed names.\n\nAll adapters share an `OpenVikingConnection` dataclass holding connection parameters and lazily create an `AsyncHTTPClient` via `ensure_client()`. Supports auto-initialize on first use, retry on recoverable errors like `DEADLINE_EXCEEDED`, and configurable commit policies.","zh":"把 OpenViking 适配成 LangChain 组件和 LangGraph 中间件，共四个接入点。\n\n检索器 `OpenVikingRetriever` 继承 `BaseRetriever`，调用 `find` 或 `search` 返回 LangChain `Document`。中间件在 LLM 调用前注入回忆上下文，代理轮次结束后捕获对话。存储 `OpenVikingStore` 继承 `BaseStore`，值存为 JSON 记录并生成 markdown 投影供语义检索。工具工厂 `create_openviking_tools` 创建 `StructuredTool` 实例。\n\n所有适配器共享 `OpenVikingConnection` 数据类，通过 `ensure_client()` 懒加载 `AsyncHTTPClient`。支持自动初始化、可恢复错误重试和提交策略配置。"},"code":[{"lang":"python","title":{"en":"The shared connection dataclass","zh":"共享连接数据类"},"text":"@dataclass(slots=True)\nclass OpenVikingConnection:\n    \"\"\"Connection settings for lazily creating an OpenViking client.\"\"\"\n\n    client: Any = None\n    url: str | None = None\n    api_key: str | None = None\n    account: str | None = None\n    user: str | None = None\n    user_id: str | None = None\n    actor_peer_id: str | None = None\n    path: str | None = None\n    timeout: float = 60.0\n    extra_headers: dict[str, str] | None = None","sourcePath":"openviking/integrations/langchain/client.py","sourceLines":"56-69"}],"io":{"inputs":[{"en":"LangChain queries","zh":"LangChain 查询"},{"en":"LangGraph agent turns","zh":"LangGraph 代理轮次"},{"en":"Store operations","zh":"存储操作"}],"outputs":[{"en":"LangChain Documents","zh":"LangChain Document"},{"en":"Injected system prompts","zh":"注入的系统提示"},{"en":"Persisted store values","zh":"持久化的存储值"}]},"family":"agent-integrations"},{"id":"agent-integrations.langchain.retrieval","parent":"agent-integrations.langchain","name":"Retrieval","kind":"processing","sourcePath":"openviking/integrations/langchain/retrievers.py","symbol":"OpenVikingRetriever","sourceLines":"30-78","pipelines":["retrieve","manage.session-lifecycle"],"summary":{"en":"OpenVikingRetriever (find/search to Documents) and OpenVikingContextMiddleware (recall inject + capture).","zh":"OpenVikingRetriever 和 OpenVikingContextMiddleware 负责检索和回忆注入捕获。"},"article":{"en":"`OpenVikingRetriever` extends LangChain `BaseRetriever`, calling `find` or `search` with configurable `target_uri`, `search_mode`, `limit`, and `score_threshold` to return `Document` objects with `openviking_` prefixed metadata. `OpenVikingContextMiddleware` extends LangGraph `AgentMiddleware`, injecting recall context into the system prompt before LLM calls and capturing conversation to the OpenViking session after agent turns, with optional commit. The retriever serves explicit queries; the middleware runs automatically on every agent turn, injecting before the LLM call and capturing after.","zh":"`OpenVikingRetriever` 继承 `BaseRetriever`，调用 `find` 或 `search` 返回带 `openviking_` 前缀元数据的 `Document`。`OpenVikingContextMiddleware` 在 LLM 调用前注入回忆上下文，代理轮次后捕获到 OpenViking 会话，可选提交。前者供显式查询，后者随代理轮次自动运行。"},"io":{"inputs":[{"en":"User query strings","zh":"用户查询字符串"},{"en":"LangGraph agent state","zh":"LangGraph 代理状态"},{"en":"Agent messages","zh":"代理消息"}],"outputs":[{"en":"LangChain Documents","zh":"LangChain Document"},{"en":"Injected system prompts","zh":"注入的系统提示"},{"en":"Captured session messages","zh":"捕获的会话消息"}]},"family":"agent-integrations"},{"id":"agent-integrations.langchain.persistence","parent":"agent-integrations.langchain","name":"Store & Tools","kind":"processing","sourcePath":"openviking/integrations/langchain/store.py","symbol":"OpenVikingStore","sourceLines":"46-60","pipelines":["write","manage.context-fs"],"summary":{"en":"OpenVikingStore (JSON + markdown persistence) and create_openviking_tools (viking_ prefixed tools).","zh":"OpenVikingStore 和 create_openviking_tools，分别负责持久化和 viking_ 前缀工具。"},"article":{"en":"`OpenVikingStore` extends LangGraph `BaseStore`, persisting values as JSON records under `<root_uri>/data` with a markdown projection under `<root_uri>/index` for semantic retrieval. It implements `get`, `put`, `search`, `list_namespaces`, and other operations. The `create_openviking_tools` factory creates `StructuredTool` objects with `viking_` prefixed names for model discoverability.","zh":"`OpenVikingStore` 继承 LangGraph `BaseStore`，值以 JSON 记录存于 `<root_uri>/data`，并在 `<root_uri>/index` 生成 markdown 投影供语义检索。`create_openviking_tools` 工厂创建 `viking_` 前缀的 `StructuredTool`，包括搜索、读取、grep、资源增删等操作。"},"io":{"inputs":[{"en":"Store get/put calls","zh":"存储读写调用"},{"en":"Tool invocations","zh":"工具调用"},{"en":"Search queries","zh":"搜索查询"}],"outputs":[{"en":"Retrieved store items","zh":"检索到的存储项"},{"en":"Tool execution results","zh":"工具执行结果"},{"en":"Markdown index docs","zh":"Markdown 索引文档"}]},"family":"agent-integrations"},{"id":"agent-integrations.web-studio","parent":"agent-integrations","name":"Web Studio","kind":"client","sourcePath":"web-studio/src/lib/ov-client/client.ts","symbol":"OvClientAdapter / normalizeBaseUrl","sourceLines":"1-80","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.relations","manage.watch-tasks","manage.auth-tenant"],"summary":{"en":"React + TypeScript SPA console using axios and auto-generated OpenAPI client for OpenViking.","zh":"React + TypeScript 单页控制台，用 axios 和自动生成的 OpenAPI 客户端连接 OpenViking。"},"article":{"en":"A React + TypeScript single-page application providing a graphical console for OpenViking. Uses `axios` for HTTP communication; API client code is auto-generated from the OpenAPI spec via `@hey-api/openapi-ts`. A custom adapter adds telemetry tagging, session-based API key storage, and SSE streaming support. Base URL resolves from environment variable or browser origin.","zh":"React + TypeScript 单页应用，提供 OpenViking 图形化管理控制台。前端通过 `axios` 发起 HTTP 请求，API 客户端由 OpenAPI 规范经 `@hey-api/openapi-ts` 自动生成，确保前后端类型一致。自定义 `OvClientAdapter` 在自动生成客户端之上叠加遥测标签、会话级密钥存储和 SSE 流式传输支持。基础 URL 优先从环境变量读取，回退到浏览器来源，兼容本地开发和生产部署两种场景。\n\nWeb Studio 在架构上分为两层。前端 SPA 源码独立存放在仓库根 `web-studio/` 目录，用 Vite 构建。交付层 `server-mount` 负责把构建产物嵌入 Python wheel，随 OpenViking 服务端一同分发。这种前后端分离的设计让前端可以独立迭代，用户通过 `/studio` 路由直接访问，无需额外配置静态文件服务器。"},"io":{"inputs":[{"en":"Browser UI interactions","zh":"浏览器 UI 交互"},{"en":"API key from storage","zh":"存储中的 API 密钥"},{"en":"Environment config","zh":"环境配置"}],"outputs":[{"en":"Rendered UI components","zh":"渲染的 UI 组件"},{"en":"HTTP API requests","zh":"HTTP API 请求"},{"en":"SSE stream data","zh":"SSE 流数据"}]},"family":"agent-integrations"},{"id":"agent-integrations.web-studio.server-mount","parent":"agent-integrations.web-studio","name":"Server Mount","kind":"integration","sourcePath":"openviking/web_studio/__init__.py","symbol":"openviking.web_studio","sourceLines":"1-12","pipelines":[],"summary":{"en":"Packages built web-studio dist/ into the Python wheel for HTTP server delivery.","zh":"将构建好的 web-studio dist/ 打包进 Python wheel，由 HTTP 服务器交付。"},"article":{"en":"The delivery seam that gets the Web Studio SPA into users' hands. During Docker build the Vite output (`web-studio/dist`) is copied into `openviking/web_studio/dist` so the Python wheel ships the bundle as package-data. The server resolves `dist/` relative to this package at runtime; if absent (e.g. `pip install` without `npm run build` first) the `/studio` routes are not registered. The SPA source lives at repo-root `web-studio/`.","zh":"Web Studio 单页应用到达用户的交付接缝。Docker 构建时 Vite 输出（`web-studio/dist`）被复制到 `openviking/web_studio/dist`，随 Python wheel 作为包数据分发。运行时服务器从该包路径解析 `dist/`；若缺失（如 `pip install` 前未执行 `npm run build`），`/studio` 路由不注册。SPA 源码在仓库根目录 `web-studio/`。"},"io":{"inputs":[{"en":"Built SPA assets (dist/)","zh":"构建好的 SPA 资源（dist/）"},{"en":"HTTP requests to /studio","zh":"/studio HTTP 请求"}],"outputs":[{"en":"SPA HTML/JS/CSS served","zh":"交付的 SPA HTML/JS/CSS"},{"en":"Studio route registration","zh":"Studio 路由注册"}]},"family":"agent-integrations"},{"id":"agent-integrations.vikingbot","parent":"agent-integrations","name":"VikingBot","kind":"service","sourcePath":"bot/vikingbot/cli/commands.py","symbol":"app (Typer)","sourceLines":"67-71","pipelines":["write","retrieve","manage.session-lifecycle","manage.context-fs"],"summary":{"en":"Integration boundary between OpenViking and VikingBot via proxy router, VikingClient, and FUSE mount.","zh":"OpenViking 与 VikingBot 的集成边界，含代理路由、VikingClient 和 FUSE 挂载。"},"article":{"en":"VikingBot is a standalone multi-channel AI agent framework, shipped as its own package (the `bot/` directory with `package.json`, `deploy/`, and independent `LICENSE`). It runs as a separate process alongside OpenViking — the `--with-bot` server flag starts both and connects them via the unified gateway routing introduced in #3119. Three integration mechanisms bridge the two systems.\n\nOpenViking mounts a `/bot/v1` proxy that forwards authenticated requests to VikingBot's OpenAPI channel, enabling the Web Studio chat playground. VikingBot's internal client, `VikingClient`, creates per-user `AsyncHTTPClient` instances for memory recall, session management, and resource operations. Per-session OpenViking filesystem mounts let agents manipulate resources as local files.\n\nChannel bridges (WhatsApp, Feishu, Slack, Discord, and others) connect external messaging platforms to VikingBot's message bus, so agents reach users through their preferred app while OpenViking handles the memory and knowledge layer.","zh":"VikingBot 是独立的多渠道 AI 代理框架，作为独立包发布（`bot/` 目录含 `package.json`、`deploy/` 和独立 `LICENSE`）。随 OpenViking 一同启动时通过 #3119 引入的统一网关路由连接。两套系统之间有三种连接机制。\n\nOpenViking 挂载 `/bot/v1` 代理，将已认证请求转发到 VikingBot OpenAPI 通道，支撑 Web Studio 聊天面板。VikingBot 内部客户端 `VikingClient` 为每用户创建 `AsyncHTTPClient` 实例，负责记忆回忆、会话管理和资源操作。每会话还有一个 OpenViking 文件系统挂载点，代理像操作本地文件一样操作资源。\n\n渠道桥接（WhatsApp、Feishu、Slack、Discord 等）把外部消息平台接入 VikingBot 消息总线，代理通过用户偏好的应用触达用户，记忆和知识层由 OpenViking 承担。"},"io":{"inputs":[{"en":"Authenticated HTTP requests","zh":"已认证 HTTP 请求"},{"en":"Agent memory operations","zh":"代理记忆操作"},{"en":"Filesystem syscalls","zh":"文件系统系统调用"},{"en":"External channel messages","zh":"外部渠道消息"}],"outputs":[{"en":"Proxy responses","zh":"代理响应"},{"en":"Recall and search results","zh":"回忆和搜索结果"},{"en":"File-like resource data","zh":"类文件资源数据"},{"en":"Message bus events","zh":"消息总线事件"}]},"family":"agent-integrations"},{"id":"agent-integrations.vikingbot.proxy","parent":"agent-integrations.vikingbot","name":"Bot Proxy","kind":"processing","sourcePath":"openviking/server/routers/bot.py","symbol":"router (APIRouter)","sourceLines":"19-30","pipelines":["write","retrieve","manage.session-lifecycle","manage.auth-tenant"],"summary":{"en":"Bot proxy router (auth + forward) and VikingClient (per-user AsyncHTTPClient with namespace policies).","zh":"Bot 代理路由和 VikingClient，分别负责认证转发和每用户 SDK 实例管理。"},"article":{"en":"The bot proxy router mounts on the OpenViking FastAPI app when `--with-bot` is enabled, authenticating incoming requests via `X-API-Key` or `Authorization` header and forwarding them to VikingBot's OpenAPI channel. It attaches the caller's OpenViking identity (`openviking_connection`) to proxied requests so bot tools use the authenticated user's namespace. Endpoints cover health check, chat, feedback, and SSE streaming chat at `/bot/v1/chat/stream`.","zh":"Bot 代理路由在启用 `--with-bot` 时挂载到 OpenViking FastAPI，认证请求后转发到 VikingBot OpenAPI 通道。它把调用方身份附加到转发请求中（`openviking_connection`），让 bot 工具使用已认证用户的命名空间。端点包括健康检查、聊天、反馈和 `/bot/v1/chat/stream` SSE 流式聊天。"},"io":{"inputs":[{"en":"Authenticated HTTP requests","zh":"已认证 HTTP 请求"},{"en":"User identity","zh":"用户身份"},{"en":"Chat messages","zh":"聊天消息"}],"outputs":[{"en":"Proxy HTTP responses","zh":"代理 HTTP 响应"},{"en":"Streaming chat output","zh":"流式聊天输出"},{"en":"Per-user SDK instances","zh":"每用户 SDK 实例"}]},"family":"agent-integrations"},{"id":"agent-integrations.vikingbot.fuse","parent":"agent-integrations.vikingbot","name":"FUSE Mount","kind":"integration","sourcePath":"bot/vikingbot/openviking_mount/mount.py","symbol":"OpenVikingMount","sourceLines":"55-80","pipelines":["manage.context-fs","retrieve"],"summary":{"en":"FUSE mount exposing OpenViking resources as local files for VikingBot agents.","zh":"FUSE 挂载把 OpenViking 资源暴露为本地文件，供 VikingBot 代理使用。"},"article":{"en":"Mounts OpenViking's virtual filesystem as a local FUSE mount point, letting VikingBot agents manipulate resources as regular files. `OpenVikingMount` uses `ov.SyncOpenViking` for all operations. `MountScope` supports `RESOURCES`, `SESSION`, `USER`, or `ALL`. Each session gets its own workspace mount. Supports read-only mode and async resource addition. When FUSE is unavailable, session mounts fall back to an API-layer `OpenVikingMount` driven programmatically instead of a kernel mount.","zh":"把 OpenViking 虚拟文件系统挂载为本地 FUSE 挂载点，代理像操作本地文件一样操作资源。`OpenVikingMount` 通过 `ov.SyncOpenViking` 完成所有操作。每会话获得独立挂载点，支持只读模式和异步资源添加。FUSE 不可用时回退到 API 层挂载（直接调用 `OpenVikingMount`）。"},"io":{"inputs":[{"en":"Filesystem syscalls","zh":"文件系统系统调用"},{"en":"Mount configuration","zh":"挂载配置"},{"en":"Session ID","zh":"会话 ID"}],"outputs":[{"en":"FileInfo objects","zh":"FileInfo 对象"},{"en":"File contents","zh":"文件内容"},{"en":"Directory listings","zh":"目录列表"}]},"family":"agent-integrations"},{"id":"agent-integrations.vikingbot.bridge","parent":"agent-integrations.vikingbot","name":"Channel Bridge","kind":"integration","sourcePath":"bot/bridge/src/server.ts","symbol":"BridgeServer","sourceLines":"20-68","pipelines":["manage.session-lifecycle"],"summary":{"en":"Node.js WebSocket bridge connecting WhatsApp and other channels to VikingBot's MessageBus.","zh":"Node.js WebSocket 桥接，把 WhatsApp 等渠道接入 VikingBot 消息总线。"},"article":{"en":"A Node.js WebSocket bridge connecting WhatsApp and other external channels to VikingBot. `BridgeServer` uses `@whiskeysockets/baileys` for the WhatsApp Web protocol, binds only to `127.0.0.1`, and supports `BRIDGE_TOKEN` authentication. On the Python side, `WhatsAppChannel` publishes inbound messages to the `MessageBus` and sends outbound messages back through the WebSocket. Other messaging channels follow similar patterns.","zh":"Node.js WebSocket 桥接 WhatsApp 到 VikingBot。`BridgeServer` 用 `@whiskeysockets/baileys` 实现协议，只绑定 `127.0.0.1`。Python `WhatsAppChannel` 发布消息到 `MessageBus`，出站经 WebSocket 发回。"},"io":{"inputs":[{"en":"WhatsApp Web messages","zh":"WhatsApp Web 消息"},{"en":"WebSocket auth token","zh":"WebSocket 认证令牌"},{"en":"Outbound bus messages","zh":"出站总线消息"}],"outputs":[{"en":"InboundMessage events","zh":"InboundMessage 事件"},{"en":"WebSocket send confirmations","zh":"WebSocket 发送确认"},{"en":"Status broadcasts","zh":"状态广播"}]},"family":"agent-integrations"},{"id":"client-transport","parent":null,"name":"Client & Transport","kind":"client","sourcePath":"","symbol":"","sourceLines":"","pipelines":[],"summary":{"en":"Entry layer for all OpenViking clients — embedded LocalClient, HTTP server, MCP endpoint, auth, and identity propagation into the service layer.","zh":"OpenViking 入口层，涵盖嵌入式客户端、HTTP 服务端、MCP 端点、认证与身份透传。"},"article":{"en":"OpenViking exposes two distinct client paths that converge on the service layer. `LocalClient` runs in-process, instantiating `OpenVikingService` directly without any network hop. The HTTP stack serves remote clients through FastAPI routers and a separate MCP JSON-RPC endpoint at `/mcp`.\n\nThese nine children fall into four groups: three client paths (`LocalClient` embedded, `AsyncHTTPClient` remote, the `Session` wrapper shared by both), two server surfaces (the FastAPI app factory and its REST routers), one MCP integration endpoint, and three identity subsystems (`RequestContext` carrier, auth plugin registry, OAuth 2.1 provider). All three entry paths converge on the same `OpenVikingService` methods.\n\nAuthentication lives here too. The auth plugin system resolves API keys and OAuth bearer tokens into a `ResolvedIdentity`; `get_request_context` then converts it into a `RequestContext` carrying user identity, role, and peer-scope filters. This context flows through every router into service calls.\n\nOAuth 2.1 support adds a full authorization code flow with PKCE, DCR client registration, and refresh token rotation — backed by a dedicated SQLite store. Together, auth and OAuth implement the `manage.auth-tenant` pipeline for multi-tenant identity and API-key lifecycle management.","zh":"OpenViking 对外暴露两条客户端路径，最终汇入 service layer。`LocalClient` 在进程内直接实例化 `OpenVikingService`；HTTP 协议栈通过 FastAPI 路由器和 `/mcp` 上独立的 MCP JSON-RPC 端点服务远程客户端。\n\n这九个子节点分四组：三条客户端路径（嵌入式 `LocalClient`、远程 `AsyncHTTPClient`、共用的 `Session` 包装），两个服务端入口（FastAPI 应用工厂与 REST 路由），一个 MCP 集成端点，三个身份子系统（`RequestContext`、auth 插件、OAuth 2.1）。三条入口最终调用同一批 `OpenVikingService` 方法。\n\nauth 插件将 API key 和 OAuth bearer 解析为 `ResolvedIdentity`，`get_request_context` 转为 `RequestContext`，含身份、角色和 peer 过滤器，随路由传入 service。\n\nOAuth 2.1 含 PKCE、DCR 注册和 refresh token 轮换，由 SQLite 存储支撑，与 auth 共同实现 `manage.auth-tenant` pipeline。"},"io":{"inputs":[{"en":"Inbound HTTP requests","zh":"入站 HTTP 请求"},{"en":"Embedded API calls","zh":"嵌入式 API 调用"},{"en":"MCP JSON-RPC messages","zh":"MCP JSON-RPC 消息"}],"outputs":[{"en":"Service method dispatches","zh":"服务方法调用"},{"en":"JSON Response envelopes","zh":"JSON 响应封装"},{"en":"Authenticated RequestContext","zh":"已认证的请求上下文"}]},"family":"client-transport"},{"id":"client-transport.local-client","parent":"client-transport","name":"LocalClient","kind":"client","sourcePath":"openviking/client/local.py","symbol":"LocalClient","sourceLines":"73-107","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.relations","manage.watch-tasks","manage.pack-backup"],"summary":{"en":"In-process client that calls OpenVikingService methods directly, wrapping each call in telemetry and building a USER-scoped RequestContext.","zh":"进程内客户端，直接调用 OpenVikingService 方法，每次调用附带遥测并构建 USER 作用域的 RequestContext。"},"article":{"en":"`LocalClient` implements `BaseClient` for embedded use, instantiating `OpenVikingService` in-process with no network overhead. Its constructor builds a `RequestContext` with `Role.USER`. Every public method delegates directly to the service sub-module through `self._service`, wrapped by `run_with_telemetry` for observability. `actor_peer_id` scopes peer-visibility filters without changing tenant identity. CLI and embedded SDK consumers use this path. Embedded mode performs no authentication, so the constructor pins the context to `Role.USER` once — there is no in-process privilege escalation path. Wrapping every call in `run_with_telemetry` keeps embedded usage observable even though no server middleware is involved.","zh":"`LocalClient` 实现 `BaseClient`，进程内直接实例化 `OpenVikingService`，零网络开销。构造函数创建带 `Role.USER` 的 `RequestContext`——嵌入模式不做认证，一次性钉死角色，进程内不存在提权路径。所有公开方法通过 `self._service` 直接调 service 子模块，外层用 `run_with_telemetry` 包裹保证可观测性。`actor_peer_id` 限定 peer 可见范围但不改租户身份，CLI 和嵌入式 SDK 共用此路径。"},"io":{"inputs":[{"en":"Embedded method arguments","zh":"嵌入式方法参数"},{"en":"UserIdentifier identity","zh":"UserIdentifier 身份"}],"outputs":[{"en":"Service method results","zh":"服务方法结果"},{"en":"Telemetry-attached payloads","zh":"附带遥测的返回值"}]},"code":[{"lang":"python","title":{"en":"Embedded-mode constructor contract","zh":"嵌入模式构造契约"},"text":"        if actor_peer_id is not None and agent_id is not None:\n            raise ValueError(\"actor_peer_id cannot be used with legacy agent_id\")\n        effective_actor_peer_id = actor_peer_id or agent_id\n        self._service = OpenVikingService(\n            path=path,\n            user=user or UserIdentifier.the_default_user(),\n        )\n        self._user = self._service.user\n        self._ctx = RequestContext(\n            user=self._user,\n            role=Role.USER,\n            actor_peer_id=normalize_peer_id(effective_actor_peer_id),\n            legacy_agent_id=normalize_peer_id(agent_id),\n        )","sourcePath":"openviking/client/local.py","sourceLines":"94-107"}],"family":"client-transport"},{"id":"client-transport.remote-client","parent":"client-transport","name":"AsyncHTTPClient","kind":"client","sourcePath":"openviking_cli/client/_http_compat.py","symbol":"AsyncHTTPClient","sourceLines":"110-167","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.relations","manage.watch-tasks","manage.pack-backup"],"summary":{"en":"Remote HTTP client extending the SDK's AsyncHTTPClient with a 180s read timeout, larger connection pool, and server-error-code to typed-exception mapping.","zh":"远程 HTTP 客户端，扩展 SDK AsyncHTTPClient，180 秒读超时、更大连接池、服务端错误码映射到类型化异常。"},"article":{"en":"In `_http_compat.py`, `AsyncHTTPClient` extends the SDK's `AsyncHTTPClient`. This file is a compatibility alias re-exporting the real client from `sdk/python/openviking_sdk/client.py`. It overrides the constructor to set a 180-second default read timeout — the larger value (vs the upstream SDK's 60s) exists because heavy local benchmark runs can keep search requests queued behind embedding/vector work. It also raises the httpx connection pool to 512 max connections with 128 keep-alive; the high ceiling (vs httpx's default 100) exists because high-parallel rollouts from one shared client were hitting `PoolTimeout` waiting for a free connection. `ERROR_CODE_TO_EXCEPTION` maps server error codes to typed `OpenVikingError` subclasses. All calls go over HTTP to the FastAPI server.","zh":"`_http_compat.py` 中的 `AsyncHTTPClient` 扩展 SDK 同名类，设 180 秒读超时和 512 连接池。两个数为高并发场景调优：嵌入/向量任务会长时间占住请求，默认连接池会先耗尽。`ERROR_CODE_TO_EXCEPTION` 将服务端错误码映射为类型化 `OpenVikingError` 子类。"},"io":{"inputs":[{"en":"Remote API call args","zh":"远程 API 调用参数"},{"en":"API key / account headers","zh":"API key / 租户请求头"}],"outputs":[{"en":"Deserialized JSON responses","zh":"反序列化的 JSON 响应"},{"en":"Typed exceptions on errors","zh":"错误时的类型化异常"}]},"family":"client-transport"},{"id":"client-transport.session-wrapper","parent":"client-transport","name":"Session Wrapper","kind":"client","sourcePath":"openviking/client/session.py","symbol":"Session","sourceLines":"19-151","pipelines":["manage.session-lifecycle"],"summary":{"en":"Lightweight OOP wrapper around a BaseClient, holding session_id and user identity and delegating all operations to the underlying client.","zh":"BaseClient 的轻量 OOP 包装，持有 session_id 和用户身份，将所有操作委托给底层客户端。"},"article":{"en":"`Session` wraps a `BaseClient` instance — either `LocalClient` or `AsyncHTTPClient`. It holds `session_id` and user identity, delegating message operations, `commit`, `delete`, `load`, `get_session_context`, and `get_archive` to the underlying client. `Part` objects convert to dicts before delegation. The `commit_async` alias supports vikingbot integration. Both embedded and remote paths share this layer. The wrapper exists so callers hold one object carrying `session_id` + user instead of threading `session_id` through every call. `Part` objects convert to dicts via `asdict` before delegation because `BaseClient` methods take plain dict payloads — the same shape that travels over HTTP in remote mode — keeping `Part` a client-side convenience.","zh":"`Session` 包装 `BaseClient` 实例，持有 `session_id` 和用户身份，将消息操作、commit、load、get_session_context 等委托给底层客户端。`Part` 先经 `asdict` 转成 dict 再委托，底层客户端只收 dict 载荷。`commit_async` 别名供 vikingbot 集成。嵌入式和远程路径共用此层。"},"io":{"inputs":[{"en":"Message roles and content","zh":"消息角色与内容"},{"en":"session_id reference","zh":"session_id 引用"}],"outputs":[{"en":"Delegated client results","zh":"委托的客户端结果"},{"en":"Commit / archive data","zh":"提交 / 归档数据"}]},"family":"client-transport"},{"id":"client-transport.http-server","parent":"client-transport","name":"FastAPI Server","kind":"deployment","sourcePath":"openviking/server/app.py","symbol":"create_app","sourceLines":"202-711","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.relations","manage.watch-tasks","manage.pack-backup","manage.auth-tenant"],"summary":{"en":"FastAPI application factory with CORS, timing, body-dump, and observability middleware; registers 23 REST routers plus MCP and OAuth endpoints.","zh":"FastAPI 应用工厂，含 CORS、计时、body-dump、可观测性中间件；注册 23 REST 路由及 MCP 和 OAuth 端点。"},"article":{"en":"`create_app()` builds the FastAPI application, layering CORS, body-dump, observability, profiling, and timing middleware. The lifespan handler initializes `OpenVikingService`, the auth plugin, OAuth store and provider, metrics, and the MCP session manager. It registers 23 REST routers and mounts `/mcp`. When OAuth is enabled, it also mounts SDK auth routes plus OpenViking's authorize-page and consent endpoints. `bootstrap.py`'s `main()` parses CLI args, loads config, optionally spawns a vikingbot subprocess, and runs uvicorn. See the REST Routers node for the per-router dispatch pattern that all 23 routers share, and the MCP Endpoint node for the FastMCP tool surface mounted at `/mcp`.","zh":"`create_app()` 构建 FastAPI 应用，依次加上 CORS，body-dump，可观测性等中间件。lifespan 初始化 service、auth、OAuth 和 MCP session manager，注册 23 REST 路由并挂载 `/mcp`。`bootstrap.py` 解析 CLI、加载配置、可选启动 vikingbot，运行 uvicorn。"},"io":{"inputs":[{"en":"ServerConfig / CLI args","zh":"ServerConfig / CLI 参数"},{"en":"Inbound HTTP traffic","zh":"入站 HTTP 流量"}],"outputs":[{"en":"FastAPI application instance","zh":"FastAPI 应用实例"},{"en":"HTTP responses + error mapping","zh":"HTTP 响应与错误映射"}]},"family":"client-transport"},{"id":"client-transport.rest-routers","parent":"client-transport","name":"REST Routers","kind":"service","sourcePath":"openviking/server/routers/__init__.py","symbol":"router (APIRouter collection)","sourceLines":"1-54","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.relations","manage.watch-tasks","manage.pack-backup"],"summary":{"en":"Twenty-three domain routers, most under /api/v1, each injecting RequestContext via Depends and dispatching to the OpenVikingService singleton.","zh":"23 个领域路由，多数挂在 /api/v1 下，各自通过 Depends 注入 RequestContext，分发到 OpenVikingService 单例。"},"article":{"en":"Twenty-three domain routers follow one shared shape: `Depends(get_request_context)` injects authenticated identity, `get_service()` fetches the `OpenVikingService` singleton, and the handler calls one service method. These are the same methods `LocalClient` invokes directly, so the HTTP path and the embedded path converge here. Most routers register under `/api/v1` prefixes, while system, metrics, webdav (`/webdav/resources`), and bot (mounted under `/bot/v1`) differ. All responses go out in a `Response` envelope (status/result/error).","zh":"23 个领域路由遵循同一形态：`Depends(get_request_context)` 注入身份，再用 `get_service()` 拿到 `OpenVikingService` 单例，处理器调用一个 service 方法——与 `LocalClient` 直接调用的是同一批方法，HTTP 路径在此汇合。多数路由挂在 `/api/v1` 下。"},"io":{"inputs":[{"en":"Authenticated HTTP requests","zh":"已认证的 HTTP 请求"},{"en":"RequestContext identity","zh":"RequestContext 身份"}],"outputs":[{"en":"Service method invocations","zh":"服务方法调用"},{"en":"JSON Response envelopes","zh":"JSON 响应封装"}]},"family":"client-transport"},{"id":"client-transport.mcp-endpoint","parent":"client-transport","name":"MCP Endpoint","kind":"integration","sourcePath":"openviking/server/mcp_endpoint.py","symbol":"mcp (FastMCP)","sourceLines":"216-974","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.watch-tasks"],"summary":{"en":"FastMCP endpoint at /mcp exposing 16 tools; _IdentityASGIMiddleware resolves auth into a contextvar for tool handlers.","zh":"/mcp 上的 FastMCP 端点，暴露 16 个工具；_IdentityASGIMiddleware 将认证解析到 contextvar 供工具处理器使用。"},"article":{"en":"The MCP endpoint at `/mcp` exposes 16 tools — find, search, recall, read, list, remember, add_resource, list_watches, cancel_watch, grep, glob, code_outline, code_search, code_expand, forget, health — via FastMCP's streamable HTTP transport. FastMCP tool handlers receive only their declared parameters — there is no request object — so `_IdentityASGIMiddleware` stashes the `RequestContext` into the `_mcp_ctx` contextvar before the handler runs, and each tool retrieves it with `_get_ctx()`. The middleware delegates to the same `resolve_identity` used by every REST route, so authentication logic is never duplicated. Each `@mcp.tool()` handler calls `get_service()` to invoke service methods directly. The `add_resource` tool implements progressive upload with signed upload tokens.","zh":"ASGI 身份中间件调用 `auth.resolve_identity`（与 REST 路由同一函数），把 `RequestContext` 存进 contextvar——FastMCP 工具处理器拿不到 HTTP 请求对象，只能经 `_get_ctx()` 取身份。工具内部调 `get_service()` 调用 service。add_resource 支持签名上传。"},"io":{"inputs":[{"en":"MCP JSON-RPC requests","zh":"MCP JSON-RPC 请求"},{"en":"API key / OAuth headers","zh":"API key / OAuth 请求头"}],"outputs":[{"en":"Tool result text / JSON","zh":"工具结果文本 / JSON"},{"en":"Signed upload URLs","zh":"签名上传 URL"}]},"code":[{"lang":"python","title":{"en":"Identity into a contextvar","zh":"身份存入 contextvar"},"text":"class _IdentityASGIMiddleware:\n    \"\"\"ASGI middleware: delegates to auth.resolve_identity (the same function\n    used by all REST API routes) so authentication logic is never duplicated.\"\"\"\n    # …\n        ctx_token = _mcp_ctx.set(ctx)\n        url_token = _request_url_ctx.set(url_info)\n        try:\n            return await self.app(scope, receive, send)\n        finally:\n            _mcp_ctx.reset(ctx_token)\n            _request_url_ctx.reset(url_token)","sourcePath":"openviking/server/mcp_endpoint.py","sourceLines":"140-209"}],"family":"client-transport"},{"id":"client-transport.identity-context","parent":"client-transport","name":"RequestContext","kind":"namespace","sourcePath":"openviking/server/identity.py","symbol":"RequestContext","sourceLines":"17-136","pipelines":["manage.auth-tenant"],"summary":{"en":"Per-request identity carrier — RequestContext with UserIdentifier, Role, optional actor_peer_id, and from_oauth flag — flowing from routers into the service layer.","zh":"每请求身份载体——RequestContext 含 UserIdentifier、Role、可选 actor_peer_id 和 from_oauth 标记——从路由流入 service 层。"},"article":{"en":"`RequestContext` carries per-request identity from routers into the service layer. It holds a `UserIdentifier` (account_id + user_id), a `Role` (string subclass with privilege rank for downgrade detection), an optional `actor_peer_id` view filter, a `legacy_agent_id` marker, and a `from_oauth` flag. Routes that mint OAuth state (OTP issuance, oauth-verify) reject callers with `from_oauth=True`, so a stolen access token cannot be laundered into a long-lived refresh-token chain. `ResolvedIdentity` is the auth plugin output that `get_request_context` converts into a full `RequestContext`. `ToolContext` wraps a `RequestContext` (a `request_ctx` field, not inheritance) and adds `viking_fs`, `default_search_uris`, and a transaction handle. Its `user`/`role`/`account_id` properties delegate to the wrapped context. It is handed to the session-memory extraction tools (`openviking/session/memory/tools.py`), which read VikingFS inside the extraction transaction — the `/mcp` tools use plain `RequestContext` via `_get_ctx()`.","zh":"`get_request_context` 把 auth 插件输出的 `ResolvedIdentity` 转成 `RequestContext`。`from_oauth=True` 的调用者会被签发 OAuth 状态的路由拒绝，防止被盗 access token 换取长期 refresh 链。`ToolContext` 组合（而非继承）`RequestContext`，加 `viking_fs` 和事务句柄，供记忆提取工具在事务内直接读 VikingFS。"},"io":{"inputs":[{"en":"ResolvedIdentity from auth","zh":"auth 输出的 ResolvedIdentity"},{"en":"Actor peer headers","zh":"Actor peer 请求头"}],"outputs":[{"en":"RequestContext for service","zh":"service 用 RequestContext"},{"en":"ToolContext for memory-extract tools","zh":"记忆提取工具用 ToolContext"}]},"code":[{"lang":"python","title":{"en":"RequestContext identity carrier","zh":"RequestContext 身份载体"},"text":"@dataclass\nclass RequestContext:\n    \"\"\"Request-level context, flows through Router -> Service -> VikingFS.\"\"\"\n\n    user: UserIdentifier\n    role: Role\n    # …\n    actor_peer_id: Optional[str] = None\n    # …\n    # Mirrors ResolvedIdentity.from_oauth. Routes that mint OAuth state\n    # (OTP issuance, oauth-verify) reject callers with from_oauth=True to\n    # prevent a stolen access token from laundering itself into a long-lived\n    # refresh-token chain.\n    from_oauth: bool = False","sourcePath":"openviking/server/identity.py","sourceLines":"91-107"}],"family":"client-transport"},{"id":"client-transport.auth","parent":"client-transport","name":"Auth Plugins","kind":"service","sourcePath":"openviking/server/auth/__init__.py","symbol":"resolve_identity / get_request_context","sourceLines":"113-166","pipelines":["manage.auth-tenant"],"summary":{"en":"Plugin-based auth system resolving API keys and OAuth bearer tokens into ResolvedIdentity, with role-downgrade protection and ROOT-key API restrictions.","zh":"基于插件的认证系统，将 API key 和 OAuth bearer token 解析为 ResolvedIdentity，带角色降级保护和 ROOT key API 限制。"},"article":{"en":"The auth system uses a plugin registry pattern. `AuthPlugin` is the abstract base with `resolve_identity`, `validate_config`, and `initialize` methods. Three built-in plugins exist: `ApiKeyAuthPlugin` (default production), `DevAuthPlugin` (localhost, always ROOT, no auth), and `TrustedAuthPlugin` (upstream identity assertion). Plugins register by mode name in a registry; `_initialize_auth_plugin` looks up the configured `auth_mode` and stores the instance on `app.state`, so deployments swap auth strategies through config without touching router code. `resolve_identity()` extracts credentials from request headers and delegates to the active plugin. `get_request_context()` converts the resulting `ResolvedIdentity` into a `RequestContext`. Bearer strings starting with `ovat_` validate through the OAuth provider. The prefix check is a cheap string test that routes only OAuth bearers to a provider lookup — and it fails closed: a prefix-tagged bearer that fails the lookup raises `UnauthenticatedError` instead of falling back to API-key auth. ROOT API keys (when not OAuth-issued) are restricted to admin/system paths; the error message directs data access to per-user or admin keys, keeping the bootstrap root key away from tenant-scoped data.","zh":"三个内置实现分别是生产用 `ApiKeyAuthPlugin`，开发用 `DevAuthPlugin`，上游身份断言用 `TrustedAuthPlugin`。插件按模式名注册，`_initialize_auth_plugin` 按配置查找并存入 `app.state`，换认证策略无需改路由代码。`ovat_` 前缀的 bearer 走 OAuth provider 校验，查不到即拒绝。ROOT key 限 admin/system 路径。"},"io":{"inputs":[{"en":"API key / Bearer headers","zh":"API key / Bearer 请求头"},{"en":"Account / user headers","zh":"租户 / 用户请求头"}],"outputs":[{"en":"ResolvedIdentity","zh":"ResolvedIdentity"},{"en":"RequestContext","zh":"RequestContext"}]},"code":[{"lang":"python","title":{"en":"ovat_ prefix fast path","zh":"ovat_ 前缀快速通道"},"text":"        from openviking.server.oauth.provider import ACCESS_TOKEN_PREFIX\n\n        if not api_key.startswith(ACCESS_TOKEN_PREFIX):\n            return None\n        provider = getattr(request.app.state, \"oauth_provider\", None)\n        if provider is None:\n            return None\n\n        record = await provider.load_access_token(api_key)\n        if record is None:\n            raise UnauthenticatedError(\"OAuth access token is invalid, expired, or revoked\")","sourcePath":"openviking/server/auth/plugins/api_key.py","sourceLines":"114-124"}],"family":"client-transport"},{"id":"client-transport.oauth","parent":"client-transport","name":"OAuth 2.1","kind":"service","sourcePath":"openviking/server/oauth/provider.py","symbol":"OpenVikingOAuthProvider","sourceLines":"81-433","pipelines":["manage.auth-tenant"],"summary":{"en":"OAuth 2.1 provider handling DCR, authorize, token, and revoke flows with PKCE, refresh token rotation, and SQLite-backed token storage.","zh":"OAuth 2.1 provider，处理 DCR、授权、令牌、撤销流程，含 PKCE、refresh token 轮换和 SQLite 令牌存储。"},"article":{"en":"`OpenVikingOAuthProvider` implements the MCP SDK's `OAuthAuthorizationServerProvider` protocol. It handles the full OAuth 2.1 lifecycle: DCR client registration (always public + PKCE), OTP-based authorization code minting with user verification `authorize()` does not redirect straight back — it mints a 6-character `display_code` and returns the configured authorize page. By default that is `/studio/oauth/consent`, a Studio SPA route that approves using the user's existing session; for CLI and cross-device flows a server-rendered fallback page shows the display_code, which the user enters at `/studio/oauth/verify` on another device. Either path polls until verified, so headless clients complete OAuth without a local browser., one-shot code exchange, refresh token rotation with replay detection, and access token revocation. Access tokens carry an `ovat_` prefix for cheap discrimination from API keys on the hot path. `OAuthStore` persists clients, codes, and tokens in SQLite with one-shot consumption via `UPDATE...RETURNING`. A background GC loop evicts expired tokens every 60 seconds.","zh":"`OpenVikingOAuthProvider` 处理 OAuth 2.1：DCR 注册（一律 public + PKCE）、OTP 授权码、一次性 code 交换、refresh token 轮换（带重放检测）和撤销。授权页走 Studio 会话，CLI 在另一设备输 6 位 display_code。access token 带 `ovat_` 前缀，`OAuthStore` 用 SQLite。"},"io":{"inputs":[{"en":"OAuth protocol requests","zh":"OAuth 协议请求"},{"en":"OTP verification codes","zh":"OTP 验证码"}],"outputs":[{"en":"Access / refresh token pairs","zh":"Access / refresh token 对"},{"en":"Authorization redirects","zh":"授权重定向"}]},"code":[{"lang":"python","title":{"en":"DCR: always public + PKCE","zh":"DCR 一律 public + PKCE"},"text":"        # OpenViking treats every registered client as public + PKCE.\n        # …\n        requested = client_info.token_endpoint_auth_method\n        if requested and requested != \"none\":\n            logger.warning(\n                \"DCR: client %s requested token_endpoint_auth_method=%s; \"\n                \"downgrading to 'none' (OpenViking only supports public PKCE clients).\",\n                client_info.client_id,\n                requested,\n            )\n        auth_method = \"none\"","sourcePath":"openviking/server/oauth/provider.py","sourceLines":"134-153"}],"family":"client-transport"},{"id":"context-ingestion","parent":null,"name":"Context Ingest","kind":"processing","sourcePath":"openviking/utils/resource_processor.py","symbol":"ResourceProcessor","sourceLines":"","pipelines":["write","manage.watch-tasks"],"summary":{"en":"Transforms external content through synchronous parse-commit then asynchronous semantic and embedding processing, producing indexed context in AGFS and the vector store.","zh":"外部内容经同步解析落盘后，进入异步语义生成与向量化管线，产出可检索的索引化上下文。"},"article":{"en":"The write pipeline transforms external content into searchable, vector-indexed context across two phases separated by a commit boundary.\n\nPhase one is synchronous and runs before any LLM call. The parse stage (`UnifiedResourceProcessor`) fetches content via `AccessorRegistry`, selects a parser from `ParserRegistry`, and writes structured files into a temp VikingFS directory. `TreeBuilder` resolves the target URI. In the commit phase of `ResourceProcessor.process_resource`, it acquires a per-resource tree lock via `OwnedLockLease.acquire_tree`, atomically moves the temp tree to its final path in AGFS (the persistent agent file system beneath `VikingFS`, addressed by `viking://` URIs), fixes image references, and cleans up. Everything before this boundary is deterministic and LLM-free so it can be retried cheaply, and readers querying the target URI never see a half-written tree.\n\nPhase two is asynchronous. `Summarizer.summarize` builds a `SemanticMsg` and enqueues it to `SemanticQueue`. `SemanticProcessor` creates a `SemanticDagExecutor` that executes bottom-up: per-file LLM summaries, `.overview.md` and `.abstract.md` generation, then dispatches vectorization to `EmbeddingEnqueue`. The embedder writes dense or sparse vectors to the vector index. Memory content takes a shorter path: individual memory files are already vectorized via the embedding queue at write time, so the semantic stage only regenerates the directory-level `.abstract.md` and `.overview.md`.","zh":"写入管线将外部内容转为可检索的向量化上下文，以落盘为界分两阶段。\n\n同步阶段不调用 LLM。解析阶段（`UnifiedResourceProcessor`）经 `AccessorRegistry` 拉取内容，从 `ParserRegistry` 选解析器，将结构化文件写入临时 VikingFS。`TreeBuilder` 算出目标 URI，`ResourceProcessor.process_resource` 的落盘阶段申请树锁，原子搬临时目录到最终 AGFS（`VikingFS` 之下的持久化 agent 文件系统，以 `viking://` URI 寻址），修正图片引用并清理。落盘边界之前全是确定性操作，不产生 LLM 开销，且读者查询目标 URI 时不会看到半成品内容。\n\n异步阶段 `Summarizer.summarize` 构造 `SemanticMsg` 入队。`SemanticProcessor` 创建 `SemanticDagExecutor` 自底向上执行：调用 LLM 为文件生成摘要，生成 `.overview.md` 和 `.abstract.md`，再派发向量化给 `EmbeddingEnqueue`。embedder 生成向量写入索引。记忆内容走捷径：单个记忆文件在写入时已由 embedding 队列完成向量化，语义阶段只需重新生成目录级 `.abstract.md` 与 `.overview.md`。"},"io":{"inputs":[{"en":"external content (file/URL/git)","zh":"外部内容（文件/URL/git）"},{"en":"user instruction","zh":"用户指令"},{"en":"target URI","zh":"目标 URI"},{"en":"request context","zh":"请求上下文"}],"outputs":[{"en":"indexed context in AGFS","zh":"AGFS 索引化上下文"},{"en":"vector store records","zh":"向量存储记录"},{"en":"L0/L1 semantic artifacts (.abstract.md / .overview.md)","zh":"L0/L1 语义产物（.abstract.md / .overview.md）"},{"en":"queue messages","zh":"队列消息"}]},"family":"context-ingestion"},{"id":"context-ingestion.parse-pipeline","parent":"context-ingestion","name":"Parse Pipeline","kind":"processing","sourcePath":"openviking/utils/media_processor.py","symbol":"UnifiedResourceProcessor.process","sourceLines":"112-206","pipelines":["write"],"summary":{"en":"Synchronous stage that fetches remote content, selects a format-specific parser, and produces a BuildingTree with temp and final URIs — no LLM involved.","zh":"同步解析阶段，拉取远程内容，选择格式解析器，产出含临时与最终 URI 的 BuildingTree，全程不调用 LLM。"},"article":{"en":"Resource ingestion starts with a synchronous parse stage — no LLM calls yet. It turns raw input (file path, URL, or git repo) into structured content in a temp VikingFS directory plus a resolved target URI.\n\n`UnifiedResourceProcessor.process` implements a two-layer architecture. Layer one uses `AccessorRegistry` to fetch remote content, with dedicated accessors for Git, HTTP, Feishu, WebFeed, and local files. The result is a `LocalResource` object. This two-layer design keeps concerns separate: accessors handle remote retrieval, parsers face only local `LocalResource` objects, so adding a new source or a new format does not interfere with the other.\n\nLayer two uses `ParserRegistry` to pick a parser by file extension or MIME type. The chosen parser extracts text, metadata, and structure into temp VikingFS files. `TreeBuilder.finalize_from_temp` scans the temp directory, computes the final URI, and returns a `BuildingTree` whose root `Context` carries `uri` and `temp_uri`; `process_resource` copies them into the result as `root_uri` and `temp_uri`. Output is a `ParseResult` with `temp_dir_path` and source metadata.","zh":"资源摄入从同步解析阶段开始，全程不调用 LLM。它把原始输入（文件路径、URL 或 git 仓库）转为临时 VikingFS 中的结构化内容，并解析出最终目标 URI。\n\n`UnifiedResourceProcessor.process` 分两层。第一层用 `AccessorRegistry` 拉取远程内容，提供 Git、HTTP、飞书、WebFeed、本地等访问器，结果是一个 `LocalResource` 对象。访问器负责取回远端内容，解析器只面对本地 `LocalResource`，新增来源或新增格式互不影响。\n\n第二层用 `ParserRegistry` 按扩展名或 MIME 类型选解析器，提取文本、元数据和结构到临时 VikingFS 文件。`TreeBuilder.finalize_from_temp` 扫描临时目录、算出最终 URI，返回 `BuildingTree`，其根 `Context` 携带 `uri` 与 `temp_uri`，由 `process_resource` 写入结果的 `root_uri` / `temp_uri`。输出是含 `temp_dir_path` 和源元数据的 `ParseResult`。"},"io":{"inputs":[{"en":"raw source path","zh":"原始源路径"},{"en":"user instruction","zh":"用户指令"},{"en":"request context","zh":"请求上下文"},{"en":"source format hint","zh":"源格式提示"}],"outputs":[{"en":"temp VikingFS directory tree","zh":"临时 VikingFS 目录树"},{"en":"BuildingTree with URIs","zh":"含 URI 的 BuildingTree"},{"en":"ParseResult metadata","zh":"ParseResult 元数据"},{"en":"source format info","zh":"源格式信息"}]},"family":"context-ingestion"},{"id":"context-ingestion.parse-pipeline.parsers","parent":"context-ingestion.parse-pipeline","name":"Parsers","kind":"processing","sourcePath":"openviking/parse/registry.py","symbol":"ParserRegistry.__init__","sourceLines":"39-80","pipelines":["write"],"summary":{"en":"Format-specific parsers and remote accessors that extract structured content into temp VikingFS directories.","zh":"按格式分发的解析器和远程访问器，把结构化内容提取到临时 VikingFS 目录。"},"article":{"en":"`ParserRegistry` maps file extensions and MIME types to concrete parsers covering documents, code repositories, directories, and media formats. Dispatch is a dictionary lookup: `register()` maps each parser's supported extensions to its name, so a new format plugs in by registering one parser without touching callers. Code repository parsing uses tree-sitter for language-agnostic AST skeleton extraction. tree-sitter gives one uniform AST mechanism across the supported languages (Python, Go, Java, Rust, C++, C#, JS/TS, PHP, Lua). `AccessorRegistry` provides dedicated accessors for Git, HTTP, Feishu, WebFeed, and local files. All parsers write extracted structured files into temp VikingFS directories.","zh":"`ParserRegistry` 按扩展名和 MIME 类型分发，新增格式只需注册一个解析器。代码仓库用 tree-sitter 提取 AST 骨架，覆盖 Python、Go、Java、Rust 等语言。`AccessorRegistry` 提供 Git、HTTP 等访问器。所有解析器写结构化文件到临时 VikingFS。"},"io":{"inputs":[{"en":"source bytes","zh":"源字节流"},{"en":"file extension","zh":"文件扩展名"},{"en":"MIME type","zh":"MIME 类型"},{"en":"remote URL (accessors)","zh":"远程 URL（访问器）"}],"outputs":[{"en":"temp VikingFS files","zh":"临时 VikingFS 文件"},{"en":"extracted metadata","zh":"提取的元数据"},{"en":"AST skeletons (code)","zh":"AST 骨架（代码）"}]},"code":[{"lang":"python","title":{"en":"Built-in parser registration","zh":"内置解析器注册"},"text":"        # Register core parsers\n        self.register(\"text\", TextParser(config=self._parser_configs.get(\"text\")))\n        self.register(\"markdown\", MarkdownParser(config=self._parser_configs.get(\"markdown\")))\n        self.register(\"pdf\", PDFParser(config=self._parser_configs.get(\"pdf\")))\n        self.register(\"html\", HTMLParser(config=self._parser_configs.get(\"html\")))\n        # …\n        self.register(\"zip\", ZipParser())\n        self.register(\"directory\", DirectoryParser())\n\n        self.register(\"image\", ImageParser())\n        self.register(\"audio\", AudioParser())\n        self.register(\"video\", VideoParser())","sourcePath":"openviking/parse/registry.py","sourceLines":"63-80"}],"family":"context-ingestion"},{"id":"context-ingestion.source-commit","parent":"context-ingestion","name":"Source Commit","kind":"processing","sourcePath":"openvikin
