g/utils/resource_processor.py","symbol":"ResourceProcessor.process_resource","sourceLines":"274-362","pipelines":["write","manage.watch-tasks"],"summary":{"en":"Moves parsed temp content to its final AGFS URI under an exclusive TreeLock, fixing image references and cleaning up.","zh":"在 TreeLock 保护下把解析后的临时内容搬到最终 AGFS URI，修正图片引用并清理临时目录。"},"article":{"en":"The commit stage of `ResourceProcessor.process_resource`. Acquires a per-resource `TreeLock` via `OwnedLockLease.acquire_tree` to prevent concurrent writes, then atomically copies the temp directory to its final AGFS URI via `viking_fs.persist_temp_tree` (readers of the target URI never observe a half-written tree). After commit, `rewrite_image_uris` rewrites local image references recorded during parse in the committed markdown files to their final `viking://` URIs, and `viking_fs.delete_temp` removes the temp directory. The lock can hand off to the semantic queue via `lock.handoff()`.","zh":"`ResourceProcessor.process_resource` 的落盘阶段。为资源申请 `TreeLock` 防止并发写入，原子复制临时目录到最终 AGFS URI（读者不会看到半写状态的树）。落盘后 `rewrite_image_uris` 将解析时记录的本地图片引用改写为最终 `viking://` URI，`viking_fs.delete_temp` 删除临时目录。锁可经 `lock.handoff()` 移交给语义队列。"},"io":{"inputs":[{"en":"temp VikingFS tree","zh":"临时 VikingFS 树"},{"en":"target URI","zh":"目标 URI"},{"en":"lock lease","zh":"锁租约"},{"en":"preexisting flag","zh":"已存在标志"}],"outputs":[{"en":"committed AGFS content","zh":"已落盘 AGFS 内容"},{"en":"fixed image URIs","zh":"修正后的图片 URI"},{"en":"deleted temp directory","zh":"已删临时目录"},{"en":"handed-off lock","zh":"已移交的锁"}]},"code":[{"lang":"python","title":{"en":"Commit boundary: persist, rewrite, delete","zh":"落盘边界：persist、rewrite、delete"},"text":"                    if not target_preexisting:\n                        await viking_fs.persist_temp_tree(temp_uri, root_uri, ctx=ctx)\n                        await rewrite_image_uris(\n                            root_uri, ctx=ctx, lock_handle=resource_lock.handle\n                        )\n                        await viking_fs.delete_temp(parse_result.temp_dir_path, ctx=ctx)\n                        temp_uri = root_uri\n                        source_committed = True","sourcePath":"openviking/utils/resource_processor.py","sourceLines":"332-339"}],"family":"context-ingestion"},{"id":"context-ingestion.semantic-enqueue","parent":"context-ingestion","name":"Semantic Enqueue","kind":"processing","sourcePath":"openviking/utils/summarizer.py","symbol":"Summarizer.summarize","sourceLines":"34-153","pipelines":["write"],"summary":{"en":"Builds SemanticMsg objects from committed URIs and enqueues them to SemanticQueue with deduplication and coalesce support.","zh":"从已落盘 URI 构造 SemanticMsg，推入 SemanticQueue，支持去重和合并版本检测。"},"article":{"en":"`Summarizer.summarize` is the main entry point for semantic processing, called immediately after resource commit. It builds a `SemanticMsg` carrying the URI, context_type, tenant scope, lock handoff, and incremental detection fields, then enqueues the message to `SemanticQueue`. For memory parent directories, `SemanticQueue.enqueue()` itself deduplicates within a hardcoded 45-second window (`_MEMORY_PARENT_SEMANTIC_DEDUPE_SEC`), returning a \"deduplicated\" sentinel that `summarize` treats as already queued — preventing re-enqueue storms from rapid writes.","zh":"`Summarizer.summarize` 在落盘后调用，构造 `SemanticMsg` 推入 `SemanticQueue`。消息携带 URI、context_type、租户范围、锁移交等字段。记忆父目录的去重发生在 `SemanticQueue.enqueue()` 内部，使用固定 45 秒窗口，命中时返回 `deduplicated` 哨兵值，`summarize` 将其视为已入队，防止重复入队风暴。"},"io":{"inputs":[{"en":"committed URI","zh":"已落盘 URI"},{"en":"context type","zh":"上下文类型"},{"en":"tenant scope","zh":"租户范围"},{"en":"lock handoff","zh":"锁移交"}],"outputs":[{"en":"SemanticMsg in SemanticQueue","zh":"SemanticQueue 中的 SemanticMsg"},{"en":"dedup key (memory)","zh":"去重键（记忆）"},{"en":"telemetry registration","zh":"遥测注册"}]},"code":[{"lang":"python","title":{"en":"SemanticMsg field wiring","zh":"SemanticMsg 字段装配"},"text":"                msg = SemanticMsg(\n                    uri=source_uri,\n                    context_type=context_type,\n                    account_id=ctx.account_id,\n                    user_id=ctx.user.user_id,\n                    peer_id=ctx.user.user_id,\n                    role=str(ctx.role),\n                    skip_vectorization=skip_vectorization,\n                    telemetry_id=telemetry.telemetry_id,\n                    target_uri=target_uri if target_uri != source_uri else None,\n                    lock_handoff=lock_handoff,\n                    is_code_repo=kwargs.get(\"is_code_repo\", False),\n                    target_preexisting=resolve_target_preexisting(idx, target_uri),\n                )","sourcePath":"openviking/utils/summarizer.py","sourceLines":"115-128"}],"family":"context-ingestion"},{"id":"context-ingestion.semantic-queue","parent":"context-ingestion","name":"Semantic Queue","kind":"queue","sourcePath":"openviking/storage/queuefs/semantic_queue.py","symbol":"SemanticQueue","sourceLines":"33-110","pipelines":["write"],"summary":{"en":"Persistent AGFS-backed NamedQueue that buffers SemanticMsg for ordered, deduplicated delivery to the semantic worker.","zh":"基于 AGFS 的持久化 NamedQueue，缓冲 SemanticMsg，按序去重地投递给语义处理 worker。"},"article":{"en":"`SemanticQueue` extends `NamedQueue` with memory-parent deduplication using a 45-second sliding window. Messages serialize to JSON and persist in the AGFS QueueFS mount point. A dedicated worker thread services the queue; dequeued messages are dispatched to `SemanticProcessor.on_dequeue`. Transient errors trigger automatic re-enqueue with throttled backoff. Stale messages whose `coalesce_version` lags behind the current version are skipped.","zh":"`SemanticQueue` 扩展 `NamedQueue`，对记忆父目录做 45 秒窗口去重。消息序列化后存入 AGFS QueueFS。专用 worker 出队后交 `SemanticProcessor.on_dequeue` 处理。瞬时错误触发重入队和退避。过期消息跳过。"},"io":{"inputs":[{"en":"SemanticMsg objects","zh":"SemanticMsg 对象"},{"en":"dedup window key","zh":"去重窗口键"},{"en":"coalesce version","zh":"合并版本号"}],"outputs":[{"en":"dequeued SemanticMsg","zh":"出队的 SemanticMsg"},{"en":"re-enqueued messages","zh":"重入队消息"},{"en":"skipped stale messages","zh":"跳过的过期消息"}]},"code":[{"lang":"python","title":{"en":"45-second memory dedup window","zh":"记忆 45 秒去重窗口"},"text":"        if msg.context_type == \"memory\" and not msg.coalesce_key:\n            key = self._memory_parent_semantic_key(msg)\n            now = time.monotonic()\n            with self._memory_parent_semantic_lock:\n                last = self._memory_parent_semantic_last.get(key, 0.0)\n                if now - last < _MEMORY_PARENT_SEMANTIC_DEDUPE_SEC:\n                    logger.debug(\n                        \"[SemanticQueue] Skipping duplicate memory semantic enqueue for %s \"\n                        \"(within %.0fs dedupe window; see #769)\",\n                        msg.uri,\n                        _MEMORY_PARENT_SEMANTIC_DEDUPE_SEC,\n                    )\n                    return \"deduplicated\"\n                self._memory_parent_semantic_last[key] = now","sourcePath":"openviking/storage/queuefs/semantic_queue.py","sourceLines":"47-60"}],"family":"context-ingestion"},{"id":"context-ingestion.semantic-dag","parent":"context-ingestion","name":"Semantic DAG","kind":"processing","sourcePath":"openviking/storage/queuefs/semantic_processor.py","symbol":"SemanticProcessor.on_dequeue","sourceLines":"306-516","pipelines":["write"],"summary":{"en":"Bottom-up DAG executor that generates per-file LLM summaries and directory L0/L1 artifacts, then dispatches vectorization.","zh":"自底向上的 DAG 执行器，为每个文件调用 LLM 生成摘要，为目录生成 L0/L1 产物，然后派发向量化。"},"article":{"en":"`SemanticProcessor.on_dequeue` receives a `SemanticMsg` and creates a `SemanticDagExecutor` for bottom-up DAG processing — directory `.overview.md` and `.abstract.md` aggregate the child `.abstract.md` files, so leaves must complete before their parents. For each directory it generates per-file LLM summaries, collects child `.abstract.md`, renders `.overview.md` (L1) and extracts `.abstract.md` (L0) — both written to VikingFS — then dispatches vectorization. Memory directories skip per-file vectorization. Supports incremental updates via a `changes` dict.","zh":"`SemanticProcessor.on_dequeue` 接收 `SemanticMsg`，创建 `SemanticDagExecutor` 自底向上处理——目录摘要聚合子级 `.abstract.md`，因此叶子先于父目录处理。为每个文件调用 LLM 生成摘要，生成目录 `.overview.md`（L1）和 `.abstract.md`（L0）写回 VikingFS，再派发向量化。记忆目录跳过逐文件向量化。"},"io":{"inputs":[{"en":"SemanticMsg","zh":"SemanticMsg"},{"en":"directory tree","zh":"目录树"},{"en":"LLM API","zh":"LLM API"},{"en":"changes dict (incremental)","zh":"changes 字典（增量）"}],"outputs":[{"en":".abstract.md (L0)","zh":".abstract.md（L0）"},{"en":".overview.md (L1)","zh":".overview.md（L1）"},{"en":"vectorization tasks","zh":"向量化任务"},{"en":"VikingFS writes","zh":"VikingFS 写入"}]},"family":"context-ingestion"},{"id":"context-ingestion.embedding-enqueue","parent":"context-ingestion","name":"Embed Enqueue","kind":"processing","sourcePath":"openviking/storage/queuefs/embedding_msg_converter.py","symbol":"EmbeddingMsgConverter.from_context","sourceLines":"19-94","pipelines":["write"],"summary":{"en":"Converts Context objects to EmbeddingMsg and enqueues them to EmbeddingQueue for vectorization.","zh":"把 Context 对象转成 EmbeddingMsg，推入 EmbeddingQueue 等待向量化。"},"article":{"en":"`EmbeddingMsgConverter.from_context` converts a `Context` object to an `EmbeddingMsg`, resolving the vectorization text from the Vectorize field and deriving the embedding level from URI metadata. `vectorize_file` handles individual file content; `vectorize_directory_meta` handles directory-level L0/L1 artifacts with two separate messages. Both set `full_text` for BM25 search and support multimodal embedding with text plus image parts. Messages enqueue to `EmbeddingQueue` via the queue manager.","zh":"`EmbeddingMsgConverter.from_context` 将 `Context` 转换为 `EmbeddingMsg`，按 URI 后缀推导层级（.abstract.md=L0，.overview.md=L1，其余=DETAIL），填入 `full_text` 供 BM25 检索。`vectorize_file` 和 `vectorize_directory_meta` 调用它，消息入队 `EmbeddingQueue`。"},"io":{"inputs":[{"en":"Context object","zh":"Context 对象"},{"en":"vectorization text","zh":"向量化文本"},{"en":"URI metadata","zh":"URI 元数据"}],"outputs":[{"en":"EmbeddingMsg in EmbeddingQueue","zh":"EmbeddingQueue 中的 EmbeddingMsg"},{"en":"BM25 full_text","zh":"BM25 全文"},{"en":"multimodal parts","zh":"多模态部件"}]},"code":[{"lang":"python","title":{"en":"URI suffix decides embedding level + BM25 text","zh":"URI 后缀决定层级与 BM25 全文"},"text":"        elif uri.endswith(\"/.abstract.md\"):\n            resolved_level = ContextLevel.ABSTRACT\n        elif uri.endswith(\"/.overview.md\"):\n            resolved_level = ContextLevel.OVERVIEW\n        else:\n            resolved_level = ContextLevel.DETAIL\n\n        if isinstance(resolved_level, ContextLevel):\n            resolved_level = int(resolved_level.value)\n        context_data[\"level\"] = int(resolved_level)\n        # …\n        full_content = context.vectorize.full_text or vectorization_text\n        context_data[\"content\"] = full_content","sourcePath":"openviking/storage/queuefs/embedding_msg_converter.py","sourceLines":"60-74"}],"family":"context-ingestion"},{"id":"context-ingestion.embedding-queue","parent":"context-ingestion","name":"Embedding Queue","kind":"queue","sourcePath":"openviking/storage/queuefs/embedding_queue.py","symbol":"EmbeddingQueue","sourceLines":"13-75","pipelines":["write"],"summary":{"en":"Persistent AGFS queue that embeds text from EmbeddingMsg and writes vectors plus metadata to the vector database.","zh":"基于 AGFS 的持久化队列，向量化 EmbeddingMsg 文本，将向量和元数据写入向量数据库。"},"article":{"en":"`EmbeddingQueue` extends the base `NamedQueue` with typed `EmbeddingMsg` enqueue and dequeue operations. `TextEmbeddingHandler.on_dequeue` calls `embed_compat(...)`, which dispatches to the embedder's `embed_async()` (the base implementation falls back to `embed()`). It constructs a record carrying `context_data` plus the embedding, and writes it to `VikingVectorIndexBackend`. Dense vectors capture semantic similarity; sparse vectors support keyword/BM25-style matching. A circuit breaker guards embedding API calls; transient failures trigger automatic re-enqueue.","zh":"`EmbeddingQueue` 扩展 `NamedQueue`，提供 `EmbeddingMsg` 类型化的入队和出队。`TextEmbeddingHandler` 通过 `embed_compat` 调用 embedder 生成向量写入 `VikingVectorIndexBackend`。稠密向量表达语义相似度，稀疏向量支持关键词/BM25 匹配。熔断器保护嵌入 API，瞬时错误自动重入队。"},"io":{"inputs":[{"en":"EmbeddingMsg","zh":"EmbeddingMsg"},{"en":"embedder API","zh":"向量化 API"},{"en":"circuit breaker state","zh":"熔断器状态"}],"outputs":[{"en":"vector index records","zh":"向量索引记录"},{"en":"dense/sparse vectors","zh":"稠密/稀疏向量"},{"en":"task tracker completion","zh":"任务追踪器完成"},{"en":"re-enqueued failures","zh":"重入队失败"}]},"family":"context-ingestion"},{"id":"context-ingestion.external-parse","parent":"context-ingestion","name":"External Parse","kind":"queue","sourcePath":"openviking/storage/queuefs/understanding_parse_processor.py","symbol":"UnderstandingParseProcessor.on_dequeue","sourceLines":"25-345","pipelines":["write","manage.watch-tasks"],"summary":{"en":"Deferred resource-add queue that runs the full parse-commit-enqueue pipeline asynchronously with task status tracking.","zh":"延迟资源添加队列，异步运行完整的解析-落盘-入队管线并追踪任务状态。"},"article":{"en":"Long-running resource adds (large git repos, slow remote fetches) would otherwise block the caller, so they are deferred to this background queue; each `UnderstandingParseMsg` carries the full resource-add parameters plus a `task_id` for asynchronous status tracking. `UnderstandingParseProcessor` dequeues `UnderstandingParseMsg` messages and calls `ResourceProcessor.process_resource` to run the complete parse-commit-enqueue pipeline asynchronously. After processing completes, it monitors queue completion via `request_wait_tracker` and optionally links the resource reason to memory through `ResourceMemoryLinkService`. Lock handoff is supported when the message carries a `lock_handoff` reference.","zh":"大仓库或慢速源的资源添加会阻塞调用方，因此延迟到这个后台队列。`UnderstandingParseProcessor` 出队 `UnderstandingParseMsg`（含完整资源添加参数和 `task_id`），调用 `ResourceProcessor.process_resource` 异步运行解析-落盘-入队管线。处理完成后通过 `request_wait_tracker` 监控队列完成情况，可选将资源 reason 关联到记忆。支持锁移交。"},"io":{"inputs":[{"en":"UnderstandingParseMsg","zh":"UnderstandingParseMsg"},{"en":"resource-add params","zh":"资源添加参数"},{"en":"lock handoff ref","zh":"锁移交引用"}],"outputs":[{"en":"processed resource in AGFS","zh":"AGFS 中已处理资源"},{"en":"queue completion status","zh":"队列完成状态"},{"en":"memory link","zh":"记忆关联"},{"en":"task status update","zh":"任务状态更新"}]},"family":"context-ingestion"},{"id":"context-ingestion.ingest-backfill","parent":"context-ingestion","name":"Ingest Backfill","kind":"service","sourcePath":"openviking/ingest/orchestrator.py","symbol":"IngestOrchestrator","sourceLines":"51-143","pipelines":["write","manage.session-lifecycle"],"summary":{"en":"Replays historical session logs from external AI coding assistants into OpenViking for memory extraction and indexing.","zh":"把外部 AI 编程助手的历史会话日志回放进 OpenViking，供记忆提取和索引。"},"article":{"en":"`IngestOrchestrator` iterates over enabled `LogSource` implementations. For each discovered session it reconciles OV state via `replayer.reconcile()`, reads messages from the cursor via `source.read_messages`, appends them in batch to `SessionReplayer`, and triggers `commit_if_needed`. The replayed sessions then feed the same downstream session-memory system as real-time writes — including `SessionCompressor` memory extraction — with memories written to `viking://user/memories/` and vectorized.","zh":"`IngestOrchestrator` 遍历启用的 `LogSource`。对每个发现的会话，先通过 `replayer.reconcile()` 对齐 OpenViking 已有状态以避免重复导入，再从游标读取消息，批量追加到 `SessionReplayer` 并触发提交。回放的会话进入与实时写入相同的下游会话记忆系统（含 `SessionCompressor` 记忆提取），记忆写入 `viking://user/memories/` 并向量化。"},"io":{"inputs":[{"en":"external session logs","zh":"外部会话日志"},{"en":"LogSource cursor","zh":"LogSource 游标"},{"en":"session reconciliation state","zh":"会话调和状态"}],"outputs":[{"en":"replayed session transcripts","zh":"回放的会话记录"},{"en":"extracted memories","zh":"提取的记忆"},{"en":"vectorized memory records","zh":"已向量化记忆记录"},{"en":"updated cursor","zh":"更新后的游标"}]},"family":"context-ingestion"},{"id":"context-ingestion.skill-processor","parent":"context-ingestion","name":"SkillProcessor","kind":"processing","sourcePath":"openviking/utils/skill_processor.py","symbol":"SkillProcessor","sourceLines":"","pipelines":["write"],"summary":{"en":"Dedicated skill write path that validates, generates VLM overview, persists to VikingFS, and indexes L0 abstract — bypassing SemanticQueue.","zh":"技能专用写入路径，验证定义，用 VLM 生成概述，持久化到 VikingFS，索引 L0 摘要，不走 SemanticQueue。"},"article":{"en":"`SkillProcessor` handles the dedicated skill write path, bypassing `SemanticQueue` entirely. Skills have a fixed flat structure (SKILL.md plus auxiliary files), so no recursive DAG traversal is needed — the L0 abstract is built directly from the normalized SKILL.md header metadata by `_build_skill_abstract`. `prepare_skill_processing` validates the skill definition and stages it for processing. `process_prepared_skill` generates the overview inline through an awaited VLM call — within the same request flow, not deferred to a queue. `_write_skill_content` and `_write_auxiliary_files` perform durable VikingFS writes. `_index_skill` enqueues only the L0 abstract to `EmbeddingQueue` for vectorization. Privacy configuration applies via `UserPrivacyConfigService` when the feature is enabled.","zh":"`SkillProcessor` 处理技能专用写入路径，完全绕过 `SemanticQueue`。技能结构扁平，L0 摘要由 `_build_skill_abstract` 直接取自 SKILL.md 头部元数据，无需递归 DAG。验证定义后在同一调用流程内通过 VLM 生成概述，写入 VikingFS。`_index_skill` 只把 L0 摘要入队 `EmbeddingQueue` 做向量化。启用时应用 `UserPrivacyConfigService` 隐私配置。"},"io":{"inputs":[{"en":"skill definition (SKILL.md)","zh":"技能定义（SKILL.md）"},{"en":"privacy config","zh":"隐私配置"},{"en":"target URI","zh":"目标 URI"}],"outputs":[{"en":"skill content in VikingFS","zh":"VikingFS 中的技能内容"},{"en":"auxiliary files","zh":"辅助文件"},{"en":"L0 abstract in EmbeddingQueue","zh":"EmbeddingQueue 中的 L0 摘要"},{"en":"indexed skill","zh":"已索引技能"}]},"family":"context-ingestion"},{"id":"context-model","parent":null,"name":"Context Model","kind":"namespace","sourcePath":"openviking/core/context.py","symbol":"Context (family anchor)","sourceLines":"1-256","pipelines":[],"summary":{"en":"Defines the unified data model all OpenViking families operate on — entities, URI addressing, abstraction levels, identity, privacy, and directory layout.","zh":"定义 OpenViking 所有组件共用的数据模型，涵盖实体、URI 寻址、抽象层级、身份、隐私和目录布局。"},"article":{"en":"Unlike the other families on this board, the Context Model is not a running component — it is the data model itself, the shared vocabulary every component reads and writes, which is why it sits apart on the left rather than on the runtime baseboard. It defines what every piece of content in OpenViking looks like and how it is addressed. Every resource, memory, skill, session, and directory is addressed by a `viking://` URI and represented as a Context record. This family divides into five subsystems: Context Entity (the record itself), URI Namespace (addressing), Identity Model (ownership boundaries), Privacy System (versioned secret storage), and Directory Layout (the initial tree). The model establishes three content types (resource, memory, skill) and three abstraction levels (L0 abstract, L1 overview, L2 detail) for vector indexing. Identity boundaries separate account, user, and peer scopes. The privacy system extracts sensitive values into a versioned config store. A preset directory tree materializes user data structures on initialization. The primary anchor is `openviking/core/context.py` with the `Context` class, `ContextType` enum, and `ContextLevel` enum. URI resolution lives in `openviking/core/namespace.py` and `openviking_cli/utils/uri.py`.","zh":"和板上其它族不同，Context Model 不是运行组件，而是数据模型本身——各组件共享、读写的那套词汇，所以它单独摆在左侧，不在运行时基板上。它规定 OpenViking 里每条内容长什么样、怎么寻址。所有资源、记忆、技能、会话和目录都通过 `viking://` URI 寻址，统一表示为 Context 记录。本族分五个子系统：Context Entity 定义记录本身，URI Namespace 负责寻址，Identity Model 划定归属边界，Privacy System 管理敏感值，Directory Layout 给出初始目录树。模型定义了三种内容类型（resource、memory、skill）和三级抽象层级（L0 摘要、L1 概览、L2 详情）用于向量索引。身份模型在 account、user、peer 三个维度做隔离。隐私系统把敏感值抽离到带版本号的配置存储。用户初始化时，预设目录树自动物化。核心锚点是 `openviking/core/context.py` 中的 `Context` 类、`ContextType` 和 `ContextLevel` 枚举，URI 解析逻辑分布在 `openviking/core/namespace.py` 和 `openviking_cli/utils/uri.py`。"},"io":{"inputs":[{"en":"URI string in any format","zh":"任意格式的 URI 字符串"},{"en":"Authentication credentials","zh":"认证凭证"},{"en":"Content text and metadata","zh":"内容文本与元数据"}],"outputs":[{"en":"Context record with type and level","zh":"带类型和层级的 Context 记录"},{"en":"Resolved namespace with owner","zh":"带所有者的解析命名空间"},{"en":"Preset directory tree in AGFS","zh":"AGFS 中的预设目录树"}]},"family":"context-model"},{"id":"context-model.context-entity","parent":"context-model","name":"Context Entity","kind":"namespace","sourcePath":"openviking/core/context.py","symbol":"Context, ContextType, ContextLevel","sourceLines":"16-256","pipelines":["write","retrieve"],"summary":{"en":"A URI, its content type, and abstraction level form a Context record that holds text for vectorization, metadata, and ownership fields.","zh":"URI、内容类型和抽象层级共同组成 Context 记录，承载待向量化文本、元数据和归属信息。"},"article":{"en":"The unified Context entity is the single record type that all indexed content becomes. Every piece of content indexed by OpenViking becomes a Context record with a URI, `context_type` (resource, memory, or skill), and a `level` (0=abstract, 1=overview, 2=detail). The Context constructor auto-derives `context_type` from the URI via `context_type_for_uri` in `openviking/core/namespace.py`. It carries `owner_user_id` and `owner_space` for access isolation, a `related_uri` list for cross-references, and a `Vectorize` payload holding text and images for embedding. `Context.to_dict` and `Context.from_dict` handle serialization for the vector database. Type and level are independent dimensions on the same record: one write/retrieve pipeline handles resources, memories, and skills by filtering on `context_type`, while `level` selects indexing granularity — no per-type code paths needed.","zh":"Context 实体是所有索引内容统一归属的单一记录类型。OpenViking 索引的每条内容都表示为一条 Context 记录，包含 URI、`context_type`（resource、memory、skill）和 `level`（0=摘要、1=概览、2=详情）。构造函数通过 `openviking/core/namespace.py` 中的 `context_type_for_uri` 从 URI 自动推导类型。记录携带 `owner_user_id` 和 `owner_space` 用于访问隔离，`related_uri` 列表维护交叉引用，`Vectorize` 载荷存放待嵌入的文本和图片。`Context.to_dict` 和 `Context.from_dict` 处理向量库的序列化与反序列化。类型与层级是同一条记录上的两个独立维度：同一套写入/检索管线通过 `context_type` 过滤即可服务三种内容，`level` 只决定索引粒度，无需按类型分叉代码。"},"io":{"inputs":[{"en":"URI string with path segments","zh":"含路径段的 URI 字符串"},{"en":"Owner user and space identifiers","zh":"所有者用户与空间标识"},{"en":"Text and images for embedding","zh":"待嵌入的文本与图片"}],"outputs":[{"en":"Context record with derived type","zh":"自动推导类型的 Context 记录"},{"en":"Vectorize payload for embedding","zh":"用于嵌入的 Vectorize 载荷"},{"en":"Serialized dict for vector DB","zh":"面向向量库的序列化字典"}]},"family":"context-model"},{"id":"context-model.context-entity.core-class","parent":"context-model.context-entity","name":"Context Class","kind":"namespace","sourcePath":"openviking/core/context.py","symbol":"Context","sourceLines":"61-256","pipelines":["write","retrieve"],"summary":{"en":"Constructor takes raw field values and returns a Context object with auto-derived type, category, and vectorization payload.","zh":"构造函数接收原始字段，返回带自动推导类型、类别和向量化载荷的 Context 对象。"},"article":{"en":"Defined in `openviking/core/context.py`, the `Context` class is the concrete record written to the vector database. Its constructor accepts raw fields — URI, timestamps, owner identifiers, metadata — and automatically derives memory subcategories from URI substrings. For user- and session-scoped URIs it assigns `user_id` as `owner_space`. `set_vectorize` attaches a payload of text and images for embedding. `to_dict` serialises every field into a dict ready for the vector database, including skill-specific name and description extracted from meta. The URI is treated as the source of truth — when not supplied, `context_type` comes from `context_type_for_uri(uri)` and `category` from URI substring matching, so callers cannot mismatch a record's type and its location. `_derive_owner_space` returns the `user_id` only for URIs starting with `viking://user/` or `viking://session/`, and an empty string otherwise.","zh":"`openviking/core/context.py` 的 `Context` 类承载索引数据。构造时接收 URI、时间戳、所有者等原始字段，自动从 URI 推导记忆类别并分配 `owner_space`，挂载向量化载荷，输出可直接写入向量库的字典，同时支持从字典反序列化重建对象。"},"io":{"inputs":[{"en":"URI and optional parent URI","zh":"URI 及可选父 URI"},{"en":"Raw field values for initialization","zh":"初始化原始字段值"},{"en":"Vectorize text and images","zh":"向量化文本与图片"}],"outputs":[{"en":"Initialized Context object","zh":"初始化后的 Context 对象"},{"en":"Derived category string","zh":"推导得到的类别字符串"},{"en":"Dict ready for vector DB","zh":"可写入向量库的字典"}]},"code":[{"lang":"python","title":{"en":"Field defaults derived from the URI","zh":"从 URI 推导的字段默认值"},"text":"self.id = id or str(uuid4())\nself.uri = uri\nself.parent_uri = parent_uri\nself.temp_uri = temp_uri\nself.is_leaf = is_leaf\nself.abstract = abstract\nself.context_type = context_type or context_type_for_uri(uri)\nself.category = category or self._derive_category()\nself.created_at = created_at or datetime.now(timezone.utc)\nself.updated_at = updated_at or self.created_at\nself.active_count = active_count\nself.related_uri = related_uri or []\nself.meta = meta or {}","sourcePath":"openviking/core/context.py","sourceLines":"91-103"}],"family":"context-model"},{"id":"context-model.context-entity.type-enum","parent":"context-model.context-entity","name":"ContextType","kind":"namespace","sourcePath":"openviking/core/context.py","symbol":"ContextType","sourceLines":"26-32","pipelines":["write","retrieve"],"summary":{"en":"classify_uri inspects URI path segments to assign a content type: resource, memory, or skill.","zh":"classify_uri 检查 URI 路径段，分配内容类型：resource、memory 或 skill。"},"article":{"en":"`ContextType` at `openviking/core/context.py` is a string enum with three values: `SKILL`, `MEMORY`, and `RESOURCE`. `classify_uri` in `openviking/core/namespace.py` inspects URI path segments to assign a type — paths containing 'memories' map to memory, 'skills' to skill, and the resources scope defaults to resource. When no explicit type is provided, the Context constructor calls `context_type_for_uri` to auto-populate the field. `classify_uri` returns a `UriClassification` dataclass carrying parts, scope, content_index, and context_type for full path analysis; `context_type_for_uri` is the one-line convenience wrapper returning just the type string — and it is what `Context.__init__` calls.","zh":"`ContextType` 是字符串枚举，含 `SKILL`、`MEMORY`、`RESOURCE` 三值。`classify_uri` 从路径段分配类型，含 'memories' 归 memory。Context 构造函数未显式传入类型时调用便捷函数自动填充。显式传入时优先使用调用方值。"},"io":{"inputs":[{"en":"URI with path segments","zh":"含路径段的 URI"},{"en":"Explicit context_type override","zh":"显式类型覆盖值"}],"outputs":[{"en":"context_type string","zh":"context_type 字符串"},{"en":"UriClassification result","zh":"UriClassification 结果"}]},"family":"context-model"},{"id":"context-model.context-entity.level-enum","parent":"context-model.context-entity","name":"L0 / L1 / L2","kind":"namespace","sourcePath":"openviking/core/context.py","symbol":"ContextLevel","sourceLines":"34-39","pipelines":["write","retrieve"],"summary":{"en":"Levels 0, 1, and 2 correspond to semantic abstraction tiers used in vector indexing.","zh":"层级 0、1、2 对应向量索引使用的语义抽象层级。"},"article":{"en":"`ContextLevel` at `openviking/core/context.py` is an integer enum: `ABSTRACT=0` (L0, roughly 100 tokens for fast vector filtering), `OVERVIEW=1` (L1, roughly 2k tokens for reranking and content navigation), `DETAIL=2` (L2, full content loaded on demand). L0 and L1 content are stored as `.abstract.md` and `.overview.md` files respectively. Vector database records are keyed by `(uri, level)`, so each directory can hold up to three indexed representations. L0 abstracts let vector search narrow candidates cheaply, L1 overviews support reranking and content navigation, and L2 full text is loaded only for final results.","zh":"`ContextLevel` 是整数枚举：`ABSTRACT=0`（L0 快速过滤）、`OVERVIEW=1`（L1 重排导航）、`DETAIL=2`（L2 完整内容）。向量库记录以 `(uri, level)` 为键，每目录最多三个索引表示，分别对应不同的检索阶段。L0 和 L1 内容分别存为 `.abstract.md` 和 `.overview.md` 文件。"},"io":{"inputs":[{"en":"Integer level value 0/1/2","zh":"层级整数值 0/1/2"},{"en":"Leaf content text","zh":"叶子内容文本"}],"outputs":[{"en":"L0 abstract vector record","zh":"L0 摘要向量记录"},{"en":"L1 overview vector record","zh":"L1 概览向量记录"},{"en":"L2 detail source file","zh":"L2 详情源文件"}]},"code":[{"lang":"python","title":{"en":"The three-level enum","zh":"三级抽象枚举"},"text":"class ContextLevel(int, Enum):\n    \"\"\"Context level (L0/L1/L2) for vector indexing\"\"\"\n\n    ABSTRACT = 0  # L0: abstract\n    OVERVIEW = 1  # L1: overview\n    DETAIL = 2  # L2: detail/content","sourcePath":"openviking/core/context.py","sourceLines":"34-39"}],"family":"context-model"},{"id":"context-model.uri-namespace","parent":"context-model","name":"viking:// URIs","kind":"namespace","sourcePath":"openviking_cli/utils/uri.py","symbol":"VikingURI","sourceLines":"14-323","pipelines":["manage.context-fs","write","retrieve"],"summary":{"en":"Parsing a viking:// URI returns its scope, canonical path, owner, and whether the caller can access it.","zh":"解析 viking:// URI 得到作用域、规范路径、所有者和访问权限判定。"},"article":{"en":"OpenViking addresses every piece of content through a `viking://{scope}/{path}` URI namespace. Scopes fall into three groups: public (resources, user, agent) browsable via `ov ls`; legacy (session) for backward-compatible paths from earlier versions; and internal (temp, queue, upload) backing runtime operations like temporary upload staging and inter-process queues. Short-format URIs such as `/resources/x` or bare `resources/x` auto-normalise to full `viking://resources/x` form. The system parses URIs into scope and path components, traverses parent URIs up the directory tree, and joins path segments. It sanitises segment names while preserving CJK and extended Latin scripts, and generates temp URIs with per-user namespace isolation. Namespace resolution expands shorthand user URIs like `viking://user/memories` into canonical form with an explicit `user_id`. URI handling splits into three layers: `VikingURI` (pure value object for parsing, normalizing, and joining), Namespace Resolver (adds identity and access control), and Path Variables (template expansion for time-organized paths).","zh":"OpenViking 通过 `viking://{scope}/{path}` URI 命名空间统一寻址所有内容。作用域分三类：公开（resources、user、agent）可通过 `ov ls` 浏览，遗留（session）兼容旧版路径，内部（temp、queue、upload）支撑临时上传暂存与进程间队列。短格式 URI 自动规范化为完整 `viking://` 形式。系统负责 URI 解析、父级遍历和路径拼接。段名清理保留中日韩及扩展拉丁字符，临时 URI 生成带用户空间隔离。命名空间解析把简写的用户 URI 展开为带显式 `user_id` 的规范形式。 URI 处理分三层：VikingURI 负责解析与规范化，Namespace Resolver 叠加身份与访问控制，Path Variables 支持时间路径模板展开。"},"io":{"inputs":[{"en":"URI string in any format","zh":"任意格式的 URI 字符串"},{"en":"RequestContext with user","zh":"含用户的请求上下文"},{"en":"Path segment for joining","zh":"待拼接的路径段"}],"outputs":[{"en":"Normalized viking:// URI","zh":"规范化的 viking:// URI"},{"en":"Parsed scope and full path","zh":"解析出的作用域与完整路径"},{"en":"Canonical user-scoped URI","zh":"规范化的用户作用域 URI"}]},"family":"context-model"},{"id":"context-model.uri-namespace.viking-uri","parent":"context-model.uri-namespace","name":"VikingURI","kind":"namespace","sourcePath":"openviking_cli/utils/uri.py","symbol":"VikingURI","sourceLines":"14-323","pipelines":["manage.context-fs"],"summary":{"en":"VikingURI normalizes any URI format into a viking:// object with scope, path, and manipulation methods.","zh":"VikingURI 将任意格式的 URI 规范化为 viking:// 对象，提供作用域、路径和操作方法。"},"article":{"en":"`VikingURI` at `openviking_cli/utils/uri.py` gives every scope and path a single normalized form so content can be addressed safely in any language. The `SCHEME` is `'viking'`. `VISITABLE_SCOPES` covers public (resources, user, agent), legacy (session), and internal (temp, queue, upload) scopes. `PUBLIC_SCOPES` are listable via `ov ls`. The constructor normalises short formats — both `/resources/x` and `resources/x` become `viking://resources/x`. `parent` returns the parent VikingURI or None for tree traversal, and `join` appends a path segment. `sanitize_segment` replaces only characters unsafe for URIs or filesystems and preserves CJK, Latin extended, Cyrillic, Arabic, Hiragana/Katakana, and Hangul, because segment names are user-facing labels in any language.","zh":"`VikingURI` 为所有作用域和路径提供统一规范形式，确保任意语言的内容都能安全寻址。构造函数将短格式规范化为 `viking://` 完整形式，`parent`、`join` 支持树遍历。`sanitize_segment` 只替换 URI/文件系统不安全字符，保留中日韩、西里尔、阿拉伯等文字，因为段名是面向用户的可见标签。"},"io":{"inputs":[{"en":"Raw URI string","zh":"原始 URI 字符串"},{"en":"Scope and path parts","zh":"作用域与路径部件"},{"en":"Text for segment sanitization","zh":"待清理的段名文本"}],"outputs":[{"en":"Normalized VikingURI object","zh":"规范化的 VikingURI 对象"},{"en":"Parent VikingURI or None","zh":"父 VikingURI 或 None"},{"en":"URI-safe segment string","zh":"URI 安全段名字符串"}]},"code":[{"lang":"python","title":{"en":"sanitize_segment: scripts preserved","zh":"sanitize_segment 保留的文字范围"},"text":"# Preserve:\n# - Letters, numbers, underscores, hyphens, dots (\\w includes [a-zA-Z0-9_])\n# - Latin-1 Supplement, Latin Extended-A/B (Western European languages: Spanish, Portuguese, French, German, etc.)\n# - Cyrillic (Russian, Bulgarian, Serbian, etc.)\n# - Arabic (Arabic, Persian, Urdu, etc.)\n# - CJK Unified Ideographs (Chinese, Japanese Kanji, Korean Hanja)\n# - Hiragana and Katakana (Japanese)\n# - Hangul Syllables (Korean)\n# - CJK Unified Ideographs Extension A/B\nsafe = re.sub(\n    r\"[^\\w\\u0080-\\u02af\\u0400-\\u052f\\u0600-\\u077f\\u4e00-\\u9fff\\u3040-\\u309f\\u30a0-\\u30ff\\uac00-\\ud7af\\u3400-\\u4dbf\\U00020000-\\U0002a6df\\-.]\",\n    \"_\",\n    text,\n)","sourcePath":"openviking_cli/utils/uri.py","sourceLines":"241-254"}],"family":"context-model"},{"id":"context-model.uri-namespace.resolver","parent":"context-model.uri-namespace","name":"NS Resolver","kind":"namespace","sourcePath":"openviking/core/namespace.py","symbol":"resolve_uri, canonicalize_uri, is_accessible, classify_uri","sourceLines":"86-327","pipelines":["manage.context-fs","manage.auth-tenant","retrieve"],"summary":{"en":"resolve_uri takes a user-facing URI and RequestContext to produce a canonical ResolvedNamespace with owner and access info.","zh":"resolve_uri 接收面向用户的 URI 和请求上下文，生成含所有者和访问信息的规范 ResolvedNamespace。"},"article":{"en":"`resolve_uri` at `openviking/core/namespace.py` transforms user-facing URIs into canonical `ResolvedNamespace` form. Shorthand like `viking://user/memories` expands via `RequestContext` to `viking://user/{user_id}/memories`. Legacy `viking://session/{id}` aliases to the user's sessions path. `classify_uri` determines `context_type` from path structure. `is_accessible` enforces that user-scoped content is only reachable by its owner, with root role bypassing all checks. When `actor_peer_id` is set, `is_hidden_by_actor_peer_view` filters other peers' content from listings. In `is_accessible` the root-role check is the first statement and returns True before the URI is even resolved, so root access is never blocked by ownership rules or namespace-shape errors.","zh":"`resolve_uri` 把面向用户的 URI 转为规范形式。简写路径经 `RequestContext` 展开为含 `user_id` 的完整路径。`is_accessible` 强制所有者访问控制，设置 `actor_peer_id` 时从列表中过滤其他 peer 的可见内容。root 角色绕过所有访问检查，直接返回可访问。"},"io":{"inputs":[{"en":"User-supplied URI string","zh":"用户提供的 URI 字符串"},{"en":"RequestContext with user_id","zh":"含 user_id 的请求上下文"},{"en":"actor_peer_id view filter","zh":"actor_peer_id 视图过滤"}],"outputs":[{"en":"ResolvedNamespace canonical URI","zh":"ResolvedNamespace 规范 URI"},{"en":"Accessibility boolean verdict","zh":"可访问性布尔判定"},{"en":"Visible roots list","zh":"可见根目录列表"}]},"family":"context-model"},{"id":"context-model.uri-namespace.path-variables","parent":"context-model.uri-namespace","name":"Path Variables","kind":"namespace","sourcePath":"openviking/core/path_variables.py","symbol":"PathVariableResolver, CalendarVariableProvider","sourceLines":"18-218","pipelines":["manage.context-fs","write"],"summary":{"en":"PathVariableResolver expands {namespace:key} template variables (including calendar values) into a concrete URI.","zh":"PathVariableResolver 展开 {namespace:key} 模板变量（含日历值），得到具体 URI。"},"article":{"en":"`PathVariableResolver` at `openviking/core/path_variables.py` resolves `{namespace:key}` template variables at request time. The variable syntax is matched by `VARIABLE_PATTERN` regex. The built-in `CalendarVariableProvider` supplies date-based variables: today, yesterday, tomorrow, year, month, day, ym (year/month), quarter, yq (year/quarter), week (ISO week), yw (year/ISO week). Resolution happens server-side; the CLI and SDK pass templates through verbatim. Calendar values are computed from the server's `datetime.now()` when no explicit datetime is passed, so the server clock is the single source of dates — clients never expand templates locally. This enables time-organised data paths like `viking://resources/emails/{calendar:today}/inbox`. Unresolved variables raise `ValueError` listing the missing keys.","zh":"`PathVariableResolver` 在请求时解析 `{namespace:key}` 模板变量。内置 `CalendarVariableProvider` 提供 today、yesterday、tomorrow、quarter、ISO week 等日期变量。解析在服务端执行，未解析变量抛出 `ValueError`。"},"io":{"inputs":[{"en":"URI template with variables","zh":"含变量的 URI 模板"},{"en":"Current datetime for calendar","zh":"日历变量的当前时间"},{"en":"Extra variable providers","zh":"额外变量提供器"}],"outputs":[{"en":"Resolved concrete URI string","zh":"解析后的具体 URI 字符串"},{"en":"ValueError on missing keys","zh":"缺失键时的 ValueError"}]},"family":"context-model"},{"id":"context-model.identity-isolation","parent":"context-model","name":"Identity Model","kind":"namespace","sourcePath":"openviking/server/identity.py","symbol":"Role, ResolvedIdentity","sourceLines":"25-88","pipelines":["manage.auth-tenant","retrieve"],"summary":{"en":"Authentication produces a RequestContext encoding account, user, role, and actor-peer isolation boundaries.","zh":"认证生成 RequestContext，编码账户、用户、角色和交互 peer 的隔离边界。"},"article":{"en":"The identity model establishes multi-tenant isolation boundaries. `UserIdentifier` pairs `account_id` (tenant) with `user_id` (individual within tenant). `Role` supports built-in (root, admin, user) and custom plugin-defined roles with privilege ranking. Ranks exist for role-downgrade detection — higher rank means more privilege, and custom roles register a rank via `Role.register(name, rank)`. The `actor_peer_id` view filter scopes visible peer data to a single interaction partner without changing ownership identity. `ResolvedIdentity` is the auth middleware output. Children: UserIdentifier (who the caller is), Peer Identity (how peer segments are validated).","zh":"身份模型建立多租户隔离边界。`UserIdentifier` 把 `account_id`（租户）和 `user_id`（租户内个人）配对。`Role` 支持内置角色（root、admin、user）和插件注册的自定义角色，带权限排序——排序用于角色降级检测，等级越高权限越大，自定义角色通过 `Role.register(name, rank)` 注册。内置角色中 root 权限最高，user 为基础权限。`actor_peer_id` 视图过滤器把可见的 peer 数据限定到一个交互对象，不改变所有者身份。`ResolvedIdentity` 是认证中间件的输出，`UserIdentifier` 通过校验函数确保 account_id 和 user_id 符合安全字符规则。 子节点：UserIdentifier 标识调用者身份，Peer Identity 校验 peer 段合法性。"},"io":{"inputs":[{"en":"Account and user identifiers","zh":"账户与用户标识"},{"en":"Role name string","zh":"角色名字符串"},{"en":"actor_peer_id from session","zh":"来自会话的 actor_peer_id"}],"outputs":[{"en":"RequestContext for pipeline flow","zh":"供管线使用的 RequestContext"},{"en":"ResolvedIdentity auth output","zh":"ResolvedIdentity 认证输出"},{"en":"ToolContext with VikingFS","zh":"含 VikingFS 的 ToolContext"}]},"family":"context-model"},{"id":"context-model.identity-isolation.user-identifier","parent":"context-model.identity-isolation","name":"UserIdentifier","kind":"namespace","sourcePath":"openviking_cli/session/user_id.py","symbol":"UserIdentifier","sourceLines":"20-79","pipelines":["manage.auth-tenant"],"summary":{"en":"An account_id and user_id form a validated identity tuple for ownership and data isolation.","zh":"account_id 和 user_id 组成校验后的身份元组，用于所有权和数据隔离。"},"article":{"en":"At `openviking_cli/session/user_id.py`, `UserIdentifier` pairs `account_id` (tenant) with `user_id` (individual within that tenant) to form the fundamental identity tuple. Both fields are validated through `validate_account_id` and `validate_user_id` from `openviking/core/identifiers.py`: `account_id` cannot start with an underscore, and both must match `[a-zA-Z0-9_.@-]+` with at most one `@` symbol. `memory_space_uri()` returns the user's memory-space URI as `viking://user/{user_id}/memories`. The default user is produced by `UserIdentifier.the_default_user()` yielding `('default', 'default')`. Equality comparison is by value.","zh":"`UserIdentifier` 是身份元组，配对 `account_id`（租户）和 `user_id`（个人）。两者须匹配 `[a-zA-Z0-9_.@-]+` 且最多一个 `@`。`memory_space_uri()` 返回用户记忆空间 URI，默认用户为 `('default', 'default')`。相等比较基于值而非引用，支持字典序列化与反序列化。"},"io":{"inputs":[{"en":"account_id string","zh":"account_id 字符串"},{"en":"user_id string","zh":"user_id 字符串"}],"outputs":[{"en":"Validated UserIdentifier tuple","zh":"校验后的 UserIdentifier 元组"},{"en":"memory_space_uri string","zh":"memory_space_uri 字符串"},{"en":"Dict for serialization","zh":"供序列化的字典"}]},"family":"context-model"},{"id":"context-model.identity-isolation.peer-normalization","parent":"context-model.identity-isolation","name":"Peer Identity","kind":"namespace","sourcePath":"openviking/core/peer_id.py","symbol":"normalize_peer_id, safe_peer_id","sourceLines":"10-26","pipelines":["manage.auth-tenant"],"summary":{"en":"normalize_peer_id validates and normalizes a peer_id segment, raising ValueError on invalid values; safe_peer_id is the lenient variant that returns None instead.","zh":"normalize_peer_id 校验并规范化 peer_id，无效值抛出 ValueError；safe_peer_id 为宽松版本，改为返回 None。"},"article":{"en":"Peer identity helpers at `openviking/core/peer_id.py` normalise and validate peer_id path segments. `normalize_peer_id` delegates to `normalize_identifier_part`, which strips whitespace, enforces the `[a-zA-Z0-9_.@-]+` pattern, rejects bare `.` and `..` segments, and allows at most one `@` character. `safe_peer_id` is a lenient wrapper that returns `None` on invalid input instead of raising an exception. Peer IDs appear in URIs as `viking://user/{user_id}/peers/{peer_id}/memories/` and `viking://user/{user_id}/peers/{peer_id}/resources/`, isolating per-peer memories and resources. Peer directories are created lazily from session `peer_id` values. peer_id shares the `normalize_identifier_part` validator with account_id and user_id because all three appear as URI path segments and must obey the same safety rules.","zh":"`normalize_peer_id` 规范化并校验 peer_id 路径段，强制 `[a-zA-Z0-9_.@-]+` 模式。`safe_peer_id` 是宽松包装，无效输入返回 None。Peer ID 出现在 URI 中，用于隔离各交互 peer 的独立数据。"},"io":{"inputs":[{"en":"Raw peer_id string","zh":"原始 peer_id 字符串"}],"outputs":[{"en":"Normalized peer_id or None","zh":"规范化 peer_id 或 None"},{"en":"ValueError on invalid input","zh":"无效输入时的 ValueError"}]},"family":"context-model"},{"id":"context-model.privacy-system","parent":"context-model","name":"Privacy System","kind":"namespace","sourcePath":"openviking/privacy/service.py","symbol":"UserPrivacyConfigService","sourceLines":"25-225","pipelines":["manage.context-fs","write","retrieve"],"summary":{"en":"Sensitive values are extracted to a versioned config store and replaced with placeholders in content.","zh":"敏感值抽离到带版本号的配置存储，内容中替换为占位符。"},"article":{"en":"The privacy system separates sensitive values (API keys, tokens, base URLs) from content files, storing them in a versioned config store under `viking://user/{user_id}/privacy/{category}/{target_key}/`. `UserPrivacyConfigService` provides `upsert` (creates new version if values changed), `get_current`, `get_version`, `activate_version` (rollback), `list_categories`, `list_targets`, and `list_versions`. Each version is a full snapshot. Rollback is trivial — `activate_version` writes the chosen historical snapshot straight to current.json, a single file write with no merge logic. Skill privacy is a specific use case: when adding a skill, sensitive values are extracted via LLM and replaced with `{{ov_privacy:skill:{name}:{field}}}` placeholders before writing SKILL.md. On read, placeholders are restored from the current active config version. Children: Privacy Config is the versioned storage service, Skill Sanitizer is the LLM pipeline that extracts and replaces secrets.","zh":"隐私系统把敏感值（API 密钥、令牌、基础 URL）从内容文件中分离，存入带版本号的配置存储 `viking://user/{user_id}/privacy/{category}/{target_key}/` 下。`UserPrivacyConfigService` 提供 `upsert`（值变化时创建新版本）、`get_current`、`get_version`、`activate_version`（回滚）、`list_categories`、`list_targets` 和 `list_versions`。每个版本都是完整快照。回滚操作很简单——`activate_version` 直接把历史快照写入 current.json，单次文件写入，无需合并。技能隐私是一个具体场景：添加技能时，LLM 提取敏感值，替换为 `{{ov_privacy:skill:{name}:{field}}}` 占位符后再写入 SKILL.md。读取时，占位符从当前激活的配置版本还原为实际值。 子节点：Privacy Config 是版本化存储服务，Skill Sanitizer 是提取并替换密钥的 LLM 管线。"},"io":{"inputs":[{"en":"Skill content with embedded secrets","zh":"含嵌入密钥的技能内容"},{"en":"Category and target_key","zh":"类别与目标键"},{"en":"Values dict for upsert","zh":"待写入的键值字典"}],"outputs":[{"en":"Placeholderized safe content","zh":"含占位符的安全内容"},{"en":"Versioned config snapshot","zh":"带版本号的配置快照"},{"en":"Restored content on read","zh":"读取时还原的内容"}]},"family":"context-model"},{"id":"context-model.privacy-system.versioned-config","parent":"context-model.privacy-system","name":"Privacy Config","kind":"namespace","sourcePath":"openviking/privacy/service.py","symbol":"UserPrivacyConfigService.upsert, UserPrivacyConfigVersion","sourceLines":"134-225","pipelines":["manage.context-fs","write"],"summary":{"en":"upsert stores values as an immutable versioned snapshot keyed by category and target_key, with rollback support.","zh":"upsert 以类别和目标键为索引，将值存为不可变的带版本快照，支持回滚。"},"article":{"en":"`UserPrivacyConfigService.upsert` at `openviking/privacy/service.py` manages versioned privacy configurations. It canonicalises incoming values as JSON with sorted keys and no spaces, then compares against the current version; if identical, no new version is created. Canonical JSON comparison (sorted keys, no spaces) prevents version churn — an upsert whose values are semantically identical to the current version only refreshes metadata (updated_by, last_accessed_at) and returns the existing version, so re-saving an unchanged config never grows the history. Otherwise it increments the version number, writes a snapshot to `history/version_NNN.json`, copies it to `current.json`, and updates `.meta.json`. `activate_version` promotes a historical version back to current. Configs are stored per-user under `viking://user/{user_id}/privacy/{category}/{target_key}/`. The `skill` category holds skill secrets keyed by skill name. `UserPrivacyConfigMeta` tracks active and latest version numbers, timestamps, labels, and the updater.","zh":"`UserPrivacyConfigService.upsert` 管理版本化隐私配置。规范化值与当前版本比较，相同则不创建新版本，否则递增版本号写入快照。`activate_version` 可回滚。配置按用户独立存储，`skill` 类别专门存放技能相关密钥。元数据记录激活版本、最新版本和各时间戳。"},"io":{"inputs":[{"en":"Category and target_key","zh":"类别与目标键"},{"en":"Values dict for storage","zh":"待存储的键值字典"},{"en":"Version number for rollback","zh":"回滚目标版本号"}],"outputs":[{"en":"UserPrivacyConfigVersion snapshot","zh":"UserPrivacyConfigVersion 快照"},{"en":"Updated meta with timestamps","zh":"含时间戳的更新元数据"},{"en":"current.json active version","zh":"current.json 激活版本"}]},"code":[{"lang":"python","title":{"en":"upsert: new version only on real change","zh":"upsert：值变化才建新版本"},"text":"await self._ensure_root(ctx, category, target_key)\nnow = get_current_timestamp()\nmeta = await self.get_meta(ctx, category, target_key)\ncurrent = await self.get_current(ctx, category, target_key)\n\nif current and canonicalize_values(current.values) == canonicalize_values(values):\n    # ...\n    return current\n\nversion_number = 1 if meta is None else meta.latest_version + 1\nversion = UserPrivacyConfigVersion(\n    version=version_number,\n    # ...\n)","sourcePath":"openviking/privacy/service.py","sourceLines":"144-174"}],"family":"context-model"},{"id":"context-model.privacy-system.skill-sanitization","parent":"context-model.privacy-system","name":"Skill Sanitizer","kind":"namespace","sourcePath":"openviking/privacy/skill_extractor.py","symbol":"extract_skill_privacy_values","sourceLines":"22-56","pipelines":["write","retrieve"],"summary":{"en":"LLM extracts secrets from skill content, replacing them with placeholders backed by versioned privacy config.","zh":"LLM 从技能内容中提取密钥，替换为占位符，由版本化隐私配置支撑。"},"article":{"en":"Skill privacy extraction at `openviking/privacy/skill_extractor.py` uses an LLM — `vlm.get_completion_async` with the `skill.privacy_extraction` prompt — to identify sensitive values embedded in skill content. The result is a dict of key-value pairs. `placeholderize_skill_content_with_blocks` in `skill_placeholder.py` replaces each matched value with a `{{ov_privacy:skill:{skill_name}:{field}}}` placeholder. On read, `restore_skill_content` in `skill_restore.py` looks up the current privacy config for the skill and substitutes placeholders back with their actual values, appending a notice when some values cannot be resolved. This keeps SKILL.md files safe to share. Extraction is prompt-driven rather than pattern-based — `render_prompt(\"skill.privacy_extraction\", ...)` receives the skill name, description, and full content, so the model can identify secrets wherever they appear in free-form markdown (code blocks, prose, configuration examples) instead of only at fixed patterns.","zh":"技能隐私提取通过 LLM 识别技能内容中的敏感值，输出键值对。`placeholderize_skill_content_with_blocks` 替换为 `{{ov_privacy:skill:...}}` 占位符。读取时 `restore_skill_content` 从当前激活的隐私配置版本还原为实际值。这使得技能文件可以安全分享，不泄露敏感信息。"},"io":{"inputs":[{"en":"Raw skill content with secrets","zh":"含密钥的原始技能内容"},{"en":"LLM prompt for extraction","zh":"用于提取的 LLM 提示词"},{"en":"Current privacy config version","zh":"当前隐私配置版本"}],"outputs":[{"en":"Sanitized content with placeholders","zh":"含占位符的净化内容"},{"en":"Extracted key-value pairs","zh":"提取出的键值对"},{"en":"Restored content on read","zh":"读取时还原的内容"}]},"family":"context-model"},{"id":"context-model.directory-layout","parent":"context-model","name":"Directory Layout","kind":"namespace","sourcePath":"openviking/core/directories.py","symbol":"DirectoryDefinition, DirectoryInitializer","sourceLines":"28-363","pipelines":["manage.context-fs"],"summary":{"en":"Initialization materializes a preset directory tree with L0/L1 records in AGFS and the vector database.","zh":"初始化物化预设目录树，L0/L1 记录同步写入 AGFS 和向量库。"},"article":{"en":"The directory layout defines the initial filesystem structure for each user and account. `PRESET_DIRECTORIES` is a dict mapping scope to a `DirectoryDefinition` tree. The static data definition itself is the Preset Tree child node. The user scope has children: memories (with 9 sub-children covering all memory types), resources, privacy, peers, skills, and sessions. Each `DirectoryDefinition` carries an abstract (L0) and overview (L1). `DirectoryInitializer` materializes these in AGFS via `_create_agfs_structure` and seeds L0/L1 vector records. Account-level roots (`viking://resources`) are initialized separately. User root initialization is lazy: it creates the user root and first-level entries without materializing empty leaf taxonomies.","zh":"目录布局定义每个用户和账户的初始文件系统结构。`PRESET_DIRECTORIES` 是一个字典，把作用域映射到 `DirectoryDefinition` 树。user 作用域的子节点包括 memories（含 9 个覆盖所有记忆类型的子节点）、resources、privacy、peers、skills 和 sessions。每个 `DirectoryDefinition` 携带 abstract（L0）和 overview（L1）。`DirectoryInitializer` 通过 `_create_agfs_structure` 在 AGFS 中物化这些目录，并播种 L0/L1 向量记录。账户级根目录（`viking://resources`）单独执行初始化流程。用户根目录初始化采用惰性策略：创建用户根和一级条目，但不物化空的叶子分类。"},"io":{"inputs":[{"en":"User RequestContext for init","zh":"用于初始化的用户请求上下文"},{"en":"Scope name (user, resources)","zh":"作用域名称（user、resources）"}],"outputs":[{"en":"Materialized AGFS directory tree","zh":"物化的 AGFS 目录树"},{"en":"L0/L1 vector seed records","zh":"L0/L1 向量播种记录"},{"en":"Count of created directories","zh":"创建的目录数量"}]},"family":"context-model"},{"id":"context-model.directory-layout.preset-tree","parent":"context-model.directory-layout","name":"Preset Tree","kind":"namespace","sourcePath":"openviking/core/directories.py","symbol":"PRESET_DIRECTORIES","sourceLines":"39-141","pipelines":["manage.context-fs"],"summary":{"en":"PRESET_DIRECTORIES maps each scope to a DirectoryDefinition tree with L0/L1 text per node.","zh":"PRESET_DIRECTORIES 将每个作用域映射到 DirectoryDefinition 树，每个节点附带 L0/L1 文本。"},"article":{"en":"`openviking/core/directories.py` defines `PRESET_DIRECTORIES`, the static layout of the initial namespace. The `user` scope root describes user-level persistent data with its full subtree. The memories sub-tree contains nine children covering all memory types: preferences, entities, events, cases, patterns, tools, skills, trajectories, and experiences. The `resources` scope root is a flat definition with no preset children — users create project directories as content is added. Each `DirectoryDefinition` carries an abstract (L0) and overview (L1) that are written as `.abstract.md` and `.overview.md` files in AGFS during initialisation, and their text is vectorised for retrieval. Patterns are generalized from cases, and experiences are distilled from execution trajectories — so several of the nine types form refinement pairs rather than being independent buckets.","zh":"`PRESET_DIRECTORIES` 静态定义初始命名空间布局。`user` 作用域根含 memories（9 个记忆类型）、resources、privacy、peers、skills、sessions 子树。`resources` 根为扁平定义。初始化时写入 `.abstract.md` 和 `.overview.md`。"},"io":{"inputs":[{"en":"Scope key (user, resources)","zh":"作用域键（user、resources）"},{"en":"L0 abstract text per node","zh":"每节点的 L0 摘要文本"},{"en":"L1 overview text per node","zh":"每节点的 L1 概览文本"}],"outputs":[{"en":"DirectoryDefinition tree object","zh":"DirectoryDefinition 树对象"},{"en":".abstract.md file content","zh":".abstract.md 文件内容"},{"en":".overview.md file content","zh":".overview.md 文件内容"}]},"family":"context-model"},{"id":"context-model.message-model","parent":"context-model","name":"Message Model","kind":"namespace","sourcePath":"openviking/message/message.py","symbol":"Message","sourceLines":"18-198","pipelines":["write","retrieve"],"summary":{"en":"Message pairs a role (user or assistant) with an ordered list of typed Parts for session conversation.","zh":"Message 将角色（user 或 assistant）与有序 Part 列表配对，构成会话消息。"},"article":{"en":"`Message` at `openviking/message/message.py` is the conversation unit flowing through sessions and the MCP endpoint. Each message has an `id`, `role` (`user` or `assistant`), and a list of `Part` objects. Part types (defined in `openviking/message/part.py`) include `TextPart` (plain text), `ContextPart` (referenced memory/resource/skill with L0 abstract), `ImagePart` (image URL with detail level), and `ToolPart` (tool call with id, name, input, output, and status). `to_dict` serialises to JSONL for persistence; `from_dict` reconstructs. The `estimated_tokens` property counts text from TextParts, ContextPart abstracts, and ToolPart fields using a CJK-aware estimator.","zh":"`Message` 是流经会话和 MCP 端点的对话单元。每条消息含 `id`、`role`（user/assistant）和 Part 列表。Part 分四种：TextPart、ContextPart、ImagePart、ToolPart。`to_dict` 序列化为 JSONL，`estimated_tokens` 用感知 CJK 的估算器统计。"},"io":{"inputs":[{"en":"role string (user or assistant)","zh":"role 字符串（user 或 assistant）"},{"en":"list of Part objects","zh":"Part 对象列表"},{"en":"optional peer_id for scoping","zh":"可选 peer_id 用于限定范围"}],"outputs":[{"en":"serialized JSONL dict","zh":"序列化 JSONL 字典"},{"en":"estimated token count","zh":"估算的 token 数量"},{"en":"first TextPart content via .content","zh":"通过 .content 获取首个 TextPart 文本"}]},"family":"context-model"},{"id":"deployment","parent":null,"name":"Deployment","kind":"deployment","sourcePath":"Dockerfile","symbol":"N/A","sourceLines":"1-130","pipelines":[],"summary":{"en":"Packages OpenViking source and config into Docker/Helm artifacts and boots a running HTTP server on container or Kubernetes runtimes.","zh":"将 OpenViking 源码与配置打包为 Docker/Helm 制品，在容器或 K8s 运行时启动 HTTP 服务。"},"article":{"en":"OpenViking runs in two modes: embedded in-process via AsyncOpenViking with LocalClient, or as a standalone HTTP server. The deployment chassis describes how standalone mode is packaged and started on container and Kubernetes runtimes.\n\nThis family breaks into six parts: the Docker multi-stage build compiles the image; the container entrypoint boots and supervises it; a Helm chart packages it for Kubernetes; the server bootstrap is the two-layer Python startup; the entry points table in pyproject.toml dispatches console commands; and the config schema defines ov.conf, the single file that controls provider and backend selection.\n\nAll persistent state lives under ~/.openviking on the host or /app/.openviking in containers. The Docker multi-stage build compiles the Rust CLI, ragfs_python native extension, and web-studio SPA into a single python:3.13-slim-trixie image. docker-compose wraps it with an optional Caddy reverse proxy on port 1934.\n\nOn Kubernetes, a Helm chart at deploy/helm/openviking/ renders ov.conf into a ConfigMap and provisions a 20Gi PVC. RocksDB single-writer semantics force replicaCount=1 with a Recreate update strategy. The entrypoint validates config before starting the server; if ov.conf is absent, a pending-health HTTP server returns 503 JSON.","zh":"OpenViking 可嵌入进程运行（AsyncOpenViking + LocalClient），也可作独立 HTTP 服务器。以下六部分介绍打包和启动：Docker 构建；容器入口；Helm 打包；服务器引导；pyproject.toml 入口；ov.conf 配置节点。\n\n持久状态存 ~/.openviking 或 /app/.openviking。Docker 编译 Rust CLI、ragfs_python 和 web-studio SPA 进 python:3.13-slim-trixie 镜像，可选 Caddy（1934）。\n\nK8s 用 Helm chart 渲染 ov.conf 为 ConfigMap，配 20Gi PVC。RocksDB 单写强制 replicaCount=1，Recreate 策略。入口脚本校验配置，缺失时 pending-health 返回 503。"},"io":{"inputs":[{"en":"Source tree and ov.conf","zh":"源码树与 ov.conf 配置"},{"en":"Docker or Helm toolchain","zh":"Docker 或 Helm 工具链"},{"en":"Host ~/.openviking volume","zh":"宿主机 ~/.openviking 卷"}],"outputs":[{"en":"Running HTTP server on port 1933","zh":"运行中的 HTTP 服务（1933）"},{"en":"Docker image artifact","zh":"Docker 镜像制品"},{"en":"K8s ConfigMap, PVC, Deployment","zh":"K8s 资源（ConfigMap、PVC、Deployment）"}]},"family":"deployment"},{"id":"deployment.docker-image","parent":"deployment","name":"Docker Image","kind":"deployment","sourcePath":"Dockerfile","symbol":"multi-stage-build","sourceLines":"1-129","pipelines":[],"summary":{"en":"Three-stage Docker build compiling Rust CLI, native extensions, and web-studio SPA into a minimal python:3.13-slim-trixie runtime image.","zh":"三阶段 Docker 构建，编译 Rust CLI、原生扩展和 web-studio SPA，产出精简运行时镜像。"},"article":{"en":"Three build stages in the Dockerfile produce a slim runtime image. Stage 1 provides rust:1.91.1-trixie. In Stage 2 (uv:python3.13-trixie-slim with Node.js 24), cargo compiles the ov CLI, maturin builds ragfs_python, and npm produces the web-studio SPA. BuildKit cache mounts persist dependencies across rebuilds. Stage 3 copies only /app/.venv and entrypoint scripts into python:3.13-slim-trixie and exposes port 1933. This three-way split is deliberate: OpenViking needs Rust, Python/maturin, and Node.js at build time — none of which the running server uses. Multi-stage keeps the final image under ~500MB instead of multi-GB by discarding every compiler.","zh":"Dockerfile 三阶段构建产出 python:3.13-slim-trixie 镜像。阶段二编译 CLI、原生扩展和 SPA，BuildKit 缓存保留依赖。阶段三拷贝 .venv 和入口脚本，暴露 1933。多阶段丢弃编译器，镜像约 500MB。"},"io":{"inputs":[{"en":"Source tree and Cargo.lock","zh":"源码树与 Cargo.lock"},{"en":"Rust toolchain and uv","zh":"Rust 工具链与 uv"},{"en":"Node.js 24 and npm","zh":"Node.js 24 与 npm"}],"outputs":[{"en":"Slim runtime Docker image","zh":"精简运行时 Docker 镜像"},{"en":"Compiled ov CLI binary","zh":"编译好的 ov CLI 二进制"},{"en":"web-studio SPA assets","zh":"web-studio SPA 静态资源"}]},"code":[{"lang":"dockerfile","title":{"en":"BuildKit cache mounts keyed by target platform","zh":"按目标平台分键的 BuildKit 缓存挂载"},"text":"RUN --mount=type=cache,target=/root/.cache/uv,id=uv-${TARGETPLATFORM} \\\n    --mount=type=cache,target=/root/.npm,id=npm-${TARGETPLATFORM} \\\n    --mount=type=cache,target=/cargo-target,id=cargo-target-${TARGETPLATFORM} \\\n    --mount=type=cache,target=/usr/local/cargo/registry,id=cargo-registry-${TARGETPLATFORM} \\\n    --mount=type=cache,target=/usr/local/cargo/git,id=cargo-git-${TARGETPLATFORM} \\\n    --mount=type=cache,target=/root/.ccache,id=ccache-${TARGETPLATFORM} \\\n    # ...","sourcePath":"Dockerfile","sourceLines":"63-68"}],"family":"deployment"},{"id":"deployment.container-runtime","parent":"deployment","name":"Container Start","kind":"deployment","sourcePath":"docker/openviking-entrypoint.sh","symbol":"openviking-entrypoint","sourceLines":"1-133","pipelines":[],"summary":{"en":"Entrypoint script that validates ov.conf, serves a 503 pending-health fallback if needed, then launches and supervises openviking-server.","zh":"入口脚本校验 ov.conf，必要时提供 503 待健康回退，然后启动并监管 openviking-server。"},"article":{"en":"openviking-entrypoint.sh looks for ov.conf via /app/.openviking volume mount or the OPENVIKING_CONF_CONTENT env var. If absent, it starts pending_health_server.py on port 1933 returning 503 JSON. This is a deliberate safety net, not an error: the pending server answers every route with the same 503 body listing the config file path and three fix options, so monitoring systems and operators can diagnose the misconfiguration from the HTTP response alone — no log-reading required. Once config appears, it launches openviking-server --host 0.0.0.0 with optional --with-bot, polls /health until ready, then supervises the process forwarding SIGINT and SIGTERM. docker-compose defines the openviking service on port 1933 and an optional Caddy proxy on 1934.","zh":"入口脚本查找 ov.conf，缺失时 1933 端口起 pending-health 返回 503——安全网设计，响应含修复法，HTTP 即诊断。找到后启 openviking-server，轮询 /health 就绪，监管进程转发信号。docker-compose 定义服务（1933）和可选 Caddy（1934）。"},"io":{"inputs":[{"en":"ov.conf via volume or env","zh":"ov.conf（卷或环境变量）"},{"en":"Container start signal","zh":"容器启动信号"},{"en":"OPENVIKING_WITH_BOT flag","zh":"OPENVIKING_WITH_BOT 开关"}],"outputs":[{"en":"Supervised openviking-server process","zh":"受监管的 openviking-server 进程"},{"en":"503 pending-health JSON","zh":"503 待健康 JSON"},{"en":"Port 1933 HTTP endpoint","zh":"1933 端口 HTTP 端点"}]},"code":[{"lang":"bash","title":{"en":"Wait-loop with liveness check on pending-health PID","zh":"带存活检测的 ov.conf 等待循环"},"text":"    OPENVIKING_CONFIG_FILE=\"${CONFIG_FILE}\" \\\n    OPENVIKING_PENDING_PORT=\"1933\" \\\n        python \"${PENDING_HEALTH_SCRIPT}\" &\n    PENDING_PID=$!\n    trap 'stop_pending_health; exit 0' INT TERM\n\n    while [ ! -f \"${CONFIG_FILE}\" ]; do\n        if ! kill -0 \"${PENDING_PID}\" 2>/dev/null; then\n            echo \"[openviking-entrypoint] pending health server exited unexpectedly\" >&2\n            PENDING_PID=\"\"\n            exit 1\n        fi\n        sleep 5\n    done","sourcePath":"docker/openviking-entrypoint.sh","sourceLines":"42-55"}],"family":"deployment"},{"id":"deployment.k8s-helm","parent":"deployment","name":"Helm Chart","kind":"deployment","sourcePath":"deploy/helm/openviking/values.yaml","symbol":"helm-chart","sourceLines":"1-158","pipelines":[],"summary":{"en":"Helm chart that renders ov.conf into a ConfigMap and provisions a 20Gi PVC, deploying a single-replica OpenViking pod with optional Ingress.","zh":"Helm chart 将 ov.conf 渲染为 ConfigMap，配 20Gi PVC，部署单副本 Pod，可选 Ingress TLS。"},"article":{"en":"The Helm chart at deploy/helm/openviking/ packages OpenViking for Kubernetes. values.yaml renders ov.conf into a ConfigMap, and a 20Gi PersistentVolumeClaim stores workspace data. The Deployment enforces replicaCount=1 — RocksDB single-writer semantics prevent shared PVC access — with a Recreate update strategy. Liveness and readiness probes target /health and /ready. Optional Ingress supports cert-manager TLS.","zh":"deploy/helm/openviking/ Helm chart 为 K8s 打包。ov.conf 渲染为 ConfigMap，20Gi PVC 存数据。RocksDB 单写强制 replicaCount=1，Recreate 策略。探针 /health 和 /ready，可选 Ingress TLS。"},"io":{"inputs":[{"en":"Helm values and ov.conf","zh":"Helm values 与 ov.conf"},{"en":"Kubernetes cluster API","zh":"Kubernetes 集群 API"}],"outputs":[{"en":"ConfigMap with ov.conf","zh":"含 ov.conf 的 ConfigMap"},{"en":"20Gi PersistentVolumeClaim","zh":"20Gi 持久卷申领"},{"en":"Single-replica Deployment","zh":"单副本 Deployment"},{"en":"Service on port 1933","zh":"1933 端口 Service"}]},"code":[{"lang":"yaml","title":{"en":"Helm template guards against multi-replica misconfiguration","zh":"Helm 模板主动拦截多副本错误配置"},"text":"{{- if gt (int .Values.replicaCount) 1 }}\n{{- fail \"replicaCount must be 1. OpenViking uses RocksDB which does not support concurrent access from multiple pods sharing the same PVC.\" }}\n{{- end }}","sourcePath":"deploy/helm/openviking/templates/deployment.yaml","sourceLines":"1-3"}],"family":"deployment"},{"id":"deployment.server-process","parent":"deployment","name":"Server Bootstrap","kind":"deployment","sourcePath":"openviking/server/bootstrap.py","symbol":"main","sourceLines":"126-301","pipelines":["write","retrieve","manage.context-fs","manage.session-lifecycle","manage.relations","manage.watch-tasks","manage.pack-backup","manage.auth-tenant"],"summary":{"en":"Two-layer bootstrap: pre-parser sets config env, loads ServerConfig, optionally starts vikingbot, builds FastAPI app, and runs uvicorn.","zh":"两层启动：预解析器设配置环境变量，加载 ServerConfig，可选启动 vikingbot，构建 FastAPI 并运行 uvicorn。"},"article":{"en":"Server startup has two layers. The console entry point `openviking_cli.server_bootstrap:main` pre-parses --config from sys.argv and exports OPENVIKING_CONFIG_FILE before importing any openviking module — preventing the config singleton from initializing against defaults. The init, doctor, and ingest subcommands are handled locally without starting the HTTP server.\n\nIt then delegates to `openviking.server.bootstrap:main`, which loads ServerConfig from ov.conf. It optionally ensures Ollama is running for local embedding models, and if --with-bot is set, spawns vikingbot on port 18790 with port-conflict detection. The function then calls create_app(config) to build the FastAPI app and hands it to uvicorn; multi-worker mode uses a factory import string so each worker initializes independently.","zh":"启动分两层。`openviking_cli.server_bootstrap:main` 导入前从 sys.argv 提取 --config，避免配置单例提前初始化。init、doctor、ingest 直接处理，不启 HTTP。然后 `openviking.server.bootstrap:main` 加载 ServerConfig，--with-bot 时启 vikingbot，create_app 交 uvicorn，多 worker 用工厂字符串。"},"io":{"inputs":[{"en":"CLI args and ov.conf","zh":"CLI 参数与 ov.conf"},{"en":"Ollama status (optional)","zh":"Ollama 运行状态（可选）"},{"en":"--with-bot flag","zh":"--with-bot 开关"}],"outputs":[{"en":"uvicorn FastAPI HTTP server","zh":"uvicorn FastAPI HTTP 服务"},{"en":"vikingbot subprocess on 18790","zh":"vikingbot 子进程（18790）"},{"en":"Initialized OpenVikingService","zh":"已初始化的 OpenVikingService"}]},"family":"deployment"},{"id":"deployment.entry-points","parent":"deployment","name":"Entry Points","kind":"deployment","sourcePath":"pyproject.toml","symbol":"project.scripts","sourceLines":"203-207","pipelines":[],"summary":{"en":"pyproject.toml console scripts dispatching ov/openviking to Rust CLI and openviking-server/vikingbot to Python modules.","zh":"pyproject.toml 控制台脚本，将 ov/openviking 分发到 Rust CLI，其余分发到 Python 模块。"},"article":{"en":"pyproject.toml [project.scripts] installs four console entry points. `ov` and `openviking` both exec into the compiled Rust binary through openviking_cli.rust_cli:main — the short name for interactive use, the long name for discoverability. For HTTP server startup, `openviking-server` maps to openviking_cli.server_bootstrap:main. `vikingbot` delegates to vikingbot.cli.commands:app. Of the two Python entry points, only `openviking-server` handles the doctor subcommand locally — no Rust binary or running server required. `vikingbot` has no doctor subcommand.","zh":"pyproject.toml 定义四个控制台入口。`ov` 和 `openviking` 都通过 `openviking_cli.rust_cli:main` execv 到 Rust 二进制——短名方便交互用，长名便于自动发现。`openviking-server` 对应 `openviking_cli.server_bootstrap:main`，`vikingbot` 对应 `vikingbot.cli.commands:app`。两个 Python 入口中只有 `openviking-server` 能本地跑 doctor 子命令，不需要 Rust 二进制或运行中的服务。`vikingbot` 没有 doctor 子命令。"},"io":{"inputs":[{"en":"User console command","zh":"用户控制台命令"},{"en":"Rust ov binary on disk","zh":"Rust ov 磁盘二进制"}],"outputs":[{"en":"execv'd Rust CLI process","zh":"execv 后的 Rust CLI 进程"},{"en":"Python server bootstrap","zh":"Python 服务器启动进程"},{"en":"vikingbot CLI process","zh":"vikingbot CLI 进程"}]},"code":[{"lang":"toml","title":{"en":"Four console entry points: two Rust, two Python","zh":"四个控制台入口：两个走 Rust，两个走 Python"},"text":"[project.scripts]\nov = \"openviking_cli.rust_cli:main\"  # Rust CLI 入口（极简包装器）\nopenviking = \"openviking_cli.rust_cli:main\"  # Rust CLI 入口（放弃 python CLI）\nopenviking-server = \"openviking_cli.server_bootstrap:main\"  # also: `openviking-server ingest ...`\nvikingbot = \"vikingbot.cli.commands:app\"","sourcePath":"pyproject.toml","sourceLines":"203-207"}],"family":"deployment"},{"id":"deployment.config","parent":"deployment","name":"Config (ov.conf)","kind":"namespace","sourcePath":"openviking_cli/utils/config/open_viking_config.py","symbol":"OpenVikingConfig","sourceLines":"105-441","pipelines":[],"summary":{"en":"Pydantic root config aggregating 20+ sub-configs (storage, embedding, vlm, rerank, retrieval, encryption, git, parsers) loaded from ov.conf.","zh":"Pydantic 根配置，聚合 storage、embedding、vlm、rerank、retrieval、encryption、git 等 20 多个子配置，从 ov.conf 加载。"},"article":{"en":"`OpenVikingConfig` is the single Pydantic model that aggregates every subsystem configuration. It reads from ov.conf via a four-level resolution chain: explicit path, OPENVIKING_CONFIG_FILE env var, ~/.openviking/ov.conf, then /etc/openviking/ov.conf. The `storage.vectordb.backend` field selects which vector index implementation to use — local, cuvs, http, qdrant, opengauss, or a custom dotted-class path. Model provider selection happens through `embedding.provider` and `vlm.provider`, each supporting multi-credential failover. A model validator synchronizes the deprecated `backend` alias into the canonical `provider` field, and warns on dimension mismatches between embedding and vectordb configs.","zh":"`OpenVikingConfig` 聚合所有子系统配置，四级链读取 ov.conf：显式路径、环境变量、~/.openviking/ov.conf、系统目录。`storage.vectordb.backend` 选向量后端，`embedding.provider` 和 `vlm.provider` 选模型提供方，支持多凭据故障转移。已弃用的 `backend` 同步到 `provider`，维度不匹配时警告。"},"io":{"inputs":[{"en":"ov.conf JSON file","zh":"ov.conf JSON 配置文件"},{"en":"OPENVIKING_CONFIG_FILE env var","zh":"OPENVIKING_CONFIG_FILE 环境变量"}],"outputs":[{"en":"Resolved OpenVikingConfig instance","zh":"已解析的 OpenVikingConfig 实例"},{"en":"Config warnings for mismatches and deprecations","zh":"配置不匹配和已弃用字段的警告"}]},"family":"deployment"},{"id":"model-providers","parent":null,"name":"Model Providers","kind":"model","sourcePath":"openviking/models/__init__.py","symbol":"(package)","sourceLines":"1-2","pipelines":[],"summary":{"en":"Unified provider abstraction for all LLM, embedding, and reranking model integrations under openviking/models/.","zh":"openviking/models/ 下统一的模型提供方抽象，覆盖 LLM、embedding 和 rerank。"},"article":{"en":"The model-providers family lives under `openviking/models/` and covers three model capabilities: embedding generation (`embedder/`), vision-language completion (`vlm/`), and reranking (`rerank/`). Each sub-package provides a base abstract class plus concrete provider implementations.\n\nShared retry and failover logic sits in `utils/model_retry.py`. `vlm/token_usage.py` defines the tracking types, but there is no single shared tracker: the embedder and rerank modules each keep their own module-level singleton via their own `_get_token_tracker()`, while every `VLMBase` instance constructs its own `TokenUsageTracker`. To observe global usage you read the two module singletons plus each VLM instance's tracker.\n\nProviders get picked at runtime from config dicts. Embedders and rerankers have no global registry; only `vlm/` keeps a `registry.py` of valid provider names. The package `__init__.py` holds nothing but a copyright header, so callers import directly from sub-packages. The prompt templates that script these LLM calls live in the sibling package `openviking/prompts/`, covered here as well.","zh":"model-providers 家族位于 `openviking/models/` 下，覆盖三类模型能力：向量生成（`embedder/`）、视觉语言补全（`vlm/`）和重排序（`rerank/`）。每个子包都提供一个基类抽象和若干具体提供方实现。\n\n重试与故障转移逻辑统一放在 `utils/model_retry.py`。`vlm/token_usage.py` 只定义计量数据结构，并不存在唯一的全局 tracker：embedder 和 rerank 模块各自持有一个模块级单例（各自的 `_get_token_tracker()`），而每个 `VLMBase` 实例在构造时自建 `TokenUsageTracker`。想看全局用量，要分别读两个模块单例和各 VLM 实例。\n\n提供方在运行时从 config 字典里选择。embedder 和 reranker 没有全局注册表，只有 `vlm/` 有个 `registry.py` 维护合法提供方名称。包的 `__init__.py` 只有版权头，调用方直接从子包导入。驱动这些 LLM 调用的提示词模板在兄弟包 `openviking/prompts/` 里，也归入本家族。"},"io":{"inputs":[{"en":"config dict with provider and credentials","zh":"含 provider 和凭证的 config 字典"},{"en":"text or multimodal content","zh":"文本或多模态内容"},{"en":"query string for retrieval","zh":"检索用查询字符串"}],"outputs":[{"en":"embedding vectors (dense/sparse/hybrid)","zh":"向量（dense/sparse/hybrid）"},{"en":"VLMResponse (text, tool calls, reasoning)","zh":"VLMResponse（文本/工具/推理）"},{"en":"rerank relevance scores","zh":"重排序相关性分数"}]},"family":"model-providers"},{"id":"model-providers.embedder","parent":"model-providers","name":"Embedder","kind":"model","sourcePath":"openviking/models/embedder/base.py","symbol":"EmbedderBase, DenseEmbedderBase, SparseEmbedderBase, HybridEmbedderBase, CompositeHybridEmbedder, FailoverEmbedder","sourceLines":"159-956","pipelines":["write","retrieve"],"summary":{"en":"Base classes and failover wrapper for dense, sparse, and hybrid text/multimodal embedding.","zh":"文本/多模态输入的 dense、sparse、hybrid 向量嵌入基类及故障转移。"},"article":{"en":"`EmbedderBase` is the root ABC for text and multimodal embedding in `openviking/models/embedder/base.py`, providing `embed`, `embed_batch`, and query/document semantics in sync and async variants. `DenseEmbedderBase`, `SparseEmbedderBase`, and `HybridEmbedderBase` narrow the output type: the hybrid base exists because hybrid search combines dense and sparse vectors, and `CompositeHybridEmbedder` builds a hybrid embedder out of one dense plus one sparse embedder.\n\n`embed_compat` is the standard entrypoint. Under it, `prepare_embedding_input` truncates plain text to `max_input_tokens` and downgrades multimodal inputs to text for embedders that do not support images, so all embedders can be called the same way. Its keyword-only `is_query` flag also binds the telemetry stage: `embed_query` for queries, `embed_resource` for documents.\n\n`FailoverEmbedder` wraps N credential-specific instances via `OrderedCredentialSwitcher`, trying credentials in priority order (index 0 highest). It advances on auth, quota, or transient errors and attempts failback to a higher-priority credential after 600 seconds or 50 requests.","zh":"`EmbedderBase` 是嵌入根基类；dense/sparse/hybrid 三个子类按向量类型收窄，`CompositeHybridEmbedder` 把一个 dense 加一个 sparse 组成 hybrid。`embed_compat` 是统一入口：截断超长输入、把多模态降级为文本，`is_query` 区分查询与文档。`FailoverEmbedder` 按优先级在凭证间轮转。"},"code":[{"lang":"python","title":{"en":"embed_compat: the unified entrypoint","zh":"embed_compat 统一入口"},"text":"async def embed_compat(\n    embedder: \"EmbedderBase\", content: \"EmbeddingInput\", *, is_query: bool = False\n) -> \"EmbedResult\":\n    \"\"\"Prepare input, then call the embedder's async-compatible entrypoint.\n\n    Accepts either a plain text string or a multimodal input (a list of content\n    parts). ``prepare_embedding_input`` downgrades multimodal inputs to text for\n    embedders that do not support images, so all embedders can be called the same\n    way.\n    \"\"\"\n    from openviking.telemetry import bind_telemetry_stage\n\n    stage = \"embed_query\" if is_query else \"embed_resource\"\n    embedding_input = embedder.prepare_embedding_input(content)","sourcePath":"openviking/models/embedder/base.py","sourceLines":"79-92"}],"io":{"inputs":[{"en":"text or multimodal content","zh":"文本或多模态内容"},{"en":"query or document flag","zh":"query/document 标记"},{"en":"credential config dict","zh":"凭证 config 字典"}],"outputs":[{"en":"EmbedResult (dense and/or sparse vector)","zh":"EmbedResult（dense/sparse 向量）"},{"en":"token usage deltas","zh":"token 用量增量"}]},"family":"model-providers"},{"id":"model-providers.vlm","parent":"model-providers","name":"VLM","kind":"model","sourcePath":"openviking/models/vlm/base.py","symbol":"VLMBase, VLMResponse, FailoverVLM, MultiCredentialVLM","sourceLines":"26-857","pipelines":["write","retrieve","manage.session-lifecycle"],"summary":{"en":"Abstract base class and response types for vision-language model backends with failover support.","zh":"视觉语言模型后端的抽象基类与响应类型，支持多凭证故障转移。"},"article":{"en":"`VLMBase` is the abstract base class for all vision-language model backends in `openviking/models/vlm/base.py`. It declares sync and async `get_completion` and `get_vision_completion` that accept prompts, images, tool definitions, and message history. Each `VLMBase` instance constructs its own `TokenUsageTracker` rather than sharing the embedder/rerank module singletons.\n\n`VLMResponse` is the structured return type with `content`, `tool_calls` (a list of `ToolCall`), `finish_reason`, `usage` dict, and `reasoning_content` for thinking-model traces. When no tools are passed, backends may return a plain string for backward compatibility.\n\n`FailoverVLM` wraps a primary and backup `VLMBase` via `PrimaryBackupSwitcher`, switching on permanent, auth, or quota errors and attempting failback after 600 seconds or 50 requests. `MultiCredentialVLM` wraps N credential-keyed instances with `OrderedCredentialSwitcher` for ring-style failover. Both annotate exceptions with `_vlm_model` and `_vlm_api_base` so upstream error mapping can surface which endpoint failed.","zh":"`VLMBase` 是视觉语言模型后端的抽象基类，声明同步与异步 `get_completion` 和 `get_vision_completion`，接受 prompt、图片、工具定义和消息历史。每个实例自建 `TokenUsageTracker`，不共享 embedder/rerank 的单例。\n\n`VLMResponse` 是结构化返回类型：`content`、`tool_calls`、`finish_reason`、`usage` 和 `reasoning_content`。不传 tools 时后端可返回裸字符串，兼容旧调用方。\n\n`FailoverVLM` 用 `PrimaryBackupSwitcher` 包装主备 `VLMBase`，遇错误切备用并定时回切。`MultiCredentialVLM` 用 `OrderedCredentialSwitcher` 在 N 个凭证间环形切换。两者都标注 `_vlm_model`/`_vlm_api_base`，让 `error_mapping.py` 在报错里指出故障端点。"},"code":[{"lang":"python","title":{"en":"VLMResponse: the return contract","zh":"VLMResponse：返回契约"},"text":"@dataclass\nclass VLMResponse:\n    \"\"\"VLM response that supports both text content and tool calls.\"\"\"\n\n    content: Optional[str] = None\n    tool_calls: List[ToolCall] = field(default_factory=list)\n    finish_reason: str = \"stop\"  # stop, tool_calls, length, error\n    usage: Dict[str, int] = field(\n        default_factory=dict\n    )  # prompt_tokens, completion_tokens, total_tokens\n    reasoning_content: Optional[str] = (\n        None  # For thinking process (doubao thinking, deepseek r1, etc.)\n    )","sourcePath":"openviking/models/vlm/base.py","sourceLines":"35-47"}],"io":{"inputs":[{"en":"prompt text","zh":"prompt 文本"},{"en":"image files or URLs","zh":"图片文件或 URL"},{"en":"tool definitions in OpenAI format","zh":"OpenAI 格式工具定义"},{"en":"message history dicts","zh":"消息历史字典"}],"outputs":[{"en":"VLMResponse (content, tool_calls, reasoning)","zh":"VLMResponse（文本/工具/推理）"},{"en":"token usage statistics","zh":"token 用量统计"}]},"family":"model-providers"},{"id":"model-providers.vlm.factory","parent":"model-providers.vlm","name":"VLM Factory","kind":"service","sourcePath":"openviking/models/vlm/base.py","symbol":"VLMFactory","sourceLines":"285-339","pipelines":["write","retrieve","manage.session-lifecycle"],"summary":{"en":"Factory that constructs concrete VLM backend instances from a provider-keyed config dict.","zh":"根据 config 中 provider 字段构造具体 VLM 后端实例的工厂。"},"article":{"en":"`VLMFactory.create()` is the single entrypoint for constructing VLM backends. It reads `config.provider` (falling back to `config.backend`, then `
