<title>吃了吗 — 新加坡吃货排位</title>
<style>
:root{
  --chili:#D8351F; --chili-dark:#A82712; --pandan:#1E7A52; --satay:#E8A33D;
  --bg:#F7F3EC; --card:#FFFFFF; --ink:#201A16; --ink2:#8A7F74; --line:#EDE6DB;
  --shadow:0 1px 2px rgba(32,26,22,.06), 0 4px 16px rgba(32,26,22,.06);
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:-apple-system,"SF Pro SC","PingFang SC","Noto Sans SC","Helvetica Neue","Microsoft YaHei",sans-serif;
  background:#E9E2D6; color:var(--ink); height:100%;
  display:flex; justify-content:center;
}
button{font:inherit; border:0; background:none; color:inherit; cursor:pointer}
img{display:block}
:focus-visible{outline:3px solid var(--satay); outline-offset:2px; border-radius:6px}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms!important; transition-duration:.01ms!important}
}

/* ---------- phone shell ---------- */
#app{
  width:100%; max-width:430px; height:100dvh; background:var(--bg);
  position:relative; overflow:hidden; display:flex; flex-direction:column;
}
@media (min-width:431px){ #app{height:min(100dvh,900px); margin:auto 0; border-radius:28px; box-shadow:0 24px 80px rgba(32,26,22,.35); } body{align-items:center} }

/* ---------- top bar ---------- */
#topbar{
  display:flex; align-items:center; gap:10px; padding:12px 16px 10px;
  background:var(--bg); border-bottom:1px solid var(--line); flex:none;
}
#topbar .logo{width:34px; height:34px; border-radius:9px; overflow:hidden; flex:none}
#topbar .logo svg,#topbar .logo img{width:100%; height:100%}
#topbar .word{font-size:19px; font-weight:800; letter-spacing:.5px}
#topbar .tag{font-size:11px; color:var(--ink2); margin-top:1px}
#topbar .me{margin-left:auto; width:32px; height:32px; border-radius:50%; background:#FFE9D6; display:grid; place-items:center; font-size:17px; border:1.5px solid var(--satay)}

/* ---------- pages ---------- */
#pages{flex:1; overflow:hidden; position:relative}
.page{position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:16px; display:none}
.page.active{display:block}

/* ---------- tab bar ---------- */
#tabbar{
  flex:none; display:flex; background:var(--card); border-top:1px solid var(--line);
  padding:6px 8px calc(8px + env(safe-area-inset-bottom));
}
#tabbar button{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  font-size:10.5px; color:var(--ink2); padding:4px 0; border-radius:12px; font-weight:600;
}
#tabbar button .ic{font-size:20px; line-height:1; filter:grayscale(1) opacity(.55)}
#tabbar button.active{color:var(--chili)}
#tabbar button.active .ic{filter:none}

/* ---------- shared card ---------- */
.card{background:var(--card); border-radius:16px; margin:12px 12px 0; box-shadow:var(--shadow); overflow:hidden}
.section-h{display:flex; align-items:baseline; gap:8px; margin:18px 16px 2px; }
.section-h b{font-size:15px}
.section-h span{font-size:11px; color:var(--ink2)}

/* ---------- feed ---------- */
.fhead{display:flex; align-items:center; gap:10px; padding:12px 14px 0}
.fava{width:38px; height:38px; border-radius:50%; background:#FFF3E4; display:grid; place-items:center; font-size:20px; flex:none; border:1px solid var(--line)}
.fwho{flex:1; min-width:0}
.fwho b{font-size:14px}
.fwho .sub{font-size:11px; color:var(--ink2); margin-top:1px}
.badge-inf{display:inline-block; font-size:9.5px; color:#fff; background:var(--satay); border-radius:4px; padding:1px 4px; margin-left:4px; vertical-align:1px; font-weight:700}
.badge-ad{display:inline-block; font-size:9.5px; color:var(--ink2); border:1px solid var(--line); border-radius:4px; padding:1px 4px; font-weight:600}
.follow{font-size:12px; font-weight:700; color:var(--chili); border:1.5px solid var(--chili); border-radius:99px; padding:3px 12px; flex:none}
.follow.on{color:var(--ink2); border-color:var(--line)}
.ftime{font-size:11px; color:var(--ink2)}

.versus{display:flex; align-items:stretch; gap:0; margin:12px 14px 0; border-radius:12px; overflow:hidden; position:relative; border:1px solid var(--line)}
.vside{flex:1; min-width:0; position:relative}
.vside img{width:100%; height:96px; object-fit:cover}
.vside .vname{position:absolute; left:0; right:0; bottom:0; padding:14px 8px 6px; font-size:12px; font-weight:700; color:#fff;
  background:linear-gradient(transparent, rgba(0,0,0,.72)); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.vside.lose img{filter:grayscale(.85) brightness(.8)}
.vside.win::after{content:"WIN"; position:absolute; top:6px; left:6px; background:var(--chili); color:#fff; font-size:9px; font-weight:800; letter-spacing:.5px; padding:2px 6px; border-radius:4px}
.vs-seam{position:absolute; left:50%; top:0; bottom:0; width:34px; transform:translateX(-50%); display:grid; place-items:center; pointer-events:none}
.vs-seam::before{content:""; position:absolute; inset:-8px auto -8px 50%; width:3px; background:var(--bg); transform:rotate(9deg)}
.vs-seam b{position:relative; background:var(--bg); border-radius:50%; width:30px; height:30px; display:grid; place-items:center; font-size:11px; font-style:italic; color:var(--chili); font-weight:900; box-shadow:var(--shadow)}
.gt{color:var(--chili); font-weight:900; padding:0 2px}
.freason{margin:10px 14px 0; font-size:14px; line-height:1.55}
.fmeta{display:flex; gap:16px; padding:10px 14px 12px; color:var(--ink2); font-size:12px}
.fmeta button{color:var(--ink2); display:flex; gap:4px; align-items:center}
.fmeta button.liked{color:var(--chili); font-weight:700}

.reco{border-left:4px solid var(--pandan)}
.reco .why{margin:8px 14px 0; font-size:12.5px; color:var(--pandan); background:#EDF6F1; border-radius:8px; padding:8px 10px; line-height:1.5}
.adcard{border-left:4px solid var(--satay)}
.adimg{width:100%; height:132px; object-fit:cover; margin-top:10px}
.adline{display:flex; align-items:center; gap:8px; padding:10px 14px 12px}
.adline .cta{margin-left:auto; background:var(--chili); color:#fff; font-size:12px; font-weight:700; padding:6px 14px; border-radius:99px}

/* ---------- rankings ---------- */
.chips{display:flex; gap:8px; overflow-x:auto; padding:12px 12px 2px; scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none; font-size:12.5px; font-weight:600; color:var(--ink2); background:var(--card); border:1px solid var(--line); border-radius:99px; padding:6px 13px}
.chip.on{color:#fff; background:var(--ink); border-color:var(--ink)}
.rrow{display:flex; align-items:center; gap:10px; padding:10px 12px; width:100%; text-align:left; border-bottom:1px solid var(--line)}
.rrow:last-child{border-bottom:0}
.rnum{width:26px; text-align:center; font-size:15px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--ink2); flex:none}
.rnum.top{color:var(--chili); font-size:17px}
.rimg{width:52px; height:52px; border-radius:10px; object-fit:cover; flex:none; background:var(--line)}
.rinfo{flex:1; min-width:0}
.rinfo b{font-size:14px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.rinfo .sub{font-size:11px; color:var(--ink2); margin-top:2px}
.rlikes{font-size:11px; margin-top:3px; color:var(--ink2)}
.rlikes .avs{letter-spacing:-3px; margin-right:5px; font-size:12px}
.relo{text-align:right; flex:none}
.relo b{font-size:14px; color:var(--chili); font-variant-numeric:tabular-nums; display:block}
.relo span{font-size:10px; color:var(--ink2)}
.uparrow{color:var(--pandan)}

/* ---------- PK ---------- */
#pk-page{display:none; flex-direction:column}
#pk-page.active{display:flex}
.pk-head{text-align:center; padding:18px 20px 6px}
.pk-head h2{font-size:21px; font-weight:800}
.pk-head p{font-size:12.5px; color:var(--ink2); margin-top:4px}
.pk-arena{flex:1; display:flex; flex-direction:column; margin:10px 16px; position:relative; border-radius:20px; overflow:hidden; box-shadow:var(--shadow); min-height:0}
.pk-side{flex:1; position:relative; overflow:hidden; text-align:left; min-height:0}
.pk-side img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform .25s}
.pk-side:active img{transform:scale(1.04)}
.pk-info{position:absolute; left:0; right:0; bottom:0; padding:40px 16px 14px; color:#fff; background:linear-gradient(transparent, rgba(10,5,2,.82))}
.pk-info b{font-size:18px; display:block}
.pk-info span{font-size:12px; opacity:.85}
.pk-vs{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:3; width:52px; height:52px; border-radius:50%; background:var(--bg); display:grid; place-items:center; font-style:italic; font-weight:900; font-size:16px; color:var(--chili); box-shadow:0 0 0 5px rgba(216,53,31,.18), var(--shadow); pointer-events:none}
.pk-seam{position:absolute; left:-6%; right:-6%; top:50%; height:4px; background:var(--bg); transform:rotate(-3deg); z-index:2; pointer-events:none}
.pk-skip{margin:2px auto 14px; font-size:13px; color:var(--ink2); font-weight:600; padding:8px 22px; border-radius:99px; border:1px dashed var(--ink2)}
.pk-won{animation:pkwin .5s}
@keyframes pkwin{0%{filter:none}30%{filter:brightness(1.35) saturate(1.4)}100%{filter:none}}
.pk-float{position:absolute; z-index:5; font-weight:900; color:#fff; background:var(--chili); padding:6px 12px; border-radius:99px; font-size:14px; animation:rise .8s forwards; pointer-events:none}
@keyframes rise{from{opacity:1; transform:translateY(0)}to{opacity:0; transform:translateY(-46px)}}
.pk-count{text-align:center; font-size:11.5px; color:var(--ink2); padding-bottom:10px}

/* ---------- profile ---------- */
.me-hero{display:flex; align-items:center; gap:14px; padding:20px 18px 4px}
.me-hero .big{width:60px; height:60px; border-radius:50%; background:#FFE9D6; border:2px solid var(--satay); display:grid; place-items:center; font-size:30px}
.me-hero b{font-size:18px}
.me-hero .sub{font-size:12px; color:var(--ink2); margin-top:3px}
.stats{display:flex; margin:14px 12px 0; background:var(--card); border-radius:16px; box-shadow:var(--shadow)}
.stats div{flex:1; text-align:center; padding:12px 0}
.stats b{font-size:18px; display:block; font-variant-numeric:tabular-nums}
.stats span{font-size:11px; color:var(--ink2)}
.frow{display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--line)}
.frow:last-child{border-bottom:0}
.frow .fava{width:34px; height:34px; font-size:18px}
.frow b{font-size:13.5px}
.frow .sub{font-size:11px; color:var(--ink2)}
.empty{text-align:center; color:var(--ink2); font-size:13px; padding:26px 20px; line-height:1.7}
.empty .go{display:inline-block; margin-top:8px; color:#fff; background:var(--chili); font-weight:700; border-radius:99px; padding:8px 20px; font-size:13px}

/* ---------- detail sheet ---------- */
#sheet-back{position:absolute; inset:0; background:rgba(20,12,8,.45); z-index:20; opacity:0; pointer-events:none; transition:opacity .25s}
#sheet-back.show{opacity:1; pointer-events:auto}
#sheet{position:absolute; left:0; right:0; bottom:0; z-index:21; background:var(--bg); border-radius:22px 22px 0 0; transform:translateY(102%); transition:transform .3s cubic-bezier(.3,.8,.3,1); max-height:86%; overflow-y:auto}
#sheet.show{transform:none}
#sheet .grab{width:40px; height:4px; border-radius:2px; background:var(--line); margin:8px auto}
#sheet .shimg{width:100%; height:180px; object-fit:cover}
.shbody{padding:14px 16px 26px}
.shbody h3{font-size:20px; font-weight:800}
.shbody .zh{font-size:13px; color:var(--ink2); margin-top:2px}
.shrow{display:flex; gap:8px; align-items:center; font-size:13px; margin-top:10px; color:var(--ink); line-height:1.5}
.shrow .k{flex:none; font-size:11px; color:var(--ink2); width:52px}
.shtags{display:flex; gap:6px; margin-top:12px; flex-wrap:wrap}
.shtag{font-size:11.5px; background:#F3EBDD; border-radius:6px; padding:4px 8px; color:#7A6A50; font-weight:600}
.maplink{display:inline-flex; align-items:center; gap:5px; margin-top:14px; color:var(--pandan); font-weight:700; font-size:13.5px; text-decoration:none}
.shjudge{margin-top:16px; border-top:1px dashed var(--line); padding-top:12px}
.shjudge .jline{font-size:13px; margin-top:8px; line-height:1.55}
.shjudge .jline .who{font-weight:700}
.shjudge .jline .rsn{color:var(--ink2); font-size:12px; display:block; margin-left:2px}

/* ---------- splash ---------- */
#splash{position:absolute; inset:0; z-index:50; background:linear-gradient(160deg,#D8351F,#A82712 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; color:#fff; transition:opacity .45s, visibility .45s}
#splash.gone{opacity:0; visibility:hidden}
#splash .slogo{width:128px; height:128px; border-radius:30px; overflow:hidden; box-shadow:0 18px 50px rgba(0,0,0,.35); background:#fff}
#splash .slogo svg,#splash .slogo img{width:100%; height:100%}
#splash h1{font-size:34px; font-weight:900; letter-spacing:2px}
#splash p{font-size:14px; opacity:.9}
#splash .enter{margin-top:14px; background:#fff; color:var(--chili); font-weight:800; font-size:15px; padding:12px 44px; border-radius:99px; box-shadow:0 8px 24px rgba(0,0,0,.25)}
#splash .fine{position:absolute; bottom:calc(18px + env(safe-area-inset-bottom)); font-size:10.5px; opacity:.65}

/* ---------- state ---------- */
const LS_KEY = 'chilema-v1';
const my = JSON.parse(localStorage.getItem(LS_KEY) || '{"votes":[],"likes":[],"follows":[]}');
const save = () => localStorage.setItem(LS_KEY, JSON.stringify(my));

const R = {};            // name -> restaurant
DATA.restaurants.forEach(r => R[r.name] = r);
const U = {};            // id -> user
DATA.users.forEach(u => U[u.id] = u);
const IMG = {};          // key -> url
DATA.images.forEach(i => IMG[i.key] = i.url);
const imgOf = r => r.img || IMG[r.img_key] || '';
const img = (r,cls)=>'<img '+(cls?'class="'+cls+'" ':'')+'loading="lazy" src="'+imgOf(r)+'" alt="">';

/* ---------- Elo (吃分) ---------- */
function computeElo(){
  const elo = {}, rec = {};
  DATA.restaurants.forEach(r => { elo[r.name] = 1500; rec[r.name] = {w:0,l:0}; });
  const all = [...DATA.judgments].sort((a,b)=>b.days_ago-a.days_ago)
    .concat(my.votes.map(v=>({winner:v.w, loser:v.l})));
  for(const j of all){
    if(!(j.winner in elo) || !(j.loser in elo)) continue;
    const ea = 1/(1+10**((elo[j.loser]-elo[j.winner])/400));
    elo[j.winner] += 24*(1-ea); elo[j.loser] -= 24*(1-ea);
    rec[j.winner].w++; rec[j.loser].l++;
  }
  return {elo, rec};
}
function fansOf(name){
  const ids = new Set(DATA.judgments.filter(j=>j.winner===name).map(j=>j.user_id));
  return [...ids].map(id=>U[id]).filter(Boolean);
}

/* ---------- helpers ---------- */
const esc = s => String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const timeAgo = d => d===0 ? '今天' : d===1 ? '昨天' : d<7 ? d+' 天前' : Math.floor(d/7)+' 周前';
const priceStr = p => '$'.repeat(p);
const userLabel = u => `<b>${esc(u.name)}</b>${u.type==='influencer' ? '<span class="badge-inf">达人</span>' : ''}`;

/* ---------- feed ---------- */
function judgeCard(j, i){
  const u = U[j.user_id]; if(!u) return '';
  const w = R[j.winner], l = R[j.loser]; if(!w||!l) return '';
  const followed = my.follows.includes(u.id);
  const liked = my.likes.includes(i);
  return `<div class="card">
    <div class="fhead">
      <div class="fava">${u.emoji}</div>
      <div class="fwho">${userLabel(u)}
        <div class="sub">${esc(u.handle)}${u.followers ? ' · '+(u.followers/1000).toFixed(0)+'k 粉丝' : ''} · ${timeAgo(j.days_ago)}</div>
      </div>
      ${u.type==='influencer' ? `<button class="follow ${followed?'on':''}" data-follow="${u.id}">${followed?'已关注':'+ 关注'}</button>` : ''}
    </div>
    <div class="versus">
      <button class="vside win" data-r="${esc(w.name)}">${img(w)}<span class="vname">${esc(w.name_zh||w.name)}</span></button>
      <button class="vside lose" data-r="${esc(l.name)}">${img(l)}<span class="vname">${esc(l.name_zh||l.name)}</span></button>
      <div class="vs-seam"><b>VS</b></div>
    </div>
    <div class="freason">${esc(w.name_zh||w.name)} <span class="gt">⟩</span> ${esc(l.name_zh||l.name)} —— ${esc(j.reason)}</div>
    <div class="fmeta">
      <button class="${liked?'liked':''}" data-like="${i}">${liked?'❤️':'🤍'} <span>${liked?'认同 · 1':'认同'}</span></button>
      <button>💬 聊聊</button>
      <button data-pk-from="${esc(w.name)}">⚔️ 我也来比</button>
    </div>
  </div>`;
}
function recoCard(name, why){
  const r = R[name]; if(!r) return '';
  return `<div class="card reco">
    <div class="fhead"><div class="fava">🥢</div><div class="fwho"><b>为你推荐</b><div class="sub">基于你的好友圈的比较</div></div></div>
    <div class="versus"><button class="vside" data-r="${esc(r.name)}" style="flex:1">${img(r)}<span class="vname">${esc(r.name_zh||r.name)} · ${esc(r.area)}</span></button></div>
    <div class="why">💡 ${why}</div>
    <div class="fmeta"><button data-r="${esc(r.name)}">📍 看详情</button><button data-pk-from="${esc(r.name)}">⚔️ 去比一比</button></div>
  </div>`;
}
function adCard(a){
  const r = R[a.restaurant]; if(!r) return '';
  return `<div class="card adcard">
    <div class="fhead"><div class="fava">📣</div><div class="fwho"><b>${esc(r.name_zh||r.name)}</b><div class="sub">${esc(r.area)}</div></div><span class="badge-ad">赞助</span></div>
    ${img(r,"adimg")}
    <div class="freason">${esc(a.tagline)}</div>
    <div class="adline"><span class="ftime">${esc(a.note||'')}</span><button class="cta" data-r="${esc(r.name)}">去看看</button></div>
  </div>`;
}
function renderFeed(){
  const {elo} = computeElo();
  const js = DATA.judgments.map((j,i)=>({j,i})).sort((a,b)=>a.j.days_ago-b.j.days_ago);
  // recommendations: most-endorsed restaurants by distinct users
  const byFans = DATA.restaurants.map(r=>({r, fans:fansOf(r.name)}))
    .filter(x=>x.fans.length>=2).sort((a,b)=>b.fans.length-a.fans.length);
  const recos = byFans.slice(0,2).map(x=>({name:x.r.name,
    why:`${x.fans.slice(0,3).map(u=>u.name).join('、')} 等 ${x.fans.length} 位你关注的人都把它排在同类之上（吃分 ${Math.round(elo[x.r.name])}）`}));
  let html = '';
  js.forEach(({j,i}, idx)=>{
    html += judgeCard(j, i);
    if(idx===1 && DATA.ads[0]) html += adCard(DATA.ads[0]);
    if(idx===4 && recos[0]) html += recoCard(recos[0].name, recos[0].why);
    if(idx===9 && DATA.ads[1]) html += adCard(DATA.ads[1]);
    if(idx===13 && recos[1]) html += recoCard(recos[1].name, recos[1].why);
  });
  document.getElementById('feed-page').innerHTML = html + '<div class="empty">🍽️ 到底啦 —— 去比一比，喂饱这条动态</div>';
}

/* ---------- rankings ---------- */
let rankFilter = '全部';
function renderRank(){
  const {elo, rec} = computeElo();
  const cats = ['全部', ...new Set(DATA.restaurants.map(r=>r.cuisine))];
  const list = DATA.restaurants.filter(r=>rankFilter==='全部'||r.cuisine===rankFilter)
    .sort((a,b)=>elo[b.name]-elo[a.name]);
  const chips = `<div class="chips">${cats.map(c=>`<button class="chip ${c===rankFilter?'on':''}" data-cat="${esc(c)}">${esc(c)}</button>`).join('')}</div>`;
  const rows = list.map((r,i)=>{
    const fans = fansOf(r.name);
    return `<button class="rrow" data-r="${esc(r.name)}">
      <span class="rnum ${i<3?'top':''}">${i+1}</span>
      ${img(r,"rimg")}
      <span class="rinfo"><b>${esc(r.name_zh||r.name)}</b>
        <span class="sub">${esc(r.cuisine)} · ${esc(r.area)} · ${priceStr(r.price)}</span>
        <span class="rlikes">${fans.length?`<span class="avs">${fans.slice(0,4).map(u=>u.emoji).join('')}</span>${fans.length} 人觉得它更好吃`:'还没人比过它'}</span>
      </span>
      <span class="relo"><b>${Math.round(elo[r.name])}</b><span>吃分 · ${rec[r.name].w}胜${rec[r.name].l}负</span></span>
    </button>`;
  }).join('');
  document.getElementById('rank-page').innerHTML =
    `${chips}<div class="section-h"><b>${rankFilter==='全部'?'新加坡总榜':rankFilter+' 榜'}</b><span>由 ${DATA.judgments.length + my.votes.length} 次「A ⟩ B」比较算出，不打分</span></div><div class="card">${rows}</div>`;
}

/* ---------- PK ---------- */
let pkPair = null, pkSeed = null;
function pickPair(from){
  const {rec} = computeElo();
  const pool = DATA.restaurants;
  let a = from ? R[from] : null;
  if(!a) a = pool[Math.floor(Math.random()*pool.length)];
  // prefer same-genre opponent
  const peers = pool.filter(r=>r.name!==a.name && (r.img_key===a.img_key || r.cuisine===a.cuisine));
  const others = pool.filter(r=>r.name!==a.name);
  const diff = peers.filter(r=>imgOf(r)!==imgOf(a));
  const cand = diff.length?diff:(peers.length?peers:others);
  const b = cand[Math.floor(Math.random()*cand.length)];
  pkPair = Math.random()<.5 ? [a,b] : [b,a];
}
function renderPK(from){
  pickPair(from);
  const [a,b] = pkPair;
  document.getElementById('pk-page').innerHTML = `
    <div class="pk-head"><h2>哪家更好吃？</h2><p>不用打分 —— 点一下你心里的赢家</p></div>
    <div class="pk-arena">
      <button class="pk-side" data-win="0">${img(a)}<span class="pk-info"><b>${esc(a.name_zh||a.name)}</b><span>${esc(a.cuisine)} · ${esc(a.area)} · ${esc(a.signature_dish)}</span></span></button>
      <button class="pk-side" data-win="1">${img(b)}<span class="pk-info"><b>${esc(b.name_zh||b.name)}</b><span>${esc(b.cuisine)} · ${esc(b.area)} · ${esc(b.signature_dish)}</span></span></button>
      <span class="pk-seam"></span><span class="pk-vs">VS</span>
    </div>
    <button class="pk-skip">都没吃过，换一对 ↻</button>
    <div class="pk-count">你已比较 ${my.votes.length} 次 · 每次比较都会实时改写榜单</div>`;
}
function pkVote(winIdx, el){
  const w = pkPair[winIdx], l = pkPair[1-winIdx];
  my.votes.push({w:w.name, l:l.name, t:0}); save();
  el.classList.add('pk-won');
  const f = document.createElement('span');
  f.className = 'pk-float'; f.textContent = '+吃分 ⟩';
  f.style.left = '50%'; f.style.top = winIdx===0 ? '22%' : '62%'; f.style.transform='translateX(-50%)';
  document.querySelector('.pk-arena').appendChild(f);
  setTimeout(()=>{ renderPK(); renderRank(); renderMe(); }, 650);
}

/* ---------- profile ---------- */
function renderMe(){
  const wins = {};
  my.votes.forEach(v=>{ wins[v.w]=(wins[v.w]||0)+1; });
  const top = Object.entries(wins).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const friends = DATA.users;
  document.getElementById('me-page').innerHTML = `
    <div class="me-hero"><div class="big">🙋</div><div><b>我（游客）</b><div class="sub">吃了吗新人 · 比较 ${my.votes.length} 次 · 关注 ${my.follows.length} 位达人</div></div></div>
    <div class="stats"><div><b>${my.votes.length}</b><span>我的比较</span></div><div><b>${new Set(my.votes.flatMap(v=>[v.w,v.l])).size}</b><span>吃过的店</span></div><div><b>${my.likes.length}</b><span>认同</span></div></div>
    <div class="section-h"><b>我的心头好</b><span>由我的「A ⟩ B」算出</span></div>
    <div class="card">${ top.length ? top.map(([n,c],i)=>{ const r=R[n]; if(!r) return ''; return `<button class="rrow" data-r="${esc(n)}"><span class="rnum ${i<3?'top':''}">${i+1}</span>${img(r,"rimg")}<span class="rinfo"><b>${esc(r.name_zh||r.name)}</b><span class="sub">我投了它 ${c} 次胜</span></span></button>`; }).join('') : `<div class="empty">你还没比过任何一家<br>好吃不好吃，比一下就知道<br><button class="go" data-goto="pk">去比一比 ⚔️</button></div>` }</div>
    <div class="section-h"><b>我的吃货圈</b><span>${friends.length} 人</span></div>
    <div class="card">${friends.map(u=>`<div class="frow"><div class="fava">${u.emoji}</div><div style="flex:1"><b>${esc(u.name)}</b>${u.type==='influencer'?'<span class="badge-inf">达人</span>':''}<div class="sub">${esc(u.bio)}</div></div>${u.type==='influencer'?`<button class="follow ${my.follows.includes(u.id)?'on':''}" data-follow="${u.id}">${my.follows.includes(u.id)?'已关注':'+ 关注'}</button>`:''}</div>`).join('')}</div>`;
}

/* ---------- detail sheet ---------- */
function openSheet(name){
  const r = R[name]; if(!r) return;
  const {elo, rec} = computeElo();
  const js = DATA.judgments.filter(j=>j.winner===name||j.loser===name).slice(0,6);
  document.getElementById('sheet').innerHTML = `
    <div class="grab"></div>
    ${img(r,"shimg")}
    <div class="shbody">
      <h3>${esc(r.name_zh||r.name)}</h3>
      <div class="zh">${esc(r.name)}</div>
      <div class="shtags"><span class="shtag">${esc(r.cuisine)}</span><span class="shtag">${priceStr(r.price)}</span><span class="shtag">吃分 ${Math.round(elo[name])}</span><span class="shtag">${rec[name].w}胜${rec[name].l}负</span></div>
      <div class="shrow"><span class="k">招牌</span>${esc(r.signature_dish)}</div>
      <div class="shrow"><span class="k">一句话</span>${esc(r.blurb)}</div>
      <div class="shrow"><span class="k">地址</span>${esc(r.address)}</div>
      <a class="maplink" target="_blank" rel="noopener" href="https://maps.google.com/?q=${r.lat},${r.lng}">📍 在 Google Maps 打开（${esc(r.area)}）</a>
      <div class="shjudge"><b style="font-size:14px">大家怎么比它</b>
        ${ js.length ? js.map(j=>{ const u=U[j.user_id]; const win=j.winner===name; const other=R[win?j.loser:j.winner]; if(!u||!other) return ''; return `<div class="jline"><span class="who">${u.emoji} ${esc(u.name)}</span>：${win?`${esc(r.name_zh||r.name)} <span class="gt">⟩</span> ${esc(other.name_zh||other.name)}`:`${esc(other.name_zh||other.name)} <span class="gt">⟩</span> ${esc(r.name_zh||r.name)}`}<span class="rsn">“${esc(j.reason)}”</span></div>`; }).join('') : '<div class="jline">还没有人比过它 —— 你来开个头？</div>' }
      </div>
    </div>`;
  document.getElementById('sheet-back').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function closeSheet(){
  document.getElementById('sheet-back').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}

/* ---------- tabs & events ---------- */
function goto(tab, pkFrom){
  document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active', p.id===tab+'-page'));
  if(tab==='pk') renderPK(pkFrom);
}
document.getElementById('tabbar').addEventListener('click', e=>{
  const b = e.target.closest('button[data-tab]'); if(b) goto(b.dataset.tab);
});
document.getElementById('app').addEventListener('click', e=>{
  const t = e.target;
  const follow = t.closest('[data-follow]');
  if(follow){
    const id = follow.dataset.follow;
    const i = my.follows.indexOf(id);
    i>=0 ? my.follows.splice(i,1) : my.follows.push(id);
    save(); renderFeed(); renderMe(); return;
  }
  const like = t.closest('[data-like]');
  if(like){
    const i = +like.dataset.like;
    const k = my.likes.indexOf(i);
    k>=0 ? my.likes.splice(k,1) : my.likes.push(i);
    save(); renderFeed(); return;
  }
  const pkFrom = t.closest('[data-pk-from]');
  if(pkFrom){ goto('pk', pkFrom.dataset.pkFrom); return; }
  const gotoBtn = t.closest('[data-goto]');
  if(gotoBtn){ goto(gotoBtn.dataset.goto); return; }
  const win = t.closest('[data-win]');
  if(win){ pkVote(+win.dataset.win, win); return; }
  const skip = t.closest('.pk-skip');
  if(skip){ renderPK(); return; }
  const rr = t.closest('[data-r]');
  if(rr){ openSheet(rr.dataset.r); return; }
});
document.getElementById('sheet-back').addEventListener('click', closeSheet);
document.getElementById('enter').addEventListener('click', ()=>document.getElementById('splash').classList.add('gone'));

/* ---------- boot ---------- */
renderFeed(); renderRank(); renderMe(); renderPK();
</script>
